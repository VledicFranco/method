name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22 required: per-package test scripts use `node --test src/**/*.test.ts`
          # which only globs natively from Node 22+. Node 20 treats the pattern as
          # a literal file path and errors with "Could not find ...".
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm test
