name: method-iteration
description: "6-phase product iteration loop for developing method itself: context → objective → design → implement → validate → decide"
version: "0.1.0"
phases:
  - id: 0
    name: "Context Loading"
    role: null
    guidance: |
      Phase 0 — Context Loading

      Before proposing any change to {{topic}}, inventory the current state of the product.

      Tasks:
      - List all existing methodologies in src/methodologies/ and their current status
        (tested, untested, known issues)
      - List any open issues, known failure patterns, or gaps surfaced in prior sessions
      - Review the active epoch hypothesis (epochs/eN-*/hypothesis.md) to understand
        what this iteration is working toward
      - Note which acceptance criteria from the epoch are still open

      Do NOT propose solutions yet. Only inventory.

      Use these exact field names in your submission:
        prior_methodologies   — array of strings: existing methodology names and their status
        open_issues           — array of strings: known gaps, failures, or missing features
        epoch_criteria_open   — array of strings: acceptance criteria not yet closed
        summary               — string: current state of the product and what this iteration addresses

      Submit when: all four fields populated, summary is specific about what gap this iteration closes.
    output_schema:
      prior_methodologies:
        type: array
        items: string
        min_items: 1
        description: "Existing methodology names and their current status"
      open_issues:
        type: array
        items: string
        min_items: 0
        description: "Known gaps, failure patterns, or missing features"
      epoch_criteria_open:
        type: array
        items: string
        min_items: 1
        description: "Acceptance criteria from the active epoch that are not yet closed"
      summary:
        type: string
        min_length: 1
        description: "Current product state and what gap this iteration addresses"
    invariants:
      - id: prior_methodologies_min_one
        description: "prior_methodologies must list at least one existing methodology"
        hard: true
      - id: epoch_criteria_open_min_one
        description: "epoch_criteria_open must reference at least one open criterion"
        hard: true
      - id: summary_non_empty
        description: "summary must be a non-empty string"
        hard: true

  - id: 1
    name: "Objective Setting"
    role: null
    guidance: |
      Phase 1 — Objective Setting

      Define the objective for this iteration at three levels, then classify the change type.

      Be level — What quality or standard does a successful iteration embody?
        Example: "methodologies that work on first try without field name errors"

      Do level — What must this iteration specifically accomplish?
        Example: "design and implement method-iteration.yaml with a validated test session"

      Motor level — What is the concrete, inspectable deliverable?
        Example: "a YAML file that loads in the server and completes at least one full session"

      Then:
      1. Write at least 3 checkable acceptance criteria. Each must be verifiable — true or false.
         BAD:  "The methodology works well"
         GOOD: "method_list returns method-iteration; at least one test session completes with delta=1.0"

      2. List at least 2 priority questions this iteration must answer.

      3. Classify the change type:
         - "methodology"     — adding or modifying a YAML methodology file
         - "infrastructure"  — changing runtime code, tools, schema, or server behavior
         - "both"            — touching both

      Use these exact field names in your submission:
        be_level              — string
        do_level              — string
        motor_level           — string
        acceptance_criteria   — array of strings, at least 3 items
        priority_questions    — array of strings, at least 2 items
        change_type           — string, must be exactly "methodology", "infrastructure", or "both"

      Submit when: all three levels defined, at least 3 criteria, at least 2 questions, change_type set.
    output_schema:
      be_level:
        type: string
        min_length: 1
        description: "Quality or standard that success embodies"
      do_level:
        type: string
        min_length: 1
        description: "What this iteration must specifically accomplish"
      motor_level:
        type: string
        min_length: 1
        description: "The concrete, inspectable deliverable"
      acceptance_criteria:
        type: array
        items: string
        min_items: 3
        description: "Checkable acceptance criteria — each must be falsifiable"
      priority_questions:
        type: array
        items: string
        min_items: 2
        description: "Questions this iteration must answer"
      change_type:
        type: string
        enum: ["methodology", "infrastructure", "both"]
        description: "What kind of change this iteration makes"
    invariants:
      - id: be_level_non_empty
        description: "be_level must be a non-empty string"
        hard: true
      - id: do_level_non_empty
        description: "do_level must be a non-empty string"
        hard: true
      - id: motor_level_non_empty
        description: "motor_level must be a non-empty string"
        hard: true
      - id: acceptance_criteria_min_three
        description: "acceptance_criteria must contain at least 3 items"
        hard: true
      - id: priority_questions_min_two
        description: "priority_questions must contain at least 2 items"
        hard: true
      - id: change_type_valid
        description: "change_type must be one of: methodology, infrastructure, both"
        hard: true

  - id: 2
    name: "Design"
    role: null
    guidance: |
      Phase 2 — Design

      Produce the design artifact before touching any files. The type of artifact depends
      on your change_type from Phase 1.

      If change_type is "methodology" or "both":
        Write a Methodology Spec covering:
        - motivation: what cognitive failure mode or gap this closes
        - cognitive_model: which framework grounds the phase design
          (TOTE, Zimmerman, Argyris, Cognitive Team, etc.)
        - phases sketch: name, role, key output fields, key invariants for each phase
        - acceptance_criteria: how we know it works in real sessions (not just type-checks)
        Use docs/methodology-spec.yaml as a template.

      If change_type is "infrastructure" or "both":
        Write a technical design covering:
        - what component changes and how
        - which files are affected
        - what the before/after behavior is
        - what could break

      In both cases:
        - Make at least 2 explicit key decisions (field names, phase structure, API shape, etc.)
        - Resolve any open questions from the epoch hypothesis that are answerable now

      Use these exact field names in your submission:
        design_summary          — string: the full design (spec or technical design as prose)
        key_decisions           — array of strings, at least 2 items: decisions made and why
        affected_files          — array of strings: files to be created or modified
        open_questions_resolved — array of strings: open questions from hypothesis now resolved (can be empty)
        methodology_name        — string: name of the new or modified methodology (soft — only if change_type includes methodology)

      Submit when: design_summary is complete enough to implement from, key_decisions list is specific,
      affected_files is accurate.
    output_schema:
      design_summary:
        type: string
        min_length: 1
        description: "Full design — methodology spec or technical design as prose"
      key_decisions:
        type: array
        items: string
        min_items: 2
        description: "Explicit decisions made during design, with rationale"
      affected_files:
        type: array
        items: string
        min_items: 1
        description: "Files to be created or modified"
      open_questions_resolved:
        type: array
        items: string
        min_items: 0
        description: "Open questions from the epoch hypothesis that are now resolved"
      methodology_name:
        type: string
        min_length: 1
        description: "Name of the new or modified methodology (required if change_type includes methodology)"
    invariants:
      - id: design_summary_non_empty
        description: "design_summary must be complete enough to implement from"
        hard: true
      - id: key_decisions_min_two
        description: "key_decisions must contain at least 2 explicit decisions"
        hard: true
      - id: affected_files_min_one
        description: "affected_files must list at least one file"
        hard: true
      - id: methodology_name_present
        description: "methodology_name should be set when change_type includes methodology"
        hard: false

  - id: 3
    name: "Implementation"
    role: null
    guidance: |
      Phase 3 — Implementation

      Execute the design from Phase 2. You are now in implemental mode — the design is
      committed. Do not re-open design decisions here. If you encounter a blocker that
      requires a design change, surface it explicitly rather than silently adapting.

      Tasks:
      - Create or modify the files listed in affected_files from Phase 2
      - For methodology changes: write the YAML, include "Use these exact field names"
        blocks in every phase guidance section
      - For infrastructure changes: make the code changes, verify type-check passes
      - Write planned test cases (TC descriptions, not runs — those happen in Phase 4)

      Use these exact field names in your submission:
        implemented_artifacts   — array of strings, at least 1 item: files created or modified
        implementation_notes    — string: anything unexpected encountered, decisions forced by implementation
        planned_tcs             — array of strings, at least 1 item: test cases planned for Phase 4

      Submit when: all affected_files from Phase 2 are implemented, type-check passes,
      planned_tcs lists at least one concrete test scenario.
    output_schema:
      implemented_artifacts:
        type: array
        items: string
        min_items: 1
        description: "Files created or modified during implementation"
      implementation_notes:
        type: string
        min_length: 1
        description: "Unexpected findings, forced decisions, or deviations from the design"
      planned_tcs:
        type: array
        items: string
        min_items: 1
        description: "Test cases to run in Phase 4 — each should name the scenario and pass criteria"
    invariants:
      - id: implemented_artifacts_min_one
        description: "implemented_artifacts must list at least one file"
        hard: true
      - id: implementation_notes_non_empty
        description: "implementation_notes must be non-empty (use 'none' if nothing unexpected)"
        hard: true
      - id: planned_tcs_min_one
        description: "planned_tcs must include at least one test case"
        hard: true

  - id: 4
    name: "Validation"
    role: null
    guidance: |
      Phase 4 — Validation

      Run real tests against the implementation. For methodology changes, this means running
      actual LLM sessions through the methodology — not just confirming the YAML loads.
      Structural validity (type-check, method_list) is necessary but not sufficient.

      Tasks:
      - Run the test cases planned in Phase 3 (use the Agent tool to spawn subagents
        with MCP access for methodology tests)
      - For each TC: record the outcome, what the server returned, whether it passed
      - Note any failure patterns: field name errors, unclear guidance, unexpected blocks
      - Assess how many acceptance criteria from Phase 1 are now closed

      Use these exact field names in your submission:
        sessions_run        — number: how many test sessions or TCs were executed (must be >= 1)
        session_outcomes    — array of strings, at least 1 item: outcome per TC (pass/fail + what happened)
        failure_patterns    — array of strings: anything that failed, was unclear, or surprised you
        delta_estimate      — number between 0.0 and 1.0: fraction of Phase 1 acceptance criteria now closed
        criteria_closed     — array of strings: which specific acceptance criteria are now satisfied

      Submit when: all planned TCs have been run, delta_estimate is honest, criteria_closed
      lists only criteria that are genuinely satisfied.
    output_schema:
      sessions_run:
        type: number
        min_value: 1
        max_value: 100
        description: "Number of test sessions or TCs executed"
      session_outcomes:
        type: array
        items: string
        min_items: 1
        description: "Outcome per TC: pass/fail and what happened"
      failure_patterns:
        type: array
        items: string
        min_items: 0
        description: "Failures, unclear guidance, surprising server behavior"
      delta_estimate:
        type: number
        min_value: 0
        max_value: 1
        description: "Fraction of Phase 1 acceptance criteria now closed (0.0–1.0)"
      criteria_closed:
        type: array
        items: string
        min_items: 0
        description: "Specific acceptance criteria confirmed satisfied by this validation"
    invariants:
      - id: sessions_run_min_one
        description: "at least 1 test session or TC must have been run"
        hard: true
      - id: session_outcomes_min_one
        description: "session_outcomes must record at least one result"
        hard: true
      - id: delta_estimate_range
        description: "delta_estimate must be between 0.0 and 1.0"
        hard: true

  - id: 5
    name: "Decide"
    role: null
    guidance: |
      Phase 5 — Decide

      Make an explicit stop/continue decision for this iteration.

      Review:
      - delta_estimate and criteria_closed from Phase 4
      - Which acceptance criteria from Phase 1 remain open
      - Whether another iteration would meaningfully close remaining gaps
        or whether the remaining gaps belong in a new epoch

      Decision options:
      - "stop"     — this iteration is done; delta is high enough and the open criteria
                     don't justify another pass before moving to the next epoch step
      - "continue" — unmet criteria justify another iteration; state what the next
                     iteration will specifically target

      The rationale must reference specific criteria by name. Vague rationales are not accepted.

      GOOD: "stop — criteria 1, 2, 3 satisfied; criterion 4 deferred to e2 as a separate epoch"
      GOOD: "continue — criterion 3 (test session end-to-end) failed due to field name issue; i2 will fix guidance and re-run"
      BAD:  "stop — looks good"

      Use these exact field names in your submission:
        decision              — string, must be exactly "stop" or "continue"
        rationale             — string: criterion-referenced rationale
        next_hypothesis       — string: what the next iteration or epoch should target (soft — encouraged always)

      Submit when: decision is made, rationale names specific criteria, next_hypothesis gives
      the team something concrete to pick up from.
    output_schema:
      decision:
        type: string
        enum: ["stop", "continue"]
        description: "Explicit stop or continue decision"
      rationale:
        type: string
        min_length: 1
        description: "Criterion-referenced rationale for the decision"
      next_hypothesis:
        type: string
        min_length: 1
        description: "What the next iteration or epoch should target"
    invariants:
      - id: decision_valid
        description: "decision must be 'stop' or 'continue'"
        hard: true
      - id: rationale_non_empty
        description: "rationale must be non-empty and reference specific criteria"
        hard: true
      - id: next_hypothesis_present
        description: "next_hypothesis is encouraged — what should the team pick up next?"
        hard: false
