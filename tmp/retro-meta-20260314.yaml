# Meta-Retrospective — RETRO-PROTO Trial
# The retrospective protocol producing a retrospective about itself.

retrospective:
  session_id: "META-RETRO-PROTO-TRIAL-20260314"
  methodology: P0-META
  method: "RETRO-PROTO (protocol, not a compiled method)"
  method_version: "0.1"
  project_card_id: null

  context:
    what_was_run: >
      The Retrospective Protocol (RETRO-PROTO) was trialed across 5 sessions on 2
      projects over a single day. 11 retrospectives were collected. The protocol
      went from draft to all 5 promotion criteria met in ~8 hours of elapsed time.
    scope:
      sessions: 5
      retrospectives: 11
      projects: [pv-method, t1-cortex]
      methods_exercised: [M3-PHRV, M1-IMPL, M2-ORCH, M1-COUNCIL, M3-TMP, M5-PLAN, M6-ARFN, M1-MDES]
      gap_candidates: 4
      evolutions_triggered: 2
      card_revisions: 4

  hardest_decision:
    step: "Trial design"
    decision: >
      Whether the self-referential test should require a change to the RETRO-PROTO
      spec itself, or whether improving an abstract method (M3-PHRV) through the
      protocol's own feedback mechanism counts. The strict reading: the protocol must
      change itself. The pragmatic reading: the protocol must produce a method
      improvement through its own mechanism — that's what "self-referential" means
      operationally.
    outcome: >
      Accepted the pragmatic reading. M3-PHRV Ax-1 was improved based on a
      retrospective observation collected through RETRO-PROTO. The protocol's
      feedback mechanism (collect → accumulate → trigger → evolve) functioned
      end-to-end, improving an abstract method. The protocol didn't change its own
      spec — it proved its spec works by producing a real improvement.
    guidance_gap: true

  observations:
    - step: "Schema design"
      type: success
      description: >
        The retrospective schema is genuinely zero-friction. 11 retrospectives in one
        day, all with real content. The hardest_decision field is the highest-signal
        element — every hardest_decision across 11 retros was genuine (no rote entries).
        The minimum-1-observation requirement works without feeling forced.
      evidence: "11/11 retros have genuine hardest_decision. 0 rote entries."
      severity: LOW
      improvement_target: abstract_method

    - step: "Accumulation thresholds"
      type: friction
      description: >
        The threshold system (3 MEDIUM for abstract method across 2+ projects) was
        too slow for the trial. All 11 retros came in one day — the cross-project
        requirement (2+ projects) was met because we deliberately ran sessions on both
        pv-method and t1-cortex. In a normal workflow where a project runs one session
        per week, reaching 3 observations across 2 projects could take months.
      evidence: >
        GC-P2SD-004 (M1-COUNCIL proportionality) needed 2 projects and got them only
        because we orchestrated cross-project sessions. In organic usage, this would
        accumulate much slower.
      severity: MEDIUM
      improvement_target: abstract_method

    - step: "Severity-based fast-track"
      type: success
      description: >
        The HIGH severity fast-track (1 observation = immediate gap candidate) was
        not triggered during the trial — all observations were MEDIUM or LOW. This
        is actually good: it means the methods don't have critical guidance failures,
        only friction and refinement opportunities. The fast-track exists as a safety
        net and wasn't needed.
      evidence: "0 HIGH observations across 11 retros."
      severity: LOW
      improvement_target: abstract_method

    - step: "Card feedback"
      type: success
      description: >
        The card_feedback section with per-rule verdicts (helpful/unhelpful/missing/
        overly_restrictive) is the highest-value output for card evolution. The
        T1X-VALGAPS retro produced 7 rule verdicts that directly led to 4 card
        revisions. The verdict vocabulary is right — "overly_restrictive" is more
        actionable than "didn't work."
      evidence: "T1X-VALGAPS: 7 verdicts → 4 card revisions (AC-01, AC-02, AC-03, AC-06)"
      severity: LOW
      improvement_target: abstract_method

    - step: "Proposed deltas"
      type: success
      description: >
        Making proposed_deltas optional was the right call. When agents have genuine
        insight, the deltas are specific and actionable (current/proposed/rationale).
        When they don't, the field is empty — no noise. Across 11 retros, deltas were
        present in 8 and absent in 3. All 8 were actionable.
      evidence: "8/11 retros had proposed_deltas. All 8 were specific with current/proposed/rationale."
      severity: LOW
      improvement_target: abstract_method

    - step: "Evolution ledger"
      type: friction
      description: >
        The evolution ledger was populated retroactively in bulk at the end of the
        trial, not incrementally as retros arrived. In production, someone (or
        something) needs to process retrospectives into the ledger regularly. The
        manual aggregation step is the weakest link — it requires a human or a
        dedicated M3-MEVO session to read retros, count observations, and trigger
        gap candidates.
      evidence: "EVOLUTION-LEDGER.yaml went from empty to fully populated in one commit (d5ceaa3)"
      severity: MEDIUM
      improvement_target: abstract_method

    - step: "Two-level evolution"
      type: success
      description: >
        The two-level model (abstract method changes need cross-project evidence,
        card changes need single-project evidence) worked correctly. Card revisions
        (DR-01/02/03/04/21) were made from single-project evidence (t1-cortex only).
        Abstract method changes (M3-PHRV Ax-1) required cross-session evidence but
        happened to be single-project (pv-method reviews). The threshold difference
        is appropriate — cards are project-specific, methods are universal.
      evidence: "4 card revisions from 1-project evidence. 1 abstract method change from 2-session evidence."
      severity: LOW
      improvement_target: abstract_method

    - step: "Self-referential test"
      type: surprise
      description: >
        The self-referential test was the last criterion to meet, but the signal was
        already present in the second retrospective (retro-review-P2-SD). The delay
        was not accumulation time — it was recognition time. The M3-PHRV citation
        friction was a clear signal from retro #2, but we didn't process it into an
        evolution until the end of the trial. Faster processing would have met the
        criterion earlier.
      evidence: "Signal available at retro #2, processed at retro #11."
      severity: LOW
      improvement_target: abstract_method

    - step: "Retrospective quality over time"
      type: gap
      description: >
        The unforeseen challenge UC-1 (retrospective quality decay) was not testable
        in a single-day trial. All 11 retros were from fresh sessions where the agent
        was encountering the method for the first time. Long-term quality decay
        (rote "everything fine" after 20+ sessions) remains unvalidated. The
        hardest_decision field mitigates this, but we don't have evidence that it
        works over many sessions.
      evidence: "11/11 retros high quality, but all from day 1. No longitudinal data."
      severity: MEDIUM
      improvement_target: abstract_method

  proposed_deltas:
    - target: abstract_method
      location: "RETRO-PROTO — accumulation mechanism"
      current: "Manual aggregation: human reads retros and updates evolution ledger"
      proposed: >
        Add a recommended aggregation cadence: process retrospectives into the
        evolution ledger at least once per week (or after every 5 retros, whichever
        comes first). The processing step could be a lightweight M3-TMP session:
        read new retros, count observations per step, check thresholds, update ledger.
      rationale: >
        The manual aggregation was the weakest link in the trial. Retro #2 had the
        signal for the self-referential test, but it wasn't processed until retro #11.
        A regular cadence prevents signal latency.

    - target: abstract_method
      location: "RETRO-PROTO — threshold calibration"
      current: "3 MEDIUM across 2+ projects for abstract method changes"
      proposed: >
        Consider lowering to 2 MEDIUM across 2+ projects for the first 6 months of
        promoted status, then re-evaluate. The trial showed that 2-project evidence
        was sufficient for confident decisions (GC-P2SD-004 M1-COUNCIL proportionality).
        The 3-observation threshold may be unnecessarily conservative for cross-project
        signals.
      rationale: >
        In the trial, reaching 3 MEDIUM on the same step across 2 projects happened
        only because we deliberately ran cross-project sessions. In organic usage,
        this could take months. Lowering the threshold temporarily accelerates the
        feedback loop while the system is young and methods are changing frequently.
