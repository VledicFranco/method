retrospective:
  session_id: "prd003-p4-m1-mdes"
  methodology: P0-META
  method: M1-MDES
  method_version: "1.0"
  project_card_id: I2-METHOD

  hardest_decision:
    step: "sigma_4"
    decision: >
      How to structure the step DAGs for the three dispatch methods.
      Each method executes another methodology's steps in a loop. The
      steps needed to represent both the loop structure (execute step →
      validate → decide → loop) and the autonomy-specific behavior
      (escalate vs auto-advance vs retry).
    outcome: >
      Used a linear DAG with explicit loop-back edges (e.g., sigma_S6
      loops to sigma_S3). Each method has 5-6 steps covering: load
      routing, initialize, execute step, validate, [scope check], loop.
      The loop semantics are documented in the step guidance rather than
      in formal step DAG edges, since the linear traversal model doesn't
      support loop edges natively.
    guidance_gap: true

  observations:
    - step: "sigma_4"
      type: gap
      description: >
        M1-MDES's step DAG definition (sigma_4) assumes a DAG without
        loops. But P3-DISPATCH methods have inherent loops — they execute
        steps of the target methodology iteratively. The step DAG section
        had to be extended informally with "loop_structure" annotations
        rather than encoding loops in the formal DAG.
      evidence: "registry/P3-DISPATCH/M1-INTERACTIVE/M1-INTERACTIVE.yaml"
      severity: MEDIUM
      improvement_target: abstract_method
    - step: "sigma_5"
      type: success
      description: >
        The PRD's Component 1 section provided complete methodology design
        with domain theory, methods, transition function, and termination.
        Translating to YAML was mostly mechanical. The PRD served as an
        effective M1-MDES input document, suggesting that well-structured
        PRDs can substitute for the knowledge corpus normally required by
        M1-MDES's sigma_1 (Domain Retraction).
      evidence: "docs/prds/003-dispatch.md:38-129"
      severity: LOW
      improvement_target: unclear
    - step: "sigma_6"
      type: friction
      description: >
        Compilation gates are self-assessed by the compiling agent. There
        is no external verification that the YAML actually satisfies G0-G6.
        The agent marks all gates as PASS based on its own judgment. This
        works when the methodology design is straightforward but could
        produce false PASSes for complex designs.
      evidence: "registry/P3-DISPATCH/P3-DISPATCH.yaml compilation_record"
      severity: LOW
      improvement_target: abstract_method

  card_feedback:
    - rule_id: DR-01
      verdict: helpful
      note: >
        Registry integrity awareness guided careful YAML structuring.
        Used P2-SD.yaml as template to ensure structural completeness.
    - rule_id: DR-02
      verdict: helpful
      note: >
        The strict YAML structure requirements ensured all sections
        were present (navigation, domain_theory, roles, phases, etc.).

  proposed_deltas:
    - target: abstract_method
      location: "M1-MDES sigma_4 guidance"
      current: "Step DAG as acyclic directed graph"
      proposed: >
        Step DAG as directed graph, optionally with labeled back-edges
        for loop structures. Loop edges must specify termination conditions.
        Methods with loops must have a termination certificate that
        addresses loop termination, not just DAG exhaustion.
      rationale: >
        Methods like P3-DISPATCH that iterate over steps of another
        methodology inherently loop. The DAG restriction forces these
        loops to be encoded informally in guidance text rather than
        structurally in the step graph.
