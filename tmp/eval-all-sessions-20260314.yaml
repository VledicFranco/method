empirical_evaluation:
  name: "Full Session Day Evaluation — 2026-03-14"
  sessions_analyzed: 5
  retrospectives_collected: 11
  projects: [pv-method, t1-cortex]
  methodologies_tested: [P2-SD, P0-META, P1-EXEC]

  # ═══════════════════════════════════════════════════════
  # SESSION INVENTORY
  # ═══════════════════════════════════════════════════════

  sessions:
    - id: "PHRV-P1EXEC-001"
      project: pv-method
      type: review
      methods: [M3-PHRV]
      retros: 1
      verdict: CONDITIONAL (7 MEDIUM in M1-COUNCIL)
      result: "7 findings → fixes applied → validated"

    - id: "review-P2-SD-20260314"
      project: pv-method
      type: review
      methods: [M3-PHRV]
      retros: 1
      verdict: CONDITIONAL (3 LOW)
      result: "3 findings → M7-PRDS order function fixed"

    - id: "PRD002-IMPL-20260314"
      project: pv-method
      type: implementation
      methods: [M5-PLAN, M1-IMPL]
      retros: 1
      result: "7/7 tasks, 14/14 tests, 6 commits"

    - id: "PRD003-IMPL-20260314"
      project: pv-method
      type: implementation
      methods: [M6-ARFN, M1-IMPL x3, M1-MDES]
      retros: 5
      result: "5/5 phases, 57 tests, bridge package + 4 MCP tools + P3-DISPATCH methodology"

    - id: "T1X-VALGAPS-20260314"
      project: t1-cortex
      type: implementation
      methods: [M2-ORCH, M1-IMPL, M1-COUNCIL, M3-TMP]
      retros: 1
      result: "7/8 tasks, 44/44 tests, 6 commits"

    - id: "T1X-BUGS-20260314"
      project: t1-cortex
      type: bugfix
      methods: [M1-IMPL x2]
      retros: 2
      result: "2/2 bugs fixed, 25/25 tests, 4 commits"

  # ═══════════════════════════════════════════════════════
  # RETRO-PROTO TRIAL — FINAL STATUS
  # ═══════════════════════════════════════════════════════

  retro_proto_trial:
    retrospective_count: "11 / 10 ✓ EXCEEDED"
    gap_candidates_surfaced: "4 / 2 ✓ EXCEEDED"
    evolution_triggered: "1 / 1 ✓ (M1-COUNCIL symbol fixes)"
    evolution_validated: "1 / 1 ✓ (re-review confirmed)"
    self_referential_test: "0 / 1 — see assessment below"

    gap_candidates:
      - id: GC-01
        name: "M1-IMPL sigma_B3 multi-task / schema friction"
        sources: "PRD002 retro (pv-method) + PRD003 retros x3 (pv-method)"
        severity: MEDIUM
        threshold: "3+ MEDIUM on same step, single project"
        status: MET

      - id: GC-02
        name: "M1-COUNCIL proportionality"
        sources: "PRD002 retro (pv-method) + T1X-VALGAPS retro (t1-cortex)"
        severity: MEDIUM
        threshold: "2 MEDIUM, 2 projects"
        status: MET

      - id: GC-03
        name: "DR-01/DR-02 Metals mandate disproportionate for non-exploration work"
        sources: "T1X-VALGAPS retro + T1X-BUG-47 retro + T1X-BUG-46 retro"
        severity: MEDIUM
        threshold: "3 observations, 1 project"
        status: "MET (card-level)"

      - id: GC-04
        name: "Phase A scaling — collapse for trivial tasks"
        sources: "T1X-BUG-46 retro + T1X-VALGAPS implicit"
        severity: LOW
        threshold: "accumulating"
        status: "Below threshold but consistent signal"

    self_referential_assessment: >
      The M3-PHRV citation friction observation (file:line awkward for YAML) appeared
      in the P2-SD review retro (MEDIUM) and is echoed by the PRD003 retros where
      agents reviewed YAML files. However, it has not yet triggered a formal change
      to M3-PHRV's Ax-1. If we apply the GC-03 pattern (DR-01 scoping from card
      feedback), that IS a protocol-driven improvement to the I1-T1X card — but the
      protocol improving ITSELF requires a change to the RETRO-PROTO spec or to
      M3-PHRV (an abstract method). The DR-01 scoping is a card change, not a
      protocol/method change. Strictly speaking: self_referential_test NOT YET MET.

  # ═══════════════════════════════════════════════════════
  # CROSS-SESSION PATTERNS
  # ═══════════════════════════════════════════════════════

  cross_session_patterns:
    - pattern: "Agents override prompt prescriptions — and they're right"
      evidence:
        - "T1X-VALGAPS: overrode M1-COUNCIL → M3-TMP for P2 (correct)"
        - "T1X-VALGAPS: chose P1-EXEC/M2-ORCH over P2-SD/M2-DIMPL (correct)"
        - "T1X-BUG-46: collapsed Phase A (correct)"
      implication: >
        Prompts should provide evaluation criteria and defaults, not rigid
        prescriptions. Trust agent routing judgment. Codified in Guide 8.

    - pattern: "Metals MCP adds friction for small/known-scope work"
      evidence:
        - "T1X-VALGAPS: DR-03/04 overly restrictive for non-Scala"
        - "T1X-BUG-47: DR-01/02 unhelpful for targeted bug fix"
        - "T1X-BUG-46: DR-01 unhelpful for single test file"
      implication: >
        I1-T1X card needs DR-01/02 scoping: mandatory for feature exploration,
        recommended for targeted bug fixes with <5 known files.

    - pattern: "Phase A scales naturally with complexity"
      evidence:
        - "T1X-BUG-46: Phase A collapsed to 'read issue, confirm file, GO' (correct)"
        - "T1X-BUG-47: Phase A was genuine investigation — discovered second bug (correct)"
        - "PRD002: Phase A found 13 discrepancies including D-11 (subtle enrichment bug)"
      implication: >
        M1-IMPL should explicitly acknowledge Phase A scaling. The method's
        guidance should say: "Phase A depth is proportional to task complexity.
        Collapse for well-prescribed trivial tasks."

    - pattern: "4/5 PRD003 hardest decisions had guidance_gap: true"
      evidence: "PRD003 retros: architecture merge strategy, test structure for untestable components, postcondition validation approach, DAG loop representation"
      implication: >
        The spec-to-code boundary is under-operationalized. Methods tell you
        WHAT to produce but not HOW to handle implementation ambiguities.
        This is expected — methods are structural, not procedural — but the
        gap should be acknowledged in Guide 8.

    - pattern: "Scala 3 indentation gotcha appears in multiple sessions"
      evidence:
        - "T1X-BUG-47: if/else in for-comprehension needed braces"
        - "T1X-VALGAPS: not observed but same codebase"
      implication: "I1-T1X card needs DR-21 (Scala 3 indentation rule)"

  # ═══════════════════════════════════════════════════════
  # ACTIONABLE CHANGES (prioritized)
  # ═══════════════════════════════════════════════════════

  actionable_changes:
    high_priority:
      - id: AC-01
        target: "I1-T1X project card"
        change: "Scope DR-01/DR-02: mandatory for feature exploration, recommended for targeted bug fixes with <5 known files"
        evidence: "3 observations across T1X-VALGAPS + T1X-BUG-47 + T1X-BUG-46"
        gap_candidate: GC-03

      - id: AC-02
        target: "I1-T1X project card"
        change: "Add DR-21: Scala 3 for-comprehension indentation rule"
        evidence: "T1X-BUG-47 post-merge compilation failure"

      - id: AC-03
        target: "I1-T1X project card"
        change: "Scope DR-03 to Scala source files only (not scripts/config)"
        evidence: "T1X-VALGAPS retro (overly_restrictive verdict)"

    medium_priority:
      - id: AC-04
        target: "Abstract method (M1-IMPL)"
        change: "Explicit Phase A scaling guidance: collapse for trivial, full for moderate"
        evidence: "T1X-BUG-46 retro + empirical pattern across 4 sessions"
        gap_candidate: GC-04

      - id: AC-05
        target: "Abstract method (P1-EXEC)"
        change: "M1-COUNCIL proportionality heuristic"
        evidence: "T1X-VALGAPS override + PRD002 sigma_B3 stretch"
        gap_candidate: GC-02

      - id: AC-06
        target: "I1-T1X project card"
        change: "DR-04 trivial disjointness escape for R9-PDVF"
        evidence: "T1X-VALGAPS retro (overly_restrictive verdict)"

    low_priority:
      - id: AC-07
        target: "I2-METHOD project card"
        change: "DR-01 gap: add guidance for fixing pre-existing registry YAML defects during implementation"
        evidence: "PRD003-P1 retro (missing_coverage verdict)"

  # ═══════════════════════════════════════════════════════
  # OVERALL ASSESSMENT
  # ═══════════════════════════════════════════════════════

  overall:
    methodology_verdict: >
      P2-SD v2.0 works in production across both feature implementation and bug
      fixes, on both TypeScript (pv-method) and Scala (t1-cortex) projects. The
      routing (delta_SD) produces correct method selections. The execution binding
      model (P1-EXEC default + override) works — agents make correct overrides.

    card_verdict: >
      The MIC system works. I1-T1X (20 rules) is overly restrictive for bug/config
      work but valuable for feature implementation. I2-METHOD (12 rules) works well.
      Card feedback from retrospectives produces actionable revision signals.

    retro_protocol_verdict: >
      RETRO-PROTO produces genuine, actionable feedback. 11 retros collected in one
      day, 4 gap candidates surfaced, 1 evolution cycle validated. The protocol is
      ready for promotion once the self-referential test is met (one more abstract
      method change driven by retro evidence).

    what_surprised_us:
      - "Agents are better at routing than prompts — trust their judgment"
      - "Phase A scaling is natural and doesn't need enforcement — agents collapse it correctly"
      - "Card rules designed for features don't always fit bugs — context-dependent scoping needed"
      - "The hardest decisions are at the spec-to-code boundary, which methods intentionally don't cover"
      - "11 retrospectives in one day — the zero-friction schema design works"
