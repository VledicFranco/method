sessions:
  - session_id: prd003-p1-m6-arfn
    methodology: P2-SD
    method: M6-ARFN
    method_version: "1.0"
    hardest_decision:
      step: architecture_spec
      decision: "Whether getMethodologyRouting should merge formal predicates with operationalization predicates, and how to handle name mismatch (formal base names vs compound operationalization names)."
      outcome: "Join on exact name match; compound names get null trueWhen/falseWhen. Pragmatic tradeoff — perfect merge would require parsing compound names."
      guidance_gap: true

  - session_id: prd003-p1-m1-impl
    methodology: P2-SD
    method: M1-IMPL
    method_version: "3.1"
    hardest_decision:
      step: sigma_B3
      decision: "Whether to fix P2-SD.yaml indentation issue (coverage_claim, authority_claim, role_partition_rationale at wrong nesting level) as part of implementation, or flag and leave."
      outcome: "Fixed it. Indentation caused js-yaml parse issues affecting routing extraction tests. Fix was semantically correct. All tests pass."
      guidance_gap: false

  - session_id: prd003-p2-m1-impl
    methodology: P2-SD
    method: M1-IMPL
    method_version: "3.1"
    hardest_decision:
      step: sigma_B1
      decision: "How to structure parser tests given pty-session and pool require a running Claude Code installation. SC-4 can't be validated in CI."
      outcome: "Focused tests on parser (pure function, 15 tests). Deferred integration testing to Phase 5. PTY session management and pool logic untested until then."
      guidance_gap: true

  - session_id: prd003-p3-m1-impl
    methodology: P2-SD
    method: M1-IMPL
    method_version: "3.1"
    hardest_decision:
      step: sigma_B3
      decision: "How to implement postcondition validation — keyword matching vs structured analysis vs always pass."
      outcome: "Keyword extraction with 50% threshold. Intentionally loose. Escalates on failure rather than retrying."
      guidance_gap: true

  - session_id: prd003-p4-m1-mdes
    methodology: P0-META
    method: M1-MDES
    method_version: "1.0"
    hardest_decision:
      step: sigma_4
      decision: "How to structure step DAGs for dispatch methods that execute another methodology's steps in a loop."
      outcome: "Linear DAG with explicit loop-back edges. Loop semantics in guidance text. 5-6 steps per method."
      guidance_gap: true

