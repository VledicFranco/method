# ============================================================================
# KEY FINDINGS
# ============================================================================

key_findings:
  - finding: "No HIGH-severity observations across all 5 retros. The methodology held up — issues were MEDIUM friction/gaps, not blockers."
  - finding: "4 of 5 hardest decisions had guidance_gap: true, indicating under-operationalization at the spec-to-code boundary is the primary improvement vector."
  - finding: "sigma_B3 is the dominant friction step (9 of 13 observations). This is structural — it's where specs meet implementation — not a defect."
  - finding: "YAML schema inconsistency is a systemic cross-step pattern (3 observations, 3 sessions). Does not meet the formal same-step threshold but warrants a registry-level improvement."
  - finding: "DR-04 (thin wrappers) and DR-09 (real fixtures) are the strongest design rules — consistently helpful, with DR-09 catching bugs that mocks would miss."
  - finding: "DR-01 has a coverage gap for pre-existing registry defects. Proposed delta PD-02 addresses this directly."
  - finding: "The most impactful proposed delta is PD-01 (DAG loop support in M1-MDES), because it affects the abstract method definition and will recur for any iterative methodology."
