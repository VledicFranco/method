# ============================================================================
# CROSS-RETRO PATTERNS
# ============================================================================

cross_retro_patterns:
  - pattern_id: CRP-01
    label: "sigma_B3 is the friction hotspot"
    sessions: [prd003-p1-m1-impl, prd003-p2-m1-impl, prd003-p3-m1-impl, prd003-p4-m1-mdes]
    description: >
      sigma_B3 (or its equivalent in M1-MDES: sigma_4/sigma_6) is where 9 of 13
      observations cluster. This is the core build step where implementation
      decisions are forced. Gaps, surprises, and frictions all concentrate here
      because this is where abstract specs meet concrete code.
    observation_count: 9

  - pattern_id: CRP-02
    label: "YAML schema inconsistencies across registry"
    sessions: [prd003-p1-m6-arfn, prd003-p1-m1-impl, prd003-p3-m1-impl]
    description: >
      Three observations relate to YAML structural issues: predicate name
      mismatch (p1-arfn), indentation bug (p1-impl), output_schema format
      variation (p3-impl). Registry YAML lacks a single enforced schema, so
      each consumer discovers inconsistencies at implementation time.
    observation_ids:
      - "p1-arfn: predicate name mismatch (MEDIUM gap)"
      - "p1-impl: indentation bug (MEDIUM surprise)"
      - "p3-impl: output_schema format variation (LOW friction)"

  - pattern_id: CRP-03
    label: "Well-written PRDs reduce architecture overhead"
    sessions: [prd003-p2-m1-impl, prd003-p4-m1-mdes]
    description: >
      Two sessions noted that detailed PRD sections served as effective
      architecture/design documents, reducing the need for separate M6-ARFN
      or M1-MDES domain retraction phases. Pattern suggests PRD quality
      directly reduces per-phase method overhead.

  - pattern_id: CRP-04
    label: "DR-04 thin wrapper pattern consistently effective"
    sessions: [prd003-p1-m6-arfn, prd003-p1-m1-impl, prd003-p3-m1-impl]
    description: >
      DR-04 was tested 3 times and rated helpful every time. The thin-wrapper
      MCP handler pattern produces trivial handler implementations and clear
      separation between core logic and transport.

  - pattern_id: CRP-05
    label: "DR-09 real fixtures catch real bugs"
    sessions: [prd003-p1-m1-impl, prd003-p3-m1-impl]
    description: >
      Using real registry YAML as test fixtures (DR-09) caught the P2-SD.yaml
      indentation bug and output_schema format variation. Both would have been
      hidden by minimal mocks. Pattern validates the design rule.

  - pattern_id: CRP-06
    label: "Hardest decisions cluster where specs are under-operationalized"
    sessions: [prd003-p1-m6-arfn, prd003-p2-m1-impl, prd003-p3-m1-impl, prd003-p4-m1-mdes]
    description: >
      4 of 5 hardest decisions had guidance_gap: true. The gaps are consistently
      at the boundary between abstract specification and concrete implementation:
      merge strategies (p1-arfn), test strategies for non-testable components
      (p2-impl), heuristic operationalization (p3-impl), and loop representation
      in DAGs (p4-mdes).

# ============================================================================
# GAP CANDIDATE ASSESSMENT
# ============================================================================
# Threshold: 3 MEDIUM observations at the same step, OR 1 HIGH observation.

gap_candidates:
  - candidate_id: GC-01
    status: MEETS_THRESHOLD
    threshold_met: "3 MEDIUM at sigma_B3"
    step: sigma_B3
    matching_observations:
      - { session: prd003-p1-m1-impl, type: surprise, severity: MEDIUM, summary: "P2-SD.yaml indentation bug" }
      - { session: prd003-p3-m1-impl, type: gap, severity: MEDIUM, summary: "Postcondition validation heuristic not operationalized" }
      - { session: prd003-p3-m1-impl, type: surprise, severity: MEDIUM, summary: "Sub-agent committed unrelated file from working directory" }
    assessment: >
      sigma_B3 has 3 MEDIUM-severity observations across 2 sessions. However,
      the observations are thematically diverse (YAML defects, heuristic gaps,
      sub-agent isolation). This suggests sigma_B3 is a broad friction point
      rather than a single addressable gap. Recommend splitting into:
      (a) registry YAML consistency gap — addressable via schema enforcement,
      (b) heuristic operationalization gap — addressable via PRD spec standards,
      (c) sub-agent isolation gap — addressable via project card commit rules.

  - candidate_id: GC-02
    status: BELOW_THRESHOLD_BUT_NOTABLE
    threshold_met: "none — 1 MEDIUM at sigma_4"
    step: sigma_4
    matching_observations:
      - { session: prd003-p4-m1-mdes, type: gap, severity: MEDIUM, summary: "Step DAG assumes acyclic; loops need informal annotations" }
    assessment: >
      Only 1 observation but it has a concrete proposed delta (allow labeled
      back-edges in DAGs). If P3-DISPATCH is used frequently, this gap will
      recur. Worth tracking but does not meet formal threshold.

  - candidate_id: GC-03
    status: BELOW_THRESHOLD_BUT_NOTABLE
    threshold_met: "none — cross-step YAML inconsistency pattern (CRP-02)"
    step: "(cross-step)"
    matching_observations:
      - { session: prd003-p1-m6-arfn, type: gap, severity: MEDIUM, summary: "Predicate name mismatch" }
      - { session: prd003-p1-m1-impl, type: surprise, severity: MEDIUM, summary: "YAML indentation bug" }
      - { session: prd003-p3-m1-impl, type: friction, severity: LOW, summary: "output_schema format variation" }
    assessment: >
      3 observations across different steps but all related to YAML schema
      inconsistency. Does not meet the formal "same step" threshold, but the
      cross-step pattern suggests a systemic issue. Consider whether the gap
      threshold should account for cross-step thematic clustering.

# ============================================================================
# PROPOSED DELTAS (ranked by frequency/impact)
# ============================================================================

proposed_deltas_all:
  - delta_id: PD-01
    source_session: prd003-p4-m1-mdes
    target: abstract_method
    location: "M1-MDES sigma_4 guidance"
    current: "Step DAG as acyclic directed graph"
    proposed: >
      Step DAG as directed graph, optionally with labeled back-edges for loop
      structures. Loop edges must specify termination conditions. Methods with
      loops must have a termination certificate that addresses loop termination,
      not just DAG exhaustion.
    rationale: >
      P3-DISPATCH methods iterate over steps of another methodology — inherent
      loops. DAG restriction forces informal encoding in guidance text.
    impact: HIGH
    frequency: 1
    rank: 1
    rank_rationale: >
      Highest impact: changes the abstract method definition, affects all future
      methodology designs that involve iteration. Without this, every looping
      methodology will re-encounter the same gap.

  - delta_id: PD-02
    source_session: prd003-p1-m1-impl
    target: project_card
    location: "DR-01"
    current: >
      Any change to a method YAML must preserve compilation status — do not
      introduce changes that would cause a compiled method to fail G0-G6 gates.
    proposed: >
      Any change to a method YAML must preserve compilation status — do not
      introduce changes that would cause a compiled method to fail G0-G6 gates.
      If a structural defect is discovered in a registry YAML during
      implementation, fix it and document the fix in the commit message.
      Registry defects that block implementation are implementation scope.
    rationale: >
      P2-SD.yaml indentation bug discovered during Phase 1 implementation.
      Without guidance, agent had to decide if fixing it was in scope.
    impact: MEDIUM
    frequency: 1
    rank: 2
    rank_rationale: >
      Medium impact but directly addresses the DR-01 missing_coverage verdict.
      Low risk — adds permission to fix, doesn't change existing constraints.

  - delta_id: PD-03
    source_session: prd003-p3-m1-impl
    target: project_card
    location: "role_notes.impl_sub_agent"
    current: "Both require care but in different ways."
    proposed: >
      Both require care but in different ways. When committing, only stage files
      directly related to the implementation task. Do not commit unstaged changes
      from other work.
    rationale: >
      Sub-agent included unrelated files in commit because it staged all changes
      rather than specific files.
    impact: LOW
    frequency: 1
    rank: 3
    rank_rationale: >
      Low impact — addresses a specific sub-agent hygiene issue. But easy to
      implement and prevents accidental pollution of commits.

