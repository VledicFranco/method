method:
  id: M3-PHRV
  parent: P2-SD
  name: "Phase Review Method"
  description: >
    Post-implementation review method. After a phase completes via M1-IMPL or
    M2-DIMPL, M3-PHRV evaluates the delivered work against the PhaseDoc,
    architecture docs, and PRD. Produces a ReviewReport with per-finding citations
    (file:line) and an overall verdict. Read-only — M3-PHRV does not modify source.
  version: "1.0"
  status: compiled
  compilation_date: "2026-03-14"
  formal_grounding: "theory/F1-FTH.md"
  source: "M1-IMPL Reviewer role (lines 215-221); P2-SD delta_SD arm 4"

navigation:
  what: >
    M3-PHRV takes a completed phase's artifacts (source files, session log, PhaseDoc,
    architecture docs) and produces a ReviewReport: a list of findings with file:line
    citations, severity ratings, and an overall verdict (PASS, CONDITIONAL, FAIL).
    Does not fix anything — findings are input to the next M1-IMPL or M3-MEVO cycle.
  who: >
    One role — reviewer. Read-only access to all phase artifacts. The reviewer
    evaluates delivered work against the spec, not against their own judgment about
    what the code should do.
  why: >
    Implementation without review accumulates silent drift: the code works but
    diverges from the spec, architecture constraints are violated without detection,
    and acceptance criteria are partially met without explicit acknowledgment. M3-PHRV
    makes the gap between spec and delivery visible and citable.
  how: >
    Four linear steps: orient (load phase artifacts) -> audit (check each task against
    PhaseDoc acceptance criteria) -> assess (evaluate architecture and cross-cutting
    concerns) -> report (produce ReviewReport with verdict).
  when_to_use:
    - "A phase has completed via M1-IMPL or M2-DIMPL"
    - "The delivered work needs evaluation against PRD and architecture"
    - "Findings are needed as input to the next planning or evolution cycle"
  when_not_to_use:
    - "Mid-implementation review — use M1-IMPL sigma_A1-A4 (confidence raising) instead"
    - "Cross-phase drift analysis — use M4-DDAG instead"
    - "The task is to fix issues, not find them — use M1-IMPL"

domain_theory:
  id: D_PHRV
  sorts:
    - name: PhaseArtifact
      cardinality: singleton_per_execution
      description: "The bundle of phase outputs: source files, session log, PhaseDoc, test results"
    - name: ArchDoc
      cardinality: finite
      description: "Architecture documents the phase should conform to"
    - name: AcceptanceCriterion
      cardinality: "finite, >= 1 from PhaseDoc"
      description: "A specific criterion from the PhaseDoc that the delivered work must satisfy"
    - name: Finding
      cardinality: unbounded
      description: "A specific observation: what was expected, what was delivered, where the gap is"
    - name: Severity
      cardinality: finite
      values: [CRITICAL, HIGH, MEDIUM, LOW]
      description: "Finding severity — same scale as M1-IMPL discrepancy classification"
    - name: ReviewReport
      cardinality: singleton_per_execution
      description: "Assembled findings with verdict"
    - name: Verdict
      cardinality: finite
      values: [PASS, CONDITIONAL, FAIL]
      description: "PASS: all criteria met. CONDITIONAL: met with documented gaps. FAIL: criteria not met."
  function_symbols:
    - name: severity_of
      signature: "Finding -> Severity"
      totality: total
    - name: verdict_of
      signature: "ReviewReport -> Verdict"
      totality: total
    - name: criterion_of
      signature: "Finding -> AcceptanceCriterion"
      totality: total
      note: "Each finding traces to a specific acceptance criterion"
  predicates:
    - name: criterion_met
      signature: "AcceptanceCriterion -> Bool"
      description: "The acceptance criterion is fully satisfied by the delivered work"
    - name: criterion_gap
      signature: "AcceptanceCriterion x Finding -> Bool"
      description: "The acceptance criterion has a gap documented by this finding"
    - name: architecture_aligned
      signature: "PhaseArtifact x ArchDoc -> Bool"
      description: "The phase artifacts conform to the architecture document"
    - name: finding_cited
      signature: "Finding -> Bool"
      description: "The finding has a specific citation: file:line for source code, file:key-path for YAML/config"
    - name: report_complete
      signature: "ReviewReport -> Bool"
      description: "The report covers all acceptance criteria and architecture checks"
  axioms:
    - id: Ax-1
      name: Finding citation required
      statement: "forall f : Finding. finding_cited(f)"
      rationale: >
        Every finding must have a specific citation. For source code review: file:line
        citation. For YAML/config review: file:key-path citation (e.g.,
        M7-PRDS.yaml -> domain_theory -> axioms -> Ax-5 -> statement). For mixed
        reviews: use whichever form is more stable and useful for the artifact type.
        Uncited findings are opinions, not review results.
      evolution_source: "retro-review-P2-SD.yaml — MEDIUM friction: file:line citations awkward for YAML review, key-path is more stable"
    - id: Ax-2
      name: Criterion traceability
      statement: "forall ac : AcceptanceCriterion. criterion_met(ac) OR exists f : Finding. criterion_gap(ac, f)"
      rationale: "Every acceptance criterion is either met or has an explicit gap finding. No criterion goes unevaluated."
    - id: Ax-3
      name: Verdict consistency
      statement: >
        forall r : ReviewReport.
        (verdict_of(r) = PASS -> forall ac : AcceptanceCriterion. criterion_met(ac)) AND
        (verdict_of(r) = FAIL -> exists ac : AcceptanceCriterion. NOT criterion_met(ac)
          AND exists f : Finding. criterion_gap(ac, f) AND severity_of(f) IN {CRITICAL, HIGH}) AND
        (verdict_of(r) = CONDITIONAL -> forall ac : AcceptanceCriterion.
          criterion_met(ac) OR (exists f : Finding. criterion_gap(ac, f) AND severity_of(f) IN {MEDIUM, LOW}))
      rationale: "Verdict must be consistent with findings. PASS requires all met. FAIL requires at least one CRITICAL/HIGH gap. CONDITIONAL allows only MEDIUM/LOW gaps."
    - id: Ax-4
      name: Finding-criterion linkage
      statement: "forall f : Finding. exists ac : AcceptanceCriterion. criterion_of(f) = ac"
      rationale: "Every finding traces to a declared acceptance criterion via criterion_of. Orphan findings with no criterion linkage are not valid."
  domain_boundary_note: >
    Excludes: fixing found issues (M3-PHRV is read-only); implementation decisions
    (the reviewer evaluates against spec, not against personal judgment); cross-phase
    concerns (those belong to M4-DDAG); the content domain of the implementation
    (D_PHRV tracks review structure, not the subject matter of the code).
  initial_state_valid_claim: >
    A state with PhaseArtifact loaded, AcceptanceCriteria enumerated, no Findings, no
    ReviewReport satisfies all axioms: Ax-1 (vacuously true — no Findings exist),
    Ax-2 (not yet applied — evaluation has not started), Ax-3 (vacuously true — no
    ReviewReport exists), Ax-4 (vacuously true — no Findings exist). Valid.
  terminal_state_valid_claim: >
    A state with all AcceptanceCriteria evaluated per Ax-2, all Findings cited per Ax-1,
    all Findings linked to criteria per Ax-4, ReviewReport complete with consistent
    verdict per Ax-3, and report_complete(reviewReport) = true. Valid.

roles:
  - id: reviewer
    description: >
      Read-only evaluator. Reads completed phase source files, PhaseDoc, architecture
      docs, and session log. Produces Findings with file:line citations. Does NOT
      modify source — findings are output, not fixes.
    observation_projection: >
      pi_reviewer = id : Mod(D_PHRV) -> Mod(D_PHRV) — full read-only visibility over
      all phase artifacts, acceptance criteria, architecture docs. Identity projection
      because review requires seeing everything the implementation produced.
    authorized_transitions:
      - "Execute sigma_0: load and read phase artifacts, enumerate acceptance criteria"
      - "Execute sigma_1: evaluate each acceptance criterion, produce Findings"
      - "Execute sigma_2: evaluate architecture alignment, produce architecture Findings"
      - "Execute sigma_3: assemble ReviewReport with verdict"
    not_authorized:
      - "Modify source files"
      - "Override PhaseDoc acceptance criteria"
      - "Produce fixes (output is findings only)"
      - "Add acceptance criteria not present in the PhaseDoc"
    coverage_claim: >
      The reviewer's observation projection is the identity — every sort, predicate, and
      function symbol in D_PHRV is observable. Coverage is trivially total:
      pi_reviewer(Mod(D_PHRV)) = Mod(D_PHRV). No dimension of the state space is invisible
      to the reviewer. This is a deliberate property: review requires full visibility.
    authority_claim: >
      The reviewer is authorized to execute all four steps (sigma_0, sigma_1, sigma_2,
      sigma_3) and produce all state transitions required to reach O_PHRV: enumerate
      criteria (sigma_0), evaluate criteria and produce findings (sigma_1), evaluate
      architecture (sigma_2), assemble report with verdict (sigma_3). No required
      transition is unauthorized.
    role_partition_rationale: >
      One role because review is a single-perspective evaluation with no adversarial
      or parallel structure. The reviewer sees all artifacts and produces all findings.
      There is no epistemic separation requirement — unlike M1-IMPL where implementer
      and reviewer have different visibility, M3-PHRV is a pure review pass where full
      context is beneficial, not harmful. Adding a second role would require genuine
      information hiding, which is counterproductive for review.

step_dag:
  topology: "sigma_0 -> sigma_1 -> sigma_2 -> sigma_3 (path graph, trivially acyclic)"
  formal: "Gamma_PHRV = ({sigma_0, sigma_1, sigma_2, sigma_3}, {(sigma_0, sigma_1), (sigma_1, sigma_2), (sigma_2, sigma_3)}, sigma_0, sigma_3)"

phases:
  - id: sigma_0
    name: "Orient"
    role: reviewer
    precondition: "Phase artifacts available (source files, session log, PhaseDoc, architecture docs)"
    postcondition: "All artifacts loaded; acceptance criteria enumerated with |acceptance_criteria| >= 1; review scope understood"
    guidance: |
      **Constraints (what must be true after this step):**
      - acceptance_criteria is non-empty and contains at least 1 item.
      - Each item in acceptance_criteria is a concrete, verifiable criterion extracted
        from the PhaseDoc — not a vague goal.
      - architecture_docs lists all architecture documents relevant to this phase.
      - files_in_scope lists all source files modified or created in this phase.
      - No evaluation yet. sigma_0 produces the inventory only.

      **Rationale:**
      Explicit enumeration of acceptance criteria creates the accountability structure for
      sigma_1. The reviewer commits to a criteria list before evaluating — this prevents
      selective evaluation (only checking the easy criteria) and ensures traceability.

      **Procedure:**
      1. Load PhaseDoc. Extract all acceptance criteria as concrete, verifiable statements.
      2. Load session log. Identify which tasks were executed and their outcomes.
      3. Load architecture docs relevant to this phase. Record their identifiers.
      4. Identify the source files modified or created in this phase. Record their paths.

      **Output schema reference:**
      - acceptance_criteria: list of concrete acceptance criterion strings (at least 1)
      - architecture_docs: list of architecture document identifiers
      - files_in_scope: list of file paths modified or created in this phase
    output_schema:
      fields:
        - name: acceptance_criteria
          type: array
          items: string
          description: "Concrete, verifiable acceptance criteria extracted from the PhaseDoc"
          min_items: 1
          required: true
        - name: architecture_docs
          type: array
          items: string
          description: "Architecture document identifiers relevant to this phase"
          required: true
        - name: files_in_scope
          type: array
          items: string
          description: "File paths of source files modified or created in this phase"
          required: true
    invariants:
      hard:
        - "acceptance_criteria has at least 1 item"
        - "each acceptance_criteria entry is a concrete, verifiable statement"
        - "files_in_scope is non-empty (a completed phase must have produced artifacts)"
      soft:
        - "acceptance_criteria are ordered by PhaseDoc task order"
        - "architecture_docs covers all documents referenced in the PhaseDoc"

  - id: sigma_1
    name: "Criteria Audit"
    role: reviewer
    precondition: "sigma_0 complete; acceptance_criteria enumerated with |acceptance_criteria| >= 1"
    postcondition: "forall ac in acceptance_criteria. criterion_met(ac) OR exists f : Finding. criterion_gap(ac, f)"
    guidance: |
      **Constraints (what must be true after this step):**
      - criteria_results contains exactly one entry per acceptance criterion from sigma_0.
      - Every entry has result = MET or result = GAP.
      - Every GAP entry has a Finding with: location (file:line), expected, actual, severity.
      - Every Finding satisfies Ax-1: finding_cited(f) — concrete file:line citation.
      - Every Finding has severity in {CRITICAL, HIGH, MEDIUM, LOW}.
      - No criterion from sigma_0 goes unevaluated (Ax-2).

      **Rationale:**
      Per-criterion evaluation with mandatory citation transforms review from subjective
      judgment into verifiable audit. Each finding is traceable to a specific criterion
      and a specific location in the delivered artifacts.

      **Procedure:**
      1. For each acceptance criterion from sigma_0.acceptance_criteria:
         a. Find the source code or artifact in files_in_scope that should satisfy it.
         b. Evaluate: is it fully met?
         c. If met: record criterion_met with result = MET.
         d. If gap: produce Finding with location (file:line), expected vs actual, severity.
      2. Classify severity using M1-IMPL scale:
         CRITICAL = compile failure or missing implementation,
         HIGH = runtime behavior impact or incorrect logic,
         MEDIUM = underspecified or partially met,
         LOW = documentation gap or style violation.
      3. Verify every criterion has exactly one entry in criteria_results.

      **Output schema reference:**
      - criteria_results: array of {criterion, result, finding} entries (one per acceptance criterion)
    output_schema:
      fields:
        - name: criteria_results
          type: array
          items: object
          description: "{criterion: string, result: MET|GAP, finding: {location: string, expected: string, actual: string, severity: CRITICAL|HIGH|MEDIUM|LOW} | null}"
          min_items: 1
          required: true
    invariants:
      hard:
        - "criteria_results has exactly |acceptance_criteria| entries"
        - "every GAP entry has a finding with non-empty location, expected, actual, and severity"
        - "every finding location is a file:line citation (Ax-1)"
        - "severity is one of CRITICAL, HIGH, MEDIUM, LOW"
      soft:
        - "criteria_results are ordered matching sigma_0 acceptance_criteria order"
        - "each finding.expected quotes or paraphrases the PhaseDoc criterion"

  - id: sigma_2
    name: "Architecture Assessment"
    role: reviewer
    precondition: "sigma_1 complete; all acceptance criteria evaluated"
    postcondition: "Architecture alignment evaluated for all ArchDocs; architecture_findings produced; architecture_aligned determined"
    guidance: |
      **Constraints (what must be true after this step):**
      - architecture_findings is present (empty array if no issues found).
      - Each finding in architecture_findings has file:line citation (Ax-1).
      - Each finding has severity in {CRITICAL, HIGH, MEDIUM, LOW}.
      - architecture_aligned is a boolean: true if no architecture findings, false if any.

      **Rationale:**
      Architecture alignment checks catch structural violations that per-criterion audit
      misses. A criterion can be functionally met while violating dependency direction,
      layer boundaries, or interface contracts. These violations are invisible at the
      acceptance-criterion level but compound across phases.

      **Procedure:**
      1. For each architecture document in sigma_0.architecture_docs:
         a. Check dependency direction: do new files depend in the right direction?
         b. Check layer violations: does code cross layer boundaries inappropriately?
         c. Check interface contracts: are interfaces used as designed?
         d. Check naming conventions: do new symbols follow project conventions?
      2. For each violation: produce Finding with location (file:line), expected behavior,
         actual behavior, and severity.
      3. Set architecture_aligned = true if architecture_findings is empty, false otherwise.

      **Output schema reference:**
      - architecture_findings: array of architecture violation findings (may be empty)
      - architecture_aligned: boolean indicating overall architecture conformance
    output_schema:
      fields:
        - name: architecture_findings
          type: array
          items: object
          description: "{check: string, location: string, expected: string, actual: string, severity: CRITICAL|HIGH|MEDIUM|LOW}"
          min_items: 0
          required: true
        - name: architecture_aligned
          type: boolean
          description: "true if no architecture violations found, false otherwise"
          required: true
    invariants:
      hard:
        - "architecture_findings is present (may be empty array)"
        - "each finding has non-empty location with file:line citation (Ax-1)"
        - "each finding has severity in {CRITICAL, HIGH, MEDIUM, LOW}"
        - "architecture_aligned = (|architecture_findings| == 0)"
      soft:
        - "architecture_findings are grouped by check type (dependency, layer, interface, naming)"
        - "each finding.check names the specific architecture rule violated"

  - id: sigma_3
    name: "Report"
    role: reviewer
    precondition: "sigma_1 and sigma_2 complete; all criteria evaluated; architecture assessed"
    postcondition: "report_complete(reviewReport) AND verdict_of(reviewReport) IN {PASS, CONDITIONAL, FAIL} AND verdict consistent with findings per Ax-3"
    guidance: |
      **Constraints (what must be true after this step):**
      - review_report is non-empty and contains all findings from sigma_1 and sigma_2.
      - verdict is one of PASS, CONDITIONAL, FAIL.
      - verdict is consistent with findings per Ax-3:
        PASS: all criteria met AND no architecture violations.
        CONDITIONAL: all criteria met or gaps are MEDIUM/LOW only.
        FAIL: at least one CRITICAL or HIGH gap exists.
      - finding_count accurately reflects total findings across sigma_1 and sigma_2.
      - severity_breakdown accurately counts findings per severity level.
      - All findings from sigma_1.criteria_results and sigma_2.architecture_findings
        are included — no findings dropped.

      **Rationale:**
      The report step synthesizes per-criterion and architecture findings into a single
      verdict. The verdict rules (Ax-3) are deterministic given the findings — the
      reviewer does not exercise judgment about the verdict, only about findings. This
      separation (subjective: is this a gap? objective: given the gaps, what is the verdict?)
      is deliberate.

      **Procedure:**
      1. Merge criteria findings from sigma_1.criteria_results (GAP entries only) and
         architecture findings from sigma_2.architecture_findings.
      2. Count findings by severity level to produce severity_breakdown.
      3. Determine verdict per Ax-3:
         - If any finding has severity CRITICAL or HIGH: verdict = FAIL.
         - Else if any finding exists (all MEDIUM or LOW): verdict = CONDITIONAL.
         - Else (no findings): verdict = PASS.
      4. Assemble review_report with: all findings, severity_breakdown, verdict, summary.

      **Output schema reference:**
      - review_report: complete review report object with findings, verdict, and summary
      - verdict: one of PASS, CONDITIONAL, FAIL
      - finding_count: integer total of all findings
      - severity_breakdown: object with counts per severity level
    output_schema:
      fields:
        - name: review_report
          type: object
          description: "Full review report: {findings: array, verdict: string, summary: string}"
          required: true
        - name: verdict
          type: enum
          values: [PASS, CONDITIONAL, FAIL]
          description: "Overall review verdict determined by Ax-3 severity rules"
          required: true
        - name: finding_count
          type: integer
          description: "Total number of findings from sigma_1 and sigma_2 combined"
          required: true
        - name: severity_breakdown
          type: object
          description: "{CRITICAL: int, HIGH: int, MEDIUM: int, LOW: int}"
          required: true
    invariants:
      hard:
        - "review_report is non-empty"
        - "verdict is one of PASS, CONDITIONAL, FAIL"
        - "verdict is consistent with severity_breakdown per Ax-3"
        - "finding_count = sum of severity_breakdown values"
        - "all findings from sigma_1 and sigma_2 are present in review_report"
      soft:
        - "review_report.summary is a concise paragraph, not a repetition of all findings"
        - "findings are ordered by severity (CRITICAL first, LOW last)"

composability:
  claims:
    - edge: "sigma_0 -> sigma_1"
      claim: >
        post_sigma_0 subset pre_sigma_1: post_sigma_0 establishes acceptance_criteria
        enumerated with |acceptance_criteria| >= 1, architecture_docs identified,
        files_in_scope listed. pre_sigma_1 requires sigma_0 complete with acceptance_criteria
        enumerated. Identity inclusion — post_sigma_0 provides a superset of pre_sigma_1.
    - edge: "sigma_1 -> sigma_2"
      claim: >
        post_sigma_1 subset pre_sigma_2: post_sigma_1 establishes forall ac in
        acceptance_criteria. criterion_met(ac) OR criterion_gap(ac, f). pre_sigma_2
        requires sigma_1 complete with all acceptance criteria evaluated. Identity inclusion.
    - edge: "sigma_2 -> sigma_3"
      claim: >
        post_sigma_2 subset pre_sigma_3: post_sigma_2 establishes architecture alignment
        evaluated with architecture_findings produced and architecture_aligned determined.
        pre_sigma_3 requires sigma_1 and sigma_2 complete with all criteria evaluated and
        architecture assessed. The conjunction of post_sigma_1 (carried forward) and
        post_sigma_2 satisfies pre_sigma_3.
  terminal_condition_claim: >
    post_sigma_3 = report_complete(reviewReport) AND verdict_of(reviewReport) IN {PASS,
    CONDITIONAL, FAIL} AND verdict consistent per Ax-3. This is O_PHRV(s). The terminal
    postcondition is identical to the objective. Terminal states are O_PHRV-satisfying.
  initial_condition_claim: >
    pre_sigma_0 requires phase artifacts available (source files, session log, PhaseDoc,
    architecture docs). This holds when a phase has completed via M1-IMPL or M2-DIMPL —
    the invoking method guarantees artifact availability as a postcondition of its own
    terminal step. No prior M3-PHRV execution is required.
  contrarian_challenge:
    weakest_edge: "sigma_1 -> sigma_2"
    challenge: >
      post_sigma_1 claims forall ac in acceptance_criteria. criterion_met(ac) OR
      criterion_gap(ac, f). But "criterion_met" is a semantic predicate — the reviewer
      may judge a criterion as met when the implementation only superficially satisfies it.
      The postcondition is satisfied structurally (every criterion has a MET or GAP entry)
      but not necessarily semantically (the MET judgments are actually correct). A reviewer
      that marks everything MET without deep inspection satisfies post_sigma_1 trivially.
    defense_or_revision: >
      This is an inherent limitation of single-reviewer methods — the same agent that
      evaluates also judges adequacy. M3-PHRV mitigates this through three mechanisms:
      (1) Ax-1 requires file:line citations for every finding, which forces the reviewer
      to locate specific code rather than making abstract judgments; (2) sigma_2 provides
      a second pass from a different angle (architecture vs criteria), which may surface
      issues missed in sigma_1; (3) the output format (criteria_results with location,
      expected, actual) creates a verifiable audit trail that downstream consumers (M3-MEVO,
      human reviewers) can inspect. The composability holds structurally; semantic adequacy
      depends on reviewer diligence, which the method cannot guarantee but can make auditable.

objective:
  id: O_PHRV
  formal: >
    O_PHRV(s) = report_complete(reviewReport_s) AND verdict_of(reviewReport_s) IN {PASS, CONDITIONAL, FAIL}
    AND (verdict_of(reviewReport_s) = PASS -> forall ac : AcceptanceCriterion. criterion_met(ac))
    AND (verdict_of(reviewReport_s) = FAIL -> exists ac. NOT criterion_met(ac) AND exists f. severity_of(f) IN {CRITICAL, HIGH})
    AND (verdict_of(reviewReport_s) = CONDITIONAL -> forall ac. criterion_met(ac) OR exists f. criterion_gap(ac, f) AND severity_of(f) IN {MEDIUM, LOW})
  type: terminal
  expressible_claim: >
    O_PHRV references report_complete (declared predicate over ReviewReport), verdict_of
    (declared function symbol ReviewReport -> Verdict), criterion_met (declared predicate
    over AcceptanceCriterion), criterion_gap (declared predicate over AcceptanceCriterion x
    Finding), and severity_of (declared function symbol Finding -> Severity). All symbols
    are in Sigma_PHRV. O_PHRV is a conjunction of Sigma-predicates — expressible as a
    closed sentence over Mod(D_PHRV).
  note: >
    O_PHRV is satisfied when a complete, consistent review report exists — regardless of
    verdict value. The method succeeds by producing an honest evaluation, not by the code
    being good. A FAIL verdict with accurate findings is a successful M3-PHRV execution.
  progress_preorder:
    definition: >
      s1 <=_O s2 iff |{ac in acceptance_criteria | evaluated(ac) in s1}| <=
      |{ac in acceptance_criteria | evaluated(ac) in s2}|. States with more evaluated
      acceptance criteria are further toward O_PHRV. Terminal states (all evaluated,
      report assembled with consistent verdict) are maximal.
    well_founded: >
      Finite acceptance criterion set (enumerated from PhaseDoc in sigma_0, at least 1).
      The measure |{ac | evaluated(ac)}| is bounded above by |acceptance_criteria|.
      Each sigma_1 iteration evaluates at least one additional criterion. The preorder
      is well-founded because the underlying set is finite and the measure strictly
      increases with each evaluation step.
  success_profile:
    - id: mu_coverage
      name: criteria_coverage
      formula: "|{ac in acceptance_criteria | evaluated(ac)}| / |acceptance_criteria|"
      range: "[0, 1]"
      terminal: "1.0"
      proxy_claim: >
        mu_coverage is an order-homomorphism w.r.t. <=_O by definition: states with
        more evaluated criteria have higher mu_coverage. mu_coverage = 1.0 is necessary
        but not sufficient for O_PHRV (report assembly and verdict consistency still
        required).
    - id: mu_completeness
      name: report_completeness
      formula: "1 if report_complete(reviewReport) AND verdict consistent per Ax-3 else 0"
      range: "{0, 1}"
      terminal: "1"
      proxy_claim: >
        mu_completeness = 0 means the report is either incomplete or has an inconsistent
        verdict. mu_completeness = 1 is necessary for O_PHRV. Binary measure; transitions
        from 0 to 1 only at sigma_3 completion. No intermediate values.

termination:
  certificate: "nu(s) = |{sigma in {sigma_0, sigma_1, sigma_2, sigma_3} | sigma has not executed in s}|"
  initial: 4
  final: 0
  decrease_witness: >
    Each step execution reduces nu by exactly 1. The DAG is a path graph with no cycles —
    each step executes exactly once. nu is bounded below by 0 and strictly decreases at
    each step. Termination is guaranteed after at most 4 step executions.

compilation_record:
  gates:
    - gate: G0
      result: PASS
      note: >
        Navigation complete. What: load artifacts, audit criteria, assess architecture,
        produce report. Who: single reviewer role (read-only). Why: makes gap between
        spec and delivery visible and citable. How: four-step linear path. When_to_use:
        post-phase evaluation. When_not_to_use: mid-implementation, cross-phase drift,
        fixing issues.
    - gate: G1
      result: PASS
      note: >
        D_PHRV = (Sigma_PHRV, Ax_PHRV). 7 sorts with cardinality, 3 total function
        symbols, 5 predicates with typed signatures referencing declared sorts
        (AcceptanceCriterion, Finding, Severity, PhaseArtifact, ArchDoc, ReviewReport,
        Verdict — all declared). 4 closed axioms (Ax-1 through Ax-4) with rationale.
        Domain boundary stated. Initial and terminal state membership in Mod(D_PHRV)
        claimed with axiom-by-axiom verification.
    - gate: G2
      result: PASS
      note: >
        O_PHRV stated as conjunction of Sigma-predicates (report_complete, verdict_of,
