method:
  id: M6-ARFN
  parent: P2-SD
  name: "Architecture Refinement Method"
  description: >
    Takes a PRD (or PRDSection) and an existing codebase/architecture, and produces
    or updates an ArchDoc — a set of focused architecture specification files
    following the horizontal documentation pattern. Refinement scope: updates
    existing architecture to accommodate new requirements. Not greenfield
    architecture design.
  version: "1.0"
  status: compiled
  compilation_date: "2026-03-14"
  formal_grounding: "theory/F1-FTH.md"

navigation:
  what: >
    M6-ARFN takes a PRD and existing architecture artifacts, analyzes what
    architectural changes the new requirements demand, and produces updated
    architecture specs. Output is a set of focused ArchDoc files (not one monolithic
    document) following the horizontal documentation pattern: system-context.md,
    interfaces.md, domains.md, data-flows.md, etc. Each file is independently
    evolvable and Git-trackable.
  who: >
    One role — the architect. Reads PRD, existing architecture, and existing
    codebase. Produces architecture refinements. Does not implement — only specifies.
  why: >
    Every method in P2-SD (M5-PLAN, M1-IMPL, M2-DIMPL, M3-PHRV, M4-DDAG) consumes
    ArchDoc as input but nothing produces it. When a new PRD arrives, the architecture
    must be refined to accommodate new requirements before planning and implementation
    can begin. Without M6-ARFN, architecture refinement happens implicitly during
    implementation — producing undocumented architectural decisions, inconsistent
    patterns, and drift that M4-DDAG later detects but cannot prevent.
  how: >
    Four linear steps: assess (identify architectural impact of new requirements) ->
    analyze (evaluate trade-offs and design options) -> specify (produce/update
    focused architecture spec files) -> validate (verify consistency and coverage).
  when_to_use:
    - "A new PRD or PRDSection requires changes to the system architecture"
    - "Existing architecture docs are stale and need updating before implementation"
    - "M5-PLAN or M1-IMPL needs an ArchDoc that doesn't yet reflect current requirements"
    - "M4-DDAG identified architectural drift that needs formal specification update"
  when_not_to_use:
    - "Greenfield architecture design with no existing codebase — outside P2-SD niche"
    - "The architecture is unchanged by the new PRD — pass ArchDoc directly to M5-PLAN"
    - "The task is implementation, not specification — use M1-IMPL or M2-DIMPL"
    - "Product discovery or PRD writing — outside P2-SD niche"

domain_theory:
  id: D_ARFN
  sorts:
    - name: PRDInput
      cardinality: singleton_per_execution
      description: "The PRD or PRDSection driving the architecture refinement"
    - name: ExistingArchitecture
      cardinality: singleton_per_execution
      description: "The current architecture: existing spec files, codebase structure, dependency graph"
    - name: ArchImpact
      cardinality: finite
      description: "An identified architectural consequence of a new requirement"
    - name: DesignOption
      cardinality: unbounded
      description: "A candidate architectural approach for addressing an ArchImpact"
    - name: ArchDecision
      cardinality: finite
      description: "A resolved design choice: which DesignOption was selected and why"
    - name: ArchSpecFile
      cardinality: finite
      description: "A focused architecture specification file (e.g., interfaces.md, domains.md, data-flows.md)"
    - name: ArchDoc
      cardinality: singleton_per_execution
      description: "The complete set of ArchSpecFiles produced or updated"
    - name: ConsistencyCheck
      cardinality: finite
      description: "A verification that the updated architecture is internally consistent"
  function_symbols:
    - name: impact_of
      signature: "ArchImpact -> PRDInput"
      totality: total
      description: "Which PRD requirement drove this architectural impact"
    - name: decision_for
      signature: "ArchDecision -> ArchImpact"
      totality: total
      description: "Which impact this decision resolves"
    - name: spec_count
      signature: "ArchDoc -> nat"
      totality: total
      description: "Number of ArchSpecFiles in the ArchDoc"
  predicates:
    - name: requirement_covered
      signature: "PRDInput x ArchDoc -> Bool"
      description: "The PRD requirement's architectural implications are addressed in the ArchDoc"
    - name: impact_resolved
      signature: "ArchImpact -> Bool"
      description: "This impact has a corresponding ArchDecision"
    - name: spec_updated
      signature: "ArchSpecFile -> Bool"
      description: "This spec file has been created or updated to reflect new decisions"
    - name: internally_consistent
      signature: "ArchDoc -> Bool"
      description: "No contradictions between ArchSpecFiles in the ArchDoc"
    - name: backward_compatible
      signature: "ArchDoc x ExistingArchitecture -> Bool"
      description: "The updated ArchDoc does not break existing contracts unless explicitly documented as breaking"
    - name: rationale_documented
      signature: "ArchDecision -> Bool"
      description: "The decision includes the trade-offs considered and why this option was chosen"
    - name: focused
      signature: "ArchSpecFile -> Bool"
      description: "The spec file covers one clear topic named in its title — no file covers multiple unrelated concerns"
  axioms:
    - id: Ax-1
      name: Impact coverage
      statement: "forall ai : ArchImpact. impact_resolved(ai)"
      rationale: "Every identified impact must be resolved with a decision. Unresolved impacts leave architectural ambiguity."
    - id: Ax-2
      name: Decision traceability
      statement: "forall ad : ArchDecision. rationale_documented(ad)"
      rationale: "Every decision must document the trade-offs and rationale. Undocumented decisions are invisible debt."
    - id: Ax-3
      name: Internal consistency
      statement: "forall doc : ArchDoc. internally_consistent(doc)"
      rationale: "The updated architecture must not contradict itself across spec files."
    - id: Ax-4
      name: Horizontal documentation
      statement: "forall doc : ArchDoc. spec_count(doc) >= 1 AND forall sf : ArchSpecFile. spec_updated(sf) -> focused(sf)"
      rationale: >
        Architecture is documented as multiple focused files (horizontal pattern), not one
        monolithic document. Each file covers one concern (interfaces, domains, data-flows, etc.)
        and evolves independently. The focused predicate ensures no single file covers multiple
        unrelated concerns.
      note: "focused is operationalized as: the file has one clear topic named in its title."
  domain_boundary_note: >
    Excludes: greenfield architecture design (M6-ARFN refines existing architecture);
    implementation (M1-IMPL/M2-DIMPL); planning (M5-PLAN); PRD writing (product discovery);
    technology selection (assumed resolved before M6-ARFN). M6-ARFN produces the spec that
    other methods consume — it does not consume its own output.
  initial_state_valid_claim: >
    A state with PRDInput present, ExistingArchitecture accessible, no ArchImpacts
    identified, no ArchDecisions made, no ArchSpecFiles updated, no ArchDoc produced,
    and no ConsistencyChecks performed satisfies all axioms: Ax-1 (vacuously true —
    no ArchImpacts exist to violate the universal); Ax-2 (vacuously true — no
    ArchDecisions exist); Ax-3 (vacuously true — no ArchDoc exists); Ax-4 (vacuously
    true — spec_count is undefined/zero and no ArchSpecFile satisfies spec_updated,
    so the conditional is vacuously true). Valid.
  terminal_state_valid_claim: >
    A state with all ArchImpacts resolved via ArchDecisions satisfies Ax-1 (every
    impact has a decision via decision_for). All ArchDecisions have documented
    rationale satisfies Ax-2 (rationale_documented holds for each). The ArchDoc is
    internally consistent satisfies Ax-3 (internally_consistent(archDoc) = true from
    sigma_3 validation). The ArchDoc contains >= 1 spec files and every updated
    ArchSpecFile is focused satisfies Ax-4 (spec_count >= 1 from sigma_2 min_items
    constraint, focused(sf) enforced by sigma_2 guidance). Valid.

roles:
  - id: architect
    description: >
      Reads PRD, existing architecture, and codebase. Identifies architectural impacts,
      evaluates design options, makes decisions, and produces/updates architecture spec
      files. Does not implement — only specifies.
    observation_projection: >
      pi_architect = id : Mod(D_ARFN) -> Mod(D_ARFN) — full visibility over PRD,
      existing architecture, codebase, all impacts, decisions, and spec files. Identity
      projection because architecture refinement requires unrestricted access to all
      inputs and outputs.
    authorized_transitions:
      - "Execute sigma_0: assess architectural impact of new requirements"
      - "Execute sigma_1: analyze design options and make decisions"
      - "Execute sigma_2: produce/update focused architecture spec files"
      - "Execute sigma_3: validate consistency and coverage"
    not_authorized:
      - "Implement code (M1-IMPL territory)"
      - "Modify the PRD"
      - "Plan phases (M5-PLAN territory)"
      - "Execute deployment or runtime operations"
    coverage_claim: >
      The architect's observation projection is the identity — every sort, predicate, and
      function symbol in D_ARFN is observable. Coverage is trivially total:
      pi_architect(Mod(D_ARFN)) = Mod(D_ARFN). No dimension of the state space is invisible
      to the architect. This is deliberate: architecture refinement requires seeing the full
      PRD, existing architecture, codebase, and all intermediate artifacts.
    authority_claim: >
      The architect is authorized to execute all four steps (sigma_0, sigma_1, sigma_2,
      sigma_3) and produce all state transitions required to reach O_ARFN: identify
      impacts (sigma_0), analyze options and make decisions (sigma_1), produce/update
      spec files (sigma_2), validate consistency (sigma_3). No required transition is
      unauthorized.
    role_partition_rationale: >
      One role for typical refinement. Architecture refinement is a single-perspective
      analysis where the architect reads inputs, reasons about trade-offs, and produces
      specifications. There is no epistemic separation requirement — unlike M1-IMPL
      where implementer and reviewer have different visibility, M6-ARFN is a pure
      specification pass where full context is beneficial, not harmful. Override to
      M1-COUNCIL (via execution_binding) when the architectural impact has multiple
      genuinely defensible approaches — e.g., microservice vs monolith extension,
      synchronous vs event-driven integration.

step_dag:
  topology: "sigma_0 -> sigma_1 -> sigma_2 -> sigma_3 (path graph, trivially acyclic)"
  formal: "Gamma_ARFN = ({sigma_0, sigma_1, sigma_2, sigma_3}, {(sigma_0, sigma_1), (sigma_1, sigma_2), (sigma_2, sigma_3)}, sigma_0, sigma_3)"

phases:
  - id: sigma_0
    name: "Assess Impact"
    role: architect
    precondition: "PRD available; existing architecture docs and codebase accessible"
    postcondition: "Architectural impacts identified with |impacts| >= 1; each traced to a PRD requirement; existing_architecture_summary produced"
    guidance: |
      **Constraints (what must be true after this step):**
      - impacts is non-empty (if empty, architecture is unchanged — M6-ARFN should not
        have been invoked).
      - Each item in impacts has: requirement_ref, component_affected,
        nature (new|modify|extend|deprecate), description.
      - existing_architecture_summary is a non-empty string describing the current
        architecture state.

      **Rationale:**
      Explicit impact identification creates the accountability structure for sigma_1.
      The architect commits to a set of impacts before evaluating options — this prevents
      premature solution-jumping and ensures every requirement's architectural consequence
      is visible before trade-off analysis begins.

      **Procedure:**
      1. Read the PRD requirements.
      2. Read existing architecture docs (system-context, interfaces, domains, data-flows, etc.).
      3. For each requirement: does it need a new component? Modify an existing interface?
         Extend a domain? Change a data flow? Deprecate a pattern?
      4. Record each impact in impacts with the requirement it traces to.
      5. Summarize the current architecture state in existing_architecture_summary.

      **Output schema reference:**
      - impacts: array of impact objects with requirement_ref, component_affected, nature,
        description (at least 1 item)
      - existing_architecture_summary: string summary of current architecture state
    output_schema:
      fields:
        - name: impacts
          type: array
          items: object
          description: "{requirement_ref: string, component_affected: string, nature: new|modify|extend|deprecate, description: string}"
          min_items: 1
          required: true
        - name: existing_architecture_summary
          type: string
          description: "Summary of the current architecture: key components, dependencies, patterns"
          required: true
    invariants:
      hard:
        - "impacts has at least 1 item"
        - "each impact has non-empty requirement_ref, component_affected, nature, and description"
        - "nature is one of new, modify, extend, deprecate"
        - "existing_architecture_summary is non-empty"
      soft:
        - "impacts are ordered by requirement_ref to match PRD structure"
        - "existing_architecture_summary covers all architecture docs relevant to the PRD"

  - id: sigma_1
    name: "Analyze Options"
    role: architect
    precondition: "sigma_0 complete; impacts identified with |impacts| >= 1"
    postcondition: "forall ai in impacts. exists ad in decisions. decision_for(ad) = ai AND rationale_documented(ad)"
    guidance: |
      **Constraints (what must be true after this step):**
      - decisions contains exactly one entry per impact from sigma_0.impacts.
      - Each entry in decisions has: impact_ref, options_considered (>= 2 when genuine
        alternatives exist), chosen_option, rationale, trade_offs_noted.
      - rationale_documented for every decision (Ax-2).
      - If only one viable option: document in rationale why alternatives were ruled out.
      - options_considered is a non-empty array of strings.

      **Rationale:**
      Explicit trade-off evaluation with documented rationale prevents implicit architectural
      decisions — the kind that silently accumulate as technical debt. Each decision records
      what was considered and why one approach was chosen, making the reasoning auditable and
      revisitable when circumstances change.

      **Procedure:**
      1. For each impact in sigma_0.impacts: identify at least two design approaches where
         genuine alternatives exist.
      2. Evaluate trade-offs for each option: performance, maintainability, complexity,
         backward compatibility.
      3. Select the approach. Record the chosen_option and document the rationale and
         trade_offs_noted.
      4. If an impact has genuinely contested alternatives (MDP = true): consider overriding
         execution_binding to M1-COUNCIL for adversarial evaluation.

      **Output schema reference:**
      - decisions: array of decision objects with impact_ref, options_considered,
        chosen_option, rationale, trade_offs_noted (one per impact)
    output_schema:
      fields:
        - name: decisions
          type: array
          items: object
          description: "{impact_ref: string, options_considered: [string], chosen_option: string, rationale: string, trade_offs_noted: string}"
          min_items: 1
          required: true
    invariants:
      hard:
        - "decisions has exactly |impacts| entries (one per impact from sigma_0)"
        - "each decision has non-empty impact_ref, options_considered, chosen_option, rationale, trade_offs_noted"
        - "each impact_ref matches a requirement_ref from sigma_0.impacts"
        - "rationale is non-empty for every decision (Ax-2)"
      soft:
        - "options_considered has >= 2 entries when genuine alternatives exist"
        - "decisions are ordered matching sigma_0.impacts order"

  - id: sigma_2
    name: "Specify"
    role: architect
    precondition: "sigma_1 complete; decisions made with |decisions| >= 1"
    postcondition: "spec_files produced with |spec_files| >= 1; forall sf in spec_files. focused(sf); readme_updated recorded"
    guidance: |
      **Constraints (what must be true after this step):**
      - spec_files is non-empty (at least 1 item).
      - Each item in spec_files has: path, action (created|updated), topic,
        decisions_applied (array of strings referencing decisions from sigma_1).
      - Each spec file is focused: one clear topic per file (Ax-4).
      - readme_updated is a boolean: true if architecture/README.md index was updated,
        false if no new files were created.
      - Follows horizontal documentation pattern: do NOT produce one monolithic architecture doc.
      - Standard file names where applicable: system-context.md, interfaces.md, domains.md,
        data-flows.md, deployment.md, observability.md, gaps.md.
      - New spec files for new architectural concerns. Updated existing files for modifications.

      **Horizontal documentation pattern:**
      - Each spec file is independently evolvable and Git-trackable.
      - Files are 3-12 KB each — small enough for LLM context, large enough to be complete.
      - An architecture/README.md serves as the index linking all spec files.
      - When a spec file is superseded, the old version moves to docs/archive/.

      **Procedure:**
      1. For each decision from sigma_1.decisions: identify which spec file(s) it affects.
      2. Create new spec files or update existing ones. Record each in spec_files with
         its path, action, topic, and decisions_applied.
      3. Ensure each file covers one concern only (focused predicate).
      4. If new files were created: update architecture/README.md index and set
         readme_updated = true. Otherwise set readme_updated = false.
      5. Add cross-references between related spec files.

      **Output schema reference:**
      - spec_files: array of spec file objects with path, action, topic, decisions_applied
        (at least 1 item)
      - readme_updated: boolean indicating whether the index was updated
    output_schema:
      fields:
        - name: spec_files
          type: array
          items: object
          description: "{path: string, action: created|updated, topic: string, decisions_applied: [string]}"
          min_items: 1
          required: true
        - name: readme_updated
          type: boolean
          description: "true if architecture/README.md index was updated, false otherwise"
          required: true
    invariants:
      hard:
        - "spec_files has at least 1 item"
        - "each spec file has non-empty path, action, topic, and decisions_applied"
        - "action is one of created, updated"
        - "each spec file is focused — one clear topic per file (Ax-4)"
        - "readme_updated is present as a boolean"
      soft:
        - "spec_files are ordered by action (created first, updated second)"
        - "each decisions_applied references a valid impact_ref from sigma_1.decisions"
        - "spec file paths follow standard naming conventions where applicable"

  - id: sigma_3
    name: "Validate"
    role: architect
    precondition: "sigma_2 complete; spec files produced/updated with |spec_files| >= 1"
    postcondition: "internally_consistent(archDoc) evaluated (Ax-3); backward_compatible assessed; coverage_verified = true (every impact addressed)"
    guidance: |
      **Constraints (what must be true after this step):**
      - consistency_result is PASS or FAIL.
      - If consistency_result = FAIL: inconsistencies is a non-empty array of strings
        listing contradictions with spec file references.
      - If consistency_result = PASS: inconsistencies is absent or empty.
      - breaking_changes is present (empty array if no breaking changes exist).
      - coverage_verified is a boolean: true if every impact from sigma_0 is addressed
        in at least one spec file from sigma_2, false otherwise.
      - backward_compatible(archDoc, existingArchitecture) is assessed through
        breaking_changes enumeration.

      **Rationale:**
      Validation catches contradictions between spec files before they propagate to
      M5-PLAN and M1-IMPL. Cross-referencing for consistency (Ax-3) surfaces issues like
      interfaces.md specifying REST while data-flows.md assumes gRPC. Coverage verification
      ensures no impact was silently dropped during specification.

      **Procedure:**
      1. Cross-reference all spec files from sigma_2.spec_files for contradictions (e.g.,
         interfaces.md says REST, data-flows.md assumes gRPC). Record contradictions
         in inconsistencies.
      2. Set consistency_result to PASS if no contradictions, FAIL if any.
      3. Check backward compatibility: do updated specs break existing contracts?
         Record any breaking changes in breaking_changes.
      4. Verify coverage: every impact from sigma_0.impacts is addressed in at least
         one spec file from sigma_2.spec_files. Set coverage_verified accordingly.

      **Output schema reference:**
      - consistency_result: enum PASS or FAIL
      - inconsistencies: array of contradiction descriptions (may be empty or absent)
      - breaking_changes: array of breaking change descriptions (may be empty)
      - coverage_verified: boolean confirming all impacts are addressed
    output_schema:
      fields:
        - name: consistency_result
          type: enum
          values: [PASS, FAIL]
          description: "PASS if no contradictions between spec files, FAIL if any found"
          required: true
        - name: inconsistencies
          type: array
          items: string
          description: "List of contradictions found between spec files, with file references"
          required: false
        - name: breaking_changes
          type: array
          items: string
          description: "List of breaking changes to existing contracts — M5-PLAN needs these"
          required: false
        - name: coverage_verified
          type: boolean
          description: "true if every impact from sigma_0 is addressed in at least one spec file"
          required: true
    invariants:
      hard:
        - "consistency_result is one of PASS, FAIL"
        - "if consistency_result = FAIL then inconsistencies is non-empty"
        - "coverage_verified is present as a boolean"
        - "breaking_changes is present (empty array if none)"
      soft:
        - "inconsistencies reference specific spec file paths"
        - "breaking_changes describe what contract is broken and which consumers are affected"

composability:
  claims:
    - edge: "sigma_0 -> sigma_1"
      claim: >
        post_sigma_0 subset pre_sigma_1: post_sigma_0 establishes impacts identified
        with |impacts| >= 1 and existing_architecture_summary produced. pre_sigma_1
        requires sigma_0 complete with impacts identified. Identity inclusion —
        post_sigma_0 provides a superset of pre_sigma_1 requirements.
    - edge: "sigma_1 -> sigma_2"
      claim: >
        post_sigma_1 subset pre_sigma_2: post_sigma_1 establishes forall ai in impacts.
        exists ad in decisions. decision_for(ad) = ai AND rationale_documented(ad) —
        every impact has a decision with documented rationale. pre_sigma_2 requires
        sigma_1 complete with decisions made. Identity inclusion — post_sigma_1 provides
        a superset of pre_sigma_2 requirements.
    - edge: "sigma_2 -> sigma_3"
      claim: >
        post_sigma_2 subset pre_sigma_3: post_sigma_2 establishes spec_files produced
        with |spec_files| >= 1, each focused, and readme_updated recorded. pre_sigma_3
        requires sigma_2 complete with spec files produced/updated. Identity inclusion —
        post_sigma_2 provides a superset of pre_sigma_3 requirements.
  terminal_condition_claim: >
    post_sigma_3 = internally_consistent(archDoc) evaluated AND backward_compatible
    assessed AND coverage_verified = true. When consistency_result = PASS and
    coverage_verified = true, the terminal state satisfies O_ARFN: all impacts resolved
    (Ax-1, carried from sigma_1), all decisions documented (Ax-2, carried from sigma_1),
    ArchDoc internally consistent (Ax-3, verified at sigma_3), spec files focused
    (Ax-4, enforced at sigma_2). The terminal postcondition entails the objective.
  initial_condition_claim: >
    pre_sigma_0 requires PRD available and existing architecture docs and codebase
    accessible. This holds when a new PRD arrives and the project has existing
    architecture — the invoking workflow guarantees PRD availability and existing
    architecture accessibility. No prior M6-ARFN execution is required.
  contrarian_challenge:
    weakest_edge: "sigma_1 -> sigma_2"
    challenge: >
      post_sigma_1 claims every impact has a decision with documented rationale. But
      "rationale_documented" is a semantic predicate — the architect may record a
      rationale that is superficial or post-hoc rather than genuinely capturing the
      trade-off reasoning. An architect who writes "chose option A because it's simpler"
      for every decision satisfies Ax-2 structurally but not substantively. The
      postcondition is satisfied formally (every decision has a rationale field) but
      the quality of reasoning is not verifiable from structure alone.
    defense_or_revision: >
      This is an inherent limitation of single-role specification methods — the same
      agent that decides also documents the rationale. M6-ARFN mitigates this through
      three mechanisms: (1) the output_schema requires options_considered (plural) and
      trade_offs_noted as separate fields, which forces the architect to articulate
      alternatives rather than just the chosen path; (2) sigma_3 provides a validation
      pass that cross-checks consistency — superficial decisions are more likely to
      produce inconsistent specs that sigma_3 catches; (3) the ArchDoc output is
      consumed by M5-PLAN and M1-IMPL, which provide downstream validation when
      specifications prove unimplementable. The composability holds structurally;
      rationale quality depends on architect diligence, which the method cannot
      guarantee but can make auditable through explicit trade-off fields.

objective:
  id: O_ARFN
  formal: >
    O_ARFN(s) = forall ai : ArchImpact. impact_resolved(ai)
    AND forall ad : ArchDecision. rationale_documented(ad)
    AND internally_consistent(archDoc_s)
    AND forall sf : ArchSpecFile. spec_updated(sf) -> focused(sf)
  type: terminal
  expressible_claim: >
    O_ARFN references impact_resolved (declared predicate over ArchImpact),
    rationale_documented (declared predicate over ArchDecision), internally_consistent
    (declared predicate over ArchDoc), spec_updated (declared predicate over
    ArchSpecFile), and focused (declared predicate over ArchSpecFile). All symbols
    are in Sigma_ARFN. O_ARFN is a conjunction of Sigma-predicates — expressible as a
    closed sentence over Mod(D_ARFN).
  note: >
    O_ARFN is satisfied when all architectural impacts are resolved with documented
    rationale, the resulting ArchDoc is internally consistent, and each spec file is
    focused. The method succeeds by producing a consistent, well-documented architecture
    refinement — regardless of whether the chosen designs are optimal (optimality is
    evaluated downstream by M5-PLAN and M1-IMPL).
  progress_preorder:
    definition: >
      s1 <=_O s2 iff |{ai in ArchImpact | impact_resolved(ai) in s1}| <=
      |{ai in ArchImpact | impact_resolved(ai) in s2}|. States with more resolved
      impacts are further toward O_ARFN. Terminal states (all impacts resolved,
      decisions documented, ArchDoc consistent, spec files focused) are maximal.
    well_founded: >
      Finite impact set (identified from PRD in sigma_0, at least 1). The measure
      |{ai | impact_resolved(ai)}| is bounded above by |ArchImpact|. Each step
      progresses toward resolution: sigma_0 identifies impacts, sigma_1 resolves them,
      sigma_2 produces specs, sigma_3 validates consistency. The preorder is well-founded
      because the underlying set is finite and progress is monotonic across the linear DAG.
  success_profile:
    - id: mu_resolution
      name: impact_resolution
      formula: "|{ai | impact_resolved(ai)}| / |{ai | identified(ai)}|"
      range: "[0, 1]"
      terminal: "1.0"
      proxy_claim: >
        mu_resolution is an order-homomorphism w.r.t. <=_O by definition: states with
        more resolved impacts have higher mu_resolution. mu_resolution = 1.0 is necessary
        but not sufficient for O_ARFN (consistency and focus still required).
    - id: mu_consistency
      name: consistency
      formula: "1 if internally_consistent(archDoc) else 0"
      range: "{0, 1}"
      terminal: "1"
      proxy_claim: >
        mu_consistency = 0 means the ArchDoc has contradictions between spec files.
        mu_consistency = 1 is necessary for O_ARFN. Binary measure; transitions from
        0 to 1 only at sigma_3 completion when validation passes. No intermediate values.

termination:
  certificate: "nu(s) = |{sigma in {sigma_0, sigma_1, sigma_2, sigma_3} | sigma has not executed in s}|"
  initial: 4
  final: 0
  decrease_witness: >
    Each step execution reduces nu by exactly 1. The DAG is a path graph with no cycles —
    each step executes exactly once. nu is bounded below by 0 and strictly decreases at
    each step. Termination is guaranteed after at most 4 step executions.

compilation_record:
  gates:
    - gate: G0
      result: PASS
      note: >
        Navigation complete. What: take PRD and existing architecture, produce focused
        ArchDoc spec files. Who: single architect role (specification only). Why: fills
        the ArchDoc production gap in P2-SD — no other method produces architecture specs.
        How: four-step linear path (assess, analyze, specify, validate). When_to_use:
        new PRD requiring architecture changes. When_not_to_use: greenfield design,
