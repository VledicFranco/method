method:
  id: M1-COUNCIL
  parent: P1-EXEC
  name: "Synthetic Agents Method"
  description: >
    Structured multi-character debate where a cast of synthetic expert agents argue
    a challenge and produce a decision or artifact, with the user as final authority.
    Forces genuine position-holding through character construction: each character has
    a named conviction and blind spot, and must defend or update positions under
    structural pressure. Value over single-agent reasoning: method-attributable insight
    generation through adversarial structure.
  version: "1.3"
  status: compiled
  compilation_date: "2026-03-20"
  evolution_note: >
    v1.3: RFC-003 (anti-capitulation invariant). Adds Ax-8 (anti-capitulation clause
    integrity) — both defend-position and acknowledge-counter clauses required in every
    character prompt. sigma_1 guidance updated with explicit anti-capitulation instructions.
    Approved by Steering Council SESSION-037 (D-087).
    Prior: v1.2 added RFC-001 (sigma_0 resume precondition for CMEM-PROTO) and RFC-002
    (Ax-7 minimum-turns guard), approved SESSION-032 (D-067, D-068).
  formal_grounding: "theory/F1-FTH.md"
  derived_from: ".claude/skills/council-team/SKILL.md"

navigation:
  what: >
    M1-COUNCIL takes a challenge with multiple defensible positions, constructs a cast
    of synthetic expert characters with opposing philosophies, runs a structured debate,
    and produces an Artifact consolidating decisions with rationale and minority positions.
    Output satisfies O_COUNCIL: all Questions resolved, at least one Position updated,
    Artifact exists, adversarial integrity maintained.
  who: >
    Three role types: Leader (1, neutral mediator), Contrarian (k >= 2, opposing-philosophy
    experts), Product Owner (the human, final decision authority). In single-LLM execution,
    the model plays Leader and Contrarians; the human plays PO.
  why: >
    Many design, strategy, and architectural problems benefit from adversarial expert debate
    but no human team is available. A single LLM agent producing multiple perspectives risks
    the hedged consensus failure mode — everything weighed, nothing committed to. M1-COUNCIL
    forces genuine position-holding through character construction: each character has a named
    conviction and a named blind spot, producing structurally different perspectives that a
    single-agent method cannot generate. Evidence: EXP-001c showed 1.8-2.5x quality improvement
    on design decisions with 3-agent adversarial structure vs neutral collaborative pattern.
  how: >
    Four linear steps: setup (confirm challenge) -> cast design (construct and approve
    characters) -> debate & resolve (structured multi-turn debate with escalations and
    decisions until all questions resolved) -> output (consolidate into artifact).
  when_to_use:
    - "The problem has at least two defensible solution philosophies leading to different decisions"
    - "The task benefits from surfacing risks, minority views, or unconsidered perspectives"
    - "A decision must be made and the user wants structured input rather than a single recommendation"
    - "The problem space is bounded enough for 3-6 expert characters to credibly cover"
    - "Multi-turn interaction is affordable"
  when_not_to_use:
    - "Execution tasks where the answer is known — use M3-TMP or M2-ORCH"
    - "Purely informational queries needing a fact or summary, not a decision"
    - "Tasks requiring continuous external state (API calls, iterative builds)"
    - "Problem space so narrow that contrarians cannot hold genuinely different positions"
    - "User needs single-response speed — multi-turn debate is overhead they cannot pay"

domain_theory:
  id: D_COUNCIL
  sorts:
    - name: Challenge
      cardinality: singleton_per_execution
      description: "The problem, decision, or design question posed by the Product Owner"
    - name: Question
      cardinality: "finite, >= 1 derived from Challenge"
      description: "A sub-question or decision point derived from the Challenge during debate"
    - name: CharacterCard
      cardinality: "finite, k + 1 (Leader + Contrarians)"
      description: "A specification constituting a Character: name, expertise, conviction, blind spot, voice"
    - name: Character
      cardinality: "finite, k + 1"
      description: "A synthetic expert agent instantiated from a CharacterCard"
    - name: Council
      cardinality: singleton_per_execution
      description: "The active ensemble: a Leader plus k Contrarians operating on a Challenge"
    - name: Position
      cardinality: unbounded
      description: "A character's stance on a Question — evolves during debate"
    - name: Turn
      cardinality: unbounded
      description: "A single character's contribution in the debate; references prior Turns via responds_to"
    - name: Escalation
      cardinality: unbounded
      description: "A Leader-to-PO query: a specific decision point requiring external authority"
    - name: Decision
      cardinality: unbounded
      description: "A resolved Question, ratified by PO response or by convergence"
    - name: Artifact
      cardinality: singleton_per_execution
      description: "Terminal output: consolidated decisions with rationale and minority positions"
  function_symbols:
    - name: card_of
      signature: "Character -> CharacterCard"
      totality: total
      description: "The CharacterCard that constitutes a Character"
    - name: speaker
      signature: "Turn -> Character"
      totality: total
      description: "The Character who issued a Turn"
    - name: topic
      signature: "Turn -> Question"
      totality: total
      description: "The Question a Turn addresses"
  predicates:
    - name: constituted_by
      signature: "Character x CharacterCard"
      description: "Character is instantiated from this CharacterCard"
    - name: is_leader
      signature: "Character"
      description: "Character occupies the Leader role (exactly one per Council)"
    - name: is_contrarian
      signature: "Character"
      description: "Character occupies a Contrarian role"
    - name: holds
      signature: "Character x Position x Question"
      description: "Character holds this Position on this Question"
    - name: resolved
      signature: "Character x Question"
      description: "Character has declared a final position on this Question"
    - name: responds_to
      signature: "Turn x Turn"
      description: "A Turn directly responds to a prior Turn (DAG over session transcript)"
    - name: escalated
      signature: "Question"
      description: "The Leader has issued an Escalation to PO on this Question"
    - name: decided
      signature: "Question"
      description: "A Decision has been issued for this Question"
    - name: derived_from
      signature: "Question x Challenge"
      description: "Question was derived from the Challenge during debate"
    - name: position_updated
      signature: "Character x Question"
      description: "Character changed their Position on this Question during the session"
    - name: cast_approved
      signature: "Character"
      description: "The PO has approved this Character as part of the Council"
    - name: decision_issued_by
      signature: "Character x Question"
      description: "Character issued the Decision that resolved this Question"
    - name: specific_question
      signature: "Escalation"
      description: "The Escalation names a specific question with named alternatives (not a vague request for input)"
    - name: precedes
      signature: "Turn x Turn"
      description: "t1 precedes t2 in session sequence — derivable from the Turn DAG (responds_to edges and issue order)"
    - name: sigma_2_terminates
      signature: "Council"
      description: "sigma_2 (Debate & Resolve) terminates for this Council — operational predicate for Ax-7 diminishing returns halt"
    - name: has_defend_clause
      signature: "CharacterCard"
      description: "The CharacterCard's prompt includes the position-defense instruction: defend your positions, don't agree to avoid friction"
    - name: has_acknowledge_clause
      signature: "CharacterCard"
      description: "The CharacterCard's prompt includes the counter-argument acknowledgment instruction: acknowledge genuinely good counter-arguments honestly"
    - name: diminishing_returns
      signature: "Council"
      description: >
        The Leader has determined that continued debate is producing diminishing returns:
        recent Turns are not generating new arguments, positions are cycling rather than
        converging, or the remaining unresolved (Character, Question) pairs are not
        producing substantive disagreement. This is a Leader judgment call — not formally
        decidable, but empirically reliable in LLM execution.
  axioms:
    - id: Ax-1
      name: Cast plurality
      statement: "exists c1 c2 : Character. is_contrarian(c1) AND is_contrarian(c2) AND c1 != c2"
      rationale: "A council with fewer than two contrarians cannot produce adversarial debate; it degenerates into a single perspective with a moderator."
    - id: Ax-2
      name: Leader uniqueness
      statement: "exists! l : Character. is_leader(l)"
      rationale: "Exactly one Leader per Council. The Leader is structurally neutral — giving two Leaders conflicting synthesis authority would corrupt the escalation mechanism."
    - id: Ax-3
      name: Position non-repetition
      statement: >
        forall c : Character, q : Question, t1 t2 : Turn.
        speaker(t1) = c AND speaker(t2) = c AND topic(t1) = q AND topic(t2) = q AND t1 != t2
        -> responds_to(t2, t_counter) for some t_counter where speaker(t_counter) != c
      rationale: "A character may not re-state a position on the same question without responding to a counter-argument. Empty repetition is a violation; defended repetition requires a responds_to edge to a different character's turn."
      operationalization: >
        Position identity is determined by Leader tagging. The Leader monitors the debate
        and flags when a Character restates a position on the same Question without
        introducing new argument content. "Same position" means: the Character's
        prescription (what should be done) and core justification (why) are unchanged
        from a prior Turn on the same Question. Surface-level rephrasing counts as
        repetition. A genuinely new argument — citing a different principle, evidence,
        or consequence — is not repetition even if the conclusion is the same. When
        the Leader flags repetition, the flagged Character must either (a) produce a
        responds_to edge to a counter-argument they have not yet addressed, or (b)
        yield the floor on that Question (declaring their position final).
    - id: Ax-4
      name: Conviction stability
      statement: >
        forall c : Character, q : Question.
        position_updated(c, q) -> exists t_counter : Turn, t_update : Turn.
        speaker(t_counter) != c AND topic(t_counter) = q
        AND speaker(t_update) = c AND responds_to(t_update, t_counter)
      rationale: "A character may update a Position only when a counter-argument has been received and acknowledged. Characters do not update positions to avoid friction. Source: EXP-001c anti-capitulation finding."
    - id: Ax-5
      name: Turn progress
      statement: >
        forall t : Turn. exists c : Character, q : Question.
        speaker(t) = c AND topic(t) = q AND resolved(c, q)
        AND NOT exists t_prior : Turn. speaker(t_prior) = c AND topic(t_prior) = q
        AND resolved(c, q) AND precedes(t_prior, t)
      rationale: >
        Each turn must produce at least one newly resolved (Character, Question) pair —
        a pair that was not resolved by any prior turn from the same character on the same
        question. Combined with Ax-3, gives the termination certificate strict-decrease
        guarantee. Source: EXP-003 C-009.
      note: "precedes(t1, t2) is the natural ordering on Turns by session sequence — derivable from the Turn DAG (responds_to edges)."
    - id: Ax-6
      name: Escalation authority boundary
      statement: "forall l : Character, q : Question. is_leader(l) AND decided(q) -> NOT decision_issued_by(l, q)"
      rationale: "The Leader may not issue a Decision — only Escalations or Convergence announcements. Final Decisions are issued by PO or by convergence."
    - id: Ax-7
      name: Diminishing returns halt
      statement: >
        exists l : Character, council : Council. is_leader(l) AND diminishing_returns(council)
        AND |{t : Turn}| >= 2 * |{q : Question}| -> sigma_2_terminates(council)
      minimum_turns_note: >
        The 2 * |Questions| threshold is a calibration parameter, not a formal derivation.
        Empirically, each Question requires at least two Turns of substantive debate (initial
        positions + at least one counter-argument exchange) before diminishing returns can be
        reliably assessed. Like mu_2's 0.8 threshold, this value is derived from observation
        of council sessions and may be adjusted as evidence accumulates. sigma_2's precondition
        guarantees |Questions| >= 1, so the minimum threshold is always >= 2. The guard cannot
        be vacuously satisfied at zero Questions. External round bounds (e.g., M2-REVIEW
        max_rounds) may terminate debate before the threshold is reached. External bounds take
        precedence — the guard constrains voluntary diminishing_returns only.
      formal_status: >
        Ax-7 is a pragmatic axiom — diminishing_returns is a Leader judgment predicate,
        not formally decidable. sigma_2_terminates is an operational predicate meaning the
        debate step ends with current resolved set as final. Unresolved (Character, Question)
        pairs are carried to sigma_3 as explicitly unresolved items. This axiom authorizes
        early termination but does not provide a formal halting guarantee. The minimum-turns
        guard (|Turns| >= 2 * |Questions|) adds a structural precondition that prevents
        premature halts before sufficient debate has occurred.
      rationale: >
        The Leader may halt sigma_2 when continued debate is producing diminishing returns.
        This is a pragmatic termination condition — not formally decidable, but empirically
        reliable. Without it, new Question proposals can extend nu_sigma_2 indefinitely.
        The Leader observes all Turns and Positions (pi_leader) and is best positioned to
        detect cycling, repetition without progress, or exhaustion of genuinely distinct
        arguments. Unresolved pairs are not silently dropped — they appear in the Artifact
        as explicitly unresolved items. The minimum-turns guard prevents premature halts:
        diminishing_returns cannot be declared until the session has produced at least
        2 * |Questions| Turns, ensuring each Question has received substantive debate.
    - id: Ax-8
      name: Anti-capitulation clause integrity
      statement: >
        forall c : Character.
        has_defend_clause(card_of(c)) AND has_acknowledge_clause(card_of(c))
      rationale: >
        EXP-003: 9 deliberations across 3 problem types. Defend-only produces 56% position
        rigidity and +86.8% mean conviction (stubbornness). Acknowledge-only produces
        capitulation events with all-decline conviction. Both clauses together produce zero
        capitulation, widest conviction spread, and conditional updating. Neither clause may
        be removed independently. G5 verifies sigma_1 guidance contains both instructions.
  domain_boundary_note: >
    Excludes: the content domain of the challenge (D_COUNCIL tracks debate structure, not
    subject matter); tool availability; the internal reasoning process of characters (only
    their Turns and Positions are observable); execution history across sessions; sub-agent
    spawning mechanics (deferred to future version). Session-scoped Turn semantics
    (partitioning the Turn carrier set across sessions) are not modeled — the current
    resume integration treats prior-session state as initial conditions.
  initial_state_valid_claim:
    fresh: >
      A state with Challenge present, no Characters, no Questions, no Turns, no Positions,
      no Decisions, no Artifact satisfies all axioms: Ax-1 through Ax-8 have false antecedents
      (no Characters or Turns exist) — all vacuously true. Valid.
    resume: >
      A state with Challenge present, Characters and Positions loaded from CMEM-PROTO memory,
      but no new Turns in this session satisfies all axioms: Ax-1 holds if the restored cast
      has >= 2 contrarians (guaranteed by prior session's sigma_1 postcondition preserved in
      memory). Ax-2 holds if exactly one leader is restored. Ax-3 through Ax-6 have false
      antecedents for the current session (no new Turns yet). Ax-8 holds if restored
      CharacterCards contain both anti-capitulation clauses (guaranteed by prior session's
      sigma_1 postcondition which enforces Ax-8 guidance). Pragmatic scoping: Characters
      and Positions loaded from CMEM-PROTO are treated as initial context, not as Turn-derived
      state. Axioms Ax-1 through Ax-8 are evaluated only over Turns produced in the current
      session. Prior Turns are not members of the carrier set; the Positions they established
      are initial conditions. Formal session-scoping of the Turn sort is deferred to a future
      theory revision (see domain_boundary_note). Assumption: the prior session completed
      normally (on_session_end fired). If the prior session was interrupted, loaded state may
      be incomplete — PO verifies state accuracy during resume scope confirmation. Valid.
  terminal_state_valid_claim: >
    A state with k+1 Characters (1 Leader, k >= 2 Contrarians), all Questions decided,
    all (Character, Question) pairs resolved, at least one position_updated, Artifact
    produced satisfies all axioms: Ax-1 (two contrarians exist), Ax-2 (one leader),
    Ax-3 (all repeated positions have responds_to edges — enforced during sigma_2),
    Ax-4 (all updates have counter-argument triggers), Ax-5 (each turn resolved at least
    one pair), Ax-6 (leader issued no decisions), Ax-7 (diminishing returns — pragmatic),
    Ax-8 (anti-capitulation clauses present in all CharacterCards — enforced during sigma_1).
    Valid.

roles:
  - id: rho_leader
    description: >
      Neutral mediator. One per Council. Synthesizes debate state, identifies impasse,
      issues Escalations to PO, announces Convergence. Has no philosophical position —
      structural neutrality is constitutive of the role.
    observation_projection: >
      pi_leader : Mod(D_COUNCIL) -> Mod(D_COUNCIL_leader) — sees all Turns, all Positions,
      all Escalations, Challenge, all CharacterCards. Does not see PO's reasons for
      external decisions (PO may provide these but is not required to).
    authorized_transitions:
      - "Summarize state of debate (synthesis Turn, not a Decision)"
      - "Identify impasse between contrarians"
      - "Issue Escalation to PO with specific question and named alternatives"
      - "Announce Convergence when contrarians align"
      - "Propose Character swap or addition (PO must approve)"
      - "Declare diminishing_returns and halt sigma_2 early (Ax-7)"
    not_authorized:
      - "Hold a philosophical position"
      - "Issue a Decision (Ax-6)"
      - "Update a Position"
  - id: rho_contrarian
    count: "k >= 2 (Ax-1)"
    description: >
      Expert with bounded knowledge base defined by CharacterCard. Reasons from own
      expertise domain — epistemic constraint, not just role flavor. Each contrarian
      holds positions and must defend or update them under structural pressure.
    observation_projection: >
      pi_contrarian : Mod(D_COUNCIL) -> Mod(D_COUNCIL_contrarian) — sees all prior Turns,
      own CharacterCard, Challenge definition. Epistemic boundary: reasons from own
      grounding, not omniscient view.
    authorized_transitions:
      - "Issue a Turn (argument, counter-argument, or synthesis proposal)"
      - "Update a Position with acknowledged counter-argument as cause (Ax-4)"
      - "Propose new Question or sub-challenge to the Council"
    not_authorized:
      - "Issue Decisions or Escalations (Leader territory)"
      - "Speak outside own expertise domain without flagging"
  - id: rho_product_owner
    description: >
      The human user. Final decision authority. Sees full session. No obligation to
      explain Decisions — they are authoritative by role definition.
    observation_projection: >
      pi_po : Mod(D_COUNCIL) -> Mod(D_COUNCIL) — full session visibility. The PO has
      the broadest view: all Turns, all Characters, all Escalations, all Decisions.
    authorized_transitions:
      - "Issue a Decision in response to an Escalation"
      - "Modify Challenge scope"
      - "Approve or veto Character swaps and additions"
      - "Terminate the session"
    not_authorized:
      - "Speak as a Character (PO is external to the cast)"
    coverage_claim: >
      pi_leader covers all debate structure: Turns, Positions, Escalations, CharacterCards.
      pi_contrarian covers the debate from each expert's epistemic lens: prior Turns, own
      card, Challenge. pi_po covers the full session. Union covers all of Mod(D_COUNCIL):
      no dimension is invisible to all three role types. The PO's full visibility ensures
      no blind spot exists at the authority level.
    authority_claim: >
      Leader authority covers debate management: synthesis, impasse identification,
      escalation, convergence. Contrarian authority covers argumentation: position-holding,
      counter-arguments, question proposal. PO authority covers decisions: resolving
      escalations, scope modification, cast approval, termination. Union covers all
      transitions required to advance from initial state (Challenge presented) to O_COUNCIL
      (all Questions decided, Artifact produced).
    role_partition_rationale: >
      Three role types because the method requires three distinct epistemic and authority
      positions — (1) neutral synthesis without position-holding (Leader), (2) committed
      argumentation from bounded expertise (Contrarian), (3) external decision authority
      (PO). Removing the Leader merges synthesis with argumentation — characters cannot
      simultaneously hold positions and neutrally mediate. Removing the PO means decisions
      are made by the cast — but adversarial characters cannot converge without external
      authority on genuinely contested questions. The three-role structure is minimal for
      adversarial debate with external arbitration.

step_dag:
  topology: "sigma_0 -> sigma_1 -> sigma_2 -> sigma_3 (path graph, trivially acyclic)"
  formal: >
    Gamma_COUNCIL = ({sigma_0, sigma_1, sigma_2, sigma_3},
    {(sigma_0, sigma_1), (sigma_1, sigma_2), (sigma_2, sigma_3)},
    sigma_0, sigma_3)

phases:
  - id: sigma_0
    name: "Setup"
    role: rho_leader
    precondition:
      fresh: "Challenge exists (provided by PO or solicited); no Council yet instantiated; no prior Characters, Positions, or session history"
      resume: "CMEM-PROTO state exists for this topic. Prior Characters, Positions, and historical context (decisions, open questions, tensions) loaded from memory. Challenge provided (new or continuation)."
    postcondition: "Challenge stated precisely; PO has confirmed scope"
    guidance: |
      **Constraints (what must be true after this step):**
      - challenge_statement is non-empty: one precise sentence stating the challenge.
      - scope_confirmed = true: the PO has accepted the restatement.
      - Do not proceed to sigma_1 without scope confirmation.

      **Rationale:**
      Scope confirmation prevents character design being wasted on the wrong problem.
      If the challenge is ambiguous, characters will be designed for the wrong domain
      and the debate will not produce useful decisions.

      **Branch selection:** If the PO requests continuation of a prior topic, check
      `.method/council/memory/INDEX.yaml` for a matching entry. If found, take the resume
      path. If not found or PO does not request continuation, take the fresh path. The PO
      decides — the agent does not auto-detect.

      **Procedure (fresh start):**
      1. If challenge text was provided, use it directly.
      2. Otherwise ask: "What should the council solve?"
      3. Restate the challenge in one sentence.
      4. Confirm with the PO before proceeding.

      **Procedure (resume from CMEM-PROTO):**
      1. Read the CMEM-PROTO memory file for the topic (council/memory/{topic_id}.yaml).
         If the memory file is missing, unreadable, or fails YAML parse: report the error
         to PO and fall back to the fresh path.
      2. Populate Characters from memory: restore active cast members from cast.active.
      3. Load prior context from the memory file's decisions and open_questions. Characters
         re-affirm or update their positions explicitly at the start of sigma_2, grounded
         in this loaded context.
      4. Determine if the challenge is new or a continuation:
         - Continuation: present the topic summary, standing decisions, and open questions
           to the PO. Restate the challenge for this session in one sentence, incorporating
           the continuation context. Confirm with PO. This becomes the challenge_statement.
           Ask if they want to continue with the current cast or modify it.
         - New challenge on existing topic: state the new challenge, note relevant prior
           context, and proceed to scope confirmation as in the fresh path.
      5. Confirm scope with PO before proceeding (same gate as fresh path).

      **Output schema reference:**
      - challenge_statement: one precise sentence
      - scope_confirmed: boolean (must be true)
    output_schema:
      fields:
        - name: challenge_statement
          type: string
          description: "One precise sentence stating the challenge"
          min_length: 1
          required: true
        - name: scope_confirmed
          type: boolean
          required: true
    invariants:
      hard:
        - "challenge_statement is non-empty"
        - "scope_confirmed = true"
      soft:
        - "challenge_statement is a single sentence, not a paragraph"

  - id: sigma_1
    name: "Cast Design"
    role: rho_leader
    precondition:
      fresh: "Challenge confirmed; Council empty"
      resume: "Challenge confirmed; Council populated from CMEM-PROTO with restored Characters; PO presented with cast for re-approval"
    postcondition: >
      Council has Leader (1) + Contrarians (k >= 2) with complete CharacterCards;
      PO has approved the cast (cast_approved for all Characters)
    guidance: |
      **Constraints (what must be true after this step):**
      - leader is non-empty: one CharacterCard for the Leader role.
      - contrarians has at least 2 entries (Ax-1): each a complete CharacterCard.
      - Each CharacterCard has: name, expertise, conviction, blind_spot, voice.
      - Contrarians must have opposing philosophical positions — not just different
        expertise, but different answers to "how should this be solved?"
      - cast_approved = true: PO has reviewed and approved (or modified) the cast.

      **Rationale:**
      Character design is the method's core mechanism. Each character's conviction is
      the sentence they defend under pressure; the blind spot is what they systematically
      underweight. Opposing convictions produce the adversarial structure that generates
      method-attributable insights. If characters merely have different expertise but
      the same philosophy, the debate degenerates into complementary monologues.

      **Cognitive diversity heuristic:**
      Ensure the cast covers both divergent-exploration (pushes beyond obvious solutions)
      and convergent-pruning (tests feasibility and implementation cost). These are two
      structurally different cognitive operations that degenerate when the same character
      does both. They do NOT require separate characters — they can be merged into domain
      contrarians through conviction and blind_spot fields. A contrarian whose blind spot
      is "underweights implementation cost" naturally explores divergently; one whose blind
      spot is "may kill good ideas too early" naturally prunes convergently. The key is
      that both operations are represented in the cast. Evidence: sessions with explicit
      divergent/convergent pairing produced the evolution ledger concept (divergent) and
      the hardest_decision field (convergent) — neither emerged from domain-only casts.

      **Anti-capitulation clause integrity (Ax-8):**
      Each character prompt MUST include both:
      (a) defend your positions — don't agree to avoid friction, AND
      (b) acknowledge genuinely good counter-arguments honestly.
      Neither may be omitted. Defend-only produces stubbornness (56% position rigidity,
      +86.8% mean conviction). Acknowledge-only produces capitulation (all-decline
      conviction). Both together produce zero capitulation with conditional updating.

      **Procedure:**
      1. Design characters tailored to the Challenge domain.
      2. For each Contrarian: name, expertise domain, core conviction (one sentence
         they would defend under pressure), blind spot (what they systematically
         underweight), voice descriptor (2-3 words).
      3. Ensure contrarians hold opposing positions on the challenge — not just different
         knowledge, but different prescriptions.
      4. Present the cast to PO. Ask: "Any changes to the lineup before we begin?"
      5. Apply PO modifications if any. Set cast_approved = true.

      **Procedure (resume from CMEM-PROTO):**
      1. Present the restored cast to PO: names, roles, convictions, blind spots.
      2. Note any potential misfit between the prior cast's expertise and the current challenge.
      3. Ask PO: "Keep the current cast, modify it, or redesign from scratch?"
      4. If keep: set cast_approved = true for all restored Characters.
      5. If modify: apply PO's changes, re-verify Ax-1 (>= 2 contrarians, 1 leader), set cast_approved.
      6. If redesign: discard restored cast, run the fresh procedure above.

      **Output schema reference:**
      - leader: CharacterCard object
      - contrarians: array of CharacterCard objects (>= 2)
      - cast_approved: boolean (must be true)
    output_schema:
      fields:
        - name: leader
          type: object
          description: "{name, expertise, voice} — Leader has no conviction or blind_spot (structurally neutral)"
          required: true
        - name: contrarians
          type: array
          items: object
          description: "{name, expertise, conviction, blind_spot, voice}"
          min_items: 2
          required: true
        - name: cast_approved
          type: boolean
          required: true
    invariants:
      hard:
        - "leader is non-empty with name and expertise"
        - "contrarians has at least 2 items"
        - "each contrarian has name, expertise, conviction, blind_spot, voice"
        - "cast_approved = true"
      soft:
        - "contrarian convictions are opposing (not merely complementary)"
        - "blind_spots are distinct across contrarians"

  - id: sigma_2
    name: "Debate & Resolve"
    role: "all roles (Leader, Contrarians, PO)"
    precondition: "Council populated; cast approved; at least one open Question exists on the Challenge"
    postcondition: >
      EITHER (full resolution): forall q : Question. derived_from(q, challenge) -> decided(q).
        forall c : Character, q : Question. derived_from(q, challenge) -> resolved(c, q).
        All Characters have declared final positions on all Questions.
      OR (diminishing returns halt): diminishing_returns(s) declared by Leader.
        Decided Questions are recorded as decided. Unresolved (Character, Question) pairs
        are explicitly recorded as unresolved with Leader's halt rationale.
    guidance: |
      **Constraints (what must be true after this step):**
      - session_transcript is non-empty: the full sequence of Turns.
      - decisions contains one entry per Question, each with rationale.
      - escalations_log contains all Escalations with PO responses.
      - all_questions_resolved = true: no open Questions remain.
      - Each Turn must advance the challenge — vague or decorative turns violate Ax-5.
      - No character re-states a position without responding to a counter-argument (Ax-3).
      - No character updates a position without acknowledging the counter-argument (Ax-4).
      - The Leader does not issue Decisions — only Escalations and Convergence (Ax-6).

      **Rationale:**
      This is the structural core of the method. The debate produces method-attributable
      insights: perspectives that a single-agent approach would not generate because they
      arise from the adversarial structure, not from the agent's general capability.
      The axioms (Ax-3 through Ax-6) are the enforcement mechanism — without them,
      characters converge with agreeableness scores of 75-92% (EXP-001c), defeating the
      adversarial structure.

      **Procedure — debate loop (internal to this step):**
      1. Characters speak in turn, labeled by name. Stay in voice.
      2. Each Turn must: (a) respond to a prior Turn or introduce a new argument,
         (b) explicitly state or update a Position on a Question, (c) resolve at least
         one (Character, Question) pair (Ax-5).
      3. Leader periodically summarizes the state of debate.
      4. When contrarians reach impasse, Leader identifies the exact dividing question
         and issues an Escalation: "[Leader] to Product Owner: [specific question].
         The contrarians are split on X because Y. What should we prioritize?"
      5. PO responds to Escalation with a Decision.
      6. After a Decision: Leader states it with one-sentence rationale. Each Character
         acknowledges how it changes their position. Move to next open Question.
      7. Leader monitors for position repetition (Ax-3): if a Character restates a
         position without new argument content, Leader flags it. The flagged Character
         must either respond to an unaddressed counter-argument or declare their position
         final on that Question.
      8. If a character is not contributing or the problem has shifted domains, propose
         a Character swap to PO.
      8. Continue until all Questions are decided and all (Character, Question) pairs
         are resolved — OR the Leader declares diminishing_returns.

      **Diminishing returns detection (Ax-7):**
      The Leader monitors for diminishing returns and may halt sigma_2 early when:
      - The minimum-turns guard is satisfied: |Turns| >= 2 * |Questions| (each Question
        has received at least two Turns of substantive debate)
      - Recent Turns are restating positions without new arguments
      - Characters are cycling through the same counter-arguments
      - Remaining unresolved pairs are not producing substantive disagreement
      - New Questions being proposed are refinements of already-decided Questions
      The Leader MUST NOT declare diminishing_returns until the minimum-turns threshold
      is met. This prevents premature halts before each Question has been debated.
      When declaring diminishing_returns, the Leader must state the current Turn count
      and Question count in the halt rationale (e.g., '14 Turns across 6 Questions,
      threshold 12 met'). The Leader records which pairs remain unresolved, and proceeds
      to sigma_3. Unresolved pairs appear in the Artifact as explicitly unresolved
      items — they are not silently dropped.

      **Termination (PAT-003A hybrid step):**
      This step has internal convergence dynamics governed by an embedded measure:
      nu_sigma_2 = |{(c, q) in Characters x Questions | NOT resolved(c, q)}|.
      Ax-5 guarantees each Turn reduces nu_sigma_2 by >= 1. Ax-3 prevents stalling
      (no empty repetition). nu_sigma_2 is bounded above by |Characters| x |Questions|,
      which is finite. The step terminates when nu_sigma_2 = 0 OR
      diminishing_returns(s) is declared by the Leader (Ax-7).
      Note: Ax-7 does not provide a formal halting guarantee — it is a pragmatic
      escape hatch. The formal measure nu_sigma_2 remains sound for resolved pairs.

      **Output schema reference:**
      - session_transcript: array of Turn entries
      - decisions: array of {question, decision, rationale} entries
      - escalations_log: array of {question, escalation, po_response} entries
      - all_questions_resolved: boolean (must be true)
    output_schema:
      fields:
        - name: session_transcript
          type: array
          items: object
          description: "{character: string, turn_content: string, question: string, position_action: update|maintain|new}"
          min_items: 1
          required: true
        - name: decisions
          type: array
          items: object
          description: "{question: string, decision: string, rationale: string}"
          min_items: 1
          required: true
        - name: escalations_log
          type: array
          items: object
          description: "{question: string, escalation: string, po_response: string}"
          min_items: 0
          required: false
        - name: all_questions_resolved
          type: boolean
          required: true
        - name: halt_rationale
          type: string
          description: "Leader's rationale for halting on diminishing returns (required if all_questions_resolved = false)"
          required: false
        - name: unresolved_pairs
          type: array
          items: object
          description: "{character: string, question: string, last_position: string} — pairs not resolved at halt"
          min_items: 0
          required: false
    invariants:
      hard:
        - "session_transcript is non-empty"
        - "decisions has at least 1 item (at least one Question must be decided)"
        - "all_questions_resolved = true OR halt_rationale is non-empty"
        - "every Turn in session_transcript has a named character and addresses a question"
        - "if all_questions_resolved = false: unresolved_pairs is non-empty"
      soft:
        - "at least one contrarian's position was updated during the session"
        - "escalations_log is populated if any impasse occurred"
        - "no two consecutive turns by the same character on the same question without a responds_to edge"

  - id: sigma_3
    name: "Output"
    role: rho_leader
    precondition: "sigma_2 complete: all Questions resolved OR diminishing_returns halt declared"
    postcondition: >
      Two-tier Artifact exists: primary report (executive summary, decisions table,
      recommendations, key tensions) for human consumption, plus structured appendix
      (cast, escalation log, session metadata) for reference and machine consumption.
    guidance: |
      **Constraints (what must be true after this step):**
      - report is non-empty: the primary council report in markdown.
      - The report has four sections: Executive Summary, Decisions Table,
        Recommendations, and Key Tensions. If sigma_2 halted on diminishing
        returns, a fifth section (Open Items) lists unresolved questions.
      - decisions_table has at least 1 entry with all five fields populated.
      - Each decisions_table entry must contain specific concrete claims in every
        field — not vague references ("because of X's argument") but the actual
        argument content ("because API rate limits make batch unviable at 5+ agents").
      - key_tensions has 2-3 entries, each 2-4 sentences explaining the structural
        disagreement, which characters held which side, and how it was resolved.
      - positions_updated_count >= 1: at least one position was updated during the
        session (if zero, the council added no value over a single recommendation).

      **Rationale:**
      The two-tier report serves two audiences: the primary report lets someone who
      wasn't in the debate act on its outcomes in 60 seconds; the appendix preserves
      formal traceability for deep-divers and machine consumers. Key Tensions and
      Position Shifts (embedded in the Decisions Table) capture the adversarial
      method's unique contribution — insights that arise from the structural
      disagreements, not from general capability. Without these, the report is just
      a list of decisions that could have come from a single-agent recommendation.

      **Procedure:**
      1. Write the Executive Summary: 2-3 sentences covering the challenge, headline
         decisions, and primary recommendation.
      2. Build the Decisions Table: one row per resolved Question. For each:
         - Decision: what was decided (one sentence)
         - Rationale: the strongest argument that won (one specific sentence)
         - Dissent/Risk: the strongest counter-argument or minority view (one sentence)
         - Position Shifts: which characters changed on this question and what specific
           argument caused it. Format: "{Name} shifted because {concrete argument}".
           Empty if no shifts on this question.
      3. Write Recommendations: numbered action items implied by the decisions.
      4. Write Key Tensions: the 2-3 fundamental disagreements that shaped the debate.
         Each gets 2-4 sentences: what the tension was, who held which side, how it
         resolved. These are the core value — the structural disagreements a single
         perspective would never surface.
      5. If sigma_2 halted on diminishing returns: add Open Items with unresolved
         questions and the Leader's halt rationale.
      6. Build the appendix: cast cards, escalation log, session metadata.

      **Output schema reference:**
      - report: markdown string (Executive Summary + Decisions Table + Recommendations + Key Tensions)
      - decisions_table: structured array (question, decision, rationale, dissent_risk, position_shifts)
      - key_tensions: array of structural disagreements
      - recommendations: array of action items
      - appendix_cast: array of character cards
      - appendix_escalation_log: array of escalation entries
      - appendix_metadata: session-level counts
      - positions_updated_count: integer >= 0
    output_schema:
      fields:
        - name: report
          type: string
          description: "The primary council report in markdown: Executive Summary, Decisions Table, Recommendations, Key Tensions, and optionally Open Items"
          min_length: 1
          required: true
        - name: decisions_table
          type: array
          items: object
          description: "{question: string, decision: string, rationale: string, dissent_risk: string, position_shifts: string[]} — one entry per resolved Question. Each string field must contain a specific concrete claim."
          min_items: 1
          required: true
        - name: key_tensions
          type: array
          items: object
          description: "{tension: string, sides: string, resolution: string} — 2-3 fundamental disagreements that shaped the debate"
          min_items: 1
          required: true
        - name: recommendations
          type: array
          items: string
          description: "Action items implied by the decisions — one line each"
          min_items: 0
          required: false
        - name: appendix_cast
          type: array
          items: object
          description: "{name: string, role: string, expertise: string, conviction: string, blind_spot: string} — character cards from sigma_1"
          min_items: 3
          required: true
        - name: appendix_escalation_log
          type: array
          items: object
          description: "{question: string, escalation: string, po_response: string} — escalations to PO with responses"
          min_items: 0
          required: false
        - name: appendix_metadata
          type: object
          description: "{question_count: integer, decisions_made: integer, positions_updated: integer, escalation_count: integer}"
          required: true
        - name: positions_updated_count
          type: integer
          description: "Number of character positions updated during the session"
          required: true
    invariants:
      hard:
        - "report is non-empty"
        - "decisions_table has at least 1 item"
        - "key_tensions has at least 1 item"
        - "appendix_cast has at least 3 items (Leader + 2 Contrarians minimum)"
        - "appendix_metadata is present with all four counts"
        - "positions_updated_count is present"
        - "every decisions_table entry has non-empty question, decision, rationale, and dissent_risk"
      soft:
        - "positions_updated_count >= 1 (if 0, council added no value)"
        - "recommendations is populated when decisions imply next actions"
        - "decisions_table entries contain specific claims, not vague references"
        - "key_tensions has 2-3 entries (fewer suggests shallow debate, more suggests unfocused)"

composability:
  claims:
    - edge: "sigma_0 -> sigma_1"
      claim: >
        Fresh path: post(sigma_0) establishes Challenge with scope confirmed, Council empty.
        pre(sigma_1, fresh) requires Challenge confirmed and Council empty. Satisfied.
        Resume path: post(sigma_0) establishes Challenge with scope confirmed, Council
        populated from CMEM-PROTO with restored Characters and Positions.
        pre(sigma_1, resume) requires Challenge confirmed and Council populated from
        CMEM-PROTO. Satisfied. Both paths are compositional.
      status: compositional_both_paths
    - edge: "sigma_1 -> sigma_2"
      claim: >
        post_sigma_1 establishes Council with Leader + Contrarians (k >= 2), all
        CharacterCards complete, cast_approved = true. pre_sigma_2 requires Council
        populated, cast approved, at least one open Question. The Challenge itself
        constitutes at least one Question (the top-level question). post_sigma_1
        satisfies pre_sigma_2.
    - edge: "sigma_2 -> sigma_3"
      claim: >
        post_sigma_2 establishes all Questions decided, all (Character, Question) pairs
        resolved, all_questions_resolved = true. pre_sigma_3 requires all Questions
        decided, no open Questions. Identity inclusion.
  terminal_condition_claim: >
    post_sigma_3 produces two-tier Artifact: primary report (executive summary, decisions
    table with position shifts, recommendations, key tensions) and structured appendix
    (cast, escalation log, metadata) with positions_updated_count. O_COUNCIL requires:
    all Questions decided (from sigma_2 postcondition, carried through), at least one
    position updated (checked at sigma_3 via positions_updated_count), Artifact exists
    (produced at sigma_3 as the report + appendix), all Characters maintained conviction
    or updated for named reason (Ax-4 enforced throughout sigma_2, position shifts in
    decisions_table provide the evidence). post_sigma_3 implies O_COUNCIL.
  initial_condition_claim: >
    pre_sigma_0 requires Challenge exists. This holds at method invocation: P1-EXEC's
    delta_EXEC passes the Challenge to M1-COUNCIL via embed_COUNCIL. On the resume path,
    pre_sigma_0 additionally requires CMEM-PROTO state for the topic. Detection and routing
    between paths is internal to sigma_0 (the agent checks for existing memory files).
  contrarian_challenge:
    weakest_edge: "sigma_1 -> sigma_2"
    challenge: >
      pre_sigma_2 requires "at least one open Question exists on the Challenge." But
      sigma_1's postcondition says nothing about Questions — it establishes the Council
      cast. The Challenge itself is a Question, but this derivation is implicit. If the
      Challenge is not automatically a Question (e.g., a vague directive), sigma_2's
      precondition may not be met.
    defense_or_revision: >
      The Challenge always constitutes at least one Question: the top-level question
      "what should we do about [challenge_statement]?" is derived_from(q, challenge)
      by construction. sigma_0 ensures the challenge is stated precisely and scope is
      confirmed, which guarantees it is well-formed as a Question. This derivation is
      implicit but reliable — a confirmed, precise challenge statement is always a
      decidable question. The composability holds because sigma_0's postcondition
      (precise statement, confirmed scope) guarantees the Challenge is Question-formable.

objective:
  id: O_COUNCIL
  formal: >
    O_COUNCIL(s) =
      (forall q : Question. derived_from(q, challenge) -> decided(q))
      AND (exists c : Character. exists q : Question. position_updated(c, q))
      AND (exists a : Artifact. a in s)
      AND (forall c : Character, q : Question. position_updated(c, q) ->
           exists t_counter : Turn, t_update : Turn. speaker(t_counter) != c AND topic(t_counter) = q
           AND speaker(t_update) = c AND responds_to(t_update, t_counter))
  type: terminal
  expressible_claim: >
    O_COUNCIL references decided (predicate over Question), position_updated (predicate
    over Character x Question), derived_from (predicate over Question x Challenge),
    Artifact (declared sort), responds_to (predicate over Turn x Turn), speaker and topic
    (function symbols). All are in Sigma_COUNCIL. O_COUNCIL is expressible as a closed
    sentence over Mod(D_COUNCIL).
  progress_preorder:
    definition: >
      s1 <=_O s2 iff |{q : Question | decided(q) in s1}| <= |{q : Question | decided(q) in s2}|.
      States with more decided Questions are further toward O_COUNCIL. Terminal states
      (all Questions decided, Artifact exists) are maximal.
    well_founded: >
      Question set is finite (derived from a finite Challenge with finite sub-questions
      surfaced during debate — new Questions may be proposed but the debate terminates
      when all proposed Questions are decided, and Ax-5 ensures progress on each turn).
  success_profile:
    - id: mu_1
      name: question_resolution
      formula: "|{q : Question | decided(q)}| / |{q : Question | derived_from(q, challenge)}|"
      range: "[0, 1]"
      terminal: "1.0"
      proxy_claim: >
        mu_1 tracks the first conjunct of O_COUNCIL. Order-homomorphism w.r.t. <=_O by
        definition. mu_1 = 1.0 is necessary but not sufficient (Artifact and position
        update still required).
    - id: mu_2
      name: adversarial_integrity
      formula: "|{t : Turn | responds_to(t, t') for some t'}| / |{t : Turn}|"
      range: "[0, 1]"
      threshold: ">= 0.8"
      proxy_claim: >
        Fraction of Turns that are specific responses to counter-arguments vs vague
        or decorative statements. Tracks Ax-3 compliance. Low mu_2 signals characters
        are agreeing to avoid friction. Evidence: EXP-001c agreeableness 75-92% without
        anti-capitulation instructions.
    - id: mu_3
      name: escalation_precision
      formula: "|{e : Escalation | specific_question(e)}| / |{e : Escalation}|"
      range: "[0, 1]"
      terminal: "1.0"
      proxy_claim: >
        Every Escalation must be a specific question with named alternatives. Imprecise
        escalations ("we need your input") place illegitimate cognitive burden on the PO.
        mu_3 = 1.0 means every escalation was actionable.

termination:
  certificate: "nu(s) = |{sigma in {sigma_0, sigma_1, sigma_2, sigma_3} | sigma has not executed in s}|"
  initial: 4
  final: 0
  decrease_witness: >
    Steps sigma_0, sigma_1, sigma_3 each execute once (trivial decrease). sigma_2 is a
    hybrid step (PAT-003A) with internal convergence governed by
    nu_sigma_2 = |{(c, q) in Characters x Questions | NOT resolved(c, q)}|.
    Ax-5 guarantees each Turn reduces nu_sigma_2 by >= 1. Ax-3 prevents stalling. nu_sigma_2
    is bounded above by |Characters| x |Questions| (both finite). sigma_2 terminates when
    nu_sigma_2 = 0, then nu decreases by 1 (sigma_2 done). Total termination guaranteed.
    nu_sigma_2 = 0 always terminates sigma_2 regardless of the minimum-turns guard. The
    Ax-7 minimum-turns guard constrains only the diminishing_returns pragmatic escape, not
    the formal termination condition via full pair resolution.

selection_profile:
  positive_indicators:
    - property: "Multiple defensible positions exist (>= 2 solution philosophies)"
    - property: "Output is a decision, not an implementation"
    - property: "User benefits from minority views being surfaced"
    - property: "Multi-turn interaction is affordable"
    - property: "Problem bounded enough for 3-6 expert characters"
  evidence: "EXP-001c: 1.8-2.5x quality improvement on design decisions with 3-agent adversarial structure"
  principal_failure_mode: >
    Characters converge too quickly because the executing LLM cannot maintain genuine
    epistemic separation between characters it is simultaneously playing. Mitigation:
    Ax-3 and Ax-4 enforce structural anti-capitulation, and mu_2 measures compliance.
    Residual risk: characters may produce superficially different but structurally
    identical arguments. Detectable by PO but not by the method itself.

known_wip:
  - id: W1
    status: open
    description: >
      Sub-agent spawning within sigma_2 (character does individual research while
      debate continues). Requires concurrent branches not in current theory.
      Deferred to v2.0.
  - id: W2
    status: resolved_v1.1
    description: >
      Position identity for Ax-3 enforcement operationalized as Leader tagging (v1.1).
      The Leader flags repetition based on unchanged prescription + justification.
      Formal definition (semantic similarity model) remains open for future versions
      but the pragmatic operationalization is sufficient for LLM execution.
  - id: W5
    status: open
    description: >
      Context isolation execution mode. EXP-002 (ov-research, 2026-03-19) found that
      running council characters as isolated sub-agents (separate context windows,
      shared transcript file) produces 2x position shifts, +43% counter-arguments, and
      qualitatively reversed conviction trajectories vs synthetic single-context execution.
      M1-COUNCIL axioms (Ax-3 through Ax-7) are mode-independent — they apply equally
      under both synthetic and isolated execution (SESSION-033 D-073, Harlan's analysis).
      Isolation is an execution architecture choice, not a method modification. The
      /council-team skill implements the --isolated flag (D-074). Method-level
      parameterization deferred pending 2+ replications on different problem types (D-075).
    evidence: "ov-research/experiments/EXP-002-context-isolation"
    council_decisions: [D-073, D-074, D-075]

