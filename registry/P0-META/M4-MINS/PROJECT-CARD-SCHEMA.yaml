specification:
  id: MIC-SCHEMA
  name: "Method Instance Card (MIC) — Project Card Schema"
  parent: M4-MINS
  version: "0.1"
  status: proposed
  date: "2026-03-14"
  description: >
    Defines the concrete schema for M4-MINS's ProjectContext sort. A project card
    is a lightweight YAML document that a project author writes to parameterize an
    abstract methodology for their specific project. M4-MINS reads the card and
    produces the project instance as a derived artifact.

formal_grounding:
  sort_instantiated: ProjectContext
  method: M4-MINS
  theory: "F1-FTH §6.3 (domain retraction)"
  relationship: >
    The project card IS the ProjectContext that M4-MINS sigma_0 receives as input.
    This schema makes the ProjectContext sort concrete — defining its fields, types,
    and constraints so project authors can fill it out without knowledge of formal
    method theory.

motivation:
  before: >
    I1-T1X (t1-cortex instance of M1-IMPL) = 10 handwritten role files + domain
    extension proposal. ~500 lines of markdown, deeply coupled to M1-IMPL v3.1
    internal structure. Each new project requires a comparable manual effort.
  after: >
    One project card (~50-80 lines YAML) + derived instance. The card is human-authored
    without formal theory. The instance is regenerated from card + abstract methodology.
    New project = fill out card template. Methodology upgrade = regenerate instance.
  key_property: >
    Instance = M4-MINS(AbstractMethodology_version, ProjectCard_version).
    Both inputs versioned independently. The instance is a derived artifact.

schema:
  project_card:
    description: "The top-level object a project author writes."

    identity:
      fields:
        - name: id
          type: string
          required: true
          description: "Instance identifier, e.g. I1-T1X"
          convention: "I{N}-{ProjectCode}"
        - name: project
          type: string
          required: true
          description: "Human-readable project name"
        - name: methodology
          type: enum
          required: true
          description: "Which abstract methodology this card instantiates"
          values: [P0-META, P1-EXEC, P2-SD]
          note: "Extensible as new methodologies are added to the registry"
        - name: methodology_version
          type: string
          required: true
          description: "Version of the abstract methodology this card targets"
          example: "2.0"

    context:
      description: >
        Technical environment of the project. These values propagate to every method
        in the methodology that touches source code, compilation, testing, or tooling.
      fields:
        - name: language
          type: string
          required: true
          example: "Scala 3"
        - name: build_command
          type: string
          required: true
          example: "sbt compile"
        - name: test_command
          type: string
          required: true
          example: "sbt test"
        - name: lint_command
          type: string
          required: false
          example: "scalafmt --check"
        - name: language_server
          type: string
          required: false
          description: "Language server for symbol navigation"
          example: "Metals"
        - name: language_server_protocol
          type: string
          required: false
          description: "How the language server is accessed"
          example: "MCP"
        - name: additional_tools
          type: array
          items: object
          required: false
          description: "Other tools the project requires for execution"
          item_fields:
            - name: name
              type: string
            - name: purpose
              type: string
            - name: protocol
              type: string

    architecture:
      description: >
        Paths to project documentation artifacts. These tell methods where to find
        architecture specs, PRDs, gaps, and other reference documents.
      fields:
        - name: docs_root
          type: string
          required: true
          description: "Root path for project documentation"
          example: "docs/"
        - name: architecture_path
          type: string
          required: true
          description: "Path to architecture spec directory"
          example: "docs/arch/"
        - name: prd_path
          type: string
          required: false
          description: "Path to PRD documents"
          example: "docs/prds/"
        - name: gaps_path
          type: string
          required: false
          description: "Path to known architectural gaps file"
          example: "docs/arch/gaps.md"
        - name: implementation_path
          type: string
          required: false
          description: "Path to implementation docs (phases, sessions, reviews)"
          example: "docs/impl/"

    delivery_rules:
      description: >
        Project-specific constraints on how methodology methods execute. Written as
        prose rules — no formal theory required. Each rule names which methods and
        roles it affects. The instantiation process (M4-MINS) derives formal
        constraints from these prose rules.
      type: array
      items:
        fields:
          - name: id
            type: string
            required: true
            description: "Rule identifier, e.g. DR-1"
          - name: rule
            type: string
            required: true
            description: "The constraint in plain language"
          - name: applies_to
            type: array
            items: string
            required: true
            description: "Method IDs this rule affects"
          - name: affects_roles
            type: array
            items: string
            required: false
            description: "Role IDs within those methods that this rule constrains"
          - name: protocol
            type: string
            required: false
            description: "Named protocol this rule enforces, if any"
            examples: ["structural_dissent", "pre_dispatch_verification"]
          - name: artifact
            type: string
            required: false
            description: "Named artifact this rule requires, if any"
            examples: ["source_verification_worksheet", "coverage_trace_matrix"]
          - name: trigger
            type: string
            required: false
            description: "Condition that activates this rule, if conditional"
            examples: ["phase_count % 3 == 0", "multi_task_scope = true"]

    role_notes:
      description: >
        Per-role operational guidance specific to this project. Keys are role IDs
        from the methodology's methods. Values are prose notes that override or
        supplement the abstract method's role descriptions.
      type: object
      keys: "role IDs (e.g., orchestrator, reviewer, impl_sub_agent)"
      value_fields:
        - name: default_mode
          type: boolean
          required: false
          description: "Whether this role is the default execution mode"
        - name: note
          type: string
          required: true
          description: "Project-specific operational guidance for this role"

    domain_extensions:
      description: >
        Optional explicit domain theory extensions for advanced users. Most project
        authors will not fill this out — M4-MINS derives domain extensions from
        delivery_rules automatically. This section is for cases where the author
        wants direct control over the formal extension.
      required: false
      fields:
        - name: sorts
          type: array
          items: object
          description: "Additional sorts for the project domain"
        - name: predicates
          type: array
          items: object
          description: "Additional predicates for the project domain"
        - name: axioms
          type: array
          items: object
          description: "Additional axioms for the project domain"

derivation_rules:
  description: >
    How M4-MINS transforms card fields into instance components. These rules define
    the systematic mapping from Layer 1 (human-authored card) to Layer 2 (formal
    instance).
  rules:
    - input: "context.language + context.language_server"
      output: "tool constraints on impl_sub_agent, qa_sub_agent roles"
      mechanism: >
        If language_server is declared: add tool_requirements to affected roles
        (impl_sub_agent gets "use {language_server} for symbol navigation").
        If language_server_protocol = MCP: add constraint "Do not use Read/Grep
        for symbol lookup — use {language_server} MCP tools."

    - input: "context.build_command, context.test_command, context.lint_command"
      output: "compile_exit, test validation, lint check bindings in M1-IMPL/M2-DIMPL"
      mechanism: >
        Map to the function symbols that M1-IMPL's Ax-I_compile, Ax-I_test, Ax-I_lint
        reference. The instance's compile_exit function calls build_command; the
        test validation calls test_command; lint_verify calls lint_command.

    - input: "delivery_rules with protocol field"
      output: "role override with named protocol"
      mechanism: >
        Generate a role override clause: the affected role's guidance is supplemented
        with the protocol's behavioral rules. E.g., structural_dissent protocol adds:
        "Produce independent findings before reading any prior review."

    - input: "delivery_rules with artifact field"
      output: "pre-step artifact requirement"
      mechanism: >
        Generate a precondition extension on the affected step: the artifact must
        exist before the step can execute. E.g., source_verification_worksheet
        becomes a precondition on M2-DIMPL sigma_1 (Dispatch).

    - input: "delivery_rules with trigger field"
      output: "conditional invocation rule on delta_SD"
      mechanism: >
        Generate a governance binding: the trigger condition determines when the
        affected method is invoked. E.g., "phase_count % 3 == 0" becomes a condition
        on delta_SD's audit arm.

    - input: "architecture paths"
      output: "artifact path bindings in all methods"
      mechanism: >
        Map architecture_path, gaps_path, prd_path to the path references in method
        guidance blocks. M6-ARFN reads from architecture_path; M5-PLAN reads from
        prd_path; M4-DDAG reads from gaps_path for baseline.

    - input: "role_notes"
      output: "guidance overlay per role"
      mechanism: >
        Append role_notes.{role}.note to the abstract method's role description
        and step guidance for that role. The note is additive — it supplements,
        not replaces, the abstract guidance.

version_compatibility:
  compatible_upgrade: >
    Card targets methodology_version X. Methodology upgrades to Y. Compatible if:
    (1) all methods referenced in delivery_rules.applies_to still exist in Y,
    (2) all roles referenced in delivery_rules.affects_roles still exist in Y,
    (3) no axioms in Y contradict axioms derived from the card.
    On compatible upgrade: regenerate instance with new methodology version.
  incompatible_upgrade: >
    If any referenced method or role is removed in Y: card needs migration.
    M4-MINS sigma_0 should detect this and report: "Card references {method/role}
    which does not exist in {methodology} v{Y}. Migration required."
  card_upgrade: >
    Card evolves (e.g., project changes build tool). Regenerate instance with same
    methodology version. No methodology change needed. Instance picks up new
    tool bindings automatically.

example_cards:
  t1_cortex:
    file: "See memory/project_mic_system.md for the full t1-cortex card example"
    summary: >
      I1-T1X: P2-SD v2.0 instance for t1-cortex. Scala 3 + Metals MCP + sbt.
      5 delivery rules (MCP navigation, structural dissent, source verification,
      full-surface security, drift every 3 phases). 3 role notes (orchestrator,
      reviewer, impl_sub_agent). Replaces 10 handwritten role files.

card_placement:
  description: >
    Where the project card lives, how it's named, and how the agent discovers it.

  location: >
    The project card lives in the PROJECT REPO, not in pv-method. It is a project
    artifact, not a method artifact. The card describes what's specific to this project —
    it belongs with the project's other configuration and documentation.

  recommended_paths:
    primary: ".method/project-card.yaml"
    alternative: "organon/project-card.yaml"
    convention: >
      .method/ is preferred — it mirrors .claude/ and .github/ as a project-level
      configuration directory. organon/ is acceptable for projects that already use
      the organon documentation pattern (e.g., t1-cortex).

  naming: >
    The file is always named project-card.yaml. One card per project per methodology.
    If a project uses two methodologies (e.g., P2-SD for delivery and P1-EXEC for
    ad-hoc execution), it has two cards:
      .method/project-card-P2-SD.yaml
      .method/project-card-P1-EXEC.yaml

  discovery: >
    An agent starting a session in a project repo looks for the card at:
    1. .method/project-card.yaml (primary)
    2. .method/project-card-{methodology}.yaml (if multiple methodologies)
    3. organon/project-card.yaml (fallback)
    If no card found: the project has not been instantiated. The agent operates
    with the abstract methodology directly (no project-specific constraints).

  gitignore: >
    The project card is COMMITTED to the repo. It is a versioned configuration
    artifact, not ephemeral. Changes to the card are reviewed like any other
    project configuration change.

  claude_md_integration: >
    The project's CLAUDE.md should reference the card:
      "This project uses P2-SD methodology. Project-specific constraints are in
      .method/project-card.yaml. Load the card at session start."
    This ensures the agent discovers the card without searching.

usage:
  description: >
    When to use the card, when not to, and how the agent consumes it at runtime.

  when_to_create:
    - "A project adopts a methodology (P2-SD, P1-EXEC, etc.) for the first time"
    - "A project has been using a methodology informally and wants to formalize its constraints"
    - "An existing hand-authored instance (like I1-T1X) needs to be migrated to card format"

  when_not_to_create:
    - "The project has no methodology-specific constraints — the abstract methodology is sufficient"
    - "The project is a one-off or prototype where method formalism adds no value"
    - "The constraints are purely runtime (e.g., 'use M1-COUNCIL when the design is contested') — these belong in P1-EXEC's delta_EXEC predicates, not in the card"

  who_creates:
    primary: "The project lead or tech lead who understands the project's constraints"
    not: "A method theorist — the card is deliberately designed to require only project knowledge"
    review: >
      Card changes should be reviewed by someone who has run sessions on the project.
      Delivery rules that are too strict produce friction; rules that are too loose
      let drift accumulate. Calibrate from execution experience.

  how_agent_uses_card:
    session_start: >
      1. Agent reads CLAUDE.md → discovers card path.
      2. Agent reads the card → loads context, delivery_rules, role_notes.
      3. Agent identifies which methodology method is being invoked (via delta_SD or direct).
      4. Agent filters delivery_rules to those with applies_to matching the current method.
      5. Agent applies role_notes for the role it occupies.
      6. Agent executes with the abstract method's guidance + card's constraints layered on top.
    constraint_application: >
      Card constraints are ADDITIVE — they supplement the abstract method's guidance,
      not replace it. The agent follows the abstract step DAG, applies the abstract
      pre/post conditions, AND also enforces the card's delivery_rules. If a card rule
      conflicts with the abstract method, the card rule takes precedence (project-specific
      overrides general).
    runtime_example: >
      Agent starts a M2-DIMPL session on t1-cortex.
      1. Reads card → finds DR-01 (Metals MCP mandatory for M2-DIMPL).
      2. Reads card → finds DR-03 (Source Verification Worksheet for orchestrator).
      3. Reads card → finds DR-05 (structural dissent for qa_sub_agent).
      4. At sigma_0 (Decompose): applies abstract M2-DIMPL sigma_0 guidance + card constraints.
      5. At sigma_2 (Gate A): dispatches qa_sub_agent with DR-05 dissent protocol active.
      6. At sigma_3 (Gate B): dispatches sec_arch_sub_agent with DR-08 full-surface scope.

  how_to_evolve_the_card:
    adding_rules: >
      When a new project-specific constraint is identified (e.g., from a post-phase
      review or drift audit), add a new delivery_rule with a unique id (DR-NN).
      The constraint takes effect on the next session without regenerating the instance.
    removing_rules: >
      When a constraint is no longer needed (e.g., a temporary restriction during a
      migration), remove the delivery_rule. Document the removal in git commit message.
    updating_context: >
      When the project's tech stack changes (e.g., build tool migration), update the
      context section. All methods that reference build/test/lint commands pick up
      the change automatically.
    versioning: >
      The card does not have a formal version field — git history IS the version.
      The methodology_version field tracks which abstract methodology version the card
      targets. Update this when the methodology upgrades and the card is confirmed
      compatible.

instance_tracking:
  description: >
    How to track which instances have been produced from which cards, and how to
    manage the card-instance-methodology relationship over time.

  instance_registry:
    description: >
      The method registry (pv-method) tracks ABSTRACT methodologies and methods.
      Project instances are tracked in a separate section of the registry — an
      instance index that maps project cards to their derived instances.
    location: "pv-method/registry/instances/"
    structure: |
      registry/instances/
        I1-T1X.yaml          ← instance record (NOT the full instance — just the tracking entry)
        I2-SILKY.yaml         ← another project instance
        ...

  instance_record_schema:
    description: >
      A lightweight tracking entry in the registry. Records what was instantiated,
      from what card, at what methodology version. Does NOT contain the full
      derived instance — that lives in the project repo.
    fields:
      - name: id
        type: string
        description: "Instance identifier, e.g. I1-T1X"
      - name: project
        type: string
        description: "Project name"
      - name: methodology
        type: string
        description: "Which methodology was instantiated"
      - name: methodology_version
        type: string
        description: "Version of the methodology at instantiation time"
      - name: card_location
        type: string
        description: "Path to the project card in the project repo"
      - name: instance_date
        type: string
        description: "When the instance was last derived"
      - name: status
        type: enum
        values: [active, stale, migrating, retired]
        description: >
          active: card and methodology are in sync.
          stale: methodology has upgraded but instance not regenerated.
          migrating: card is being updated for a new methodology version.
          retired: project no longer uses this methodology.
      - name: methods_instantiated
        type: array
        items: string
        description: "Which methods in the methodology have project-specific overrides"
      - name: delivery_rule_count
        type: integer
        description: "Number of delivery rules in the card"
      - name: notes
        type: string
        required: false
    example: |
      instance:
        id: I1-T1X
        project: t1-cortex
        methodology: P2-SD
        methodology_version: "2.0"
        card_location: "t1-cortex/.method/project-card.yaml"
        instance_date: "2026-03-14"
        status: active
        methods_instantiated: [M1-IMPL, M2-DIMPL, M3-PHRV, M4-DDAG]
        delivery_rule_count: 20
        notes: "Migrated from 10 handwritten I1-T1X role files to MIC format."

  staleness_detection:
    description: >
      How to detect when an instance is out of sync with its methodology.
    mechanism: >
      The instance record's methodology_version is compared against the registry's
      current version of that methodology. If they differ:
        - Compatible upgrade: status = stale, regenerate instance.
        - Incompatible upgrade: status = migrating, card needs updates.
    check_frequency: >
      Check at session start. If the agent loads a card targeting P2-SD v2.0 but
      the registry has P2-SD v3.0, warn the user and suggest regeneration.
    automated_check: >
      A simple version comparison: card.methodology_version vs registry methodology
      version. If different, surface the discrepancy before proceeding.

  lifecycle:
    creation: >
      1. Project lead writes the project card (.method/project-card.yaml).
      2. M4-MINS derives the instance (or agent applies card at runtime without explicit derivation).
      3. An instance record is created in pv-method/registry/instances/{id}.yaml.
    update_card: >
      1. Project lead edits the card (adds/removes delivery rules, updates context).
      2. Instance is regenerated (or agent picks up changes at next session start).
      3. Instance record's instance_date is updated.
    update_methodology: >
      1. Methodology upgrades (e.g., P2-SD v2.0 → v3.0).
      2. Instance record's status changes to stale.
      3. Project lead reviews card compatibility with new version.
      4. If compatible: update card.methodology_version, regenerate instance.
      5. If incompatible: update card delivery_rules/role_notes, then regenerate.
      6. Instance record's status returns to active.
    retirement: >
      1. Project stops using the methodology.
      2. Instance record's status changes to retired.
      3. Card remains in project repo (historical reference) but is no longer loaded.

implementation_status:
  schema: "proposed v0.1"
  card_placement: "specified"
  usage_guide: "specified"
  instance_tracking: "specified"
  derivation_engine: "not yet built"
  prototype: "validated (t1-cortex card reproduces I1-T1X, see tmp/I1-T1X-card-analysis.yaml)"
  next_steps:
    - "Create registry/instances/ directory and I1-T1X.yaml tracking entry"
    - "Place the t1-cortex card in the t1-cortex project repo at .method/project-card.yaml"
    - "Add card discovery instructions to t1-cortex CLAUDE.md"
    - "Test: run a P2-SD session on t1-cortex using the card instead of I1-T1X role files"
    - "Build: extend M4-MINS sigma_0 to accept project cards with this schema"
