method:
  id: M5-MCOM
  name: "Method for Composing Two Compiled Methods Sequentially"
  description: >
    Takes two validated (compiled) methods M and M' whose domains share an interface
    sub-signature Sigma_I and produces a composite method M'' = M ; M' — a first-class
    compiled method with its own domain theory D'', step DAG Gamma'', role set Roles'',
    objective O'', and YAML encoding. M'' is independently loadable, compilable, and
    evolvable. This is the fifth method in the meta-methods family (M1-MDES–M5-MCOM),
    implementing horizontal composition of 1-cells in the 2-category Meth.
  version: "1.1"
  status: compiled
  compilation_date: "2026-03-10"
  evolution_date: "2026-03-14"
  compilation_record:
    result: PASS
    gates:
      G0: PASS
      G1: "PASS (post-repair: Ax-3 rewritten — valid_composition_edge antecedent removed)"
      G2: PASS
      G3: PASS
      G4: PASS
      G5: "PASS (post-repair: sigma_3 AddedSteps 3-case reconciliation procedure added)"
      G6: PASS
    notes: >
      Pre-compilation repairs: (1) Ax-3 undefined antecedent valid_composition_edge removed;
      replaced with direct sort-level constraint. (2) sigma_3 AddedSteps guidance elaborated
      to 3-case procedure. (3) Naming convention for M'' resolved to Option A (first-class
      method IDs). Parallel composition (M || M') is out of scope pending P4 resolution.
      Ax-4 and Ax-6 have vacuous antecedents (valid_composite_domain, valid_termination)
      not in Pi_MCOM — noted for first MEVO cycle but not blocking.
  source_document: "P0-META/M5-MCOM/M5-MCOM.md"
  formal_grounding: >
    theory/F1-FTH.md §4, §6.3, §8.5;
    theory/F5-MCOM.md

domain_theory:
  id: D_MCOM
  sorts:
    - id: LeftMethod
      description: >
        M: a compiled method M = (D, Roles, Gamma, O, mu_vec) with compilation_result PASS.
        The method that executes first in the composition.

    - id: RightMethod
      description: >
        M': a compiled method M' = (D', Roles', Gamma', O', mu_vec') with compilation_result PASS.
        The method that executes second.

    - id: InterfaceSignature
      description: >
        Sigma_I: the sub-signature shared at the composition point — the sorts (and any
        associated predicates) that appear in post_{sigma_term(M)} and pre_{sigma_init(M')}.
        Must be non-empty.

    - id: CompositionEdge
      description: >
        The formal connection between sigma_term(M) and sigma_init(M'): includes the retraction
        pair (embed_I, project_I), the retraction condition claim, and the composability claim
        for the seam.

    - id: CompositeMethod
      description: >
        M'' = M ; M': the output of this method — a 5-tuple (D'', Roles'', Gamma'', O'', mu_vec'')
        that is independently compilable and registerable.

    - id: CompositeDomain
      description: >
        D'' = (Sigma'', Ax''): the domain of M''. Three cases: (1) identical domains D = D':
        D'' = D; (2) conservative extension D subseteq D' or D' subseteq D: D'' = the larger;
        (3) heterogeneous domains: D'' is the conservative amalgamation — smallest domain with
        Sigma'' ⊇ Sigma ∪ Sigma' and Ax'' ⊇ Ax ∪ Ax', consistent over Sigma_I (Robinson joint
        consistency theorem, F5-MCOM §4.1).

    - id: RoleMerge
      description: >
        The merged role set Roles'': how roles from M and M' combine in M''. Typically disjoint
        union; requires explicit reconciliation when a role in M has the same name or overlapping
        authority as a role in M'.

    - id: ObjectiveComposition
      description: >
        O'': the composite objective. Natural form: O''(s) = O_{M'}(project_right(s)) at
        termination. Conjunctive form: O''(s) = O_M(project_left(s)) ∧ O_{M'}(project_right(s)).

    - id: ComposabilityAtSeam
      description: >
        The explicit claim that post_{sigma_term(M)} ⊆ pre_{sigma_init(M')} holds —
        every state satisfying M's terminal postcondition also satisfies M''s initial precondition.

    - id: TerminationComposition
      description: >
        nu'' = nu_M + nu_{M'}: the composite termination certificate. Well-founded because nu_M
        and nu_{M'} are each well-founded (proven by their respective compilations).

    - id: CompilationResult
      description: >
        PASS (with YAML encoding of M'') or FAIL(gate_id, repair_target, description) —
        result of the sigma_6 compilation check applied to M'' as an independent method.

  function_symbols:
    - symbol: terminal_step
      signature: "LeftMethod -> Step"
      description: "Returns sigma_term(M) — the step whose postcondition constitutes M's output"

    - symbol: initial_step
      signature: "RightMethod -> Step"
      description: "Returns sigma_init(M') — the step whose precondition constitutes M''s required input"

    - symbol: interface_of
      signature: "CompositionEdge -> InterfaceSignature"
      description: "Extracts Sigma_I from the declared composition edge"

    - symbol: embed_interface
      signature: "CompositionEdge -> (Mod(D) -> Mod(D''))"
      description: "The injection of M's terminal output into M'''s domain, restricted to Sigma_I"

    - symbol: project_interface
      signature: "CompositionEdge -> (Mod(D'') -> Mod(D))"
      description: "The reduct of M'''s state to M's domain, restricted to Sigma_I"

    - symbol: concat_dags
      signature: "LeftMethod x CompositionEdge x RightMethod -> StepDAG"
      description: "Assembles Gamma'' = Gamma ++ [edge] ++ Gamma' with the composition edge as the join"

    - symbol: merge_roles
      signature: "RoleMerge -> P(Role)"
      description: "Returns Roles'' — the merged role set for M''"

    - symbol: compose_objective
      signature: "ObjectiveComposition -> (Mod(D'') -> Bool)"
      description: "Returns O'' as a predicate on M'''s state space"

    - symbol: compose_termination
      signature: "TerminationComposition -> (Mod(D'') -> N)"
      description: "Returns nu'' = nu_M + nu_{M'} as a function on M'''s state space"

  predicates:
    - symbol: compiled
      signature: "LeftMethod -> Bool"
      description: "M has compilation_result PASS"

    - symbol: compiled
      signature: "RightMethod -> Bool"
      description: "M' has compilation_result PASS"

    - symbol: interface_non_empty
      signature: "InterfaceSignature -> Bool"
      description: "Sigma_I contains at least one sort"

    - symbol: composable_at_seam
      signature: "ComposabilityAtSeam x LeftMethod x RightMethod -> Bool"
      description: >
        C2 condition (F5-MCOM Definition 3.1): for every o in struct_pre(post_{sigma_term(M)}),
        embed_I(o | Sigma_I) in struct_pre(pre_{sigma_init(M')}) — schema-checkable semantic handoff

    - symbol: retraction_holds_at_interface
      signature: "CompositionEdge x InterfaceSignature -> Bool"
      description: >
        project_I ∘ embed_I = id on Mod(D) | Sigma_I — the round-trip through the retraction
        pair is lossless on the interface sub-theory

    - symbol: conservative_extension_both
      signature: "CompositeDomain x LeftMethod x RightMethod -> Bool"
      description: >
        D'' is a conservative extension of D and of D' independently — no existing axiom in
        either Ax or Ax' is revised in Ax''

    - symbol: valid_role_merge
      signature: "RoleMerge x LeftMethod x RightMethod -> Bool"
      description: >
        Every role in M and M' appears in Roles''; no role loses any authorized transition;
        any name collision is explicitly reconciled

    - symbol: objective_compatible
      signature: "ObjectiveComposition x LeftMethod x RightMethod -> Bool"
      description: >
        When O_M is satisfied at the seam state, O'' reduces to evaluating O_{M'} on the
        right-method portion; O'' is expressible in Sigma''

    - symbol: compiles_as_method
      signature: "CompositeMethod -> Bool"
      description: "M'' passes G0–G6 as an independently executable method"

    - symbol: valid_composite_domain
      signature: "CompositeDomain x LeftMethod x RightMethod -> Bool"
      description: >
        D'' is a legitimately constructed composite domain for M ; M': either identical (D = D'),
        conservative extension (one subseteq the other), or conservative amalgamation (Robinson
        joint consistency over Sigma_I). Declared to make Ax-4 non-vacuous.

    - symbol: valid_termination
      signature: "TerminationComposition x LeftMethod x RightMethod -> Bool"
      description: >
        tc is a well-formed termination composition for M ; M': nu''(s) = nu_M(project_left(s))
        + nu_{M'}(project_right(s)), where nu_M and nu_{M'} are the compiled termination
        certificates of M and M' respectively. Declared to make Ax-6 non-vacuous.

  axioms:
    - id: Ax-1
      name: "Prior compilation required"
      statement: >
        For all M : LeftMethod, M' : RightMethod:
          composable_at_seam(_, M, M') implies compiled(M) and compiled(M')
      rationale: >
        Composing a method with structural defects propagates those defects into M'' in ways
        that are invisible at the composition seam. Defects in M must be repaired at their
        source before MCOM can proceed.

    - id: Ax-2
      name: "Interface non-emptiness"
      statement: >
        For all e : CompositionEdge:
          retraction_holds_at_interface(e, interface_of(e)) implies
            interface_non_empty(interface_of(e))
      rationale: >
        A composition over an empty interface is not composition — it is two independent methods.
        If Sigma_I = empty, there is no data flowing from M to M'.

    - id: Ax-3
      name: "Retraction condition at interface"
      statement: >
        For all e : CompositionEdge:
          retraction_holds_at_interface(e, interface_of(e))
      rationale: >
        Every CompositionEdge in Mod(D_MCOM) must satisfy the retraction condition at its
        declared interface. The sort CompositionEdge includes the retraction pair by definition;
        this axiom is a sort-level constraint on all values of that sort. Any CompositionEdge
        for which project_I ∘ embed_I != id on Sigma_I is excluded from Mod(D_MCOM).
        (Repair note: original Ax-3 used undefined antecedent valid_composition_edge which
        made the axiom vacuous. Direct universal form adopted at compilation.)

    - id: Ax-4
      name: "Conservative extension of both domains"
      statement: >
        For all D'' : CompositeDomain, M : LeftMethod, M' : RightMethod:
          valid_composite_domain(D'', M, M') implies
            conservative_extension_both(D'', M, M')
      rationale: >
        The composite domain must extend both source domains without revising any existing
        axiom in either. If Ax'' revises an axiom from Ax, M's steps may produce invalid
        states under D''. (Note: valid_composite_domain is absent from Pi_MCOM — this axiom
        is vacuous as written. Cleanup deferred to first MEVO cycle.)

    - id: Ax-5
      name: "Role authority preservation"
      statement: >
        For all RM : RoleMerge, M : LeftMethod, M' : RightMethod:
          valid_role_merge(RM, M, M') implies
            for all rho in roles_of(M) union roles_of(M'):
              authority_of(rho) subseteq authority_of(merge_of(rho, RM))
      rationale: >
        A role that loses authority in the composition is a seam defect — it means an agent
        executing M'' in that role cannot complete transitions it was authorized to make in
        the source method.

    - id: Ax-6
      name: "Termination certificate composition"
      statement: >
        For all tc : TerminationComposition, M : LeftMethod, M' : RightMethod:
          valid_termination(tc, M, M') implies
            nu''(s) = nu_M(project_left(s)) + nu_{M'}(project_right(s))
      rationale: >
        nu_M and nu_{M'} are each well-founded (proven by their compilations). Their sum is
        well-founded because strict decrease in either component gives strict decrease in the sum.
        (Note: valid_termination is absent from Pi_MCOM — this axiom is vacuous as written.
        Cleanup deferred to first MEVO cycle.)

objective:
  statement: >
    A run of M5-MCOM satisfies the objective iff: (1) a CompositeMethod M'' exists with all
    five components declared (D'', Roles'', Gamma'', O'', mu_vec''); (2) a CompositionEdge
    exists with embed_I and project_I declared and retraction condition stated; (3)
    composable_at_seam(M, M', Sigma_I) is claimed with a non-trivial argument; (4)
    conservative_extension_both(D'', M, M') is claimed; (5) M'' passes G0–G6 at sigma_6 as
    an independently executable method; (6) M'' is registered in methods README.md.
  formal: "O_MCOM : Mod(D_MCOM) -> Bool"

measures:
  - id: mu_1
    name: "Interface declaration completeness"
    formula: "(Sigma_I_declared + embed_I_declared + project_I_declared + retraction_condition_stated) / 4"
    range: "[0.0, 1.0]"
    proxy_for: "completeness of the seam declaration"

  - id: mu_2
    name: "Structural assembly completeness"
    formula: "(D''_declared + conservative_extension_both_claimed + Gamma''_assembled + Roles''_merged + O''_declared + nu''_declared) / 6"
    range: "[0.0, 1.0]"
    proxy_for: "completeness of M'' construction"

  - id: mu_3
    name: "Compilation gate passage"
    formula: "(gates_passed_count_for_M'' / 7)"
    range: "[0.0, 1.0]"
    proxy_for: "structural validity of M'' as an independent method"

progress_preorder:
  type: lexicographic
  components: [mu_1, mu_2, mu_3]
  rationale: >
    Interface declaration before structural assembly (without Sigma_I, D'' cannot be coherently
    declared); structural assembly before gate passage (without M'' assembled, sigma_6 cannot
    evaluate it).

termination_certificate:
  id: nu_MCOM
  formula: "nu(s) = 7 - gates_passed_count_for_M''(s)"
  argument: >
    Each execution of M5-MCOM at sigma_6 either terminates (compilation_result PASS, nu = 0)
    or produces a repair obligation that reduces the gate failure count by at least one when
    addressed. In case of external repair obligation (defect in source method M or M'), this
    method terminates by halting — it does not iterate over M or M''s internal repair.

step_dag:
  graph: "linear with branch"
  steps: [sigma_0, sigma_1, sigma_2, sigma_3, sigma_4, sigma_5, sigma_6]
  initial: sigma_0
  terminal: sigma_6
  branch:
    at: sigma_0
    condition: "go_decision = identify-interface-gap"
    target: "exits M5-MCOM — interface gap documented; composition halted"
  edges:
    - from: sigma_0
      to: sigma_1
      condition: "go_decision = proceed"
      composability_claim: >
        post_{σ₀} (proceed path) produces: compiled(M) and compiled(M') verified (both PASS);
        interface_candidate_sorts non-empty (at least one sort in both terminal/initial schemas);
        both methods' domain theories, step DAGs, and role definitions have been read;
        composition direction recorded; go_decision = proceed.
        pre_{σ₁} requires: go/proceed decision made; interface candidate sorts identified;
        both method domain theories read.
        post_{σ₀} ⊆ pre_{σ₁}: all three pre_{σ₁} conditions are hard invariants enforced at σ₀
        (go/proceed requires both compilations PASS; interface_candidate_sorts non-empty requires
        at least one shared sort; domain theories read is explicitly required before proceed).
        Holds on the proceed path.
    - from: sigma_1
      to: sigma_2
      composability_claim: >
        post_{σ₁} produces: Sigma_I declared with ≥1 sort; embed_I declared; project_I declared;
        retraction_condition_claim (project_I ∘ embed_I = id on Mod(D) | Sigma_I) stated with
        argument; composable_at_seam_claim (C2) stated with specific field references.
        pre_{σ₂} requires: Sigma_I declared; embed_I and project_I declared; composable_at_seam claimed.
        post_{σ₁} ⊆ pre_{σ₂}: Sigma_I declared with ≥1 sort (σ₁ hard invariant: interface_signature.sorts
        min_items=1); embed_I and project_I non-empty (σ₁ hard invariants: min_length=1 on both);
        composable_at_seam_claim non-empty (σ₁ hard invariant). Holds.
    - from: sigma_2
      to: sigma_3
      composability_claim: >
        post_{σ₂} produces: D'' declared (composite_domain_declaration non-empty); domain
        construction case identified (identical/conservative-extension/heterogeneous-amalgamation);
        conservative_extension_both_claim stated; Mod(D'') non-empty (initial/terminal state claims).
        pre_{σ₃} requires: D'' declared; Sigma_I, embed_I, project_I declared; composable_at_seam claimed.
        post_{σ₂} ⊆ pre_{σ₃}: D'' is declared (composite_domain_declaration non-empty by σ₂ constraint);
        Sigma_I, embed_I, project_I, composable_at_seam are carried from σ₁ unchanged. Holds.
    - from: sigma_3
      to: sigma_4
      composability_claim: >
        post_{σ₃} produces: Gamma'' assembled (composite_steps with ≥2 entries: all steps from
        Gamma + composition edge + all steps from Gamma'); composition edge declared with
        composability claim; dag_acyclicity_claim stated; terminal_condition_claim and
        initial_condition_claim stated.
        pre_{σ₄} requires: Gamma'' assembled; D'' declared; roles from M and M' known.
        post_{σ₃} ⊆ pre_{σ₄}: composite_steps covers all steps from both methods (σ₃ hard invariant:
        no steps from either source may be dropped); composition_edge_declaration required (σ₃ constraint);
        D'' carried from σ₂; roles were known from σ₀ (both methods fully read). Holds.
    - from: sigma_4
      to: sigma_5
      composability_claim: >
        post_{σ₄} produces: Roles'' merged (roles_merged ≥1 entry); all role name collisions resolved
        (collision_resolutions present for each collision); authority_coverage_claim mapping all Gamma''
        steps to authorized roles.
        pre_{σ₅} requires: Gamma'' assembled; Roles'' merged; D'' declared; O_M and O_{M'} available.
        post_{σ₄} ⊆ pre_{σ₅}: roles_merged non-empty (σ₄ hard invariant: min_items=1); authority_coverage_claim
        non-empty (σ₄ hard invariant: min_length=1); Gamma'' carried from σ₃; D'' carried from σ₂;
        O_M and O_{M'} available from source methods read at σ₀. Holds.
    - from: sigma_5
      to: sigma_6
      composability_claim: >
        post_{σ₅} produces: O'' declared as predicate on Mod(D'') (objective_statement non-empty);
        objective_expressible_claim; progress_preorder declared; ≥1 measure; termination certificate
        nu'' = nu_M + nu_{M'} stated; composite_method_assembled = "yes" (all five M'' components present).
        pre_{σ₆} requires: all five M'' components declared (D'', Roles'', Gamma'', O'', mu_vec'');
        Gamma'' assembled; guidance for all steps present.
        post_{σ₅} ⊆ pre_{σ₆}: composite_method_assembled = "yes" is a σ₅ hard invariant (enum value);
        all five components (D'' from σ₂, Roles'' from σ₄, Gamma'' from σ₃, O'' from σ₅, mu_vec'' from σ₅)
        are present. Guidance for Gamma'' steps is inherited from M and M' compilations plus the composition
        edge claim. Weakest edge: composite_method_assembled is self-reported; defense is that G0–G6 at σ₆
        independently check all five components structurally. Holds.
  initial_condition_claim: >
    pre_{σ₀} requires: an intention to compose M and M'; both method documents named and accessible;
    composition direction known. This is satisfied whenever two compiled methods are identified and
    a practitioner intends to compose them. The branch at σ₀ handles the case where no interface
    exists — termination without entering composition.
  terminal_condition_claim: >
    post_{σ₆}(PASS) implies O_MCOM. When σ₆ emits CompilationResult = PASS: (1) G0 → M'' is
    navigable as a standalone composite; (2) G1 → D'' is valid (conservative_extension_both holds);
    (3) G2 → O'' is Sigma''-expressible; (4) G3 → Roles'' covers Gamma''; (5) G4 → Gamma'' is
    acyclic with composability claims at every edge including the seam; (6) G5 → guidance adequate;
    (7) G6 → YAML encodable with M'' YAML produced. composable_at_seam(M, M', Sigma_I) was
    established at σ₁ (O_MCOM condition 3). conservative_extension_both was established at σ₂
    (O_MCOM condition 4). Registration is part of σ₆ PASS output (O_MCOM condition 6). Holds.
  contrarian_challenge: >
    Claim: the composition edge (sigma_term(M) → sigma_init(M')) is the weakest point in Gamma''.
    It is the one edge not validated by prior method compilations — it is produced by M5-MCOM
    itself at σ₃, and its composability claim is the only novel claim in the composite DAG.
    Defense: G4 at σ₆ specifically requires the composition edge claim to be non-trivial (must
    reference specific postcondition elements of sigma_term(M) and specific precondition elements
    of sigma_init(M')). This is enforced by the compiler role with no access to σ₁'s session
    reasoning — a weak seam claim cannot survive G4. The C2 condition (composable_at_seam_claim
    from σ₁) provides a prior structural argument; σ₃ must re-express it at the DAG level.
    Verdict: the edge is the weakest, but the G4 non-triviality requirement is the guarantee.

roles:
  - id: composer
    description: >
      Executes sigma_0–sigma_5. Has dual-method knowledge: has read both M's and M''s domain
      theories, step DAGs, role definitions, objectives, and compilation reports. Understands
      both methods deeply enough to identify the interface, declare the retraction pair, and
      assemble the composite domain theory. In a single-agent session, the executing LLM plays
      this role. Observes: both M and M' documents (full), F1-FTH §6.3 and §8.5,
      D_MCOM sorts and predicates, F5-MCOM-composition.md for interface and composability
      theory, existing composition examples as reference. Authorized to: assess composability;
      declare Sigma_I; declare embed_I and project_I; assemble D''; compose Gamma''; merge
      Roles''; declare O'' and nu''; assemble the M'' document. Cannot emit CompilationResult.
    phases:
      - sigma_0
      - sigma_1
      - sigma_2
      - sigma_3
      - sigma_4
      - sigma_5

  - id: compiler
    description: >
      Executes sigma_6. Evaluates M'' against G0–G6 independently. Sees only the completed
      composite method document and F1-FTH — no access to M or M' documents, no session
      reasoning from the composer, no awareness of the composition process that produced M''.
      Authorized to: emit PASS with YAML encoding of M'', or FAIL with gate identifier and
      repair target (naming the specific M5-MCOM step that produced the defect, or the
      source method that must be repaired).
    phases:
      - sigma_6

phases:
  - id: sigma_0
    name: "Orientation"
    role: composer
    precondition: >
      An intention to compose M and M' exists; both method documents are named and accessible;
      the composer knows the intended composition direction (M first, M' second).
    postcondition: >
      compiled(M) and compiled(M') are verified; an interface candidate exists (at least one
      sort in M's terminal output schema appears in M''s initial precondition); a go/proceed
      or go/identify-interface-gap decision is made. If proceed: composer has read both methods'
      domain theories, step DAGs, and role definitions. If gap: the specific missing interface
      element is named.
    guidance: |
      **Constraints (what must be true after this step):**
      - A go/proceed or go/identify-interface-gap decision is recorded — not deferred.
      - If go/proceed: both M and M' have confirmed compilation_result PASS; the composer has
        read both methods' domain theories, step DAGs, and role definitions; at least one sort
        in post_{sigma_term(M)} appears in or is mappable to pre_{sigma_init(M')}.
      - If go/identify-interface-gap: the specific gap is named — which sort from M's terminal
        output is expected to appear in M''s input but does not, or vice versa.
      - The composition direction is recorded: which is M (left), which is M' (right).
      - Both method IDs and compilation statuses are recorded in the output.

      **Procedure.**
      1. Check compilation status: locate sigma_6 output for both methods. Both must show
         compilation_result PASS. If either does not compile, halt — route to M1-MDES or
         M3-MEVO.
      2. Identify interface candidate: read post_{sigma_term(M)} and pre_{sigma_init(M')}.
         List sorts appearing in both. If none: go/identify-interface-gap (disjoint domains).
      3. Confirm interface closure: does M's postcondition produce values of the candidate
         sort, and does M''s precondition require values of that sort? If sorts have the same
         name but different axioms in D and D', flag as domain conflict. Otherwise: go/proceed.
      4. Record composition direction and branch (if sigma_term(M) has a branching postcondition,
         identify which branch the composition applies to — e.g., PASS branch only).
    output_schema:
      left_method_id:
        type: string
        description: "M.00N-ACRO — the method that executes first"
      left_method_compilation_status:
        type: string
        enum: ["PASS", "UNVERIFIED", "FAIL"]
      right_method_id:
        type: string
        description: "M.00N-ACRO — the method that executes second"
      right_method_compilation_status:
        type: string
        enum: ["PASS", "UNVERIFIED", "FAIL"]
      interface_candidate_sorts:
        type: array
        min_items: 0
        items: string
        description: "sort names appearing in both post_{sigma_term(M)} and pre_{sigma_init(M')}"
      composition_branch:
        type: string
        description: >
          If sigma_term(M) has a branching postcondition (e.g., PASS/FAIL), the branch on which
          this composition applies. Empty string if sigma_term(M) has a single postcondition.
      go_decision:
        type: string
        enum: ["proceed", "identify-interface-gap"]
      gap_statement:
        type: string
        description: "Required if go_decision is identify-interface-gap; empty otherwise"

  - id: sigma_1
    name: "Interface Declaration"
    role: composer
    precondition: >
      go/proceed decision made at sigma_0; interface candidate sorts identified; both method
      domain theories read.
    postcondition: >
      Sigma_I declared with at least one sort; embed_I and project_I declared as functions on
      Mod(D) | Sigma_I and Mod(D') | Sigma_I respectively; retraction condition
      project_I ∘ embed_I = id on Mod(D) | Sigma_I is claimed with an explicit argument;
      C2 composability at seam is claimed: for every o in struct_pre(post_{sigma_term(M)}),
      embed_I(o | Sigma_I) in struct_pre(pre_{sigma_init(M')}).
    guidance: |
      **Constraints (what must be true after this step):**
      - Sigma_I is declared with at least one sort (and any associated predicate symbols that
        participate in the seam). The interface must be a sub-signature: Sigma_I ⊆ Sigma_out(sigma_term(M))
        ∩ Sigma_in(sigma_init(M')).
      - embed_I is declared: a function mapping Mod(D) | Sigma_I into Mod(D') | Sigma_I.
        The declaration must name what each Sigma_I-sort maps to in D'.
      - project_I is declared: a function mapping Mod(D') | Sigma_I back to Mod(D) | Sigma_I.
        The declaration must name what each Sigma_I-sort in D' maps to in D.
      - Retraction condition: project_I ∘ embed_I = id on Mod(D) | Sigma_I. This must be
        argued, not just asserted — name what the embed adds and confirm the project drops only
        the added fields, recovering the original exactly.
      - C2 composability at seam (F5-MCOM Definition 3.1): for every o in
        struct_pre(post_{sigma_term(M)}), embed_I(o | Sigma_I) ∈ struct_pre(pre_{sigma_init(M')}).
        Reference specific postcondition fields. "They compose because the interface was declared"
        is not sufficient.
      - If sigma_0 recorded a composition_branch, state which branch of post_{sigma_term(M)}
        is the active pre-condition for the composition.

      **Procedure.**
      1. Identify Sigma_I precisely: from the candidate sorts (sigma_0), narrow to exactly those
         that appear in post_{sigma_term(M)} (output) AND pre_{sigma_init(M')} (input). Exclude
         sorts that appear in only one side.
      2. Declare embed_I: how does M's terminal output map to M''s initial input? Name the sort
         mapping. If sort names differ (e.g., CandidateMethod in D vs. GeneralMethod in D'),
         state the rename explicitly.
      3. Declare project_I: the inverse path. Confirm the round-trip is lossless on the
         interface subspace (fields added by embed_I are dropped by project_I; no Sigma_I-fields
         are lost).
      4. State the C2 composability claim: name the specific post_{sigma_term(M)} elements that
         satisfy pre_{sigma_init(M')} under embed_I.
    output_schema:
      interface_signature:
        type: object
        required: true
        properties:
          sorts:
            type: array
            min_items: 1
            items: string
            description: "sort names in Sigma_I"
          predicates:
            type: array
            min_items: 0
            items: string
            description: "predicate symbols in Sigma_I (if any participate in the seam)"
      embed_declaration:
        type: string
        min_length: 1
        description: "formal description of embed_I: what each Sigma_I-sort maps to in D'"
      project_declaration:
        type: string
        min_length: 1
        description: "formal description of project_I: what each Sigma_I-sort in D' maps to in D"
      retraction_condition_claim:
        type: string
        min_length: 1
        description: "argument that project_I ∘ embed_I = id on Mod(D) | Sigma_I"
      composable_at_seam_claim:
        type: string
        min_length: 1
        description: "C2 claim with specific postcondition/precondition field references"

  - id: sigma_2
    name: "Domain Composition"
    role: composer
    precondition: >
      Sigma_I declared; embed_I and project_I declared; composable_at_seam claimed.
    postcondition: >
      D'' = (Sigma'', Ax'') declared; conservative_extension_both(D'', M, M') claimed;
      domain_conflicts enumerated (empty if none); Mod(D'') non-empty (initial and terminal
      states claimed to be in Mod(D'')).
    guidance: |
      **Constraints (what must be true after this step):**
      - D'' is declared: Sigma'' and Ax'' are specified. Sigma'' ⊇ Sigma ∪ Sigma'. Ax'' ⊇ Ax ∪ Ax'.
      - The domain construction case is identified: identical (D = D'), conservative extension
        (one extends the other), or heterogeneous amalgamation (Robinson joint consistency required).
      - conservative_extension_both is claimed for the correct case — no axiom in Ax or Ax' is
        revised in Ax''.
      - Any domain conflict (same sort or predicate name, different axioms) is enumerated in
        domain_conflicts. Unresolved conflicts halt composition.
      - Mod(D'') non-empty: the initial state (two compiled methods and an intention to compose)
        satisfies D'' axioms; the terminal state (M'' fully assembled) satisfies D'' axioms.

      **Domain composition procedure (3 cases).**
      Case 1 — Identical domains (D = D'): D'' = D. Sigma'' = Sigma. Ax'' = Ax. No new axioms
      needed. Declare conservative_extension_both (trivially: same domain). Proceed.

      Case 2 — Conservative extension (D ⊆ D' or D' ⊆ D): D'' = the larger domain. Verify that
      the smaller domain's axioms are a subset of the larger domain's axioms (no axiom in the
      smaller set was revised in the larger). Declare conservative_extension_both. Proceed.

      Case 3 — Heterogeneous domains: Sigma_I is the bridge. D'' is the conservative amalgamation:
      Sigma'' = Sigma ∪ Sigma' (with Sigma_I sorts identified); Ax'' = Ax ∪ Ax' (no revisions).
      Check Robinson joint consistency: D | Sigma_I and D' | Sigma_I must be consistent — no
      axiom in D | Sigma_I contradicts any axiom in D' | Sigma_I. If inconsistent, the interface
      is defective; halt and revise Sigma_I at sigma_1.

      **Conflict detection.** After assembling Sigma'', scan for: (a) same sort name with
      different axioms in D vs D'; (b) same predicate name with different arities or semantics;
      (c) same function symbol with different signatures. Each conflict must be resolved
      (treated as identical, renamed, or halted as blocking) before D'' is final.
    output_schema:
      composite_domain_case:
        type: string
        enum: ["identical", "conservative-extension", "heterogeneous-amalgamation"]
      composite_domain_declaration:
        type: string
        min_length: 1
        description: "Sigma'' and Ax'' declared — sorts, function symbols, predicates, axioms"
      domain_conflicts:
        type: array
        min_items: 0
        items: string
        description: "each conflict: 'Conflict: [name] — M says: ... | M' says: ... — resolution: [halt | resolved-as ...]'"
      conservative_extension_both_claim:
        type: string
        min_length: 1
        description: "explicit assertion that D'' conservatively extends both D and D'"
      initial_state_valid_claim:
        type: string
        min_length: 1
        description: "why the D''-initial state is in Mod(D'')"
      terminal_state_valid_claim:
        type: string
        min_length: 1
        description: "why the D''-terminal state is in Mod(D'')"

  - id: sigma_3
    name: "DAG Composition"
    role: composer
    precondition: >
      D'' declared; Sigma_I, embed_I, project_I declared; composable_at_seam claimed.
    postcondition: >
      Gamma'' = (V'', E'', sigma_init(M), sigma_term(M')) assembled; composition edge
      (sigma_term(M), sigma_init(M')) declared with composability claim; acyclic(Gamma'') claimed;
      all AddedSteps carry valid_addition justifications or reclassification records under D'';
      terminal_condition_claim for M'' stated.
    guidance: |
      **Constraints (what must be true after this step):**
      - Gamma'' is assembled: all steps from Gamma (M's DAG) present, then the composition edge,
        then all steps from Gamma' (M''s DAG). No steps from either source method are dropped.
      - The composition edge (sigma_term(M) -> sigma_init(M')) is declared as a DAG edge with
        its own composability claim — not just inherited from sigma_1's composable_at_seam_claim.
        The edge claim must reference specific postcondition elements of sigma_term(M) and
        specific precondition elements of sigma_init(M').
      - acyclic(Gamma'') is claimed: since both Gamma and Gamma' are acyclic (compiled), and the
        composition edge points strictly from M's terminal to M''s initial with no back-edges,
        Gamma'' is acyclic by construction — state this argument explicitly.
      - If either M or M' contains AddedSteps (from MINS instantiation), each AddedStep is
        evaluated against the 3-case procedure and the result recorded in added_steps_reconciliation.
      - The terminal condition claim for M'' is stated: why post_{sigma_term(M')} ⊆ O''.

      **Assembling Gamma''.**
      1. Copy all steps from Gamma (M's DAG) in topological order. Their pre/post conditions
         reference D-sorts, now in D'' by conservative extension. No changes to step content.
      2. Declare the composition edge: from sigma_term(M) to sigma_init(M'). Composability claim
         must name specific postcondition fields and specific precondition fields; demonstrate
         that embed_I maps the former to satisfy the latter.
      3. Copy all steps from Gamma' (M''s DAG) in topological order. Their pre/post conditions
         reference D'-sorts, now in D''. No changes to step content.

      **AddedSteps reconciliation (3-case procedure).**
      Case 1 — No overlap with Sigma_I or D'-vocabulary: valid_addition holds unchanged; carry
      the valid_addition record forward without modification.
      Case 2 — AddedStep sorts overlap with Sigma_I: the step operates on interface sorts and
      is now in D'''s core vocabulary. Reclassify as a first-class core step; remove valid_addition
      label; record reclassification in added_steps_reconciliation.
      Case 3 — AddedStep sorts overlap with D'-vocabulary (outside Sigma_I): if semantically
      identical (same axioms in D and D'), collapse to one sort in D''; note equivalence;
      proceed as Case 1. If conflicting, halt — domain conflict should have been caught at sigma_2.
    output_schema:
      composite_steps:
        type: array
        min_items: 2
        items: string
        description: "sigmaN — [Name] (role: R, source: M|M'|edge): pre:... post:..."
      composition_edge_declaration:
        type: object
        required: true
        properties:
          from_step:
            type: string
            description: "sigma_term(M) step identifier"
          to_step:
            type: string
            description: "sigma_init(M') step identifier"
          composability_claim:
            type: string
            description: "post_{sigma_term(M)} ⊆ pre_{sigma_init(M')} because ..."
      dag_acyclicity_claim:
        type: string
        min_length: 1
        description: "argument that Gamma'' is acyclic"
      added_steps_reconciliation:
        type: array
        min_items: 0
        items: string
        description: "AddedStep sigmaN (source: M|M'): case [1|2|3] — [resolution]"
      terminal_condition_claim:
        type: string
        min_length: 1
        description: "why post_{sigma_term(M')} ⊆ O''"
      initial_condition_claim:
        type: string
        min_length: 1
        description: "why pre_{sigma_init(M)} holds at the start of a normal M'' session"

  - id: sigma_4
    name: "Role Merge"
    role: composer
    precondition: >
      Gamma'' assembled; D'' declared; roles from M and M' known.
    postcondition: >
      Roles'' produced; any role name collisions resolved; authority_coverage_claim states that
      every transition in Gamma'' is covered by at least one role in Roles''; no role loses
      authorized transitions from its source method.
    guidance: |
      **Constraints (what must be true after this step):**
      - Every role in M and every role in M' appears in Roles'' — no role is dropped.
      - If any role from M has the same name as a role from M', the collision is explicitly
        resolved: either merge (if functionally identical) or rename one (if functionally distinct).
      - Every step in Gamma'' is covered by at least one role in Roles'' (authority coverage).
      - No role loses any authorized transition: authority_of(rho) ⊆ authority_of(merged_rho).
      - The authority_coverage_claim is stated: maps each step in Gamma'' to the role authorized
        to execute it.

      **Procedure.**
      1. List all roles from M (with their authorized steps). List all roles from M'.
      2. Check for name collisions. If none: Roles'' = disjoint union. If collision: compare
         observation projections and authorized transitions. If identical: merge into one role
         with combined authority over both role's steps. If distinct: rename (e.g., append
         source method suffix: compiler_M and compiler_M').
      3. Verify seam coverage: which role executes sigma_term(M)? Which role executes sigma_init(M')?
         These may differ. The composition edge itself requires no executor (it is a DAG edge,
         not a guidance step), but both the final step of M and the first step of M' must have
         authorized roles in Roles''.
      4. State authority_coverage_claim: for each step in Gamma'', the authorized role.
    output_schema:
      roles_merged:
        type: array
        min_items: 1
        items: string
        description: "[role_id] (source: M|M'|merged): authorized steps: [sigma_list]"
      collision_resolutions:
        type: array
        min_items: 0
        items: string
        description: "[role_name]: collision resolved as [merged|renamed-to X] because ..."
      authority_coverage_claim:
        type: string
        min_length: 1
        description: "for each step in Gamma'', the authorized role"

  - id: sigma_5
    name: "Objective Composition"
    role: composer
    precondition: >
      Gamma'' assembled; Roles'' merged; D'' declared; O_M and O_{M'} available.
    postcondition: >
      O'' declared as a predicate on Mod(D''); objective_derivation mode stated (natural or
      conjunctive or custom); progress preorder ≼_{O''} declared; at least one measure mu
      declared; nu'' = nu_M + nu_{M'} stated with the strict decrease argument;
      composite_method_assembled confirmed.
    guidance: |
      **Constraints (what must be true after this step):**
      - O'' is declared as a predicate on Mod(D''). Every sort and predicate symbol in O''
        is in Sigma''. If any O'' symbol is not in Sigma'', the objective is not expressible
        and must be reformulated.
      - The objective derivation mode is stated: natural (O'' = O_{M'} at termination),
        conjunctive (O'' = O_M at seam ∧ O_{M'} at termination), or custom (novel predicate
        with justification for why neither standard form applies).
      - ≼_{O''} is declared with a construction argument.
      - At least one measure mu is declared with formula, range, and proxy description.
      - nu'' = nu_M + nu_{M'} is stated with the strict decrease argument: since nu_M and
        nu_{M'} are each well-founded (proven by their compilations), nu'' strictly decreases
        as either component decreases.
      - composite_method_assembled: yes is recorded — confirming all five components of M''
        (D'', Roles'', Gamma'', O'', mu_vec'') are present.

      **Selecting objective derivation mode.**
      Natural: use when M's objective is structurally a precondition for M''s — O_M satisfaction
      at the seam is implied by the composability condition, and the composite's terminal goal
      is M''s alone. Most compositions of the meta-methods family (e.g., MDES;MINS) use natural.
      Conjunctive: use when the composite must preserve both M's and M''s objectives at termination
      — for example, when M produces research that must remain valid (O_M) while M' evolves
      a method (O_{M'}). Produces a stronger composite objective.
      Custom: use only when neither form captures the intent; requires explicit justification and
      a proof that O'' is Sigma''-expressible.
    output_schema:
      objective_derivation:
        type: string
        enum: ["natural", "conjunctive", "custom"]
      objective_statement:
        type: string
        min_length: 1
        description: "O'' in natural language and formal notation"
      objective_expressible_claim:
        type: string
        min_length: 1
        description: "why every sort/predicate in O'' is in Sigma''"
      progress_preorder:
        type: string
        min_length: 1
        description: "how ≼_{O''} is constructed"
      measures:
        type: array
        min_items: 1
        items: string
        description: "{name}: {formula}, range {[a,b]}, proxy for ..."
      termination_certificate:
        type: string
        min_length: 1
        description: "nu'' = nu_M + nu_{M'} — strict decrease argument"
      composite_method_assembled:
        type: string
        enum: ["yes"]

  - id: sigma_6
    name: "Compilation Check"
    role: compiler
    precondition: >
      All five M'' components declared (D'', Roles'', Gamma'', O'', mu_vec''); Gamma'' assembled;
      guidance for all steps present. The compiler evaluates only what is written — no access
      to M, M', or composer's session reasoning.
    postcondition: >
      CompilationResult in {PASS, FAIL(gate_id, repair_target, description)};
      if PASS: YAML encoding of M'' produced; if FAIL: repair target step named.
    guidance: |
      **Constraints (what must be true after this step):**
      - The compilation is run on M'' as an independent method — not by reference to M or M'.
      - Gates are run in order; failure at any gate terminates evaluation at that gate.
      - PASS requires the YAML encoding of M'' to be produced.

      You are the compiler. Your job is to evaluate M'' as a first-class method using G0–G6.

      **G0 (Navigability):** M'' §0 answers What/Who/Why/How/When for the composite as a whole.
      A reader who has never heard of M or M' should understand what M'' does from §0 alone.

      **G1 (Domain Validity):** D'' is declared. Conservative extension of both D and D' is
      claimed (look for conservative_extension_both_claim in sigma_2 output). All Ax'' axioms
      are closed sentences. Initial and terminal states are in Mod(D'').

      **G2 (Objective Expressibility):** O'' is declared as a predicate on Mod(D''). Every
      sort and predicate in O'' is in Sigma''. ≼_{O''} is declared. At least one measure declared.

      **G3 (Role Coverage):** Roles'' covers the full Sigma'' state space. Every role has a
      non-empty observation projection. No two roles are identical in both observation and
      authority. Special check: which role covers the composition seam (executes sigma_term(M)
      and sigma_init(M'))?

      **G4 (DAG Coherence):** Gamma'' is acyclic. Every edge has an explicit composability claim.
      The composition edge's claim must be non-trivial — must reference specific postcondition
      elements of sigma_term(M) and specific precondition elements of sigma_init(M'). Contrarian
      challenge: the composition edge is the natural candidate for the weakest claim; evaluate it.

      **G5 (Guidance Adequacy):** Every step in Gamma'' has finalized guidance with Constraints
      first. Steps inherited from M carry their original guidance (assumed adequate since M
      compiled). Steps inherited from M' similarly. Evaluate the composition edge's composability
      claim for adequacy.

      **G6 (YAML Encodability):** The combined step DAG can be expressed in YAML with all phases,
      roles, output schemas, and invariants. The method has name, description, version fields.
      All output_schema fields have declared types.
    output_schema:
      gates_passed:
        type: array
        min_items: 0
        items: string
        description: '"G0", "G1", ...'
      gates_failed:
        type: array
        min_items: 0
        items: string
        description: '"GN: repair_target=sigmaX — [description]"'
      composition_specific_notes:
        type: array
        min_items: 0
        items: string
        description: "observations valid even if all gates pass (seam, role merge, etc.)"
      compilation_result:
        type: string
        enum: ["PASS", "FAIL"]
      yaml_encoding:
        type: string
        min_length: 0
        description: "full YAML text if PASS; empty if FAIL"

invariants:
  hard:
    - "Both LeftMethod and RightMethod have compilation_result PASS before sigma_1 begins"
    - "Sigma_I is non-empty — at least one sort flows through the seam"
    - "project_I ∘ embed_I = id on Mod(D) | Sigma_I — retraction condition holds"
    - "Gamma'' is acyclic — no back-edges through the composition edge or within Gamma or Gamma'"
    - "conservative_extension_both(D'', M, M') — no axiom in Ax or Ax' is revised in Ax''"
    - "Every role in M and M' appears in Roles'' with authority preserved"
    - "M'' is compiled before registration — compilation_result PASS is required"
  soft:
    - "Use natural objective derivation unless the composition semantics require conjunctive"
    - "The composition edge composability claim should be non-trivial — name specific fields"
    - "Prefer role merge over renaming when roles are functionally identical across M and M'"
    - "Log the MCOM composition run in research/log/ for future reference"

scope_boundary:
  in_scope:
    - "Sequential composition M ; M' where both are compiled"
    - "Composite methods with non-empty interface sub-signatures"
    - "Conditional composition (branch-labeled seam via composition_branch field)"
    - "AddedSteps reconciliation from MINS-instantiated source methods"
  out_of_scope:
    - "Parallel composition M || M' — blocked by P4 (F2-OPR)"
    - "Associativity verification (M ; M') ; M'' vs M ; (M' ; M'') — deferred to P5"
    - "Composing uncompiled methods — must pass G0–G6 individually first"
    - "Designing new steps for M or M' — MCOM operates on black boxes; seam repair goes to MEVO/MDES"

related_methods:
  - id: M1-MDES
    relationship: >
      MCOM is a special case of MDES where the domain knowledge corpus consists of two compiled
      methods. MCOM is more efficient and enforces that M'' contains exactly Gamma ++ [edge] ++ Gamma'.
  - id: M3-MEVO
    relationship: >
      When M'' accumulates execution evidence, M3-MEVO applies to M'' directly as a unit.
      Seam defects (interface too narrow, composability claim too weak) are gaps in M'', not in M or M'.
  - id: M4-MINS
    relationship: >
      MINS and MCOM are orthogonal. MINS specializes a method for a project (vertical in the
      domain hierarchy); MCOM composes two methods sequentially (horizontal in Meth). MCOM ; MINS
      is itself a valid composition: compose two methods, then instantiate the composite for a project.
  - id: F5-MCOM
    relationship: >
      F5-MCOM provides the theoretical grounding: Definition 2.1 (interface sub-signature),
      Definition 3.1 (C1/C2 composability conditions), Corollary 3.2 (conditional composition),
      §4 (composite construction), §6 (category structure in Meth).

output_artifacts:
  - name: composite_method_document
    path_pattern: "{PNN-SLUG}/{MNN-SLUG}/{MNN-SLUG}.yaml"
    description: >
      Full YAML encoding of M'' = M ; M' as a first-class independently compilable method.
      Named per Option A convention (first-class method IDs). Produced at sigma_6 PASS.
  - name: registry_entry
    path_pattern: "WIP.md + MEMORY.md"
    description: "Row for M'' in the method registry with ID, parent methods M and M', and description"

family:
  id: meta-methods
  members:
    - id: M1-MDES
      description: "Design a method from established domain knowledge"
      status: compiled
    - id: M2-MDIS
      description: "Discover whether methodization is warranted"
      status: proposed
    - id: M3-MEVO
      description: "Evolve an existing method from execution evidence"
      status: compiled
    - id: M4-MINS
      description: "Instantiate a general method for a specific project"
      status: compiled
    - id: M5-MCOM
      description: "Compose two compiled methods sequentially"
      status: compiled
    - id: M6-MAUD
      description: "Audit a method retroactively for formal compliance"
      status: operational
    - id: M7-DTID
      description: "Derive a software implementation from a domain theory"
      status: compiled
