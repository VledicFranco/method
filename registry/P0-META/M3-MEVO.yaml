method:
  id: M3-MEVO
  name: "Method for Evolving Deployed Methods from Execution Evidence"
  description: >
    Takes a deployed method M.X version N with accumulated execution evidence and produces
    M.X version N+1 — an evolved method with a change manifest and a refinement claim per
    Definition 8.2 (F1-FTH). The method compiles when the evolved candidate passes all
    seven acceptance gates (G0–G6) at σ₅ and each changed step carries a structurally
    complete refinement claim. This is the third method in the meta-methods family (M1-MDES–M.00N).
  version: "0.1"
  status: compiled
  compilation_date: "2026-03-09"
  source_document: "P0-META/M3-MEVO/M3-MEVO.md"
  formal_grounding: "theory/F1-FTH.md §8.4, Definition 8.2"

domain_theory:
  id: D_MEVO
  reference: "theory/F1-FTH.md §1, §8.4"
  note: >
    D_MEVO is the domain of the method evolution workspace. World states track the
    execution evidence corpus, the gap records crystallized from it, the changes designed
    against those gaps, and the refinement claims warranting that the evolved method satisfies
    Definition 8.2 (F1-FTH §8.4). Extracted from G1 compilation record and formalized in v0.2.
  sorts:
    - name: Method
      cardinality: unbounded
      description: "A compiled method M.X vN — the artifact being evolved"
    - name: DomainTheory
      cardinality: unbounded
      description: "A domain theory D = (Sigma, Ax); the domain of the method under evolution"
    - name: ExecutionEvidence
      cardinality: unbounded
      description: "The complete execution record: session logs, gate failure records, delta trends"
    - name: SessionLog
      cardinality: unbounded
      description: "A single execution session record with step outcomes, gate failures, and delta values"
    - name: GateFailureRecord
      cardinality: unbounded
      description: "A recorded gate failure: step ID, gate ID, session ID, and failure description"
    - name: GapRecord
      cardinality: unbounded
      description: "A crystallized gap: named failure pattern, ≥3 session citations, step and gate IDs"
    - name: VersionBoundary
      cardinality: finite
      values: [evolution, new-method]
      description: "The sigma_2 determination: whether the gaps require evolution or a new method design"
    - name: ChangeManifest
      cardinality: unbounded
      description: "A structured record mapping GapRecord IDs to ChangeDesign IDs to RefinementClaim IDs"
    - name: RefinementClaim
      cardinality: unbounded
      description: "A structured argument for Definition 8.2: gap_closure_mechanism, initial_state_preservation, composability_integrity"
    - name: ConservativeExtension
      cardinality: unbounded
      description: "A domain extension D' of D that adds vocabulary without modifying any existing axiom"
    - name: CompilationResult
      cardinality: finite
      values: [PASS, FAIL]
      description: "The sigma_5 compilation outcome for the evolved method candidate"
    - name: nat
      cardinality: infinite
      description: "Natural numbers — session counts, gap counts, gate counts"

  function_symbols:
    - name: session_count
      signature: "GapRecord -> nat"
      totality: total
      note: "Number of distinct session IDs cited in a GapRecord; Ax-1 guarantees this is >= 3"
    - name: domain_of
      signature: "Method -> DomainTheory"
      totality: total
      note: "The domain theory of the method; used in conservative extension and axiom revision checks"

  predicates:
    - name: has_sufficient_evidence
      signature: "GapRecord"
      description: "Gap cites >= 3 distinct sessions — the evidence threshold (Ax-7)"
    - name: conservative_extension
      signature: "DomainTheory x DomainTheory"
      description: "D' is a conservative extension of D: adds new sorts/predicates/axioms over new vocabulary; no existing axiom modified"
    - name: axiom_revised
      signature: "DomainTheory x DomainTheory"
      description: "D' modifies or removes an existing axiom of D — requires new-method determination"
    - name: closes_gap
      signature: "RefinementClaim x GapRecord"
      description: "The refinement claim addresses the named gap: its gap_closure_mechanism prevents the failure pattern"
    - name: preserves_initial_states
      signature: "RefinementClaim"
      description: "The change does not narrow the set of valid initial states for the evolved method"
    - name: no_new_composability_failures
      signature: "RefinementClaim"
      description: "The change does not break composability at any edge adjacent to the changed step"
    - name: refines
      signature: "Method x Method"
      description: "M' refines M per Definition 8.2 (F1-FTH §8.4): for every run of M from s0, a run of M' from s0 achieves mu_vec >= component-wise"

  axioms:
    - id: Ax-1
      statement: "forall g : GapRecord. session_count(g) >= 3"
      rationale: "GapRecord is constitutively defined by the evidence threshold — only gap candidates meeting >= 3 sessions are crystallized into GapRecords (sigma_1 hard invariant)."
    - id: Ax-2
      statement: "forall g : GapRecord. has_sufficient_evidence(g)"
      rationale: "Every GapRecord satisfies the evidence predicate — direct consequence of Ax-1 and the definition of has_sufficient_evidence."
    - id: Ax-3
      statement: "forall D D'. conservative_extension(D, D') -> NOT axiom_revised(D, D')"
      rationale: "Conservative extension and axiom revision are mutually exclusive by definition — a CE adds only new vocabulary; any modification of existing axioms is by definition an axiom revision."
    - id: Ax-4
      statement: "forall clm g. closes_gap(clm, g) -> has_sufficient_evidence(g)"
      rationale: "A refinement claim can only close an evidenced gap — closing a sub-threshold candidate would violate the evidence principle."
    - id: Ax-5
      statement: "forall D D'. conservative_extension(D, D') -> forall s. s in Mod(D) -> s in Mod(D')"
      rationale: "The defining property of conservative extension: every model of D is also a model of D'. This is what makes CE safe — no existing valid state is invalidated."
    - id: Ax-6
      statement: "forall clm. preserves_initial_states(clm) AND no_new_composability_failures(clm) -> refines(M_evolved, M_current)"
      rationale: "The two structural conditions together constitute the operational warrant for Definition 8.2 refinement: if initial states are preserved and composability is intact, the evolved method can reproduce any run of the current method with equal or better measure."
    - id: Ax-7
      statement: "forall g. has_sufficient_evidence(g) <-> session_count(g) >= 3"
      rationale: "Biconditional definition: has_sufficient_evidence is definitionally equivalent to the session count threshold. Used to formalize the sigma_1 hard invariant."
    - id: Ax-8
      statement: "forall M' M M''. refines(M', M) AND refines(M'', M') -> refines(M'', M)"
      rationale: "Transitivity of refinement — required for the 2-category structure of Meth (F1-FTH §8.5) and to compose multi-cycle evolutions."

  initial_state_valid_claim: >
    A state with an accessible ExecutionEvidence corpus and a compiled M.X vN but no crystallized
    GapRecords, no ChangeManifest, and CompilationResult undefined satisfies all axioms:
    Ax-1 and Ax-2 are vacuously satisfied (no GapRecords yet); Ax-3 through Ax-5 are vacuously
    satisfied (no CE or AR determinations); Ax-6 vacuously (no RefinementClaims); Ax-7 vacuously;
    Ax-8 vacuously. Valid initial state.
  terminal_state_valid_claim: >
    A state with all GapRecords crystallized (session_count >= 3 each), a ChangeManifest covering
    all gaps, RefinementClaims for all changed steps (closes_gap, preserves_initial_states,
    no_new_composability_failures all holding), and CompilationResult = PASS satisfies all axioms:
    Ax-1 (session_count >= 3 by construction), Ax-2 (has_sufficient_evidence holds), Ax-3 (no CE
    and AR simultaneously), Ax-4 (closes_gap only for evidenced gaps), Ax-5 (CE preserves models),
    Ax-6 (both conditions hold -> refines holds), Ax-7 (biconditional), Ax-8 (transitivity preserved).
    Valid terminal state.
  domain_boundary_note: >
    Excludes: the content of the method being evolved beyond its structural properties (domain
    theory sorts, step pre/postconditions, guidance text); the semantic meaning of execution
    failures beyond their session citations; external deployment infrastructure. D_MEVO tracks
    evidence, gaps, changes, and refinement arguments only.

step_dag:
  graph: "linear with branch"
  steps: [sigma_0, sigma_1, sigma_2, sigma_3, sigma_4, sigma_5]
  initial: sigma_0
  terminal: sigma_5
  branch:
    at: sigma_2
    condition: "version_boundary_determination = new-method"
    target: "M1-MDES (exits M3-MEVO; AXIOM_REVISION detected — new method design required)"
  edges:
    - from: sigma_0
      to: sigma_1
      composability_claim: >
        post_{σ₀} produces: gap_candidates (unfiltered, with session citations, step IDs, gate IDs),
        per_step_failure_rates (≥1 entry), evidence_summary, method_version_read.
        pre_{σ₁} requires: gap_candidates set enumerated from σ₀ with session citations, step IDs,
        and gate IDs; per_step_failure_rates computed. post_{σ₀} ⊆ pre_{σ₁}: all required fields
        produced by σ₀ are consumed by σ₁ in the same format (arrays of string entries with
        step/gate/session citations). The hard invariant that per_step_failure_rates has ≥1 item
        at σ₀ satisfies the implicit cardinality requirement at σ₁. Holds.
    - from: sigma_1
      to: sigma_2
      composability_claim: >
        post_{σ₁} produces: gap_records set with ≥1 entry, each citing ≥3 distinct sessions
        (enforced by Axiom 1 hard invariant), and gap_set_summary.
        pre_{σ₂} requires: GapRecord set from σ₁ with at least one entry, each citing ≥3
        sessions; M.X vN accessible. post_{σ₁} ⊆ pre_{σ₂}: gap_records produced by σ₁ satisfies
        the GapRecord cardinality constraint (≥1 entry) and evidence constraint (≥3 sessions each)
        by Axiom 1 of D_MEVO, which is a hard invariant enforced at σ₁. M.X vN accessibility
        is an environmental precondition unchanged since σ₀. Holds.
    - from: sigma_2
      to: sigma_3
      condition: "version_boundary_determination = evolution"
      composability_claim: >
        post_{σ₂} (evolution branch only) produces: domain_impact_classifications covering all
        GapRecords (NO_DOMAIN_CHANGE, CONSERVATIVE_EXTENSION, or AXIOM_REVISION with justifications)
        and version_boundary_determination = "evolution". pre_{σ₃} requires: GapRecord set with
        domain impact classifications from σ₂; version_boundary_determination = "evolution".
        post_{σ₂} ⊆ pre_{σ₃}: domain_impact_classifications covers every GapRecord by the hard
        invariant that classification count equals gap_records count from σ₁. version_boundary_determination
        = "evolution" is guaranteed by the hard invariant that AXIOM_REVISION implies new-method —
        if this edge is reached, no gap was classified AXIOM_REVISION. Holds on the evolution path.
    - from: sigma_3
      to: sigma_4
      composability_claim: >
        post_{σ₃} produces: change_designs (≥1 entry, each citing a GapRecord), composability_rechecks
        for all adjacent edges to changed steps, deferred_gap_designs for any unaddressed gaps.
        pre_{σ₄} requires: change_designs set with composability rechecks from σ₃; GapRecord set
        from σ₁; all changes designed. post_{σ₃} ⊆ pre_{σ₄}: change_designs satisfies the ≥1
        cardinality constraint by σ₃ hard invariant; every GapRecord appears in change_designs or
        deferred_gap_designs by σ₃ hard invariant; composability_rechecks cover all required edges.
        GapRecord set from σ₁ is carried through unchanged (σ₃ cannot modify gap records). Holds.
    - from: sigma_4
      to: sigma_5
      composability_claim: >
        post_{σ₄} produces: M.X vN+1 assembled with all five F1-FTH components (D, Roles, Γ, O,
        μ⃗); assembled_method_confirmation = "assembled"; RefinementClaims for each changed step;
        ChangeManifest; version_bump. pre_{σ₅} requires: M.X vN+1 candidate assembled with all five
        components declared; assembled_method_confirmation = "assembled"; compiler has access only
        to candidate and F1-FTH. post_{σ₄} ⊆ pre_{σ₅}: assembled_method_confirmation = "assembled"
        is a hard invariant at σ₄ (must equal the enum value "assembled"). All five F1-FTH components
        are required to be present for the candidate to pass G0 at σ₅, and the σ₄ assembly step
        explicitly targets this. Weakest edge: assembled_method_confirmation is self-reported by
        the evolver; defense is that G5 at σ₅ independently catches guidance-schema mismatches and
        G6 catches structural YAML completeness — a spurious confirmation cannot survive σ₅. Holds.
  initial_condition_claim: >
    pre_{σ₀} requires: M.X vN exists as a compiled method document; execution evidence is accessible;
    at least one session has been completed. This is satisfied by any deployed method with recorded
    execution history — not trivial (zero-session invocation is excluded) but not restrictive.
    Any compiled method after at least one real execution satisfies pre_{σ₀}.
  terminal_condition_claim: >
    post_{σ₅}(PASS) implies O_MEVO. When σ₅ emits CompilationResult = PASS: (1) G0–G6 all passed
    → M.X vN+1 is structurally valid per F1-FTH (O_MEVO condition 5); (2) the RefinementClaims
    enforced at σ₄ establish Definition 8.2 for each changed step (O_MEVO condition 4); (3) the
    ChangeManifest from σ₄ maps gap records to change designs to claims (O_MEVO condition 3);
    (4) the GapRecord set from σ₁ has ≥1 entry with ≥3 sessions (O_MEVO condition 1); (5)
    VersionBoundary = "evolution" was declared at σ₂ (O_MEVO condition 2); (6) registration in
    the methods registry is part of the σ₅ PASS output (O_MEVO condition 6). All six conditions
    covered. Holds.
  contrarian_challenge: >
    Claim: σ₄→σ₅ is the weakest edge because assembled_method_confirmation is self-reported by
    the evolver who assembled the method. A structurally incomplete M.X vN+1 could carry a
    spurious "assembled" flag.
    Defense: G5 at σ₅ independently checks that every step has finalized guidance and that every
    required output field has guidance coverage; G6 checks YAML structural completeness including
    output_schema types and invariant counts. These gates are evaluated by the compiler role, which
    has no access to the design reasoning or change manifest — epistemic separation prevents the
    evolver's self-assessment from biasing the compilation check. A spurious assembled_method_confirmation
    cannot survive G5 or G6.
    Verdict: the edge holds; compiler independence is the structural guarantee for this claim.

roles:
  - id: analyst
    description: >
      Executes σ₀–σ₁. Reads raw execution evidence — session logs, gate failure records,
      delta trends — and crystallizes named, specific gap records. Has direct access to the
      method server's session logs, gate failure records, and delta trend data for M.X vN.
      Has access to M.X vN's step specifications to correlate failures to specific steps and
      gates. Observes: ExecutionEvidence (session logs, gate failure counts, delta trends),
      M.X vN step specifications, gate definitions (G0–G6). Authorized to: identify gap
      candidates, apply the ≥3-session evidence threshold, emit GapRecord set, discard
      single-session failures. CANNOT design fixes or propose changes to M.X vN — the analyst
      names gaps in the evidence record, not proposed repairs.
    phases:
      - sigma_0
      - sigma_1

  - id: evolver
    description: >
      Executes σ₂–σ₄. Receives crystallized GapRecord set from the analyst and designs
      changes. Has access to M.X vN, the GapRecord set, and F1-FTH. Does not have access
      to raw execution logs — only to the crystallized gap records the analyst produced.
      Observes: M.X vN (full method document), GapRecord set, F1-FTH, ConservativeExtension
      predicate definition, Definition 8.2. Authorized to: declare VersionBoundary, design
      changes to Γ, Roles, guidance, and D subject to evolution constraints, emit ChangeManifest
      and RefinementClaim set, assemble M.X vN+1. CANNOT revise gap records — only the
      analyst's crystallized gaps are legitimate evolution inputs; every change must cite a
      GapRecord from σ₁.
    phases:
      - sigma_2
      - sigma_3
      - sigma_4

  - id: compiler
    description: >
      Executes σ₅. Evaluates the evolved method candidate against G0–G6. Sees only the
      evolved candidate document and F1-FTH — no access to the gap records, change manifest,
      or execution evidence that motivated the changes. Same epistemic constraint as M1-MDES
      σ₆: evaluate structure, not intent. Authorized to: emit PASS with version-bumped artifacts,
      or FAIL with gate identifiers and repair targets mapped back to M3-MEVO steps.
    phases:
      - sigma_5

phases:
  - id: sigma_0
    name: "Evidence Assessment"
    role: analyst
    precondition: >
      M.X vN exists as a compiled method document. Execution evidence (session logs, gate
      failure records, delta trends) is accessible. At least one session has been completed
      using M.X vN.
    postcondition: >
      Execution evidence has been read and summarized — not merely noted as available.
      Per-step failure rates have been computed. Delta stall patterns have been identified.
      A set of gap candidates has been enumerated with session citations, step IDs, and gate
      IDs. The analyst can state which steps or gates show the highest failure frequency.
      The gap candidate list is unfiltered — it includes single-session events and edge
      cases; filtering happens at σ₁.
    guidance: |
      **Constraints (what must be true after this step):**
      - M.X vN has been read — the analyst knows the method's step structure, gate definitions,
        and output schemas before reading the evidence.
      - evidence_summary is non-empty: states session count, date range, and overall failure
        distribution in the execution history.
      - method_version_read is non-empty: identifies which version of M.X was read.
      - per_step_failure_rates contains at least one entry — one per step in M.X vN, each
        stating failure_count / total_sessions.
      - delta_stall_patterns may be empty (if no stalls observed) but must be populated if
        any step shows delta ≤ prior-step-delta across multiple sessions.
      - gap_candidates may be empty only if zero failures occurred across all sessions; if
        any failure was observed, it must appear here with its session citation.
      - Do not filter the gap_candidates list at this step — include single-session failures,
        ambiguous failures, and apparent user errors. Filtering happens at σ₁.

      **Rationale.** This step reads the execution record without interpretation. Premature
      filtering at the evidence stage risks discarding weak signals that combine with future
      session evidence into genuine gaps. The σ₁ evidence threshold exists precisely because
      the σ₀ read is deliberately unfiltered.

      **Procedure.**
      1. Read M.X vN's step structure first. Know what σ_init through σ_term are, what gates
         G0–G6 check, what each step's output schema requires. This is the reference frame for
         interpreting failure events — without it, a gate failure at step 3 has no meaning.
      2. Read the execution evidence. For each session in the log: record which steps completed
         successfully and which produced gate failures; record the delta at each step if
         available; record any explicit gate failure descriptions.
      3. Aggregate across sessions: for each step, compute failure_count / total_sessions;
         identify sessions where delta did not increase (delta stall indicator); list all
         observed failure events with their session IDs.
      4. Produce the evidence summary: a human-readable characterization of the overall
         execution history (session count, date range, failure distribution).
      5. Enumerate gap candidates: every distinct observed failure event with session ID,
         step ID, gate ID, and brief description. Do not discard anything.

      **Output schema reference:**
      - evidence_summary: human-readable characterization of the execution history
      - method_version_read: "M.X vN — [ID] — [date read]"
      - per_step_failure_rates: one entry per step, "σN — name: failure_rate = K/T (K failures in T sessions)"
      - delta_stall_patterns: "σN — name: stalled in sessions [IDs]"; empty array if no stalls
      - gap_candidates: "σN | Gate: GX | Sessions: [ID1, ID2, ...] | Description: ..."; unfiltered

    output_schema:
      fields:
        - name: evidence_summary
          type: string
          description: "Session count, date range, and overall failure distribution in the execution history"
          min_length: 1
          required: true
        - name: method_version_read
          type: string
          description: "M.X vN — [ID] — [date read]"
          min_length: 1
          required: true
        - name: per_step_failure_rates
          type: array
          items: string
          description: "σN — name: failure_rate = K/T (K failures in T sessions)"
          min_items: 1
          required: true
        - name: delta_stall_patterns
          type: array
          items: string
          description: "σN — name: stalled in sessions [IDs]"
          min_items: 0
          required: false
        - name: gap_candidates
          type: array
          items: string
          description: "σN | Gate: GX | Sessions: [ID1, ID2, ...] | Description: ..."
          min_items: 0
          required: false
    invariants:
      hard:
        - "evidence_summary is non-empty"
        - "method_version_read is non-empty"
        - "per_step_failure_rates has at least 1 item"
        - "each per_step_failure_rates entry names a step ID and a fraction K/T"
        - "each gap_candidates entry includes a step ID, a gate ID, at least one session ID, and a description"
      soft:
        - "per_step_failure_rates contains one entry for every step declared in M.X vN"
        - "gap_candidates is not filtered — single-session failures and ambiguous events are included"
        - "delta_stall_patterns is populated if any step showed non-increasing delta across sessions"
        - "evidence_summary states the total session count and date range, not just a qualitative assessment"

  - id: sigma_1
    name: "Gap Crystallization"
    role: analyst
    precondition: >
      gap_candidates set enumerated from σ₀ with session citations, step IDs, and gate IDs.
      per_step_failure_rates computed. Sufficiency decision from σ₀ is implicit: M.X vN was
      read and at least one session was completed.
    postcondition: >
      Every gap candidate from σ₀ has been evaluated against the ≥3-session evidence threshold
      (Axiom 1 of D_MEVO — hard invariant). Candidates meeting the threshold are crystallized
      into GapRecords with precise names, gate citations, step IDs, and session sets. Sub-threshold
      candidates are documented as deferred with explicit deferral reasons. The GapRecord set
      contains at least one entry and is finalized and ready for Evolver consumption. No
      GapRecord proposes a fix.
    guidance: |
      **Constraints (what must be true after this step):**
      - Every gap candidate from σ₀ has been evaluated — none silently dropped.
      - HARD INVARIANT (Axiom 1 of D_MEVO): each promoted GapRecord cites ≥3 distinct session
        IDs where the named failure occurred. This threshold is not negotiable — do not lower it
        under any circumstance.
      - Each gap candidate is either promoted to a GapRecord or documented in deferred_candidates
        with an explicit reason (e.g., "appeared in 2 sessions — insufficient evidence",
        "appears linked to user error, not method structure", "one-off edge case").
      - Each GapRecord has: a gap ID (e.g., GAP-001), the step ID and gate ID where the failure
        occurs, a precise failure pattern description naming what the agent produced that failed
        the gate (not what the agent should have produced instead), and the session citation set.
      - gap_records contains at least one entry. If zero gaps survive the threshold, this method
        should not have been invoked — report and halt rather than proceeding with an empty set.
      - No GapRecord proposes a fix — the Analyst names the gap; the Evolver designs the repair.
      - gap_set_summary is non-empty: states total gaps crystallized, deferred count, and which
        steps are most affected.

      **Rationale.** The ≥3-session evidence threshold implements Axiom 1 of D_MEVO. A single
      gate failure could be user error, an unusual initial state, or a session-specific context
      issue. Two failures could be a correlated pair from the same user in the same context.
      Three failures across distinct sessions with distinct initial states is the minimum credible
      pattern. Lowering this threshold risks evolving the method in response to noise.

      **Procedure.**
      1. For each gap candidate from σ₀: count the distinct session IDs where this failure
         pattern appears.
      2. If count ≥ 3: promote to GapRecord. Name the gap precisely — the name must describe the
         failure pattern, not the fix. E.g., "σ₃ output schema missing required coverage_claim
         across ≥3 sessions" not "σ₃ guidance doesn't emphasize coverage_claim enough."
      3. If count < 3: document in deferred_candidates with exact count and reason. Deferred
         candidates are not discarded — they are deferred evidence that may accumulate into a
         gap in a future evolution cycle.
      4. Naming precision check: re-read each GapRecord name. Does it describe an observed
         output or failure, or does it imply a solution? Rewrite any name that implies a fix.

      **Output schema reference:**
      - gap_records: one entry per crystallized gap; format "GAP-NNN | σX | Gate: GY | Pattern: [description] | Sessions: [IDs]"
      - deferred_candidates: one entry per sub-threshold candidate; format "σN | Gate: GX | Sessions: [K] — DEFERRED: [reason]"
      - gap_set_summary: total gaps crystallized, deferred count, steps most affected

    output_schema:
      fields:
        - name: gap_records
          type: array
          items: string
          description: "GAP-NNN | σX | Gate: GY | Pattern: [description] | Sessions: [IDs]"
          min_items: 1
          required: true
        - name: deferred_candidates
          type: array
          items: string
          description: "σN | Gate: GX | Sessions: [K] — DEFERRED: [reason]"
          min_items: 0
          required: false
        - name: gap_set_summary
          type: string
          description: "Total gaps crystallized, deferred count, which steps are most affected"
          min_length: 1
          required: true
    invariants:
      hard:
        - "gap_records has at least 1 item"
        - "AXIOM-1: every gap_records entry cites at least 3 distinct session IDs"
        - "gap_set_summary is non-empty"
        - "every gap candidate from sigma_0 appears in either gap_records or deferred_candidates"
        - "no gap_records entry contains a proposed fix — pattern descriptions name observed failures only"
      soft:
        - "gap_records entries follow the format GAP-NNN | σX | Gate: GY | Pattern: [...] | Sessions: [...]"
        - "deferred_candidates entries state exact session count and explicit deferral reason"
        - "gap_set_summary names the specific steps showing highest failure concentration"
        - "GapRecord pattern descriptions name the specific field missing or specific output that was wrong, not vague failure characterizations"

  - id: sigma_2
    name: "Domain Impact Analysis"
    role: evolver
    precondition: >
      GapRecord set received from σ₁ — at least one entry, each citing ≥3 sessions. M.X vN
      document accessible. F1-FTH accessible. The Evolver does not have access to raw
      execution logs — only to the crystallized gap records.
    postcondition: >
      Every GapRecord has a domain impact classification in exactly one of three categories:
      NO_DOMAIN_CHANGE, CONSERVATIVE_EXTENSION, or AXIOM_REVISION. A VersionBoundary
      determination has been produced: "evolution" if no gap requires AXIOM_REVISION,
      "new-method" if any gap requires AXIOM_REVISION. If new-method: the specific axioms
      at issue are named and M1-MDES is recommended; the evolution path halts here.
      If evolution: the output is ready for σ₃.
    guidance: |
      **Constraints (what must be true after this step):**
      - Every GapRecord from σ₁ has a domain impact classification — none unclassified.
      - Domain impact classifications use exactly three categories:
        - NO_DOMAIN_CHANGE — closing the gap requires changes to Γ (step pre/post/guidance/output_schema),
          Roles (observation projections, authority sets), or guidance text only; D = (Σ, Ax) unchanged.
        - CONSERVATIVE_EXTENSION — closing the gap requires adding new sorts, predicates, or axioms
          over new vocabulary; no existing axiom in Ax is modified or removed; D' is a proper
          extension of D.
        - AXIOM_REVISION — closing the gap requires modifying or removing an existing axiom in Ax.
      - version_boundary_determination is one of: "evolution" or "new-method".
        - "evolution" requires: no gap classification is AXIOM_REVISION.
        - "new-method" requires: at least one gap is classified AXIOM_REVISION.
      - If version_boundary_determination is "new-method": new_method_rationale is non-empty and
        names the specific axioms at issue and recommends M1-MDES as the design path. The
        evolution path halts — do not proceed to σ₃.
      - If version_boundary_determination is "evolution": proceed to σ₃.
      - conservative_extension_details entries are required for each CONSERVATIVE_EXTENSION gap —
        naming the new vocabulary being added.

      **Rationale.** The evolution vs. new-method threshold is the most consequential decision
      in this method. A conservative extension leaves all existing valid states intact — every
      state in Mod(D) is also in Mod(D'). An axiom revision changes what counts as a valid state,
      potentially invalidating runs that M.X vN handled correctly. When in doubt about whether a
      change is conservative, classify it as AXIOM_REVISION — the cost of a false positive (routing
      to M1-MDES unnecessarily) is far lower than the cost of a false negative (silently
      breaking existing runs).

      **Procedure.**
      For each gap that might require domain theory change:
      1. State precisely what change to D is under consideration (add sort X, add axiom A, modify axiom B).
      2. Apply the conservative extension test from F3-DTC §2:
         - Adding a new sort to Σ: conservative unless an existing axiom quantifies over "all sorts".
         - Adding a new predicate p(X, Y): conservative unless an existing axiom references p.
         - Adding a new axiom over new vocabulary: conservative by definition.
         - Modifying an existing axiom: ALWAYS AXIOM_REVISION — even strengthening modifications
           change Mod(D) and may narrow valid initial states.
      3. Classify accordingly. Document the reasoning in domain_impact_classifications.

      **If new-method determination:** Document what domain theory change is required and halt.
      The methodology caller will initiate M1-MDES. The other gaps (classified NO_DOMAIN_CHANGE
      or CONSERVATIVE_EXTENSION) may be addressed in a separate evolution cycle.

      **Output schema reference:**
      - domain_impact_classifications: one entry per gap; "GAP-NNN: [CATEGORY] — [justification]"
      - version_boundary_determination: "evolution" or "new-method"
      - new_method_rationale: names the specific axioms at issue; required if new-method; empty string if evolution
      - conservative_extension_details: one entry per CONSERVATIVE_EXTENSION gap; "GAP-NNN: adds [sort/predicate/axiom] over new vocabulary [X]"

    output_schema:
      fields:
        - name: domain_impact_classifications
          type: array
          items: string
          description: "GAP-NNN: NO_DOMAIN_CHANGE | CONSERVATIVE_EXTENSION | AXIOM_REVISION — [justification]"
          min_items: 1
          required: true
        - name: version_boundary_determination
          type: enum
          values: ["evolution", "new-method"]
          required: true
        - name: new_method_rationale
          type: string
          description: "Names the specific axioms at issue and recommends M1-MDES; required if new-method; empty string if evolution"
          min_length: 0
          required: true
        - name: conservative_extension_details
          type: array
          items: string
          description: "GAP-NNN: adds [sort/predicate/axiom] over new vocabulary [X]"
          min_items: 0
          required: false
    invariants:
      hard:
        - "domain_impact_classifications has at least 1 item"
        - "domain_impact_classifications count equals gap_records count from sigma_1"
        - "version_boundary_determination is present and is one of: evolution, new-method"
        - "if version_boundary_determination is new-method: new_method_rationale is non-empty"
        - "if version_boundary_determination is new-method: new_method_rationale names the specific axioms at issue"
        - "each classification uses exactly one of: NO_DOMAIN_CHANGE, CONSERVATIVE_EXTENSION, AXIOM_REVISION"
        - "AXIOM_REVISION classification implies version_boundary_determination is new-method"
      soft:
        - "classification justifications name the specific axiom or domain element at issue, not a generic explanation"
        - "conservative_extension_details entries are present for every CONSERVATIVE_EXTENSION gap"
        - "if version_boundary_determination is evolution: the evolver proceeds to sigma_3 rather than halting"
        - "if in doubt between CONSERVATIVE_EXTENSION and AXIOM_REVISION, the conservative choice is AXIOM_REVISION"

  - id: sigma_3
    name: "Change Design"
    role: evolver
    precondition: >
      GapRecord set with domain impact classifications from σ₂. version_boundary_determination
      is "evolution" — the AXIOM_REVISION branch does not reach this step. M.X vN document
      accessible. F1-FTH accessible.
    postcondition: >
      Every GapRecord has a corresponding change design — either a direct repair (specific
      modification to Γ, Roles, guidance, or D) or a documented deferral reason. Every change
      entry cites exactly one GapRecord. CONSERVATIVE_EXTENSION changes include the new
      vocabulary and do not touch any existing axiom text. Changes to step pre/post conditions
      include a preliminary composability recheck at each affected edge. change_designs and
      composability_rechecks are ready for σ₄.
    guidance: |
      **Constraints (what must be true after this step):**
      - Every GapRecord from σ₁ has a corresponding change design entry or a documented deferral
        in deferred_gap_designs — none unaddressed.
      - Every change_designs entry cites exactly one GapRecord ID — no unmotivated changes.
      - Changes classified CONSERVATIVE_EXTENSION include the new vocabulary being added and do
        not touch any existing axiom text in M.X vN.
      - Changes to step pre/post conditions include a composability recheck in composability_rechecks
        for each affected edge (σᵢ → σ_changed) and (σ_changed → σⱼ); state whether
        post_{σᵢ} ⊆ pre_{σⱼ} still holds or was revised.
      - Changes to output schemas include a note on which guidance text sections cover the new
        or modified fields — guidance coverage must be maintained.
      - opportunistic_candidates documents improvement opportunities observed beyond the gap records
        — do not apply them; record them for a future evolution cycle.
      - Do not alter any aspect of M.X vN not targeted by a change design citing a GapRecord.

      **Rationale.** Three constraints bound the design space: (1) every change must cite a gap —
      uncited changes are scope creep that cannot carry refinement claims; (2) the change must close
      the named gap — if M.X vN+1 had been deployed, would the failing sessions have produced a
      different outcome? If not, redesign; (3) the change must not break adjacent composability —
      check both edges at each changed step.

      **Procedure by change type:**
      Guidance-only changes (most common, lowest risk): the gap is that agents consistently failed
      to produce a required output field or produced it incorrectly. The fix revises guidance to
      better orient agents toward that field. Verify constraints-first format (F2-OPR §P2.2).
      Guidance changes cannot break composability by definition — guidance does not appear in
      pre/post conditions.

      Output schema changes (medium risk): the gap is that the step's output schema did not
      adequately capture the postcondition. Additions tighten what counts as a valid output.
      Verify that the strengthened postcondition does not exceed what the next step's precondition
      requires — stronger is fine; inconsistent is not.

      Pre/post condition changes (highest risk): the gap is a formal error in stated pre or post
      conditions. Every pre/post change must be accompanied by an explicit composability recheck
      at both adjacent edges in composability_rechecks.

      Conservative domain extension: new sorts or predicates added to D. Steps using new vocabulary
      must be updated consistently. Steps not referencing the new vocabulary are unaffected — this
      is the defining property of conservative extension.

      **Output schema reference:**
      - change_designs: one entry per gap (or co-addressed gaps); "CHG-NNN | GAP-NNN | Step: σX | Type: [guidance|schema|pre-post|domain] | Change: [description]"
      - composability_rechecks: "CHG-NNN | Edge σᵢ→σⱼ: post_{σᵢ} ⊆ pre_{σⱼ} [still holds | FAILS — revised to: ...]"
      - deferred_gap_designs: "GAP-NNN: deferred — [reason]"
      - opportunistic_candidates: observed improvements outside gap scope; deferred to future evolution cycle

    output_schema:
      fields:
        - name: change_designs
          type: array
          items: string
          description: "CHG-NNN | GAP-NNN | Step: σX | Type: [guidance|schema|pre-post|domain] | Change: [description]"
          min_items: 1
          required: true
        - name: composability_rechecks
          type: array
          items: string
          description: "CHG-NNN | Edge σᵢ→σⱼ: post_{σᵢ} ⊆ pre_{σⱼ} [still holds | FAILS — revised to: ...]"
          min_items: 0
          required: false
        - name: deferred_gap_designs
          type: array
          items: string
          description: "GAP-NNN: deferred — [reason]"
          min_items: 0
          required: false
        - name: opportunistic_candidates
          type: array
          items: string
          description: "Observed improvement opportunities outside gap scope; deferred to future evolution cycle"
          min_items: 0
          required: false
    invariants:
      hard:
        - "change_designs has at least 1 item"
        - "every gap_records entry from sigma_1 appears in change_designs or deferred_gap_designs"
        - "every change_designs entry cites exactly one GapRecord ID"
        - "no change_designs entry targets a component not cited by a GapRecord"
        - "composability_rechecks contains entries for every edge adjacent to a step with a pre-post or schema change"
      soft:
        - "change_designs entries follow the format CHG-NNN | GAP-NNN | Step: σX | Type: [...] | Change: [...]"
        - "CONSERVATIVE_EXTENSION changes name the new vocabulary explicitly and confirm no existing axiom text is modified"
        - "guidance-type changes include a note confirming constraints-first format compliance"
        - "opportunistic_candidates are recorded but not applied in this execution"

  - id: sigma_4
    name: "Refinement Claim"
    role: evolver
    precondition: >
      change_designs set with composability rechecks from σ₃. GapRecord set from σ₁. M.X vN
      accessible. All changes have been designed; composability has been rechecked for all
      pre/post and schema changes.
    postcondition: >
      A RefinementClaim exists for each changed step, structurally complete: it addresses all
      three required arguments — (a) gap_closure_mechanism, (b) initial_state_preservation,
      (c) composability_integrity. A ChangeManifest cross-references gap record IDs, change
      design IDs, and refinement claim IDs. M.X vN+1 is assembled with all accepted changes
      applied, version field bumped, and change manifest appended as a new section.
      assembled_method_confirmation is "assembled".
    guidance: |
      **Constraints (what must be true after this step):**
      - Every changed step has exactly one RefinementClaim entry in refinement_claims.
      - Every refinement_claims entry is structurally complete — all three sub-fields present
        and non-empty:
        (a) gap_closure_mechanism: names the GapRecord ID and states what the change does
            differently that prevents the named failure pattern. Must name the mechanism,
            not just assert "the guidance is better."
        (b) initial_state_preservation: states why valid initial states are not narrowed. For
            non-initial steps, state: "σ is not σ_init; its change does not affect pre_{σ_init}."
            For guidance-only changes, state: "Guidance changes cannot affect pre_{σ_init} by
            definition — guidance does not appear in precondition predicates." For σ_init changes,
            verify whether the new precondition is strictly stronger than the old and justify.
        (c) composability_integrity: references the composability recheck from σ₃ and states
            the result for each edge adjacent to the changed step.
      - change_manifest cross-references: one row per change, "CHG-NNN | GAP-NNN | σX | [change summary] | CLM-NNN".
      - version_bump is non-empty: "M.X vN → M.X vN+1 — [date]".
      - assembled_method_confirmation is "assembled".
      - No claim is stated more weakly than the minimum bar: specific (names the gap and mechanism),
        complete (all three sub-fields non-empty), falsifiable (a reader can identify what would
        have to be false for the claim to fail).
      - Insight-preservation check (THMC-A1): before assembling M.X vN+1, verify that every
        output_schema field of every step in M.X vN appears in some step's output_schema in
        M.X vN+1. Populate insight_preservation_check with any fields from M.X vN NOT covered
        by M.X vN+1. If non-empty, each entry must carry a non-empty justification. Empty array
        = trivial pass (all fields covered). This operationalizes the THMC-A1 recommendation
        (F2-OPR): evolution must not silently discard output_schema coverage.

      **Rationale.** The refinement claim is the formal content that distinguishes an evolution
      from an ad-hoc patch. It is not a formal bisimulation proof — it is the minimum credible
      structured argument for Definition 8.2 (F1-FTH): for every run of M.X vN from s₀, there
      exists a run of M.X vN+1 from s₀ producing μ⃗ ≥ the original component-wise.

      **Procedure for each changed step σ:**
      (a) gap_closure_mechanism: Name the GapRecord ID. State what the change does differently
      from M.X vN. Argue why, if M.X vN+1 had been deployed, the sessions producing the gap
      failure would not have produced it. An argument like "the guidance now states the
      coverage_claim field explicitly, so agents cannot miss it" is acceptable. An argument like
      "the guidance is better" is not — it does not name the mechanism.

      (b) initial_state_preservation: Address one of three cases:
      - σ is not σ_init: state this directly.
      - Change is guidance-only: state that guidance cannot affect precondition predicates.
      - σ is σ_init and pre changed: check whether the new precondition is strictly stronger
        (narrower). If so, state whether the narrowing is intentional (the old precondition
        admitted malformed inputs that produced the gap) or must be widened.

      (c) composability_integrity: Reference the σ₃ recheck result for each adjacent edge.
      If a composability failure was identified and resolved by a co-change to an adjacent step,
      cite both change design IDs.

      **After writing all claims, assemble the ChangeManifest:**
      One row per change: CHG-NNN | GAP-NNN | σX | Change summary | CLM-NNN.

      **Then assemble M.X vN+1:**
      Apply all accepted change designs to M.X vN. Bump the version field from N to N+1.
      Append a "## Change History" section with the full change manifest and refinement claims.
      Do not alter any aspect of the method not targeted by a change design.

      **Output schema reference:**
      - refinement_claims: array with one entry per changed step; each entry is an object with
        three required sub-fields: gap_closure_mechanism, initial_state_preservation, composability_integrity
      - change_manifest: "CHG-NNN | GAP-NNN | σX | [change summary] | CLM-NNN"
      - version_bump: "M.X vN → M.X vN+1 — [date]"
      - assembled_method_confirmation: must be "assembled"
      - insight_preservation_check: array of objects { step_id, field, justification }; one entry
        per output_schema field in M.X vN not covered by any step in M.X vN+1; justification
        must be non-empty for each entry; empty array is a valid trivial pass

    output_schema:
      fields:
        - name: refinement_claims
          type: array
          items:
            claim_id:
              type: string
              description: "CLM-NNN identifier"
            step_id:
              type: string
              description: "σX — the changed step this claim covers"
            change_id:
              type: string
              description: "CHG-NNN — the change design this claim covers"
            gap_closure_mechanism:
              type: string
              description: "Names the GapRecord ID and states the mechanism by which the change prevents the named failure pattern"
            initial_state_preservation:
              type: string
              description: "States why valid initial states are not narrowed by this change"
            composability_integrity:
              type: string
              description: "References the sigma_3 composability recheck result for each adjacent edge"
          min_items: 1
          required: true
        - name: change_manifest
          type: array
          items: string
          description: "CHG-NNN | GAP-NNN | σX | [change summary] | CLM-NNN"
          min_items: 1
          required: true
        - name: version_bump
          type: string
          description: "M.X vN → M.X vN+1 — [date]"
          min_length: 1
          required: true
        - name: assembled_method_confirmation
          type: enum
          values: ["assembled"]
          required: true
        - name: insight_preservation_check
          type: array
          items:
            step_id:
              type: string
              description: "σX — the step in M.X vN whose output_schema field is not covered in M.X vN+1"
            field:
              type: string
              description: "The output_schema field name from M.X vN that is absent from all steps in M.X vN+1"
            justification:
              type: string
              description: "Non-empty explanation of why this insight loss is acceptable"
          min_items: 0
          required: true
          note: "Empty array = trivial pass (all output_schema fields covered). Non-empty requires justification per entry. Operationalizes THMC-A1 (F2-OPR)."
    invariants:
      hard:
        - "refinement_claims has at least 1 item"
        - "change_manifest has at least 1 item"
        - "version_bump is non-empty"
        - "assembled_method_confirmation equals 'assembled'"
        - "every changed step from sigma_3 has exactly one refinement_claims entry"
        - "every refinement_claims entry has gap_closure_mechanism non-empty"
        - "every refinement_claims entry has initial_state_preservation non-empty"
        - "every refinement_claims entry has composability_integrity non-empty"
        - "change_manifest cross-references: each row cites a CHG-NNN, a GAP-NNN, a step ID, and a CLM-NNN"
        - "insight_preservation_check is present (may be empty array)"
        - "if insight_preservation_check is non-empty, every entry has a non-empty justification"
      soft:
        - "gap_closure_mechanism names the specific GapRecord ID and the specific mechanism — not a generic quality assertion"
        - "initial_state_preservation addresses one of the three cases: non-initial step, guidance-only change, or σ_init pre-condition change"
        - "composability_integrity names the specific edges rechecked and their outcomes"
        - "refinement claims are falsifiable — a reader can identify what would have to be false for the claim to fail"
        - "insight_preservation_check has been genuinely checked: every output_schema field in every M.X vN step was compared against M.X vN+1 step schemas"

  - id: sigma_5
    name: "Compilation Check"
    role: compiler
    precondition: >
      M.X vN+1 candidate assembled with all five components declared (D, Roles, Γ, O, μ⃗).
      Guidance finalized. assembled_method_confirmation is "assembled" from σ₄. The compiler
      observes only the evolved candidate document and F1-FTH — no gap records, no change
      manifest context, no execution evidence.
    postcondition: >
      CompilationResult ∈ {PASS, FAIL}. If PASS: gate_verdicts has exactly 7 entries all PASS,
      overall_verdict is PASS, and version_artifacts names the registered location. If FAIL:
      gate_verdicts contains at least one FAIL verdict, overall_verdict is FAIL, and repair_targets
      names the specific M3-MEVO step to repair (not a step of M.X vN+1).
    guidance: |
      **Constraints (what must be true after this step):**
      - Run gates in order G0 through G6.
      - A gate failure terminates evaluation at that gate. Report the failure and repair target.
        Do not continue to later gates after a failure — a method failing G0 cannot meaningfully
        be evaluated at G4.
      - gate_verdicts contains one entry per gate evaluated (G0 through the first failure, or
        G0 through G6 if all pass).
      - overall_verdict is PASS only if all seven gates pass.
      - If PASS: version_artifacts is non-empty, naming the registered path of M.X vN+1.
      - If FAIL: repair_targets names the specific M3-MEVO step (σN identifier) to repair.
      - The refinement_claims section of M.X vN+1 is not evaluated by G0–G6 — it was enforced
        at σ₄; the compiler checks structural validity only.
      - Repair targets map to M3-MEVO steps, not to steps of M.X vN+1:
        G0 → σ₄ (motivation section is part of M.X vN+1 assembly)
        G1 → σ₂ or σ₃ (domain theory change was misclassified or incorrectly applied)
        G2 → σ₃ (objective or measure change was incorrectly designed)
        G3 → σ₃ (role change was incorrectly designed)
        G4 → σ₃ (composability failure introduced and not caught by σ₃ recheck)
        G5 → σ₃ (guidance change was inadequate)
        G6 → σ₃ or σ₄ (YAML encoding issue in the assembled document)

      **Rationale.** You are the compiler. Your job is to evaluate the evolved candidate method
      against the seven formal theory gates. You have access to the candidate document and F1-FTH.
      You do not have access to the design reasoning, gap records, or change manifest — evaluate
      structure, not intent. This epistemic separation is the defining constraint of the compiler role.

      **G0 — Navigability (What/Who/Why/How/When)**
      Check that §0 of the candidate method explicitly answers all five questions: What (what it
      produces; what compiles), Who (roles; LLM or human execution), Why (problem it solves),
      How (step structure overview), When (input conditions and boundary conditions).
      FAIL → repair target: σ₄

      **G1 — Domain Theory Validity**
      Check: at least one sort declared; all predicates have typed arguments referencing declared
      sorts; axioms are closed sentences (no free variables); no trivially contradictory axiom pair;
      initial_state_valid_claim and terminal_state_valid_claim present.
      FAIL → repair target: σ₂ or σ₃

      **G2 — Objective Expressibility and Measure Well-formedness**
      Check: O stated as a predicate over Mod(D) (not a process description); every sort/predicate
      in O is declared in Σ; progress preorder ≼_O declared or fixpoint objective with monotone
      operator named; at least one measure with formula, range, and proxy claim; measure formulas
      reference only declared Σ symbols.
      FAIL → repair target: σ₃

      **G3 — Role Coverage and Authority**
      Check: at least one role declared; each role has non-empty observation projection; coverage_claim
      present and non-trivial; authority_claim present; no two roles have identical observation
      projections AND identical authority sets.
      FAIL → repair target: σ₃

      **G4 — Step DAG Composability**
      Check: at least two steps declared; each step has pre, post, guidance, and output_schema;
      each edge has a composability claim stating why post_{σᵢ} ⊆ pre_{σⱼ}; terminal_condition_claim
      present; initial_condition_claim present; step graph is acyclic; contrarian_challenge present
      with all three fields populated.
      FAIL → repair target: σ₃

      **G5 — Guidance Structural Adequacy**
      Check: every step has finalized guidance text; adequacy_results has an entry for every step;
      no INADEQUATE step without revised_guidance; format_audit_results has an entry for every step;
      no FORMAT-FAIL step without revised_guidance; spot-check 2 required output fields per
      ADEQUATE+FORMAT-OK step against the guidance.
      FAIL → repair target: σ₃

      **G6 — YAML Encodability**
      Check: step DAG expressible as YAML phases array with id, name, role, guidance, output_schema,
      and invariants fields; each output_schema field has declared type and applicable constraints;
      hard invariant count ≥ required field count across all phases; at least one soft invariant
      per phase with significant content quality requirements; methodology has name, description,
      version fields; no phase guidance references undefined variables.
      FAIL → repair target: σ₃ or σ₄

      If all gates pass, emit overall_verdict PASS and record version_artifacts.

      **Output schema reference:**
      - gate_verdicts: one entry per gate evaluated, each with gate id, verdict (PASS/FAIL/PARTIAL/CONDITIONAL), and notes
      - overall_verdict: "PASS" or "FAIL"
      - repair_targets: array of repair obligations naming the M3-MEVO step to fix; empty if PASS
      - version_artifacts: "M.X vN+1 registered at [path]" if PASS; empty string if FAIL

    output_schema:
      fields:
        - name: gate_verdicts
          type: array
          items:
            gate:
              type: string
              description: "Gate identifier: G0, G1, G2, G3, G4, G5, or G6"
            verdict:
              type: enum
              values: ["PASS", "FAIL", "PARTIAL", "CONDITIONAL"]
              description: "Outcome of this gate"
            notes:
              type: string
              description: "Specific items checked, issues found, or conditions for CONDITIONAL"
          min_items: 1
          required: true
        - name: overall_verdict
          type: enum
          values: ["PASS", "FAIL"]
          required: true
        - name: repair_targets
          type: array
          items:
            gate:
              type: string
              description: "The gate that failed"
            mevo_step:
              type: string
              description: "The M3-MEVO step to repair (σN identifier)"
            description:
              type: string
              description: "What must be added or corrected in the named MEVO step to pass this gate"
          min_items: 0
          required: false
        - name: version_artifacts
          type: string
          description: "M.X vN+1 registered at [path] if PASS; empty string if FAIL"
          min_length: 0
          required: true
    invariants:
      hard:
        - "gate_verdicts has at least 1 item"
        - "overall_verdict is present and is one of: PASS, FAIL"
        - "version_artifacts is present (may be empty string if FAIL)"
        - "if overall_verdict is PASS: gate_verdicts has exactly 7 items, all with verdict PASS"
        - "if overall_verdict is FAIL: repair_targets has at least 1 item"
        - "if overall_verdict is PASS: version_artifacts is non-empty"
        - "if overall_verdict is FAIL: version_artifacts is empty string"
        - "repair_targets entries name M3-MEVO steps (σ₁–σ₄), not steps of M.X vN+1"
      soft:
        - "gate_verdicts entries appear in order G0, G1, G2, G3, G4, G5, G6"
        - "evaluation stops at the first FAIL gate — later gates are not listed when a prior gate fails"
        - "repair_targets entries name specific missing fields or structural violations, not general guidance"
        - "CONDITIONAL verdicts name the specific condition that must hold for the gate to be treated as PASS"

termination_certificate:
  measure: "ν_MEVO = (total_gaps - gaps_with_complete_claims) + (7 - gates_passed_count)"
  formal: >
    ν(s) = (total_gaps − |{g ∈ gap_records | g has structurally complete RefinementClaim in s}|)
           + (7 − |{g ∈ {G0,...,G6} | g passes in state s}|)
  argument: >
    The termination measure ν_MEVO sums two non-negative components. The first component,
    (total_gaps − gaps_with_complete_claims), strictly decrements with each gap addressed at
    σ₃–σ₄. A complete RefinementClaim requires all three sub-fields (gap_closure_mechanism,
    initial_state_preservation, composability_integrity) to be non-empty — this is a structural
    requirement enforceable at σ₄, not a vague quality judgment. Each σ₄ iteration that
    correctly completes a claim reduces this component by exactly one. Base case: this component
    reaches 0 when all gaps have structurally complete refinement claims.

    The second component, (7 − gates_passed_count), mirrors M1-MDES: each repair cycle at
    σ₅ that correctly addresses the named gate failure reduces the failed gate count by at least
    one per re-execution. Since the gate set is finite (|{G0,...,G6}| = 7), this component is
    bounded below by 0 and strictly decreasing under correct repairs.

    The overall measure ν_MEVO is bounded below by 0, strictly decreasing under correct execution,
    and reaches 0 when all gaps have complete refinement claims and all seven gates pass —
    triggering σ₅ PASS. The certificate is non-trivial only when: (1) the ≥3-session evidence
    threshold was correctly enforced at σ₁, and (2) all domain impact classifications at σ₂
    were conservative — if any gap requires AXIOM_REVISION, termination of the evolution path
    is guaranteed by the new-method branch at σ₂ rather than by this measure.

success_profile:
  mu_1:
    name: "gap_coverage"
    formula: "gaps_crystallized / gaps_identified"
    range: [0.0, 1.0]
    description: >
      Fraction of identified gap candidates that were crystallized into GapRecords with
      sufficient evidence. Computed as gaps_crystallized / gaps_identified. A complete
      evidence-grounded evolution has μ₁ = 1.0; partial evolutions (some gaps deferred for
      insufficient evidence) have μ₁ < 1.0.
  mu_2:
    name: "refinement_completeness"
    formula: "gaps_with_complete_claims / gaps_crystallized"
    range: [0.0, 1.0]
    description: >
      Fraction of crystallized gaps that have a structurally complete RefinementClaim — all
      three sub-fields present and non-empty (gap_closure_mechanism, initial_state_preservation,
      composability_integrity). Computed as gaps_with_complete_claims / gaps_crystallized.
      A valid evolution release requires μ₂ = 1.0.
  mu_3:
    name: "compilation_passage"
    formula: "gates_passed / 7"
    range: [0.0, 1.0]
    description: >
      Fraction of the seven G0–G6 gates that the evolved candidate passes at σ₅. Computed
      as gates_passed / 7. A valid evolution release requires μ₃ = 1.0.
  session_delta_formula: "(mu_1 + mu_2 + mu_3) / 3"
  progress_preorder: "lexicographic on (mu_3, mu_2, mu_1)"
  preorder_rationale: >
    μ₃ (compilation passage) is primary: a method with complete refinement claims but zero
    compilation passage has made formal arguments without structural verification — it cannot
    be released. μ₂ (refinement completeness) is secondary: high compilation passage without
    complete refinement claims means structural gates passed without formal grounding of changes.
    μ₁ (gap coverage) is tertiary: uncovered gaps represent unrealized evolution value but do
    not block release when all crystallized gaps are claimed and compiled.

objective:
  statement: >
    A run of M3-MEVO satisfies O_MEVO iff: (1) a GapRecord set exists with at least one
    gap, each citing ≥3 distinct sessions; (2) a VersionBoundary of "evolution" has been
    declared (or the run terminates with a "new-method" determination routing to M1-MDES);
    (3) a ChangeManifest exists with one entry per gap closed; (4) a structurally complete
    RefinementClaim exists for each changed step, with all three arguments addressed —
    gap_closure_mechanism, initial_state_preservation, and composability_integrity; (5) M.X vN+1
    exists as a complete method document passing all seven acceptance gates at σ₅; (6) M.X vN+1
    is registered in the methods README with its version, date, and change summary.
  type: terminal
  progress_preorder: "lexicographic on (mu_3, mu_2, mu_1)"

output_artifacts:
  - name: evolved_method_document
    path_pattern: "{PNN-SLUG}/{MNN-SLUG}/{MNN-SLUG}.yaml"
    description: "Full method YAML at version N+1 with version field bumped and change_history section appended"
  - name: change_manifest
    path_pattern: "Appended to evolved method document under change_history key"
    description: "Structured record mapping gap records to change designs to refinement claims for each evolution"
  - name: gap_records_archive
    path_pattern: "{PNN-SLUG}/{MNN-SLUG}/evolution/YYYYMMDD-gap-records.yaml"
    description: "Optional auditability artifact: crystallized gap records from σ₁"
  - name: registry_entry
    path_pattern: "WIP.md + MEMORY.md"
    description: "Version field updated with version number, date, and one-line change summary"

family:
  id: meta-methods
  members:
    - id: M1-MDES
      description: "Design a method from established domain knowledge"
      status: active
    - id: M2-MDIS
      description: "Discover whether methodization is warranted"
      status: future
    - id: M3-MEVO
      description: "Evolve an existing method from execution evidence"
      status: active
    - id: M4-MINS
      description: "Instantiate a general method for a specific project"
      status: compiled

compilation_record:
  gates:
    - gate: G0
      result: PASS
      note: >
        Navigation complete. What: change manifest + refinement claim + evolved method M.X vN+1.
        Who: three roles — analyst (sigma_0-sigma_1), evolver (sigma_2-sigma_4), compiler (sigma_5).
        Why: Definition 8.2 gap; M1-IMPL version history (v1.0 to v2.1) as canonical example of
        evolution without formal refinement claims. How: linear sigma_0 through sigma_5 DAG with
        new-method branch at sigma_2. When: deployed M.X vN with execution history, at least one
        gap candidate appearing across 3 or more sessions, and continuity requirement (must remain M.X).
    - gate: G1
      result: PASS
      note: >
        D_MEVO = (Sigma_MEVO, Ax_MEVO). 11 sorts declared: Method, DomainTheory, ExecutionEvidence,
        SessionLog, GateFailureRecord, GapRecord, VersionBoundary, ChangeManifest, RefinementClaim,
        ConservativeExtension, CompilationResult. 7 predicates typed over declared sorts:
        has_sufficient_evidence, conservative_extension, axiom_revised, closes_gap,
        preserves_initial_states, no_new_composability_failures, refines. All 8 axioms are
        closed sentences — no free variables. No undefined sort references.
    - gate: G2
      result: PASS
      note: >
        O_MEVO expressible over Sigma_MEVO as conjunction of six conditions, all referencing
        declared sorts (GapRecord, VersionBoundary, ChangeManifest, RefinementClaim, CompilationResult).
        Progress preorder declared as lexicographic ordering on (mu_1, mu_2, mu_3) with rationale.
        Three measures declared: mu_1 (gap coverage), mu_2 (refinement claim completeness), mu_3
        (compilation passage rate), each with formula and range [0.0, 1.0]. Session delta formula
        declared. Well-founded: each measure bounded and decreasing under correct execution.
    - gate: G3
      result: PASS
      note: >
        Three roles with non-empty observation projections and authority claims. Analyst observes
        ExecutionEvidence and M.X vN step specifications; authorized to emit GapRecords, discard
        single-session failures; explicitly CANNOT design fixes. Evolver observes M.X vN + GapRecord
        set + F1-FTH; authorized to declare VersionBoundary and design changes; CANNOT revise
        gap records. Compiler observes candidate + F1-FTH only; authorized to emit PASS or FAIL.
        Coverage claim: union covers all of Mod(D_MEVO). Authority claim: union covers all transitions
        required for O_MEVO. Role partition rationale documented in section 2.
    - gate: G4
      result: PASS
      note: >
        Gamma_MEVO is a linear DAG (sigma_0 through sigma_5) with a branch at sigma_2 (new-method
        path exits the method; routes to M1-MDES). Composability claims at all five edges
        documented in section 6, each showing post_{sigma_i} satisfies pre_{sigma_j}. Terminal
        condition claim: post_{sigma_5}(PASS) implies O_MEVO. Initial condition claim: pre_{sigma_0}
        satisfied by any deployed M.X vN with at least 1 session in execution history. Contrarian
        challenge documented: weakest edge is sigma_4 to sigma_5 (self-reported assembly_confirmation);
        defense is that G5 at sigma_5 catches guidance-schema mismatches that superficial confirmation
        would miss. Termination certificate nu_MEVO declared in section 8.
    - gate: G5
      result: PASS
      note: >
        All six steps (sigma_0 through sigma_5) have finalized guidance text. All steps lead with
        a Constraints block before any Guidance or Procedure text — constraints-first format
        satisfied throughout. The insight-preservation constraint added to sigma_4 is integrated
        into the existing Constraints block, not replacing or weakening any prior constraint.
        No step has INADEQUATE or placeholder guidance. Adequacy: each Constraints block names
        specific checkable conditions; guidance provides decision procedures for each constraint.
    - gate: G6
      result: PASS
      note: >
        This file (M3-MEVO/M3-MEVO.yaml). Structurally complete: all 6 phases declared
        with id, name, role, precondition, postcondition, guidance, output_schema, and invariants.
        Roles section complete with phases arrays. Domain theory section declares all 11 sorts,
        7 predicates, and 8 axioms. Measures and objective declared. insight_preservation_check
        field added to sigma_4 output_schema with hard invariants. compilation_record section
        added with all 7 gates. No undefined variable references.
