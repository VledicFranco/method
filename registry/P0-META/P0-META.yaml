methodology:
  id: P0-META
  name: "Genesis Methodology for the Meta-Method Family"
  formal_type: "Phi = (D_Phi, delta_Phi, O_Phi)"
  version: "1.2"
  status: compiled
  compilation_date: "2026-03-14"
  formal_grounding: "theory/F1-FTH.md §7"
  source_document: "P0-META/P0-META.md"
  supersedes: "P0-META/M1-MDES/family-proposals.md"
  changes_from_v1_2: >
    Tier-1 compliance fixes (2026-03-14): declared domain: Method -> Domain function symbol
    (used in arm 2 but previously undeclared — G1 violation); corrected progress preorder
    direction (both inequalities were inverted — terminal states were not maximal under v1.1
    definition). Tier-2 fixes: unified high_gap/high_gaps notation (Boolean predicate vs
    set comprehension now explicit); corrected arm 8 expansion note to use declared arm labels.
  changes_from_v1_0: >
    Tier-1 compliance fixes (2026-03-14): declared nat sort; added in_meta_family,
    deprecated, self_consistent predicates to Pi; added active_registry predicate (Tier-2);
    fixed Ax-1 (mutual exclusion with deprecated); added Ax-7 (deprecated exclusion),
    Ax-8 (active_registry uniqueness); fixed Ax-6 (meta_family -> in_meta_family);
    fixed delta_META arm 5 (deprecated guard); O_META and nu_META de-parametrized from T
    via active_registry; renamed derived_predicates section with clarifying note;
    nu_META term clarified for M4-MINS and M7-DTID arms.

domain_theory:
  id: D_META
  reference: "P0-META/P0-META.md §1"
  sorts:
    - name: Method
      cardinality: unbounded
      description: "A formal method M = (D, Roles, Gamma, O, mu_vec)"
    - name: Methodology
      cardinality: unbounded
      description: "A formal methodology Phi = (D_Phi, delta_Phi, O_Phi)"
    - name: MethodID
      cardinality: infinite
      description: "Opaque string identifier e.g. P0-META.M1-MDES"
    - name: Status
      cardinality: finite
      values: [proposed, compiled, deprecated]
      description: "Compilation status of a method"
    - name: Gap
      cardinality: unbounded
      description: "A named execution gap with associated execution evidence"
    - name: Severity
      cardinality: finite
      values: [LOW, MEDIUM, HIGH, CRITICAL]
      description: "Severity rating of a Gap record"
    - name: ProjectContext
      cardinality: unbounded
      description: "A project deployment context: tech stack, team, constraints"
    - name: TargetRegistry
      cardinality: unbounded
      description: "A finite declared set of MethodIDs bounding one META run"
    - name: LifecyclePosition
      cardinality: finite
      values: [discovery, design, evolution, instantiation, composition, audit, derivation]
      description: "Which lifecycle stage a meta-method occupies"
    - name: Domain
      cardinality: unbounded
      description: "A many-sorted signature+axioms pair D = (Sigma, Ax)"
    - name: nat
      cardinality: infinite
      description: "Natural numbers — codomain of target_size; built-in numeric type, not a domain entity"

  function_symbols:
    - name: status
      signature: "Method -> Status"
      totality: total
    - name: lifecycle_pos
      signature: "Method -> LifecyclePosition"
      totality: total
    - name: severity
      signature: "Gap -> Severity"
      totality: total
    - name: target_size
      signature: "TargetRegistry -> nat"
      totality: total
      note: "cardinality of the declared target scope; Ax-5 guarantees this is finite"
    - name: domain
      signature: "Method -> Domain"
      totality: total
      note: "the domain theory of a method; used in arm 2 to test whether a domain sketch is already covered by an in-scope method"

  predicates:
    - name: compiled
      signature: "Method"
      description: "m has passed G0-G6 under M1-MDES"
    - name: proposed
      signature: "Method"
      description: "m exists as a design proposal, not yet compiled"
    - name: deprecated
      signature: "Method"
      description: "m has been formally retired — no longer actively maintained or instantiated"
    - name: has_gap
      signature: "Method x Gap"
      description: "gap g has been identified in compiled method m from execution evidence"
    - name: needs_instantiation
      signature: "Method x ProjectContext"
      description: "m needs a project instance for ctx"
    - name: composable_pair
      signature: "Method x Method"
      description: "C1/C2 composability holds (F5-MCOM) between m1 and m2"
    - name: has_impl_target
      signature: "Method"
      description: "m's domain theory has a software implementation target for M7-DTID"
    - name: informal_practice
      signature: "Domain"
      description: "domain d has informal practice not yet methodized"
    - name: domain_sketch_ready
      signature: "Domain"
      description: "d has a domain sketch ready for MDES sigma_0 input"
    - name: in_scope
      signature: "Method x TargetRegistry"
      description: "m is declared in target registry T"
    - name: composition_in_scope
      signature: "Method x Method x TargetRegistry"
      description: "the composite of m1;m2 is a declared target in T"
    - name: in_meta_family
      signature: "Method"
      description: "m is a member of the P0-META repertoire (M1-MDES, M2-MDIS, M3-MEVO, M4-MINS, M5-MCOM, M6-MAUD, M7-DTID)"
    - name: self_consistent
      signature: "Method"
      description: >
        m passes M1-MDES sigma_6 self-application gate — its domain theory is internally
        consistent with all gates holding. Operationalized by running M1-MDES sigma_6
        against m. Promoted from known_wip to formal predicate in v1.1.
    - name: active_registry
      signature: "TargetRegistry"
      description: >
        T is the target registry declared for the current META run. Exactly one T satisfies
        this predicate at any time (Ax-8). Encodes the scope parameter as a state component,
        making O_META and nu_META proper predicates over Mod(D_META) with no free parameters.

  defined_predicates_note: >
    The following are Sigma-definable abbreviations — closed formulas expressible entirely
    in the primitive predicates of Pi above. They are defined symbols, not primitive
    predicate symbols; their semantics is fully determined by their definition. They
    appear in O_META, nu_META, and delta_META conditions as abbreviations only.
  defined_predicates:
    - name: high_gap
      signature: "Method"
      definition: "exists g. has_gap(m, g) AND severity(g) IN {HIGH, CRITICAL}"
    - name: compiled_clean
      signature: "Method x TargetRegistry"
      definition: "in_scope(m, T) AND compiled(m) AND NOT high_gap(m)"

  axioms:
    - id: Ax-1
      statement: "forall m. compiled(m) -> NOT proposed(m) AND NOT deprecated(m)"
      rationale: "Compilation is a terminal active status; compiled methods are neither proposals nor retired."
    - id: Ax-2
      statement: "forall m g. has_gap(m, g) -> compiled(m)"
      rationale: "Gaps exist only for compiled methods. Proposed methods have incompleteness, not gaps."
    - id: Ax-3
      statement: "forall m1 m2. composable_pair(m1, m2) -> compiled(m1) AND compiled(m2)"
      rationale: "Only compiled methods form composable pairs."
    - id: Ax-4
      statement: "forall m ctx. needs_instantiation(m, ctx) -> compiled(m)"
      rationale: "Only compiled methods are instantiated."
    - id: Ax-5
      statement: "forall T. target_size(T) in nat"
      rationale: "Target scope is finite — foundational condition for nu_META."
    - id: Ax-6
      statement: "forall m. in_meta_family(m) AND compiled(m) -> lifecycle_pos(m) in {design, evolution, instantiation, composition, audit, derivation}"
      rationale: "Every compiled meta-method occupies a defined lifecycle position; discovery is pre-compile only."
    - id: Ax-7
      statement: "forall m. deprecated(m) -> NOT compiled(m) AND NOT proposed(m)"
      rationale: "Deprecated methods are formally retired; mutually exclusive with compiled and proposed."
    - id: Ax-8
      statement: "exists! T. active_registry(T)"
      rationale: >
        Exactly one target registry is active at any META run, declared by the meta-architect
        at initialization. Encodes T as a proper state component, eliminating the free parameter
        from O_META and nu_META. (Tier-2 fix — promotes T from parameter to state predicate.)

roles:
  - id: meta-architect
    description: >
      Strategic role that evaluates delta_META, dispatches meta-methods, receives
      results, and updates registry state. Holds full D_META observability — no
      information is withheld. The meta-architect does not execute the dispatched
      method directly; it invokes and records.
    observation_projection:
      sub_theory: D_META
      note: "pi_{meta-arch} = id — full domain visibility required to evaluate delta_META"
    authorized_transitions:
      - "Declare a target registry T by asserting active_registry(T) in the initial state (Ax-8)"
      - "Invoke any compiled method in the meta-family repertoire per delta_META"
      - "Record method completion: mark compiled, close gap records, register instances"
      - "Extend T when new work is discovered mid-run (with justification)"
      - "Terminate when O_META satisfied"
    not_authorized:
      - "Execute the dispatched meta-method directly"
      - "Modify gap severity records retroactively"
      - "Evaluate delta_META without a declared target registry T (active_registry must hold)"
    coverage_claim: "G3-C1: all D_META predicates used in delta_META are in Sigma_{meta-arch}"
    authority_claim: "G3-C2: all registry state changes produced by delta_META outputs are in alpha_{meta-arch}"

objective:
  formal_statement: >
    O_META(s) ≡
      (forall T. active_registry(T) ->
        forall m. in_scope(m, T) -> compiled_clean(m, T))
      AND (forall m. in_meta_family(m) AND compiled(m) -> self_consistent(m))
  note: >
    T is state-encoded via active_registry(T) (Ax-8) — O_META is a proper predicate
    over Mod(D_META) with no free parameters. self_consistent is now a formal predicate
    in D_META (v1.1); operationalized by running M1-MDES sigma_6 against m.

  progress_preorder:
    statement: >
      s1 ≼ s2 iff
        (let T1 = unique T s.t. active_registry(T, s1); T2 = unique T s.t. active_registry(T, s2)):
        |{m | compiled_clean(m, T1)}|_s1 <= |{m | compiled_clean(m, T2)}|_s2
        AND |{m | high_gap(m) AND in_scope(m, T1)}|_s1 >= |{m | high_gap(m) AND in_scope(m, T2)}|_s2
    note: >
      Product preorder — both components must hold. s1 ≼ s2 means s2 has made at least as much
      progress toward O_META as s1: s2 has >= compiled_clean methods and <= high-gap methods.
      Terminal states are maximal (all in-scope methods are compiled_clean, zero high_gap methods).
      T read from state via active_registry. Corrected from v1.1 (direction was inverted).

  success_profile:
    - id: mu_1
      name: registry_completeness
      formula: "|{m | compiled_clean(m, T)}|_s / target_size(T)"
      range: "[0, 1]"
      priority: 1
    - id: mu_2
      name: gap_cleanliness
      formula: "1 - |{m | in_scope(m, T) AND high_gap(m)}|_s / max(1, |{m | in_scope(m, T) AND compiled(m)}|_s)"
      range: "[0, 1]"
      priority: 2
    - id: mu_3
      name: meta_family_health
      formula: "|{m | in_meta_family(m) AND self_consistent(m)}(s)| / |{m | in_meta_family(m)}(s)|"
      range: "[0, 1]"
      priority: 3
  success_profile_note: "Lexicographic priority: mu_1 > mu_2 > mu_3. T resolved via active_registry(T, s)."

transition_function:
  id: delta_META
  evaluation_order: priority_stack
  note: >
    Conditions evaluated in strict priority order. First condition that holds
    determines the selection. If none holds, returns None (terminate).
  arms:
    - priority: 1
      label: gap_severity_first
      condition: "exists m in T. high_gap(m, s)"
      selects: M3-MEVO
      tiebreak: "highest severity gap first; within same severity, earlier lifecycle_pos wins"
      rationale: >
        A compiled method with a HIGH/CRITICAL gap is actively degraded.
        Repair precedes all new work — building on a broken base compounds problems.

    - priority: 2
      label: lifecycle_design
      condition: "exists d. domain_sketch_ready(d, s) AND NOT exists m in T. domain(m) = d"
      selects: M1-MDES
      rationale: >
        A domain sketch is ready but no compiled method covers it.
        Design unblocks instantiation and composition downstream.

    - priority: 3
      label: lifecycle_instantiation
      condition: "exists m in T. compiled(m, s) AND exists ctx. needs_instantiation(m, ctx, s)"
      selects: M4-MINS
      rationale: >
        A compiled method has a declared project context needing a specialized instance.
        Instantiation makes methods practically usable.

    - priority: 4
      label: structural_composition
      condition: "exists m1 m2 in T. composable_pair(m1, m2, s) AND composition_in_scope(m1, m2, T)"
      selects: M5-MCOM
      rationale: >
        Two compiled methods are composable and the composite is a declared target.
        Composition extends the method family's algebraic structure.

    - priority: 5
      label: structural_audit
      condition: "exists m in T. NOT compiled(m, s) AND NOT proposed(m, s) AND NOT deprecated(m, s)"
      selects: M6-MAUD
      rationale: >
        An informal method (no formal record, not retired) is in scope. Audit formalizes
        it before informal practice drifts further from theory. Guard against deprecated
        methods added in v1.1 — deprecated methods do not route to M6-MAUD.

    - priority: 6
      label: implementation_derivation
      condition: "exists m in T. compiled(m, s) AND has_impl_target(m, s)"
      selects: M7-DTID
      rationale: >
        A compiled method has an identified software implementation target.
        Derivation grounds theory in executable artifacts (addresses P6).

    - priority: 7
      label: discovery_wip
      condition: "exists d. informal_practice(d, s) AND NOT domain_sketch_ready(d, s)"
      selects: M2-MDIS
      status: WIP
      callable: false
      wip_note: >
        M2-MDIS is proposed, not compiled. When this condition fires, the
        meta-architect records the domain and produces a minimal domain sketch manually.
        Arm becomes callable when M2-MDIS compiles.

    - priority: 8
      label: terminate
      condition: "O_META(s) OR (arms 1-7 all evaluate false)"
      selects: None
      note: >
        Formal expansion: NOT(gap_severity_first fires) AND NOT(lifecycle_design fires)
        AND NOT(lifecycle_instantiation fires) AND NOT(structural_composition fires)
        AND NOT(structural_audit fires) AND NOT(implementation_derivation fires)
        AND NOT(discovery_wip fires). Informal shorthand retained for readability.

termination:
  certificate_id: nu_META
  formula: >
    nu_META(s) =
      let T = unique TargetRegistry s.t. active_registry(T, s) in
      (target_size(T) - |{m | compiled_clean(m, T)}|_s) * W_method
      + sum_{m in T} |{g | has_gap(m, g) AND severity(g) IN {HIGH, CRITICAL}}|_s * W_gap
  weights:
    W_method: ">> W_gap (completing a method outweighs closing individual gaps)"
    W_gap: 1
    note: "Weight values are empirical carry-forwards; calibrate from first META runs"
  bound: "bounded above by target_size(T) * W_method + max_gaps * W_gap for fixed T"
  decrease_per_invocation:
    - arm: M1-MDES
      effect: "compiles one method → |compiled_clean| increases by >= 1 → first term strictly decreases"
    - arm: M3-MEVO
      effect: "closes HIGH gap → second term decreases by >= 1; if last gap on m, compiled_clean(m) holds → first term decreases"
    - arm: M4-MINS
      effect: "clears needs_instantiation(m, ctx) → arm 3 condition weakens"
      note: >
        nu_META does not directly decrease numerically for M4-MINS (instantiation does not
        increase compiled_clean or close gaps). Arm 3 fires only while instantiation is pending;
        once cleared it cannot re-fire for the same (m, ctx). Known-WIP: formal nu-decrease
        argument requires showing no arm 3 re-fire without prior arm-1 or arm-6 decrease.
    - arm: M5-MCOM
      effect: "compiles composite method → |compiled_clean| increases by 1 → first term strictly decreases"
    - arm: M6-MAUD
      effect: "formalizes informal method → promotes to proposed or compiled → arm 5 condition clears for m"
      note: "If audit result is compiled, first term decreases. If proposed, arm 5 clears and arm 2 may fire next."
    - arm: M7-DTID
      effect: "completes derivation → has_impl_target(m) no longer holds → arm 6 condition clears for m"
      note: >
        nu_META does not directly decrease numerically for M7-DTID (derivation does not
        increase compiled_clean or close gaps). Arm 6 fires only while impl target is pending.
        Known-WIP: formal nu-decrease argument mirrors M4-MINS case.

inter_method_coherence:
  retraction_pairs:
    - id: RP-1
      to: M1-MDES
      embed: "projects domain sketch and existing registry entries into D_MDES"
      project: "extracts compiled method; updates registry status to compiled"
    - id: RP-2
      to: M3-MEVO
      embed: "projects target method's execution evidence and gap record into D_MEVO"
      project: "extracts new method version; closes gap record"
    - id: RP-3
      to: M4-MINS
      embed: "projects compiled method and project context into D_MINS"
      project: "extracts instantiation artifacts; registers project instance"
    - id: RP-4
      to: M5-MCOM
      embed: "projects two target methods and domain interface into D_MCOM"
      project: "extracts composite method; registers in registry"
    - id: RP-5
      to: M6-MAUD
      embed: "projects informal method artifact into D_MAUD"
      project: "extracts MAUD report; updates method status"
      note: >
        D_MAUD is the domain theory of M6-MAUD. It shares structural overlap with D_MDES
        (the audit reviews the same gate structure) but is a distinct domain theory.
        D_MAUD requires explicit declaration when M6-MAUD compiles. Tier-2 open item:
        RP-5 embed/project cannot be formally verified until D_MAUD is declared.
    - id: RP-6
      to: M7-DTID
      embed: "projects compiled method and implementation target spec into D_DTID"
      project: "extracts IDD; registers against method; updates P6 status"
    - id: RP-7
      to: M2-MDIS
      status: WIP
      embed: >
        type-level sketch: embed_MDIS maps (domain d s.t. informal_practice(d) AND
        NOT domain_sketch_ready(d)) into D_MDIS as initial discovery state
      project: >
        type-level sketch: project_MDIS extracts domain_sketch_ready artifact,
        asserting domain_sketch_ready(d) in D_META state
      note: >
        M2-MDIS is proposed. Retraction pair declared at type level only; formal
        embed/project functions require D_MDIS declaration, which blocks on M2-MDIS compile.

known_wip:
  - id: M2-MDIS
    status: proposed
    delta_arm: priority_7
    workaround: "meta-architect produces minimal domain sketch manually when condition fires"
  - id: nu_META_weights
    status: open
    description: "W_method and W_gap have no calibrated values; first empirical runs will calibrate"
  - id: nu_META_M4_M7_decrease
    status: open
    description: >
      Arms M4-MINS and M7-DTID clear their firing conditions but do not directly decrease
      nu_META's numeric value. Formal termination argument requires showing these arms cannot
      re-fire without another arm having already strictly decreased nu_META.
  - id: D_MAUD_declaration
    status: open
    description: >
      M6-MAUD's domain theory D_MAUD is referenced in RP-5 but not formally declared.
      Requires M6-MAUD compile pass to produce D_MAUD specification. Blocks formal
      verification of RP-5 retraction condition.
