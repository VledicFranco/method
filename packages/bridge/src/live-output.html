<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{nickname}} — Live Output</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js"></script>
  <style>
:root {
  --void:       #050910;
  --deep-void:  rgba(2,5,10,.98);
  --abyssal:    #0e2030;
  --abyss:      #0b1c2b;
  --ocean:      #0c2a3c;
  --bio:        #00d4b0;
  --bio-bright: #00f0d0;
  --bio-dim:    rgba(0,212,176,.10);
  --solar:      #eeaa62;
  --solar-dim:  rgba(238,170,98,.08);
  --stellar:    #f4f8fc;
  --dim:        #c0d0de;
  --dim2:       #7a90a2;
  --nebular:    #9b7fd4;
  --muted:      #4a5c6a;
  --red:        #e05a5a;
  --font-d: 'Space Grotesk', system-ui, sans-serif;
  --font-b: 'Inter', system-ui, sans-serif;
  --font-m: 'JetBrains Mono', 'Consolas', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--void);
  color: var(--stellar);
  font-family: var(--font-b);
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── AGENT IDENTITY BANNER ───────────────────────── */
.agent-banner {
  background: rgba(11,28,43,.55);
  border-bottom: 1px solid rgba(255,255,255,.05);
  border-left: 2px solid var(--bio);
  padding: 1rem 1.5rem;
  flex-shrink: 0;
}

.banner-top {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: .4rem;
}

.banner-nickname {
  font-family: var(--font-d);
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--bio-bright);
  letter-spacing: -.02em;
}

.banner-status {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  font-family: var(--font-m);
  font-size: .65rem;
  font-weight: 500;
  padding: .15rem .5rem;
  border-radius: 2px;
}
.banner-status::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
}
.banner-status.ready { color: var(--bio); background: var(--bio-dim); }
.banner-status.ready::before { background: var(--bio); }
.banner-status.working { color: var(--solar); background: var(--solar-dim); }
.banner-status.working::before { background: var(--solar); animation: pulse 1.5s ease-in-out infinite; }
.banner-status.dead { color: var(--red); background: rgba(224,90,90,.10); }
.banner-status.dead::before { background: var(--red); opacity:.5; }
.banner-status.initializing { color: var(--dim2); background: rgba(122,144,162,.08); }
.banner-status.initializing::before { background: var(--dim2); animation: pulse 2s ease-in-out infinite; }

.banner-id {
  font-family: var(--font-m);
  font-size: .62rem;
  color: var(--dim2);
  margin-left: auto;
}

.banner-purpose {
  font-family: var(--font-b);
  font-size: .92rem;
  color: var(--stellar);
  margin-bottom: .35rem;
}

.banner-meta {
  font-family: var(--font-m);
  font-size: .68rem;
  color: var(--dim2);
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.banner-meta span { white-space: nowrap; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .3; }
}

/* ── TERMINAL AREA ───────────────────────────────── */
.terminal-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
  background: var(--deep-void);
}

#terminal {
  flex: 1;
  min-height: 0;
}

/* xterm.js overrides for Vidtecci theme */
#terminal .xterm {
  padding: 8px 12px;
}

.scroll-lock-btn {
  position: absolute;
  bottom: 4.5rem;
  right: 1.5rem;
  font-family: var(--font-m);
  font-size: .62rem;
  color: var(--bio);
  background: rgba(5,9,16,.9);
  border: 1px solid rgba(0,212,176,.2);
  border-radius: 2px;
  padding: .3rem .6rem;
  cursor: pointer;
  display: none;
  z-index: 10;
}
.scroll-lock-btn:hover {
  background: var(--bio-dim);
}
.scroll-lock-btn.active {
  color: var(--solar);
  border-color: rgba(238,170,98,.3);
}

/* ── INPUT BAR ───────────────────────────────────── */
.input-bar {
  background: rgba(11,28,43,.55);
  border-top: 1px solid rgba(255,255,255,.05);
  padding: .75rem 1.5rem;
  display: flex;
  gap: .75rem;
  flex-shrink: 0;
}

.input-bar input {
  flex: 1;
  background: rgba(5,9,16,.6);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 2px;
  color: var(--stellar);
  font-family: var(--font-m);
  font-size: .78rem;
  padding: .5rem .75rem;
  outline: none;
  transition: border-color .2s;
}
.input-bar input:focus {
  border-color: rgba(0,212,176,.3);
}
.input-bar input::placeholder {
  color: var(--muted);
}

.input-bar button {
  background: rgba(0,212,176,.1);
  border: 1px solid rgba(0,212,176,.25);
  border-radius: 2px;
  color: var(--bio);
  font-family: var(--font-m);
  font-size: .72rem;
  padding: .5rem 1rem;
  cursor: pointer;
  transition: background .2s;
}
.input-bar button:hover { background: rgba(0,212,176,.2); }
.input-bar button:disabled { opacity: .4; cursor: not-allowed; }

/* ── NAV ─────────────────────────────────────────── */
.nav-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: .5rem 1.5rem;
  background: rgba(5,9,16,.4);
  border-bottom: 1px solid rgba(255,255,255,.03);
  flex-shrink: 0;
}

.nav-link {
  font-family: var(--font-m);
  font-size: .62rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--dim2);
  text-decoration: none;
  transition: color .2s;
}
.nav-link:hover { color: var(--bio); }
.nav-sep { color: var(--muted); font-size: .7rem; }

/* ── MOBILE RESPONSIVE ─────────────────────────────── */
@media (max-width: 768px) {
  .agent-banner {
    padding: .75rem 1rem;
  }

  .banner-nickname {
    font-size: 1.1rem;
  }

  .banner-meta {
    gap: .75rem;
    font-size: .6rem;
  }

  .banner-meta span {
    white-space: normal;
  }

  .banner-top {
    flex-wrap: wrap;
    gap: .5rem;
  }

  .banner-id {
    margin-left: 0;
    width: 100%;
  }

  body {
    height: 100dvh; /* dynamic viewport height — accounts for mobile browser chrome */
  }

  .terminal-container {
    min-height: 40vh;
  }

  .input-bar {
    padding: .5rem .75rem;
    position: sticky;
    bottom: 0;
    z-index: 10;
    background: rgba(11,28,43,.95);
  }

  .input-bar input {
    font-size: .9rem;
    padding: .65rem .75rem;
    min-height: 44px;
  }

  .input-bar button {
    font-size: .78rem;
    padding: .65rem 1.25rem;
    min-height: 44px;
  }

  .nav-bar {
    padding: .5rem 1rem;
  }

  .scroll-lock-btn {
    bottom: 5rem;
    right: .75rem;
    min-height: 44px;
    min-width: 44px;
    display: none;
    padding: .4rem .75rem;
  }
}
  </style>
</head>
<body>

<nav class="nav-bar">
  <a href="/dashboard" class="nav-link">Dashboard</a>
  <span class="nav-sep">/</span>
  <span class="nav-link" style="color:var(--bio);">{{nickname}}</span>
  <span class="nav-sep">/</span>
  <span class="nav-link" style="color:var(--stellar);">Live Output</span>
</nav>

<div class="agent-banner">
  <div class="banner-top">
    <span class="banner-nickname">{{nickname}}</span>
    <span class="banner-status {{statusClass}}">{{status}}</span>
    <span class="banner-id">{{shortId}} &middot; {{uptime}}</span>
  </div>
  <div class="banner-purpose">{{purpose}}</div>
  <div class="banner-meta">
    <span>workdir {{workdir}}</span>
    <span>method {{methodSid}}</span>
    <span>tokens {{tokens}}</span>
    <span>cache {{cache}}</span>
  </div>
</div>

<div class="terminal-container">
  <div id="terminal"></div>
  <button class="scroll-lock-btn" id="scroll-btn" onclick="toggleScrollLock()">Scroll lock: OFF</button>
</div>

<div class="input-bar">
  <input type="text" id="prompt-input" placeholder="Send a prompt..." onkeydown="if(event.key==='Enter')sendPrompt()">
  <button onclick="sendPrompt()" id="send-btn">Send</button>
</div>

<script>
var sessionId = '{{sessionId}}';
var scrollLock = false;
var eventSource = null;

// ── Initialize xterm.js ──
var term = new Terminal({
  fontFamily: 'JetBrains Mono, Consolas, monospace',
  fontSize: 13,
  scrollback: 10000,
  cursorBlink: true,
  cursorStyle: 'bar',
  theme: {
    background: '#050910',
    foreground: '#f4f8fc',
    cursor: '#00d4b0',
    selectionBackground: 'rgba(0,212,176,0.2)',
    selectionForeground: '#f4f8fc',
    black: '#0b1c2b',
    red: '#e05a5a',
    green: '#00d4b0',
    yellow: '#eeaa62',
    blue: '#4a90d9',
    magenta: '#9b7fd4',
    cyan: '#00d4b0',
    white: '#c0d0de',
    brightBlack: '#4a5c6a',
    brightRed: '#ff6b6b',
    brightGreen: '#00f0d0',
    brightYellow: '#ffc078',
    brightBlue: '#6ab0f3',
    brightMagenta: '#b39ddb',
    brightCyan: '#00f0d0',
    brightWhite: '#f4f8fc'
  }
});

var fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));

// Detect proxy prefix and fix nav links
var API_BASE = window.location.pathname.indexOf('/api/') === 0 ? '/api' : '';
if (API_BASE) {
  document.querySelectorAll('a[href^="/dashboard"], a[href^="/sessions/"]').forEach(function(a) {
    var h = a.getAttribute('href');
    if (h && !h.startsWith(API_BASE)) a.setAttribute('href', API_BASE + h);
  });
}

// ── Resize: fit terminal and sync PTY dimensions ──
var resizeTimer = null;

function syncResize() {
  fitAddon.fit();
  var dims = fitAddon.proposeDimensions();
  if (dims && dims.cols && dims.rows) {
    fetch(API_BASE + '/sessions/' + sessionId + '/resize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cols: dims.cols, rows: dims.rows })
    }).catch(function() { /* resize sync failure is non-fatal */ });
  }
}

function debouncedResize() {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(syncResize, 200);
}

// Initial fit + sync
syncResize();

// Refit on window resize (debounced)
window.addEventListener('resize', debouncedResize);

// ── Scroll lock toggle ──
var scrollBtn = document.getElementById('scroll-btn');

function toggleScrollLock() {
  scrollLock = !scrollLock;
  scrollBtn.textContent = 'Scroll lock: ' + (scrollLock ? 'ON' : 'OFF');
  scrollBtn.classList.toggle('active', scrollLock);
  if (!scrollLock) {
    term.scrollToBottom();
  }
}

// Show scroll lock button when user scrolls up
term.element.addEventListener('wheel', function(e) {
  if (e.deltaY < 0) {
    // Scrolling up — show button
    scrollBtn.style.display = 'block';
  }
});

// ── SSE connection ──
function connectSSE() {
  eventSource = new EventSource(API_BASE + '/sessions/' + sessionId + '/stream');
  eventSource.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data.text) {
        term.write(data.text);
        if (!scrollLock) {
          term.scrollToBottom();
        }
      }
    } catch (err) {}
  };
  eventSource.onerror = function() {
    eventSource.close();
    setTimeout(connectSSE, 3000);
  };
}

// ── Send prompt ──
function sendPrompt() {
  var input = document.getElementById('prompt-input');
  var btn = document.getElementById('send-btn');
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  btn.disabled = true;
  btn.textContent = 'Sending...';

  fetch(API_BASE + '/sessions/' + sessionId + '/prompt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: text })
  }).catch(function(e) {
    term.write('\r\n[Error sending prompt: ' + e.message + ']\r\n');
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = 'Send';
    input.focus();
  });
}

connectSSE();
</script>

</body>
</html>
