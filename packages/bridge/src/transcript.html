<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}} — Transcript</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --void:       #050910;
  --abyssal:    #0e2030;
  --abyss:      #0b1c2b;
  --ocean:      #0c2a3c;
  --bio:        #00d4b0;
  --bio-bright: #00f0d0;
  --bio-dim:    rgba(0,212,176,.10);
  --solar:      #eeaa62;
  --solar-dim:  rgba(238,170,98,.08);
  --stellar:    #f4f8fc;
  --dim:        #c0d0de;
  --dim2:       #7a90a2;
  --nebular:    #9b7fd4;
  --nebular-dim: rgba(155,127,212,.10);
  --muted:      #4a5c6a;
  --red:        #e05a5a;
  --font-d: 'Space Grotesk', system-ui, sans-serif;
  --font-b: 'Inter', system-ui, sans-serif;
  --font-m: 'JetBrains Mono', 'Consolas', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--void);
  color: var(--stellar);
  font-family: var(--font-b);
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── NAV ─────────────────────────────────────────── */
.nav-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: .5rem 1.5rem;
  background: rgba(5,9,16,.4);
  border-bottom: 1px solid rgba(255,255,255,.03);
  flex-shrink: 0;
}

.nav-link {
  font-family: var(--font-m);
  font-size: .62rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--dim2);
  text-decoration: none;
  transition: color .2s;
}
.nav-link:hover { color: var(--bio); }
.nav-sep { color: var(--muted); font-size: .7rem; }

/* ── AGENT BANNER ──────────────────────────────── */
.agent-banner {
  background: rgba(11,28,43,.55);
  border-bottom: 1px solid rgba(255,255,255,.05);
  border-left: 2px solid var(--bio);
  padding: 1rem 1.5rem;
  flex-shrink: 0;
}

.banner-top {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: .3rem;
}

.banner-nickname {
  font-family: var(--font-d);
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--bio-bright);
}

.banner-meta {
  font-family: var(--font-m);
  font-size: .68rem;
  color: var(--dim2);
  display: flex;
  gap: 1.5rem;
}

/* ── TRANSCRIPT AREA ─────────────────────────────── */
.transcript-container {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 2rem;
}

.turn {
  margin-bottom: 1.25rem;
  padding: .75rem 1rem;
  border-radius: 2px;
  position: relative;
}

.turn-user {
  border-left: 2px solid rgba(238,170,98,.35);
  background: var(--solar-dim);
}

.turn-assistant {
  border-left: 2px solid rgba(0,212,176,.2);
  background: rgba(11,28,43,.3);
}

.turn-header {
  display: flex;
  align-items: baseline;
  gap: .75rem;
  margin-bottom: .4rem;
}

.turn-role {
  font-family: var(--font-m);
  font-size: .62rem;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.turn-user .turn-role { color: var(--solar); }
.turn-assistant .turn-role { color: var(--bio); }

.turn-time {
  font-family: var(--font-m);
  font-size: .58rem;
  color: var(--muted);
}

.turn-tokens {
  font-family: var(--font-m);
  font-size: .56rem;
  color: var(--dim2);
  margin-left: auto;
}

.turn-content {
  font-family: var(--font-b);
  font-size: .88rem;
  line-height: 1.6;
  color: var(--dim);
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── TOOL CALLS ──────────────────────────────────── */
.tool-calls {
  margin-top: .6rem;
}

.tool-call {
  border-left: 2px solid rgba(155,127,212,.25);
  background: var(--nebular-dim);
  padding: .4rem .75rem;
  margin-bottom: .35rem;
  border-radius: 0 2px 2px 0;
  cursor: pointer;
}

.tool-call-header {
  display: flex;
  align-items: center;
  gap: .5rem;
  font-family: var(--font-m);
  font-size: .68rem;
}

.tool-call-name {
  color: var(--nebular);
  font-weight: 500;
}

.tool-call-toggle {
  color: var(--muted);
  font-size: .56rem;
}

.tool-call-input {
  display: none;
  margin-top: .3rem;
  font-family: var(--font-m);
  font-size: .65rem;
  color: var(--dim2);
  white-space: pre-wrap;
  word-break: break-word;
}

.tool-call.expanded .tool-call-input { display: block; }
.tool-call.expanded .tool-call-toggle::after { content: '▾'; }
.tool-call:not(.expanded) .tool-call-toggle::after { content: '▸'; }

/* ── SUMMARY ─────────────────────────────────────── */
.summary-bar {
  background: rgba(11,28,43,.55);
  border-top: 1px solid rgba(255,255,255,.05);
  padding: .6rem 1.5rem;
  display: flex;
  gap: 2rem;
  flex-shrink: 0;
  font-family: var(--font-m);
  font-size: .65rem;
  color: var(--dim2);
}

.summary-bar span { white-space: nowrap; }
.summary-bar .val { color: var(--dim); font-weight: 500; }

/* ── EMPTY STATE ─────────────────────────────────── */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--muted);
  font-family: var(--font-m);
  font-size: .82rem;
}
  </style>
</head>
<body>

<nav class="nav-bar">
  <a href="/dashboard" class="nav-link">Dashboard</a>
  <span class="nav-sep">/</span>
  <span class="nav-link" style="color:var(--bio);">{{nickname}}</span>
  <span class="nav-sep">/</span>
  <span class="nav-link" style="color:var(--stellar);">Transcript</span>
</nav>

{{banner}}

<div class="transcript-container">
  {{turns}}
</div>

{{summary}}

<script>
document.querySelectorAll('.tool-call').forEach(function(el) {
  el.addEventListener('click', function() {
    el.classList.toggle('expanded');
  });
});
</script>

</body>
</html>
