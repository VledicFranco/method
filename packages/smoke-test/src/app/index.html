<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Methodology Smoke Tests</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="top-nav">
    <div class="brand">Methodology Smoke Tests</div>
    <nav class="nav-links">
      <a href="#/layers" data-route="layers">Layers</a>
      <a href="#/features" data-route="features">Features</a>
    </nav>
    <button id="run-all-btn" class="btn-run-all" type="button">Run All (mock)</button>
  </header>

  <main id="view-root" aria-live="polite"></main>

  <footer id="run-all-panel" class="run-all-panel" hidden>
    <div class="rap-header">
      <span class="rap-title">Run All</span>
      <div class="rap-counts">
        <span class="c-pass"><span data-c="pass">0</span> passed</span>
        <span class="c-fail"><span data-c="fail">0</span> failed</span>
        <span class="c-running"><span data-c="running">0</span> running</span>
        <span class="c-total">of <span data-c="total">0</span></span>
      </div>
      <button id="run-all-close" class="rap-close" type="button" aria-label="close">&times;</button>
    </div>
    <div class="rap-list" id="run-all-list"></div>
  </footer>

  <!--
    C-7 deliverable: client modules inlined as a single ES module block.
    Rationale: server.ts (forbidden in C-7 scope) currently only serves
    /, /styles.css, and /api/*. Until server gains a static asset
    handler, the client lives here. Module boundaries preserved via
    const namespaces (API, Badge, Router, RunAllPanel, LayerStackView)
    so extraction to packages/smoke-test/src/app/client/** is a
    mechanical follow-up.
  -->
  <script type="module">
    // ────────────────────────────────────────────────────────────
    // API — fetch wrappers over the smoke-test HTTP surface (PRD 056 §Surface 5)
    // ────────────────────────────────────────────────────────────
    const API = {
      async getLayers()   { return (await fetch('/api/layers')).json(); },
      async getClusters() { return (await fetch('/api/clusters')).json(); },
      async getFeatures() { return (await fetch('/api/features')).json(); },
      async getCases()    { return (await fetch('/api/cases')).json(); },
      /** Opens an SSE stream for a single case run. Returns the EventSource. */
      runCase(id) { return new EventSource(`/api/run/${encodeURIComponent(id)}`); },
      /** Opens an SSE stream for the full run-all flow. Returns the EventSource. */
      runAll() { return new EventSource('/api/run-all'); },
    };

    // ────────────────────────────────────────────────────────────
    // Badge components — layerBadge, coverageBadge
    // ────────────────────────────────────────────────────────────
    const Badge = {
      layerBadge(layerId, label) {
        const el = document.createElement('span');
        el.className = `layer-badge ${layerId}`;
        el.textContent = label ?? layerId;
        return el;
      },
      coverageBadge(status, text) {
        const el = document.createElement('span');
        el.className = `cov-badge ${status}`;
        el.textContent = text;
        return el;
      },
    };

    // ────────────────────────────────────────────────────────────
    // Router — hash-based; dispatches render/destroy
    // Registered routes: #/layers (default), #/features, #/feature/:id
    // ────────────────────────────────────────────────────────────
    const Router = (() => {
      const routes = new Map();
      let currentView = null;

      function register(name, view) { routes.set(name, view); }

      function parse(hash) {
        const clean = (hash || '').replace(/^#\/?/, '');
        if (!clean) return { route: 'layers', params: {} };
        const parts = clean.split('/');
        const head = parts[0];
        if (head === 'feature' && parts[1]) return { route: 'feature', params: { id: parts[1] } };
        return { route: head, params: {} };
      }

      async function dispatch() {
        const { route, params } = parse(location.hash);
        const view = routes.get(route);
        const root = document.getElementById('view-root');
        if (currentView && typeof currentView.destroy === 'function') {
          try { currentView.destroy(); } catch (err) { console.error('destroy error', err); }
        }
        root.innerHTML = '';
        if (!view) {
          root.innerHTML = `<div class="view-placeholder">Route <code>${route}</code> is not yet implemented. Pending commission (C-8 Feature Map, C-9 Feature Detail).</div>`;
          currentView = null;
        } else {
          currentView = view;
          try {
            await view.render(root, params);
          } catch (err) {
            console.error('[router] render error', err);
            root.innerHTML = `<div class="view-placeholder">Failed to render view: ${err?.message ?? err}</div>`;
          }
        }
        document.querySelectorAll('.top-nav .nav-links a').forEach((a) => {
          const match = a.dataset.route === route || (route === 'feature' && a.dataset.route === 'features');
          a.classList.toggle('active', match);
        });
      }

      function init() {
        window.addEventListener('hashchange', dispatch);
        if (!location.hash) location.hash = '#/layers';
        else dispatch();
      }

      return { register, init, dispatch };
    })();

    // ────────────────────────────────────────────────────────────
    // Run-All Panel — minimal counts + per-case status dots (D-5)
    // (C-9 will polish; C-7 ships the SSE wiring)
    // ────────────────────────────────────────────────────────────
    const RunAllPanel = (() => {
      const panelEl = document.getElementById('run-all-panel');
      const listEl  = document.getElementById('run-all-list');
      const closeBtn = document.getElementById('run-all-close');
      const counts = { pass: 0, fail: 0, running: 0, total: 0 };
      const rows = new Map();
      let source = null;

      function setCount(k, v) {
        counts[k] = v;
        const el = panelEl.querySelector(`[data-c="${k}"]`);
        if (el) el.textContent = String(v);
      }

      function reset() {
        for (const k of ['pass', 'fail', 'running', 'total']) setCount(k, 0);
        rows.clear();
        listEl.innerHTML = '';
      }

      function ensureRow(caseId) {
        let row = rows.get(caseId);
        if (row) return row;
        row = document.createElement('div');
        row.className = 'rap-row';
        const dot = document.createElement('span');
        dot.className = 'rap-dot';
        row.appendChild(dot);
        const id = document.createElement('span');
        id.className = 'rap-id';
        id.textContent = caseId;
        row.appendChild(id);
        const status = document.createElement('span');
        status.className = 'rap-status';
        status.textContent = '…';
        row.appendChild(status);
        listEl.appendChild(row);
        rows.set(caseId, row);
        return row;
      }

      function setRowStatus(caseId, cls, label) {
        const row = ensureRow(caseId);
        const dot = row.querySelector('.rap-dot');
        const status = row.querySelector('.rap-status');
        if (dot) dot.className = `rap-dot ${cls}`;
        if (status) status.textContent = label;
      }

      function show() { panelEl.hidden = false; }
      function hide() {
        panelEl.hidden = true;
        if (source) { source.close(); source = null; }
      }

      /**
       * Consumes one RunEvent from the /api/run-all SSE stream.
       * Server emits {type: 'case_started'|'case_completed'|'case_failed'|'parse_error',
       * caseId, allPassed?, error?, durationMs?, total?, completed?}.
       * Treat case_completed+allPassed===true as pass; anything else terminal as fail.
       */
      function update(ev) {
        const caseId = ev.caseId ?? 'unknown';
        if (typeof ev.total === 'number' && ev.total !== counts.total) {
          setCount('total', ev.total);
        }
        if (ev.type === 'case_started') {
          setRowStatus(caseId, 'running', 'running…');
          setCount('running', counts.running + 1);
          return;
        }
        if (ev.type === 'case_completed' || ev.type === 'case_failed' || ev.type === 'parse_error') {
          const passed = ev.type === 'case_completed' && ev.allPassed === true;
          const label = passed
            ? `PASS${typeof ev.durationMs === 'number' ? ` (${ev.durationMs}ms)` : ''}`
            : ev.error ? `FAIL: ${String(ev.error).slice(0, 100)}` : 'FAIL';
          setRowStatus(caseId, passed ? 'pass' : 'fail', label);
          setCount('running', Math.max(0, counts.running - 1));
          if (passed) setCount('pass', counts.pass + 1);
          else setCount('fail', counts.fail + 1);
        }
      }

      function start() {
        reset();
        show();
        if (source) source.close();
        source = API.runAll();
        source.onmessage = (msg) => {
          try { update(JSON.parse(msg.data)); }
          catch (err) { console.error('[run-all] parse error', err, msg.data); }
        };
        source.onerror = () => {
          if (source && source.readyState === 2) { source.close(); source = null; }
        };
      }

      closeBtn.addEventListener('click', hide);
      return { show, hide, update, start };
    })();

    // ────────────────────────────────────────────────────────────
    // Layer Stack view — the C-7 deliverable
    // ────────────────────────────────────────────────────────────
    const ARROW_TOOLTIPS = {
      'methodology->method': 'Methodology selects which Method to run next',
      'method->strategy':    'Method orders Steps; each Step invokes a Strategy',
      'strategy->agent':     'Strategy invokes an Agent for each agent-typed node',
    };

    const LayerStackView = {
      async render(root) {
        const [layers, features] = await Promise.all([API.getLayers(), API.getFeatures()]);

        // Per-layer coverage rollup from the feature registry (single source of truth).
        const rollup = new Map();
        for (const l of layers) rollup.set(l.id, { total: 0, covered: 0 });
        for (const f of features) {
          const bucket = rollup.get(f.layerId);
          if (!bucket) continue;
          bucket.total += 1;
          if (f.coverage === 'covered') bucket.covered += 1;
        }

        const container = document.createElement('div');
        container.className = 'layer-stack-view';

        const intro = document.createElement('section');
        intro.innerHTML = `
          <h2>The Four Abstraction Layers</h2>
          <p class="intro">
            The method runtime operates across four nested layers. Each has a distinct
            responsibility and is tested independently. The layers <strong>compose top
            to bottom</strong>: Methodology selects Methods, a Method orders Steps,
            each Step invokes a Strategy, and a Strategy invokes Agents.
          </p>`;
        container.appendChild(intro);

        // Layer stack + composition arrows between every adjacent pair (D-4)
        const stack = document.createElement('div');
        stack.className = 'layer-stack';
        for (let i = 0; i < layers.length; i++) {
          stack.appendChild(renderLayerRow(layers[i], rollup.get(layers[i].id)));
          if (i < layers.length - 1) {
            stack.appendChild(renderCompArrow(layers[i].id, layers[i + 1].id));
          }
        }
        container.appendChild(stack);

        // Per-layer documentation
        const docs = document.createElement('div');
        docs.className = 'layer-docs';
        for (const layer of layers) docs.appendChild(renderLayerDoc(layer));
        container.appendChild(docs);

        root.appendChild(container);
      },
      destroy() { /* no timers/subscriptions */ },
    };

    function renderLayerRow(layer, bucket) {
      const row = document.createElement('div');
      row.className = `layer-row ${layer.id}`;
      row.id = `layer-row-${layer.id}`;
      row.addEventListener('click', () => {
        const doc = document.getElementById(`layer-doc-${layer.id}`);
        if (doc) doc.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      const label = document.createElement('div');
      label.className = `layer-label ${layer.id}`;
      label.innerHTML = `
        <div class="lname">${layer.name}</div>
        <div class="lsub">${layer.level} — ${levelSubtitle(layer.level)}</div>`;
      row.appendChild(label);

      const body = document.createElement('div');
      body.className = 'layer-body';

      const summary = document.createElement('div');
      summary.className = 'lsummary';
      summary.textContent = summaryLine(layer);
      body.appendChild(summary);

      const stats = document.createElement('div');
      stats.className = 'lstats';
      const covered = bucket?.covered ?? 0;
      const total   = bucket?.total ?? 0;
      const status  = total === 0 ? 'gap' : covered === total ? 'covered' : covered === 0 ? 'gap' : 'partial';
      const count = document.createElement('span');
      count.className = `lcount ${status}`;
      count.textContent = `${covered}/${total} features tested`;
      stats.appendChild(count);
      stats.appendChild(Badge.coverageBadge(status, status === 'covered' ? 'COVERED' : status === 'partial' ? 'PARTIAL' : 'NO COVERAGE'));
      stats.appendChild(levelPill(layer.level));
      body.appendChild(stats);

      const pills = document.createElement('div');
      pills.className = 'concept-pills';
      for (const c of layer.keyConcepts.slice(0, 6)) {
        const p = document.createElement('span');
        p.className = 'concept-pill';
        p.textContent = c;
        pills.appendChild(p);
      }
      body.appendChild(pills);

      row.appendChild(body);
      return row;
    }

    function renderCompArrow(fromId, toId) {
      const tip = ARROW_TOOLTIPS[`${fromId}->${toId}`] ?? `${fromId} → ${toId}`;
      const el = document.createElement('div');
      el.className = 'comp-arrow';
      el.title = tip;
      el.setAttribute('aria-label', tip);
      el.innerHTML = `<span class="glyph">&#9660;</span><span class="label">${tip}</span>`;
      return el;
    }

    function renderLayerDoc(layer) {
      const el = document.createElement('section');
      el.className = `layer-doc ${layer.id}`;
      el.id = `layer-doc-${layer.id}`;

      const h = document.createElement('h3');
      h.appendChild(Badge.layerBadge(layer.id, layer.name));
      h.appendChild(levelPill(layer.level));
      const htitle = document.createElement('span');
      htitle.textContent = `${layer.name} Layer`;
      h.appendChild(htitle);
      el.appendChild(h);

      const narr = document.createElement('p');
      narr.className = 'narrative';
      narr.textContent = layer.narrative;
      el.appendChild(narr);

      const lifeHead = document.createElement('div');
      lifeHead.className = 'doc-subhead';
      lifeHead.textContent = 'Lifecycle';
      el.appendChild(lifeHead);

      const life = document.createElement('div');
      life.className = 'lifecycle-pills';
      layer.lifecycle.forEach((op, idx) => {
        const pill = document.createElement('span');
        pill.className = 'lifecycle-pill';
        pill.textContent = op;
        life.appendChild(pill);
        if (idx < layer.lifecycle.length - 1) {
          const sep = document.createElement('span');
          sep.className = 'lifecycle-sep';
          sep.textContent = '→';
          life.appendChild(sep);
        }
      });
      el.appendChild(life);

      const conceptHead = document.createElement('div');
      conceptHead.className = 'doc-subhead';
      conceptHead.textContent = 'Key concepts';
      el.appendChild(conceptHead);

      const concepts = document.createElement('div');
      concepts.className = 'concept-pills';
      for (const c of layer.keyConcepts) {
        const p = document.createElement('span');
        p.className = 'concept-pill';
        p.textContent = c;
        concepts.appendChild(p);
      }
      el.appendChild(concepts);

      return el;
    }

    function levelPill(level) {
      const el = document.createElement('span');
      el.className = 'level-pill';
      el.textContent = level;
      return el;
    }

    function levelSubtitle(level) {
      switch (level) {
        case 'L4': return 'Coalgebraic Session';
        case 'L3': return 'Step DAG';
        case 'L2': return 'DAG Executor';
        case 'L1': return 'Pacta SDK';
        default:   return level;
      }
    }

    function summaryLine(layer) {
      const s = layer.narrative || '';
      const i = s.indexOf('. ');
      return i === -1 ? s : s.slice(0, i + 1);
    }

    // ────────────────────────────────────────────────────────────
    // Main — wire routes, Run All button, kick off initial render
    // ────────────────────────────────────────────────────────────
    Router.register('layers', LayerStackView);
    // 'features' + 'feature' routes are registered by C-8 and C-9.

    document.getElementById('run-all-btn').addEventListener('click', () => RunAllPanel.start());

    Router.init();
  </script>
</body>
</html>
