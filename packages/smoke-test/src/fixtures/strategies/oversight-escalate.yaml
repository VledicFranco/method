strategy:
  id: S-SMOKE-OVERSIGHT-ESCALATE
  name: "Oversight rule with escalation"
  version: "1.0"
  context:
    inputs:
      - { name: task_desc, type: string }
  capabilities:
    work: [implement]
  dag:
    nodes:
      - id: expensive-work
        type: methodology
        methodology: "P2-SD"
        method_hint: "M1-IMPL"
        capabilities: [work]
        inputs: [task_desc]
        outputs: [result]
  oversight:
    rules:
      - condition: "execution_metadata.cost_usd > 0.5"
        action: "escalate_to_human"
