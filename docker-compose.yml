services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: method
      POSTGRES_USER: method
      POSTGRES_PASSWORD: method
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U method -d method"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://method:method@db:5432/method
      PORT: 47821
    ports:
      - "47821:47821"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src/methodologies:/app/src/methodologies:ro

  web:
    build: ./web
    environment:
      API_URL: http://server:47821
      PORT: 47820
    ports:
      - "47820:47820"
    depends_on:
      - server

volumes:
  postgres_data:
