name: research-team
description: "goal-directed-loop × (Architect ; Scout ; Researcher ; Critic ; Synthesizer)"
version: "0.1.0"
phases:
  - id: 0
    name: "Context Loading"
    role: null
    guidance: |
      Phase 0 — Context Loading

      Before beginning any research on {{topic}}, inventory all prior work that already exists.

      Tasks:
      - Search memory files, prior research notes, related documents, earlier sessions on this topic
      - For each document found, note its name and what it contributes
      - Do NOT begin analysis or form opinions — only inventory

      If there is genuinely no prior work, submit:
        prior_documents: ["none — fresh start"]
        summary: "No prior work found. This is a fresh research session."

      Use these exact field names in your submission:
        prior_documents   — array of strings, at least 1 item (use ["none — fresh start"] if nothing exists)
        summary           — string (what was found and what each document contributes)

      Submit when: prior_documents is populated (at least one entry).
    output_schema:
      prior_documents:
        type: array
        items: string
        min_items: 1
        description: "Names or paths of prior documents found. Use ['none — fresh start'] if nothing exists."
      summary:
        type: string
        min_length: 1
        description: "What was found and what each document contributes"
    invariants:
      - id: prior_documents_min_one
        description: "prior_documents must be a non-empty array"
        hard: true
      - id: summary_non_empty
        description: "summary must be a non-empty string"
        hard: true

  - id: 1
    name: "Architect — Forethought"
    role: "Architect"
    guidance: |
      Phase 1 — Architect: Forethought

      You are acting as the Architect for this research session on {{topic}}.

      Define the session objective at three levels:

      Be level — What identity, values, or standards does good research on this topic embody?
        Example: "rigorous, citable, and honest about uncertainty"

      Do level — What must this session specifically accomplish?
        Example: "map the design space of MCP sampling patterns and identify trade-offs"

      Motor level — What is the concrete, inspectable deliverable?
        Example: "a structured summary covering 4+ design patterns with trade-off analysis"

      Then:

      1. Write at least 3 checkable acceptance criteria.
         BAD:  "The research is comprehensive"
         GOOD: "Covers at least 4 of the priority questions with cited sources"
         GOOD: "Each identified pattern has at least one concrete example"

      2. List at least 2 priority research questions this session must answer.
         These will guide the Scout and Researcher in later phases.

      3. Define what is explicitly out of scope.
         This prevents scope creep and makes expectations honest.

      Use these exact field names in your submission:
        be_level              — string (identity/values that success embodies)
        do_level              — string (what this session must specifically accomplish)
        motor_level           — string (the concrete, inspectable deliverable)
        acceptance_criteria   — array of strings, at least 3 items
        priority_questions    — array of strings, at least 2 items
        out_of_scope          — array of strings (can be empty)

      Submit when: all three levels defined, at least 3 criteria, at least 2 priority questions.
    output_schema:
      be_level:
        type: string
        min_length: 1
        description: "Identity/values that success embodies"
      do_level:
        type: string
        min_length: 1
        description: "What this session must specifically accomplish"
      motor_level:
        type: string
        min_length: 1
        description: "The concrete, inspectable deliverable"
      acceptance_criteria:
        type: array
        items: string
        min_items: 3
        description: "Checkable acceptance criteria — each must be falsifiable or measurable"
      priority_questions:
        type: array
        items: string
        min_items: 2
        description: "Priority research questions this session must answer"
      out_of_scope:
        type: array
        items: string
        min_items: 0
        description: "What is explicitly not part of this research session"
    invariants:
      - id: acceptance_criteria_min_three
        description: "acceptance_criteria must contain at least 3 items"
        hard: true
      - id: priority_questions_min_two
        description: "priority_questions must contain at least 2 items"
        hard: true
      - id: out_of_scope_present
        description: "out_of_scope should be defined (even if empty)"
        hard: false

  - id: 2
    name: "Scout — Territory Mapping"
    role: "Scout"
    guidance: |
      Phase 2 — Scout: Territory Mapping

      You are now acting as the Scout for {{topic}}.

      Your job is breadth, not depth. Map the territory — identify sources, do not evaluate them.

      Tasks:
      - List at least 3 sources relevant to {{topic}}
        (papers, documentation pages, codebases, articles, existing knowledge, prior art)
      - For each source, note which priority questions from Phase 1 it might address
      - Do NOT read deeply or form strong opinions yet — only identify what exists

      Write coverage_notes: which priority questions have good source coverage, and which
      look thin or missing. This guides the Researcher in Phase 3.

      Use these exact field names in your submission:
        sources          — array of strings, at least 3 items
        coverage_notes   — string (which priority questions have good coverage, which look thin)

      Submit when: at least 3 sources listed, coverage_notes written.
    output_schema:
      sources:
        type: array
        items: string
        min_items: 3
        description: "List of sources identified. Each entry: source name/URL and which priority questions it addresses."
      coverage_notes:
        type: string
        min_length: 1
        description: "Which priority questions have good coverage, which look thin or missing"
    invariants:
      - id: sources_min_three
        description: "sources must contain at least 3 items"
        hard: true
      - id: coverage_notes_non_empty
        description: "coverage_notes must be a non-empty string"
        hard: true

  - id: 3
    name: "Researcher — Deep Dive"
    role: "Researcher"
    guidance: |
      Phase 3 — Researcher: Deep Dive

      You are now acting as the Deep Researcher for {{topic}}.

      Select 2-4 of the most relevant sources from Phase 2 and go deep.
      Quality over breadth — read carefully and extract precisely.

      Tasks:
      1. Select 2-4 sources (deep_sources). Prefer sources that address priority questions
         from Phase 1 that currently lack coverage.

      2. Write consolidated findings: what do we now know about {{topic}}?
         Be specific. Cite sections, examples, or exact quotes where possible.

      3. Trace citations: for each key claim, note its source.

      4. Note limitations: what does the research NOT cover?
         What assumptions does it make that may not hold in your context?
         At least 1 limitation required.

      Use these exact field names in your submission:
        deep_sources   — array of 2-4 strings (source names)
        findings       — string, prose narrative (NOT a dict, object, or nested structure)
        citations      — array of strings, one per key claim
        limitations    — array of strings

      Submit when: 2-4 deep sources examined, findings written, citations listed, limitations noted.
    output_schema:
      deep_sources:
        type: array
        items: string
        min_items: 2
        max_items: 4
        description: "2-4 sources selected for deep reading"
      findings:
        type: string
        min_length: 1
        description: "Consolidated findings from deep reading — specific, citable, precise"
      citations:
        type: array
        items: string
        min_items: 1
        description: "Key claims with their sources: 'claim — source (section/page)'"
      limitations:
        type: array
        items: string
        min_items: 1
        description: "What the research does not cover, or assumptions that may not hold"
    invariants:
      - id: deep_sources_range
        description: "deep_sources must contain 2 to 4 items"
        hard: true
      - id: findings_non_empty
        description: "findings must be a non-empty string"
        hard: true
      - id: citations_min_one
        description: "citations must contain at least 1 entry"
        hard: true
      - id: limitations_min_one
        description: "limitations must contain at least 1 entry"
        hard: true

  - id: 4
    name: "Critic — Challenge"
    role: "Critic"
    guidance: |
      Phase 4 — Critic: Challenge

      You are now acting as the Critic for {{topic}}.

      Your role is adversarial. Challenge the research from Phase 3.

      Tasks:
      1. List at least 1 blocking challenge — something that, if true, would meaningfully
         undermine the main findings or their applicability.

         Examples:
         - "The primary source is from 2019 — key APIs have changed significantly"
         - "All sources assume a stateless architecture, but our context is stateful"
         - "The cited benchmarks used controlled conditions unlike our production environment"

      2. List at least 1 thing that stands — something the research got right that survives scrutiny.
         This prevents the Critic from being purely destructive.

      Be specific. Generic skepticism ("needs more sources") is not useful.

      Use these exact field names in your submission:
        blocking_challenges   — array of strings
        what_stands           — array of strings (NOT "things_that_stand" or any other name)

      Submit when: at least 1 blocking challenge, at least 1 thing that stands.
    output_schema:
      blocking_challenges:
        type: array
        items: string
        min_items: 1
        description: "Specific challenges that could undermine the findings"
      what_stands:
        type: array
        items: string
        min_items: 1
        description: "Findings that survive scrutiny and should be retained"
    invariants:
      - id: blocking_challenges_min_one
        description: "blocking_challenges must contain at least 1 item"
        hard: true
      - id: what_stands_min_one
        description: "what_stands must contain at least 1 item"
        hard: true

  - id: 5
    name: "Synthesizer — Integration"
    role: "Synthesizer"
    guidance: |
      Phase 5 — Synthesizer: Integration

      You are now acting as the Synthesizer for {{topic}}.

      Integrate the research (Phase 3) and the Critic's challenges (Phase 4) into a coherent output.

      Tasks:
      1. Write a synthesis: what do we now know about {{topic}}?
         This is the main deliverable. It should be dense and useful.
         Address the priority questions from Phase 1.

      2. For each blocking challenge from Phase 4, state its resolution:
         - "resolved — [how]"
         - "partially resolved — [what remains]"
         - "still open — [why it couldn't be resolved and what it means]"

      3. Assess delta against the acceptance criteria from Phase 1:
         How close are we to done?
         Example: "3 of 5 criteria met. Criteria 4 and 5 remain open — insufficient data on X."

      Use these exact field names in your submission:
        synthesis                       — string, prose
        blocking_challenges_addressed   — array of strings, one entry per challenge (NOT "challenge_resolutions")
        delta_assessment                — string

      Submit when: synthesis written, all blocking challenges addressed, delta assessed.
    output_schema:
      synthesis:
        type: string
        min_length: 1
        description: "The main research output — dense, useful, addresses priority questions"
      blocking_challenges_addressed:
        type: array
        items: string
        min_items: 1
        description: "One entry per blocking challenge from Phase 4: 'challenge — resolution status'"
      delta_assessment:
        type: string
        min_length: 1
        description: "How many acceptance criteria are met vs open, and why"
    invariants:
      - id: synthesis_non_empty
        description: "synthesis must be a non-empty string"
        hard: true
      - id: blocking_challenges_addressed_non_empty
        description: "blocking_challenges_addressed must contain at least 1 entry"
        hard: true
      - id: delta_assessment_non_empty
        description: "delta_assessment must be a non-empty string"
        hard: true

  - id: 6
    name: "Architect — Stop/Continue"
    role: "Architect"
    guidance: |
      Phase 6 — Architect: Stop/Continue

      You are again the Architect. This is the final gate.

      Review:
      - The synthesis from Phase 5
      - The delta assessment from Phase 5
      - The acceptance criteria you defined in Phase 1
      - Any still-open blocking challenges

      Make an explicit decision:
      - "stop"     — the session has delivered sufficient value; the deliverable meets the criteria
      - "continue" — unmet criteria or open challenges justify a follow-on session

      The rationale must reference specific criteria or challenges.

      GOOD: "stop — all 4 criteria met; synthesis covers all priority questions with citations"
      GOOD: "continue — criteria 3 and 4 unmet; next session should focus on Y and Z"
      BAD:  "stop — research looks good"

      Use these exact field names in your submission:
        decision   — string, must be exactly "stop" or "continue"
        rationale  — string (specific, criterion-referenced rationale for the decision)

      Submit when: decision is "stop" or "continue", rationale references specific criteria.
    output_schema:
      decision:
        type: string
        enum: ["stop", "continue"]
        description: "Explicit stop or continue decision"
      rationale:
        type: string
        min_length: 1
        description: "Criterion-referenced rationale for the decision"
    invariants:
      - id: decision_valid
        description: "decision must be 'stop' or 'continue'"
        hard: true
      - id: rationale_non_empty
        description: "rationale must be a non-empty string"
        hard: true
