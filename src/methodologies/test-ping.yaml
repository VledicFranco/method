name: test-ping
description: "2-phase smoke test — verifies server connectivity and basic phase advancement. No research required."
version: "0.1.0"
phases:
  - id: 0
    name: "Readiness Check"
    role: null
    guidance: |
      Phase 0 — Readiness Check

      Confirm the server is connected and you are ready.

      Submit a single non-empty string in the message field. Any text is fine.

      Use this exact field name in your submission:
        message   — string (any non-empty text)

      Example valid output:
        { "message": "ready" }
    output_schema:
      message:
        type: string
        min_length: 1
        description: "Any non-empty confirmation string"
    invariants:
      - id: message_non_empty
        description: "message must be a non-empty string"
        hard: true

  - id: 1
    name: "Stop/Continue"
    role: null
    guidance: |
      Phase 1 — Stop/Continue

      Make an explicit decision and provide a rationale. This is the final phase.

      Use these exact field names in your submission:
        decision   — string, must be exactly "stop" or "continue"
        rationale  — string, non-empty

      Example valid output:
        { "decision": "stop", "rationale": "Smoke test passed. Server is connected and advancing phases correctly." }
    output_schema:
      decision:
        type: string
        enum: ["stop", "continue"]
        description: "Must be exactly 'stop' or 'continue'"
      rationale:
        type: string
        min_length: 1
        description: "Non-empty rationale for the decision"
    invariants:
      - id: decision_valid
        description: "decision must be 'stop' or 'continue'"
        hard: true
      - id: rationale_non_empty
        description: "rationale must be a non-empty string"
        hard: true
