# Method Instance Card — pv-method
# Layer 1 input to M4-MINS. Parameterizes P2-SD for this project.

project_card:
  id: I2-METHOD
  project: pv-method
  card_version: "1.5"

  governance:
    autonomy: M2-SEMIAUTO
    session_cadence: "weekly or on-demand"
    veto_authority: product_owner
    max_autonomous_decisions: 3
    essence_escalation: always
    council_path: ".method/council/"
  methodology: P2-SD
  methodology_version: "2.0"

  essence:
    purpose: >
      The runtime that makes formal methodologies executable by LLM agents. Loads
      compiled methodology YAML specifications from the registry, exposes them via
      MCP tools, and enables agents to follow step-by-step method guidance with
      structured output validation. The registry of methods IS the product — the
      server is the delivery mechanism.
    invariant: >
      Theory is the source of truth. When implementation and formal theory diverge,
      the implementation must be revised — never the theory. The registry's compiled
      methods have passed G0-G6 gates; the server must faithfully represent them
      without distortion.
    optimize_for:
      - "Faithfulness: the server's behavior must match the methodology specs it serves — no silent interpretation"
      - "Simplicity: core has zero transport deps, MCP is a thin wrapper, factory pattern for state"
      - "Registry integrity: method YAMLs are production artifacts — preserve compilation status"

  context:
    language: "TypeScript 5.7"
    build_command: "npm run build"
    test_command: "npm test"
    lint_command: "npx tsc --noEmit"
    language_server: "TypeScript Language Server"
    language_server_protocol: "LSP (via IDE)"
    additional_tools:
      - name: "tsx"
        purpose: "TypeScript execution without compilation for dev/debug"
        protocol: CLI

  architecture:
    docs_root: "docs/"
    architecture_path: "docs/arch/"
    prd_path: "docs/prds/"
    gaps_path: "docs/arch/gaps.md"
    fca_spec: "docs/fractal-component-architecture/"
    design_methodology: >
      Fractal Component Architecture (FCA) — PRD 023. One structural pattern
      (the component) repeats at every scale. Bridge follows domain-co-located
      structure with port-based dependency injection at the composition root.

  source_layout:
    monorepo: true
    layer_stack: "L2 methodts → L3 mcp → L4 bridge (deps flow downward only)"
    packages:
      - name: "@methodts/methodts"
        path: "packages/methodts/"
        layer: L2
        purpose: "TypeScript methodology type system, stdlib catalog, strategy logic"
      - name: "@methodts/testkit"
        path: "packages/testkit/"
        layer: L2
        purpose: "Testing framework — assertions, builders, diagnostics, runners"
      - name: "@methodts/mcp"
        path: "packages/mcp/"
        layer: L3
        purpose: "MCP server — thin protocol adapter over methodts"
      - name: "@methodts/bridge"
        path: "packages/bridge/"
        layer: L4
        purpose: "HTTP server — PTY session pool, domain-co-located FCA architecture"
    registry: "registry/"
    theory: "theory/"

  delivery_rules:
    # --- Registry integrity ---
    - id: DR-01
      rule: >
        The registry/ directory contains the canonical method specifications. Any
        change to a method YAML must preserve compilation status — do not introduce
        changes that would cause a compiled method to fail G0-G6 gates. Treat
        registry files as production artifacts, not scratch documents.
      applies_to: [M1-IMPL, M2-DIMPL]
      affects_roles: [impl_sub_agent]
      protocol: registry_integrity

    - id: DR-02
      rule: >
        Method YAML files follow a strict structure: navigation, domain_theory
        (sorts, function_symbols, predicates, axioms, state claims, boundary),
        roles (with coverage/authority), phases (with guidance/output_schema/invariants),
        composability, objective, termination, compilation_record. When editing
        registry YAMLs, preserve all sections — do not delete sections to simplify.
      applies_to: [M1-IMPL, M2-DIMPL]
      affects_roles: [impl_sub_agent]

    # --- Package boundary discipline ---
    - id: DR-03
      rule: >
        Domain packages (@methodts/methodts) must have zero transport dependencies — no MCP
        SDK, no HTTP, no socket imports. Domain packages export pure functions that the MCP
        package wraps. This separation allows domain logic to be used by other
        transports in the future.
      applies_to: [M1-IMPL, M2-DIMPL]
      affects_roles: [impl_sub_agent]

    - id: DR-04
      rule: >
        MCP package (@methodts/mcp) is a thin wrapper over methodts. MCP tool handlers
        should be minimal: parse input, call domain function, format output. Business
        logic in MCP handlers is a violation — move it to methodts. Boundary: response
        envelope construction from domain return types is formatting (acceptable in
        MCP). Conditional logic, state mutation, or decisions that change behavior
        based on input content are business logic (must be in the domain package).
      applies_to: [M1-IMPL, M2-DIMPL]
      affects_roles: [impl_sub_agent]
      evolution_source: "retro-prd002-impl.yaml — D-12/D-13 gap, formatting/logic boundary ambiguous"

    # --- YAML handling ---
    - id: DR-05
      rule: >
        Use js-yaml for all YAML parsing. The registry contains complex YAML with
        multi-line strings, nested objects, and arrays of objects. Parsing must
        preserve structure faithfully — no lossy transformations.
      applies_to: [M1-IMPL, M2-DIMPL]
      affects_roles: [impl_sub_agent]

    - id: DR-06
      rule: >
        Path resolution for registry files must handle both relative and absolute
        paths, and work on Windows (backslash) and Unix (forward slash). The
        registry is loaded from disk at server start; paths are resolved relative
        to the registry root.
      applies_to: [M1-IMPL, M2-DIMPL]
      affects_roles: [impl_sub_agent]

    # --- Theory alignment ---
    - id: DR-07
      rule: >
        The MCP server's tool surface must align with formal methodology concepts.
        Tool names should map to methodology operations: methodology_list (enumerate),
        methodology_load (load into session), step_current (read current step),
        step_advance (execute step transition), theory_lookup (query formal theory).
        Do not invent tools that have no methodology-level grounding.
      applies_to: [M1-IMPL, M6-ARFN]
      affects_roles: [impl_sub_agent, architect]

    - id: DR-08
      rule: >
        When the formal theory (theory/ directory) and the implementation diverge,
        the theory is the source of truth. If an implementation decision contradicts
        F1-FTH or a compiled method's axioms, the implementation must be revised —
        not the theory.
      applies_to: [M1-IMPL, M2-DIMPL, M3-PHRV]
      affects_roles: [impl_sub_agent, reviewer]

    # --- Testing ---
    - id: DR-09
      rule: >
        Every core function that loads or transforms YAML should have a test with
        a real registry YAML fixture (not a minimal mock). The registry YAMLs are
        complex and the loader must handle their full structure.
      applies_to: [M1-IMPL, M2-DIMPL]
      affects_roles: [impl_sub_agent]

    # --- Review focus ---
    - id: DR-10
      rule: >
        Phase reviews (M3-PHRV) must check registry integrity: do any registry
        YAMLs have broken references (e.g., parent methodology that doesn't exist,
        retraction pair to a method that was renamed)? Registry consistency is a
        first-class review criterion.
      applies_to: [M3-PHRV]
      affects_roles: [reviewer]

    # --- Drift audit focus ---
    - id: DR-11
      rule: >
        Drift audits (M4-DDAG) should check for theory-implementation drift: does
        the MCP server's behavior match the formal methodology specs? Common drift:
        step_advance allows transitions the step DAG doesn't permit, tools expose
        state the role's observation projection shouldn't include.
      applies_to: [M4-DDAG]
      affects_roles: [drift_auditor]
      trigger: "phase_count % 3 == 0"

    # --- Registry YAML validation ---
    - id: DR-13
      rule: >
        After editing any registry YAML file, verify parsing with strict-mode YAML
        parser: node -e "require('js-yaml').load(require('fs').readFileSync('file.yaml','utf8'))".
        Parse failures are registry integrity violations. A compiled method with
        invalid YAML is silently broken — the server can't load it.
      applies_to: [M1-IMPL, M2-DIMPL]
      affects_roles: [impl_sub_agent, orchestrator]
      evolution_source: "council SESSION-001 D-002 — M1-COUNCIL duplicate key incident"

    # --- Architecture refinement ---
    - id: DR-12
      rule: >
        Architecture specs follow the horizontal documentation pattern: one concern
        per file in docs/arch/ (loader.md, state-model.md, mcp-layer.md, etc.).
        Do not merge architecture specs into monolithic documents. Each file is
        3-12 KB and independently evolvable.
      applies_to: [M6-ARFN]
      affects_roles: [architect]
      protocol: horizontal_documentation

    # --- Bridge module testing ---
    - id: DR-14
      rule: >
        Bridge modules that manage session state, token budgets, or external API
        interactions (token-tracker, usage-poller, adaptive-settle, spawn-queue)
        must have unit tests covering their core logic paths. Dashboard and
        live-output routes should have at least smoke tests verifying they render
        without errors. Bridge test gaps are safety-net debt — silent regressions
        in session management corrupt agent execution.
      applies_to: [M1-IMPL, M2-DIMPL]
      affects_roles: [impl_sub_agent]
      evolution_source: "SESSION-036 DELTA-001 (retro-prd005-phase2, retro-2026-03-14-002)"

    # --- FCA port discipline ---
    - id: DR-15
      rule: >
        External dependencies (filesystem, YAML parsing, process execution) must be
        accessed through port interfaces defined in packages/bridge/src/ports/. Domain
        code must not import node:fs, js-yaml, or node:child_process directly — accept
        port implementations via constructor injection. The composition root
        (server-entry.ts) is the only place that instantiates concrete port providers.
        Exception: test files may use Node builtins for fixture setup. Exception: native
        fs.watch() in trigger watchers (watchers are fundamentally different from read/write).
      applies_to: [M1-IMPL, M2-DIMPL, M3-PHRV]
      affects_roles: [impl_sub_agent, reviewer]
      evolution_source: "FCA compliance audit 2026-03-23 — PRD 024 port wiring"

  processes:
    description: >
      Trigger-action pairs enforced by the steering council during Step 4 (Capture).
      Processes evolve organically through the council's governance retrospective
      (session_retro.process_improvement_signal). Evidence-based: every process traces
      to a specific pattern observed in the project's history.
    items:
      - id: PR-01
        name: "Guide sync on registry change"
        trigger: "Any commit modifying registry/ methodology or method YAMLs"
        action: "Check if the relevant guide in docs/guides/ needs updating. If yes, create an agenda item or update inline."
        enforced_by: council_step_4
        evidence: "evolution-analysis: 40% of registry changes lacked guide updates"

      - id: PR-02
        name: "Stale agenda escalation"
        trigger: "An agenda item has been open for 3+ sessions without discussion"
        action: "Leader escalates: close (do it), promote to P0 (do it next), or archive (won't do it). No item lives in limbo."
        enforced_by: council_step_2
        evidence: "evolution-analysis: 4 items never addressed across 5 sessions"

      - id: PR-03
        name: "Retro placement enforcement"
        trigger: "Any retrospective artifact is produced"
        action: "Save to .method/retros/retro-YYYY-MM-DD-NNN.yaml. NOT tmp/. Orchestrator prompts must specify this path."
        enforced_by: orchestrator_prompt
        evidence: "evolution-analysis: 12/12 retros in tmp/, 0/12 in .method/retros/"

  role_notes:
    impl_sub_agent:
      note: >
        This project has two distinct artifact types: TypeScript source code
        (packages/) and methodology YAML specifications (registry/). Sub-agents
        MUST NOT modify registry YAML files unless the task explicitly requires
        registry changes. If a registry file has a parsing error, REPORT it to
        the orchestrator — do not fix it. Also do not modify .method/project-card.yaml,
        .method/council/ artifacts, or any schema files. Code changes follow
        standard TypeScript practices. Registry changes (when explicitly authorized)
        must preserve method compilation status and structural completeness.
        IMPORTANT: Only modify files within the scope specified by the orchestrator's
        task description. If the task says "update bridge endpoints", do not also
        commit changes to council logs, architecture docs, or other files outside
        that scope. Out-of-scope changes must be reported back, not committed.
        When in doubt about a registry change, check the method's compilation_record
        to understand what gates it passed.
      scope_enforcement: >
        Orchestrator prompts MUST explicitly list which files/directories the sub-agent
        may modify (allowed_paths). Sub-agents that touch files outside allowed_paths
        create cherry-pick merge overhead and risk silent corruption of governance
        artifacts. Evidence: 4 retros documented scope drift (retro-prd004, retro-prd008,
        retro-t1x-valgaps, retro-2026-03-18-001). PRD 014 specifies infrastructure-level
        enforcement via pre-commit hooks + PTY watcher scope_violation events.
    reviewer:
      note: >
        Review has two dimensions: code quality (standard) and registry integrity
        (project-specific). Check that registry YAMLs are structurally complete,
        cross-references are valid (parent methodologies exist, retraction pairs
        reference real methods), and no compiled method has been degraded.
    architect:
      note: >
        Architecture decisions must respect the dual nature of this project: it is
        both a software product (MCP server) and a method registry (YAML specs).
        The architecture must support loading arbitrary methodology YAMLs at runtime
        while keeping the server simple and transport-agnostic.
    drift_auditor:
      note: >
        Primary drift risk: the MCP server's tool behavior diverges from the formal
        methodology specs it serves. Check that step transitions match the step DAG,
        observation projections match what tools expose, and authority constraints
        match what tools allow.
