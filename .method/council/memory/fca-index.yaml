id: TOPIC-FCA-INDEX
name: "@method/fca-index — FCA-Indexed Context Library for Token-Efficient Agent Retrieval"
status: active
sessions:
  - date: "2026-04-08"
    cast: [Oryn, Sable, Vera, Rion, Lena]
    surface_advocate: Sable
    outcome: decided
    artifact: .method/sessions/fcd-debate-fca-index/decision.md
  - date: "2026-04-09"
    cast: [Oryn, Sable, Vera, Rion, Lena]
    surface_advocate: Sable
    outcome: decided
    artifact: .method/sessions/fcd-debate-fca-index-features/decision.md
    topic: "next features — scan hygiene, context detail, compliance tooling"
  - date: "2026-04-12"
