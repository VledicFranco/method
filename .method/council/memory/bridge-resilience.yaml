standing_decisions:
  - id: SD-1
    question: "Recovery at L3 (Pacta) or L4 (Bridge)?"
    decision: "Hybrid. RecoveryIntent enum + AgentState inspectability at L3. Recovery orchestration at L4."
    rationale: "L3 exposes vocabulary, L4 implements machinery. SessionStore at L3 deferred."
    session: 1

  - id: SD-2
    question: "Event-sourcing or checkpoint-on-transition?"
    decision: "Checkpoint-on-transition via EventSink. Not event-sourcing."
    rationale: "Schema instability makes event-sourcing premature. Checkpoints give recovery data without replay infra."
    session: 1

  - id: SD-3
    question: "Startup recovery approach?"
    decision: "Three-phase: discover (NativeSessionDiscovery port) → reconcile (cross-ref persistence + PIDs) → hydrate (pool.restoreSession)"
    rationale: "Only sessions with live backing process get restored. Dead sessions tombstoned."
    session: 1

  - id: SD-4
    question: "AgentEvent to BridgeEvent integration?"
    decision: "Sink adapter at composition root. No type merging across L3/L4."
    rationale: "FCA layer boundary. L3 events stay L3-typed."
    session: 1

