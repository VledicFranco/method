      message: "feat(strategy): ArtifactStore + LlmRequest allowedTools (PRD 017 Phase 1a)"
    - hash: 22cc4b6
      message: "feat(strategy): gate framework with sandboxed evaluator (PRD 017 Phase 1b)"
    - hash: d50357a
      message: "feat(strategy): DAG executor with topo sort and parallel execution (PRD 017 Phase 1c)"
    - hash: 42a2f31
      message: "fix: remove unused variables in strategy executor files"
    - hash: 7ea8641
      message: "feat(strategy): MCP tools, HTTP endpoints, retro generator (PRD 017 Phase 1d)"
    - hash: d11a9f0
      message: "fix: remove unused beforeEach import in strategy-routes test"

