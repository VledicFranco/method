  - number: 165
    title: "chore(sc1): qualitative AC-5 analysis + post-merge bench reproduction"
    base: master
    merge_sha: "13fa23b"
    risk: very low (docs-only)
    summary: >
      Substitute for the AC-5 synthetic agent run. Reads the rendered MCP
      output for each of the 5 benchmark queries and judges whether
      top-1 enrichment achieves its goal (let agent decide without source
      reads). Conclusion: yes for all 5 queries. Side finding: top-1 strict
      precision on this benchmark is 20% — pacta-playground appears as
      top-1 for 3 unrelated queries (Q2, Q3, Q5) due to its broad README.
      This is an indexing problem PR #163 made observable rather than
      caused. Filed as a future follow-up in the analysis doc.

