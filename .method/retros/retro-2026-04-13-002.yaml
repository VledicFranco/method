hardest_decision: >
  Whether to attempt the real synthetic agent run (AC-5) autonomously via
  the bridge. Decided against it: the bridge spin-up + multi-agent runs
  consume real Claude API budget, and the user was already at the budget
  edge ("out of extra usage, resets 12am") at the start of the session.
  Doing this overnight without supervision risks burning meaningful budget
  on results the user can't immediately verify. Substituted with a
  qualitative analysis (PR #165) that predicts the qualitative outcome and
  surfaces a previously-invisible indexing problem (top-1 strict precision
  is 20% on the benchmark — pacta-playground dominates 3 unrelated queries).
  Honest substitute > risky goal-fitted experiment.

scope: >
