retro:
  id: "054"
  date: "2026-03-24"
  session_type: M2-DIMPL
  methodology: P2-SD v2.0
  instance: I2-METHOD
  commission: "Test Coverage — Low-Hanging Fruit"
  pr: 48

  hardest_decision: >
    Whether to chase the last 0.57% to hit the 85% target or accept 84.43%.
    The gap is caused by a tooling mismatch: methodts uses vitest but root
    test:coverage uses c8 with node:test, so 84 new methodts tests (commission
    + adapter) aren't reflected in the overall number. Fixing the coverage
    script would be a production code change outside the commission scope.
    Decided to accept the result and document the discrepancy.

  observations:
    - label: coverage-tool-split
      text: >
        The project has two coverage tools: c8 (root, node:test) and vitest
        (methodts). They don't merge. Any commission targeting "overall
        coverage" must account for which runner measures what. The methodts
        vitest coverage is invisible to the root metric.

    - label: core-was-undertested
      text: >
        Core went from 57% to 100% with 59 tests. The loader had ZERO direct
        tests before this commission. For a package that's the foundation of
        the system, this was a significant gap. The CoreFileSystem port made
        test isolation trivial — good architecture payoff.

    - label: parallel-subagents-effective
      text: >
        Phase 1 (3 parallel agents) and Phase 2 (2 parallel agents) worked
        well for independent test-writing tasks. No merge conflicts since each
        agent had a dedicated file scope. The key constraint was giving each
        agent enough context about existing test patterns.

    - label: flaky-tests-preexisting
      text: >
        Two pre-existing flaky tests surfaced during runs: jsonl recovery and
        OOM cap tests. These are environmental/timing-sensitive. They should
        be tagged or quarantined to avoid noise in future commissions.

  card_feedback:
    essence: >
      Coverage work validates the architecture's testability. The port pattern
      in core and the FCA domain structure in bridge both proved easy to test
      in isolation. The essence holds — the runtime's fidelity to methodology
      specs is now better verified.
    delivery_rules: >
      DR-09 (real YAML fixtures) was followed throughout. DR-14 (bridge unit
      tests) was the primary driver. No delivery rule conflicts.

  proposed_deltas:
    - type: tooling
      description: >
        Unify coverage measurement: either add methodts vitest runs to the
        root test:coverage script, or create a merged coverage report. The
        current split makes "overall coverage" misleading.
    - type: process
      description: >
        Tag flaky tests (jsonl recovery, OOM cap) so they can be excluded
        from CI without masking real failures.
