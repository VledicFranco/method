constants_landed:
  TOP_RESULT_EXCERPT_PER_PART: 350
  TOP_RESULT_TOTAL_BUDGET: 1400
  REST_RESULT_EXCERPT_PER_PART: 120
  reasoning: >
    Sweet spot from three-iteration tuning. 500/1800 gave best Q1-Q5 benefit
    but Q4 at 379%. 350/1400 brings Q4 to 365% with most of the Q1-Q5 benefit
    preserved (Q1 keeps +216 tokens of enrichment vs +355 at 500/1800).
    300/1200 only got Q4 to 359% — diminishing returns past 350/1400.
