retrospective:
  session_id: "prd003-p1-m6-arfn"
  methodology: P2-SD
  method: M6-ARFN
  method_version: "1.0"
  project_card_id: I2-METHOD

  hardest_decision:
    step: "architecture_spec"
    decision: >
      Whether getMethodologyRouting should merge formal predicates with
      operationalization predicates, and how to handle the name mismatch
      between formal predicates (e.g., "task_type") and operationalization
      entries (e.g., "task_type = section").
    outcome: >
      Decided to join on exact name match with formal predicates as the
      authoritative set. Compound operationalization names don't match base
      formal names, so those formal predicates get null trueWhen/falseWhen.
      The evaluationOrder text provides the full evaluation logic as a
      fallback. This is a pragmatic tradeoff — perfect merge would require
      parsing the compound names, which adds complexity for marginal benefit.
    guidance_gap: true

  observations:
    - step: "architecture_spec"
      type: gap
      description: >
        The predicate_operationalization section in P2-SD.yaml uses compound
        names like "task_type = section" while domain_theory.predicates uses
        base names like "task_type". The architecture had to define a merge
        strategy for these mismatched names. No methodology guidance existed
        for how to extract and join these YAML sections.
      evidence: "registry/P2-SD/P2-SD.yaml:193-249 vs :87-106"
      severity: MEDIUM
      improvement_target: project_card
    - step: "architecture_spec"
      type: success
      description: >
        The horizontal documentation pattern (DR-12) worked well. Creating
        routing.md as a separate concern from loader.md was natural and
        kept each doc focused. The existing docs (loader.md, state-model.md)
        provided clear patterns to follow.
      evidence: "docs/arch/routing.md"
      severity: LOW
      improvement_target: project_card

  card_feedback:
    - rule_id: DR-12
      verdict: helpful
      note: >
        Horizontal docs pattern guided the decision to create routing.md as
        a separate file. Clear and actionable.
    - rule_id: DR-04
      verdict: helpful
      note: >
        The formatting/logic boundary clarification (from PRD 002 retro)
        made it easy to specify that MCP handlers should just serialize
        core return values.

  proposed_deltas: []
