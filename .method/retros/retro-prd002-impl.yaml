# Retrospective — PRD 002 Implementation Session
# Produced post-hoc from the agent's implementation report.
# The executing agent did not have knowledge of RETRO-PROTO during execution.
# This retrospective was derived from their report's §8 (Decisions), §9 (Findings),
# §12 (Methodology Reflection), and observed method execution patterns.

retrospective:
  session_id: "PRD002-IMPL-20260314"
  methodology: P2-SD
  method: "M5-PLAN + M1-IMPL (sequential)"
  method_version: "M5-PLAN v1.0, M1-IMPL v3.1"
  project_card_id: I2-METHOD

  hardest_decision:
    step: "M1-IMPL sigma_A4 (Verify and Decide)"
    decision: >
      D-12/D-13 gap: the spec audit found that no specification covers who builds
      the methodology_load enriched response. The PhaseDoc tasks assumed core would
      produce it, but load() returns void. The orchestrator had to decide: add a new
      core function (obeying DR-03/DR-04 strictly) or let MCP construct the response
      from LoadedMethod fields (bending DR-04 — "MCP is thin wrapper").
    outcome: >
      Ruled that MCP constructing the response envelope from LoadedMethod fields is
      formatting, not business logic, and therefore acceptable under DR-04. No new
      core function needed. This was a pragmatic judgment that the method's guidance
      didn't cover — the method says "no business logic in MCP" but doesn't define
      what counts as "business logic" vs "formatting."
    guidance_gap: true

  observations:
    # --- Method-level signals ---
    - step: "M1-IMPL Phase B (sigma_B1-B5)"
      type: friction
      description: >
        M1-IMPL's 9-step structure is designed for single-task implementation. With
        7 tasks, Phase B steps were stretched — sigma_B3 (Implement) contained all
        7 tasks in one step. The agent had to internally organize parallel waves
        (P1-CORE + P2-CORE parallel, then P1-MCP + P3-CORE parallel, etc.) within
        a single sigma_B3. The method's step DAG doesn't model this internal
        parallelism — it's all "sigma_B3: Implement" regardless of task count.
      evidence: >
        Report §3 (Implementation Execution Order): 4 waves with parallel/serial
        dependencies, all within sigma_B3. Report §12: "sigma_B3 contained all 7
        tasks in one step."
      severity: MEDIUM
      improvement_target: abstract_method

    - step: "M1-IMPL Phase A (sigma_A1-A2)"
      type: friction
      description: >
        The spec audit inventoried 81 claims and found 13 discrepancies, of which
        5 were LOW-severity documentation issues requiring no action. The inventory
        effort for cosmetic inconsistencies may not be worth the overhead for small
        projects. The agent noted this directly in their reflection.
      evidence: >
        Report §9: 5 LOW findings with "No fix needed" resolution. Report §12:
        "The inventory effort for cosmetic inconsistencies may not be worth the
        overhead for small projects."
      severity: LOW
      improvement_target: abstract_method

    - step: "P2-SD delta_SD routing"
      type: success
      description: >
        delta_SD correctly routed to M1-IMPL over M2-DIMPL. The agent evaluated
        multi_task_scope and correctly identified file scope overlaps (state.ts/types.ts
        shared by 3 tasks, mcp/index.ts shared by 2 tasks) as blocking parallel
        dispatch. This is exactly the predicate operationalization working as intended.
      evidence: >
        Report §8 (Decision 1): "File scope overlaps in state.ts/types.ts (3 tasks)
        and mcp/index.ts (2 tasks) prevent clean parallel dispatch."
      severity: LOW
      improvement_target: abstract_method

    - step: "M5-PLAN sigma_3 (Scope and Rate)"
      type: success
      description: >
        M5-PLAN's forced PhaseDoc production caught the D-12/D-13 gap before
        implementation. Without sigma_3's scope assignment, the methodology_load
        enrichment ownership question would have surfaced mid-implementation.
      evidence: >
        Report §12: "M5-PLAN's forced PhaseDoc production caught the D-12/D-13 gap
        before implementation."
      severity: LOW
      improvement_target: abstract_method

    - step: "M1-IMPL Phase A (sigma_A2)"
      type: success
      description: >
        The spec audit's 81-claim inventory + 13-discrepancy catalog caught D-11
        (terminal step returns plain text, losing enrichment). This would have been
        a subtle bug — the enriched JSON silently losing all context on the last
        step transition.
      evidence: >
        Report §12: "D-11 (terminal step plain text) would have been a subtle bug."
      severity: LOW
      improvement_target: abstract_method

    # --- Card-level signals ---
    - step: "M1-IMPL sigma_A4"
      type: gap
      description: >
        DR-04 ("MCP handlers should be minimal: parse input, call core function,
        format output. Business logic in MCP handlers is a violation") doesn't define
        the boundary between "formatting" and "business logic." The agent had to make
        a judgment call about whether constructing a response envelope from LoadedMethod
        fields counts as formatting. The delivery rule should either define this
        boundary or acknowledge it as a judgment call.
      evidence: >
        Report §7: "One pragmatic exception: methodology_load response envelope
        assembled in MCP from LoadedMethod fields (formatting, not logic)."
        Report §8 (Decision 2): orchestrator ruled this acceptable under DR-04.
      severity: MEDIUM
      improvement_target: project_card

  card_feedback:
    - rule_id: DR-03
      verdict: helpful
      note: "Core zero-transport-deps constraint was clear and followed without friction."
    - rule_id: DR-04
      verdict: missing_coverage
      note: >
        Rule says "business logic in MCP handlers is a violation" but doesn't define
        the formatting/logic boundary. The agent had to make an undocumented judgment
        call. Suggest adding: "Response envelope construction from core return types
        is formatting; conditional logic or state mutation is business logic."
    - rule_id: DR-09
      verdict: helpful
      note: "Real YAML fixture requirement worked well — tests use registry/P0-META/M1-MDES and registry/P2-SD/M1-IMPL as fixtures."
    - rule_id: DR-12
      verdict: helpful
      note: "Horizontal doc pattern followed naturally — three focused arch doc updates."

  proposed_deltas:
    - target: abstract_method
      location: "M1-IMPL Phase B sigma_B3 guidance"
      current: "sigma_B3 is a single Implement step regardless of task count"
      proposed: >
        When PhaseDoc has > 3 tasks, sigma_B3 guidance should recommend organizing
        implementation into dependency-aware waves (parallel where file scopes are
        disjoint, serial where they overlap). The wave structure should be declared
        in sigma_B2 (Diff) alongside the change list.
      rationale: >
        The PRD 002 agent naturally organized 4 waves within sigma_B3. This is a
        recurring pattern for multi-task phases. Making it explicit in guidance would
        prevent each agent from re-inventing the wave structure.

    - target: project_card
      location: "I2-METHOD DR-04"
      current: >
        "MCP handlers should be minimal: parse input, call core function, format
        output. Business logic in MCP handlers is a violation — move it to core."
      proposed: >
        "MCP handlers should be minimal: parse input, call core function, format
        output. Business logic in MCP handlers is a violation — move it to core.
        Boundary: response envelope construction from core return types is formatting
        (acceptable in MCP). Conditional logic, state mutation, or decisions that
        change behavior based on input content are business logic (must be in core)."
      rationale: >
        The D-12/D-13 gap showed this boundary is ambiguous. The agent made the right
        call but had to improvise. Making the boundary explicit prevents future agents
        from either over-migrating formatting to core or under-migrating logic to MCP.
