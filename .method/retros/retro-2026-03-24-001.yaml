hardest_decision: >
  Whether to delete compat.ts or deprecate it. The commission said to remove it,
  but compat.ts serves a different purpose (typed DAG -> adaptive controller mapping)
  than the new unified pipeline (untyped YAML -> DAG execution). Chose deprecation
  over deletion to preserve backward compatibility without breaking external consumers.
  The deprecation notice is clear and points to the replacement.

observations:
  - The two strategy systems (bridge DAG executor and methodts adaptive controller)
    have fundamentally different execution models. The bridge model is significantly
    richer (DAG parallelism, script nodes, expression-based gates, artifacts, oversight).
    The methodts model is simpler (single-methodology loop with controller decisions).
    Unification required extending methodts with the bridge's capabilities rather than
    making the bridge delegate to methodts's existing runStrategy loop.
  - The DagNodeExecutor port pattern cleanly separates transport concerns. The bridge
    only needs to implement prompt building and LLM invocation -- all execution
    orchestration (DAG walking, gates, retries, oversight) lives in methodts.
  - Name conflicts between compat.ts StrategyDAG<S> and the new untyped StrategyDAG
    required selective re-exports in index.ts with aliasing. Adding subpath exports
    to package.json was a cleaner solution for bridge imports.
  - All 4 real strategy YAML fixtures parse and validate successfully through the
    new methodts parser, confirming behavioral equivalence with the bridge parser.

card_feedback:
  essence: >
    The purpose statement ("runtime that makes formal methodologies executable by
    LLM agents") is well-served by this change. Strategy DAGs are now first-class
    methodology artifacts in methodts, not bridge-only constructs.
  delivery_rules: >
    DR-03 (zero transport deps) was well-served by the DagNodeExecutor port.
    DR-09 (real YAML fixtures) was essential -- testing with real fixtures caught
    a path resolution issue immediately. DR-15 (port discipline) guided the
    StrategySource interface design.

proposed_deltas:
  - id: DR-16
    description: >
      Subpath exports: When adding new modules to a package, add corresponding
      subpath exports to package.json immediately. This prevents other packages
      from needing to import through the barrel index.ts (which can cause name
      conflicts and circular dependency issues).
