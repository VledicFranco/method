observations:
  - obs: >
      The pacta-testkit peer-dep problem recurs on every minor bump unless
      the range is permissive. Each release that bumps agent-runtime's
      version invalidates a fixed `^x.y.0` peer range, and ERESOLVE kills
      the workflow at npm ci before any publish. The correct expression
      is `*` because all @methodts/* packages release in lockstep (so the
      peer is ALWAYS satisfied by the workspace-linked version), AND the
      peer is already optional per peerDependenciesMeta. Fixed in
      e7c578a0. A smarter release script would detect internal @methodts/*
      peer ranges and auto-update them — captured as a potential follow-up.
  - obs: >
      gh auth switch doesn't persist across separate Bash tool invocations
      in this harness. Each shell reads the latest default account from
      the shared config. For personal-repo releases, every gh invocation
      must be preceded by `gh auth switch --user VledicFranco` in the SAME
      Bash call. For gh API POSTs, token scope also matters —
      `gh release create` failed with a "workflow scope may be required"
      error that the underlying POST via `gh api` did not — the scope
      check happens client-side in the CLI, not server-side.
  - obs: >
      Sub-agent worktree isolation is not perfect. Unit 4's sub-agent
      wrote files into the MAIN repo checkout (packages/pacta-*/) while
      its own worktree at .claude/worktrees/agent-a61ed3f9 stayed empty.
      This left uncommitted modifications in the orchestrator's main tree
      after the sub-agent completed. The sub-agent eventually committed +
      merged correctly (PR #199), but the main-tree leak complicated
      orchestrator state — needed a stash + careful checkout flow before
      the v0.3.0 release. Unit 5's sub-agent hit a similar but less severe
      version (noted in its own report). If this pattern continues,
      main-tree writes from sub-agents should either be treated as an
      expected side effect (and cleaned up explicitly by the orchestrator)
      or the harness should enforce harder isolation.
  - obs: >
      npm-scope lockstep releases + permissive internal peer ranges is
      the right default for an in-house monorepo. External @methodts
      consumers see one synchronised surface version; internal workspace
      resolution uses `*` / `workspace:*` / exact version for peer ranges
      without manual maintenance burden.
  - obs: >
      `gh release create` behaviour differs from `gh api POST /releases`:
      the CLI runs extra client-side checks (e.g. "workflow" scope warning)
      that the raw API call skips. When a release is stuck behind a CLI
      scope check but the underlying token has sufficient repo permissions,
      falling back to the API POST is the clean recovery path.

