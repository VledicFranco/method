observations:
  - >
    The fix was structurally tiny — single function, ~10 LoC of real change
    inside scanner. The leverage came from understanding WHY pacta-playground
    dominated (test-file JSDoc in embedding doc) rather than from cleverness
    in the fix itself. The qualitative analysis (PR #165) earned its keep by
    surfacing this in the first place.
  - >
    Top-1 precision metric is a useful operating metric distinct from SC-3
    (top-5 inclusion). Worth promoting to a regular dashboard. Currently we
    only track SC-1 (token cost) and SC-2 (top-5 inclusion) — top-1 strict
    precision is a third dimension that fell out of this work.
  - >
    The Q4 trade-off (loses verification-driven precise match) confirms the
    original PRD's stance that filename queries are out of fca-index scope.
    Future search-strategy advisor (still deferred) will route Q4 to glob
    entirely; until then, Q4 stays a known weakness with a known reason.
  - >
    Required a full rescan to evaluate (rm -rf .fca-index && fca-index scan .).
    Scanner changes have a non-trivial validation cost — every change requires
    re-embedding all 101 components. Worth noting for future scanner work.
  - >
    The narrowed-docText approach generalises. Promoting EMBEDDING_PARTS to a
    ProjectScanConfig field would let projects tune it (e.g., a heavily-tested
    project might want to include verification). Deferred until a real
    consumer asks.

card_feedback:
  essence: >
    Faithfulness held: implemented the council's "engine variant" spirit by
    fixing the producer (scanner), not the consumer. Honest about the Q4
    trade-off rather than over-tuning to keep the old top-1.
  delivery_rules: >
    DR-09 (real fixtures) — new scanner tests use real component fixtures
    via InMemoryFileSystem. DR-15 (port discipline) — no port changes,
    no new node:fs imports. Still respects all FCA gates (G-PORT, G-BOUNDARY,
    G-LAYER passing).

proposed_deltas:
  - >
    Add a top-1 strict precision metric to the SC-1 bench harness so we can
    watch this dimension over time, not just total tokens. Would have caught
    the playground domination at the original PR #163 measurement instead of
    requiring a follow-up qualitative analysis.
  - >
    Consider promoting EMBEDDING_PARTS to ProjectScanConfig so per-project
    tuning is possible. Currently hard-coded as a private constant.
  - >
    Document the "scanner change requires rescan" lifecycle in the fca-index
    README so future contributors don't measure stale embeddings.

