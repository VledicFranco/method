hardest_decision: >
  Whether to fix the precision issue at the scanner level (narrow docText for
  all components) or with a band-aid (add a focused README to pacta-playground).
  The band-aid would have fixed the visible symptom; the scanner fix addresses
  the root cause and benefits every component with test-heavy JSDoc. Picked
  the scanner fix because it generalises and the trade-off (Q4 loses its
  verification-driven match) is consistent with the existing PRD policy
  ("filename queries should use glob"). The empirical result confirmed the
  call: top-1 strict precision on concept queries jumped 0/4 → 4/4.

