  - id: OBS-S13
    category: agent_coordination
    observation: "The PRD 012 commissioned agent (M2-ORCH) had a sub-agent push directly to master (commit fd52a49) before the feature branch PR existed. Worktree isolation prevented file conflicts but did not prevent pushing to the wrong branch. The commission prompt said 'create a PR' but didn't say 'NEVER push to master.'"
    implication: "Commission prompts must explicitly forbid pushing to master. Consider a pre-push hook rejecting master pushes from agent sessions. PRD 017 Strategy executor should enforce branch isolation at infrastructure level."

  - id: OBS-S14
    category: agent_coordination
    observation: "PR #25 (usage-poller tests) contained print-mode code instead. The usage-poller agent's worktree branch accumulated commits from the PRD 012 agent. Root cause: M2-ORCH sub-agents may have shared branch references or pushed to wrong remotes."
    implication: "Worktree isolation alone is insufficient — agents need branch-level isolation too. Each commissioned agent should have a unique branch name derived from its session ID, and the bridge should enforce this."

  - id: OBS-S15
    category: agent_coordination
    observation: "My session notes commit accidentally went to feat/print-mode-sessions because the PRD 012 agent had switched the main repo's branch. I created a 'planning' worktree to fix this, but only after the issue occurred."
    implication: "When commissioning agents, the human (or genesis LLM) should immediately switch to a worktree to avoid branch contamination from agents working in the main repo."

  - id: OBS-S16
    category: agent_coordination
    observation: "Draft PRs cannot be merged via the GitHub MCP merge_pull_request tool. The review agent approved PR #26 but couldn't mark it as ready-for-review (no update_pull_request MCP tool exists). Had to merge via git squash merge locally."
    implication: "Need an update_pull_request MCP tool, or commission prompts should instruct agents to create non-draft PRs. Alternatively, the merge workflow should use git operations when MCP tools hit draft limitations."

  - id: OBS-S17
    category: process
    observation: "Three parallel commissions (PRD 012 Phase 4 + two PRD 013 tests) ran concurrently. All three produced working code. But the merge/review process was messy — wrong content on PR #25, stray commit on master, branch contamination. The implementation quality was good; the git coordination was poor."
    implication: "Agent code quality scales well with parallel commissions. Agent git discipline does not. The Strategy executor (PRD 017) should own git operations — agents produce artifacts, the executor handles branching, committing, and PR creation."

  - id: OBS-S18
    category: tool_effectiveness
    observation: "The /commission skill produced a prompt that the agent executed successfully (all 9 deliverables, 41+ tests, clean architecture). The PO's refinements (constant push, draft PR, PR comments as journal) were the key additions that made the process traceable."
    implication: "The commission skill's default prompt structure works. The 'PR as living artifact' pattern should be baked into the default template, not added manually each time."

