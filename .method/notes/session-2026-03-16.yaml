# ─── Observations ───────────────────────────────────────────

observations:
  - id: OBS-S1
    category: process
    observation: "Parallel explore agents (3 concurrent) were highly effective for PRD audit — each checked a subset of PRDs against the codebase independently. Total research time ~3 min vs ~10 min sequential."
    implication: "Strategy Pipelines could use this pattern: spawn parallel research agents, gate on completion, merge results."

  - id: OBS-S2
    category: tool_effectiveness
    observation: "The council session for Strategy Pipelines ran ~65 turns across 12 questions in a single context window. The 6-member cast maintained distinct voices and genuine disagreements throughout. 5 position shifts occurred naturally."
    implication: "M1-COUNCIL scales to complex design challenges with large casts. The 6-member cast was not too large — each member contributed distinctly."

  - id: OBS-S3
    category: process
    observation: "The proportionality check in the council skill correctly identified that the 'how to structure the PRD' question didn't need a council — it had a clear best answer. Saved ~15 min of unnecessary debate."
    implication: "Proportionality checks work. They should be preserved even as council usage increases."

  - id: OBS-S4
    category: context_management
    observation: "This session loaded the full codebase (theory, registry, core, mcp, bridge, project card) into context via 5 parallel explore agents before the council. Total research ~3 min. The council session benefited from this — references to specific files, interfaces, and patterns were accurate."
    implication: "Pre-loading domain knowledge before a council session produces higher-quality debate. Could be formalized as a 'research phase' in Strategy execution."

  - id: OBS-S5
    category: document_design
    observation: "The three-layer document structure (vision + PRD + council memory) emerged from a direct recommendation, not a council debate. The structure separates concerns cleanly: vision = permanent idea archive, PRD = current scope, memory = debate context."
    implication: "Not every design decision needs adversarial debate. Some have clear solutions that benefit from direct recommendation."

  - id: OBS-S6
    category: council_memory
    observation: "First use of CMEM-PROTO. The memory file for Strategy Pipelines captured 12 decisions, 4 tensions, 5 key insights, and 3 recommendations in ~200 lines of YAML. This is the right granularity — enough to resume a session without re-reading the full report."
    implication: "Memory files should stay under 300 lines. If they grow beyond that, the topic should be split."

  - id: OBS-S7
    category: tool_effectiveness
    observation: "GlyphJS lint caught 4 schema errors on first attempt (steps needed 'content' not 'description', comparison needs 'options'+'features', architecture needs 'children', sequence needs 'actors'). All fixable from schema output. Document was too tall for --continuous PDF (19857px vs 19200px limit) — had to use paginated."
    implication: "Always lint before export. For long council reports, paginated PDF is the safe default."

  - id: OBS-S8
    category: process
    observation: "The session naturally flowed: maintenance → audit → improvement → research → design. Each phase built on the prior: the PRD audit revealed what was implemented, the --print research informed the Strategy design, the council used all accumulated knowledge."
    implication: "Long sessions with accumulating context produce better design work than isolated short sessions. Strategy Pipelines should support extended multi-phase workflows."

