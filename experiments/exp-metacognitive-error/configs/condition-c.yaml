# Condition C: MonitorV2 — Prediction-Error Tracking + Adaptive Thresholds
#
# Uses MonitorV2 (createMonitorV2) which extends the v1 Monitor with:
#   - Prediction-error tracking (Friston 2009) — per-module expectation models
#   - Precision weighting (Da Costa 2024) — inverse-variance reliability weights
#   - Adaptive thresholds (Botvinick 2001) — Gratton effect on confidence threshold
#   - Metacognitive taxonomy (Nelson & Narens 1990) — EOL, JOL, FOK, RC
#
# MonitorV2 is a drop-in replacement for v1 Monitor. It produces the same
# MonitorReport output (anomalies, escalation, restrictedActions, forceReplan)
# with additional enriched monitoring signal fields (predictionError, precision,
# conflictEnergy, metacognitive judgments).
#
# This condition replaces the previously-deferred SLM Monitor condition.

condition: C
name: "v2-monitor-prediction-error"
description: "MonitorV2 with prediction-error tracking, adaptive thresholds, and precision weighting"

monitor:
  active: true
  implementation: "monitorv2"  # createMonitorV2() — prediction-error tracking Monitor
  config:
    baseConfidenceThreshold: 0.3
    grattonDelta: 0.05
    thresholdFloor: 0.1
    thresholdCeiling: 0.6
    predictionErrorThreshold: 1.5
    expectationAlpha: 0.2
    stagnationThreshold: 3

evaluation:
  method: "monitor-output"
  # Same evaluation as Condition B — MonitorReport anomalies are checked against ground truth
  # Additional enriched fields (predictionError, precision, d') are logged but not gated

metrics:
  # d' (d-prime) from signal detection theory — metacognitive sensitivity
  # d' = Z(hit rate) - Z(false alarm rate)
  # d' > 1.0 indicates meaningful discrimination ability
  dPrime: true

stream:
  minCycles: 12
  maxCycles: 18
  minErrors: 2
  maxErrors: 4

runs:
  count: 10
  baseSeed: 42
