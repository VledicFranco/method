  - "T02 deep dive: why does formula reasoning fail 80% of the time with working memory?"
  - "T06: consider whether multi-file extraction is inherently beyond partition capacity"
  - "SLM compilation: evaluator + assessment as compilation targets (zero-cost monitoring)"
