hypothesis: >
  MetaComposer-inspired task modality classification from decomposed goals can
  selectively gate memory activation: recall tasks (preserve, ensure, fix-without-editing)
  get memory ON, edit-heavy tasks get memory OFF. This should recover T01 (100% without
  memory) while keeping T02/T03/T06 improvements from memory.

