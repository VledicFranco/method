engineering_wall:
  description: >
    Memory gating by goal-verb classification cannot resolve the T01 tradeoff
    because T01 legitimately contains "must be preserved" — a recall verb.
    Memory IS architecturally appropriate for T01 (preserve = recall need), but
    the implementation adds redundant noise that hurts editing focus.

    This is a RETRIEVAL QUALITY problem, not a gating problem. The wall is at
    the boundary between "should memory activate?" (gating — solved for T02-T06)
    and "what should memory surface?" (retrieval quality — unsolved for T01).

  next_steps:
    - title: "Structural memory entries"
      detail: "Store file SUMMARIES (imports, exports, class signatures) instead of raw content. Reduces noise while preserving structural recall."
    - title: "ACT-R context tag improvement"
      detail: "Better spreading activation tags: file dependency graph, function signatures, import chains. Current tags are just significant words."
    - title: "Retrieval diversity"
      detail: "Enforce diversity in retrieved entries — don't surface 5 entries from the same file. Spread across different files for broader recall."
    - title: "MetaComposer integration (deferred)"
      detail: "The full MetaComposer needs MemoryPortV2 FactCards for signal gathering. Current experiment loop uses MemoryPortV3. Would need adapter or V3-based signal extraction."

