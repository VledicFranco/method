findings:
  - id: F1
    title: "LLM evaluator produces accurate, differentiated assessments — but makes termination WORSE"
    detail: >
      The LLM evaluator correctly identifies when the agent is reading files vs writing code,
      gives accurate discrepancy scores (1.0 when nothing done, 0.85 when partial progress,
      0.3-0.5 when substantial work completed), and provides insightful summaries. However,
      the HIGH confidence (0.85-0.95) makes the goal-unreachable heuristic fire more reliably.
      Rule-based had 0.50 confidence which let some runs escape termination. Better signal
      quality paradoxically worsened outcomes because the termination logic is flawed.

  - id: F2
    title: "The termination logic is the bottleneck, not the discrepancy signal"
    detail: >
      R-20 proved the signal was bad. R-21 proved that fixing the signal didn't fix the
      problem. The issue is structural: the unreachable check (rate<=0 past 60% of cycles)
      doesn't account for EXPECTED task phases. An agent reading files in cycles 1-6 is in
      an exploration phase, not stuck. The evaluator correctly reports "no progress" because
      no files have been written — but the correct interpretation is "exploration in progress"
      not "goal unreachable." The termination logic lacks PHASE AWARENESS.

  - id: F3
    title: "Missing cognitive functions identified — anticipatory monitoring gap"
    detail: >
      The architecture lacks three cognitive processes that humans use for progress monitoring:
      (1) Pre-task difficulty estimation (Koriat's EOL judgment) — parameterizes expected
      timeline and effort.
      (2) Phase-aware progress evaluation — reading code in cycle 3 is expected; reading code
      in cycle 12 is alarming. The current evaluator treats all cycles identically.
      (3) Solvability estimation (Metcalfe-Wiebe warmth signal) — a running P(solvable) that's
      separate from P(solved). "I haven't done it yet but I know how" prevents premature
      abandonment.
      These map to the Planner module (RFC 001, never implemented) and extensions to the
      Evaluator's metamonitor.

  - id: F4
    title: "The Planner module (RFC 001) was always the missing piece"
    detail: >
      RFC 001 defines 8 modules. The Planner (goal decomposition, strategy selection, anterior
      prefrontal abstract planning) was listed but never elaborated or implemented. RFC 004
      addressed the Evaluator's goal-state gap but assumed the discrepancy function was the
      fix. R-20/R-21 show the real gap is upstream: without a Planner that sets phase
      expectations, decomposes the goal into subgoals, and estimates difficulty, the Evaluator
      has no reference trajectory to evaluate against. It can only compare "now vs goal" —
      not "now vs where we should be."

  - id: F5
    title: "LLM evaluator validates the frontier-then-SLM pattern — the LLM CAN evaluate"
    detail: >
      Despite the termination problem, the LLM evaluator demonstrated that frontier models
      CAN assess goal-state discrepancy accurately. The assessments were insightful, correctly
      tracked which files were created, and identified when agents were stuck vs making progress.
      This validates the first step of the RFC 002 pipeline: the capability exists at the
      frontier level. When the termination logic is fixed, the LLM evaluator signal will be
      valuable. SLM compilation can follow once the full system (Planner + phase-aware Evaluator)
      is validated.

next_steps:
  - "RFC 006: Anticipatory Monitoring — formalize the missing cognitive functions"
  - "Diagnostic experiment (R-22): inject phase awareness into evaluator prompt, test if premature termination is prevented"
  - "If validated: implement Planner module + phase-aware Evaluator as proper cognitive modules"
  - "Defer SLM compilation until the full Planner→Evaluator pipeline is validated at frontier"
