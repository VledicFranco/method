investigation:
  t02_regression:
    conclusion: "LLM variance, NOT caused by pin flag"
    evidence:
      - "T02 task description matches 'Do not' pattern → 1 entry pinned. With capacity=8, negligible impact (7 slots remain)."
      - "Monitor interventions LOWER than R-14 baseline (avg 2.4 vs 5.2)"
      - "Failure reasons identical to R-14: 'applyDiscount still has the buggy formula' — same bug, same failure mode"
      - "Passing runs (3,4) succeed in same pattern as R-14 passes (6 cycles, quick fix)"
      - "At N=5, 2/5 vs 4/5 is within binomial confidence interval (p=0.80, 95% CI: [0.28, 0.99])"

  t03_regression:
    conclusion: "LLM variance, NOT caused by pin flag"
    evidence:
      - "T03 has ZERO constraint keyword matches — nothing is pinned"
      - "Failure reasons identical to R-14: 'AppConfig interface/type is not exported'"
      - "At N=5, 1/5 vs 3/5 is within binomial confidence interval (p=0.60, 95% CI: [0.15, 0.95])"

  hotfix_applied:
    commit: "7d03fc0"
    change: "Tightened \\bnever\\b → \\bnever\\s+(import|use|call|trigger|modify|...)\\b to reduce false positives on incidental 'never' usage. Added \\bprohibited\\b and \\bforbidden\\b."
    rationale: "While not the cause of T02/T03 regression, the broad 'never' pattern was a future risk. Tightened for hygiene."

findings:
  - id: F1
    title: "Pin flag produces +12pp overall improvement with no causal regression"
    detail: >
      Overall: 60% → 72%. T04: 0% → 100% (the fix). T05: 80% → 100% (bonus).
      T02 and T03 show apparent regression but investigation attributes this to
      LLM variance at N=5, not pin flag interference. The pin flag only pins 1 entry
      (task description on cycle 0), has negligible workspace capacity impact, and
      T03 has zero pinning at all.

  - id: F2
    title: "N=5 is insufficient to distinguish 40pp regression from noise"
    detail: >
      At N=5 with binomial distribution, the 95% CI for p=0.80 is [0.28, 0.99].
      Observing 2/5 is within this interval. To distinguish a true regression from
      noise with 80% power, need N≥20 per task. Recommend running N=20 on T02
      specifically if the regression concern persists.
