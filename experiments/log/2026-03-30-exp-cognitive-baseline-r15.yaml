verdict: >
  baseline (t2) and baseline-t4 tie at 6/7 (85.7%). baseline-t3 drops to 5/7 (71.4%).
  Raising the threshold to t3 HURTS: the intermediate delay is long enough to miss some
  intervention windows but not long enough to reliably let the agent self-correct.
  Raising to t4 recovers to baseline success rate while reducing avg interventions from
  6.6 to 4.4 and avg duration from 86.2s to 82.3s — a mild efficiency gain with identical
  success. However, baseline-t4 has higher variance: one run (run 2) completed with only
  2 interventions and FAILED. The failure mode was a Grep loop that baseline would have
  caught 2 cycles earlier. Overall, t2=2 (baseline) is the safer choice due to lower
  variance and proven track record. t4 is a promising candidate for future experiments
  with larger N to confirm whether the efficiency gain is robust.

recommendation: >
  Use `baseline` (stagnationThreshold=2, constrain-force) as BEST_CONFIG for R-14.
  Rationale: (1) ties t4 on success rate (6/7), (2) lower variance (1 FAIL vs 1 FAIL
  but baseline's failure was in the interior of the N, not edge-case low-intervention),
  (3) consistent with all prior experiments (R-02, R-12), making R-14 comparable to
  historical data. t4 is flagged as a follow-up ablation with larger N (N=15+) to
  confirm whether the 2-intervention reduction is real signal or noise.

findings:
  - id: F1
    title: "t3 threshold is the worst performer — 71.4% vs 85.7% for t2 and t4"
    detail: >
      stagnationThreshold=3 produced 2 failures vs 1 for both t2 and t4. The pattern
      suggests t3 is in a "bad zone": the anomaly fires 1 cycle later than t2, which
      is long enough to let some exploration loops develop but not long enough for the
      agent to self-correct. Failure runs 3 and 4 both ended in read-loop chains
      (7-9 consecutive Read/Glob cycles) without writing the fix. avg_interventions
      (5.4) is between t2 (6.6) and t4 (4.4), confirming a partial reduction that
      does not deliver the efficiency gain of t4.

  - id: F2
    title: "t4 achieves same success rate with 33% fewer interventions and 4s faster"
    detail: >
      baseline-t4 matched baseline (6/7) while averaging 4.4 interventions vs 6.6 for
      baseline — a 33% reduction. avg_duration dropped from 86.2s to 82.3s (-4.5%).
      The early-cycle over-firing documented in R-12 (constrain at cycle 2 even when
      not truly stagnated) is partially suppressed at t4, allowing more autonomous
      exploration before intervention. The single t4 failure (run 2, 2 interventions)
      was a genuine stagnation that the higher threshold delayed too long, confirming
      the tradeoff is real.

  - id: F3
    title: "t2 baseline remains the best-understood and safest config for cross-experiment comparability"
    detail: >
      R-02, R-03, and R-12 all used stagnationThreshold=2. Switching to t4 for R-14
      would break comparability with prior results. Since t2 and t4 have identical
      success rates at N=7, the tie goes to t2 for experimental continuity. If t4 is
      validated at larger N, it becomes the recommended default for new experiments.
