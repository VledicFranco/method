experiment: exp-cognitive-baseline
run_id: r15-threshold-ablation
date: 2026-03-30
agent: "Claude Sonnet 4.6"
config:
  task: "01 (circular-dep)"
  condition: cognitive
  N: 7
  configs_tested: [baseline, baseline-t3, baseline-t4]
  question: >
    Does raising stagnationThreshold from 2 → 3 → 4 (constrain-force strategy, same
    workspace + prompt) improve success rate on Task 01 by reducing premature over-firing
    in early cycles?

protocol_notes: >
  R-12 identified a wiring defect (run.ts hardcoded stagnationThreshold: 2). That defect
  was fixed prior to R-15: run.ts line 403 now reads config.monitor.stagnationThreshold.
  However, the constrain/force enforcement schedule in monitor.ts (lines 197, 211) remains
  hardcoded at consecutive=2 (constrain) and consecutive=3 (force). The stagnationThreshold
  parameter controls when the stagnation ANOMALY is flagged (triggering anomalyDetected=true
  and activating the onStagnation branch in run.ts). For t3 and t4: the anomaly fires later,
  but the restrictedActions and forceReplan computed inside monitor.ts still follow the fixed
  2/3 schedule. The practical effect is that at t4 the constrain signal from the stagnation
  branch is delayed by 2 cycles, reducing total interventions without fully removing them.

