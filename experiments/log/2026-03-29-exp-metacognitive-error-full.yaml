gate: "R-04 — Metacognitive Error Detection"
notes: |
  Key findings:

  1. E1 (contradiction), E2 (action-mismatch), E4 (planning error) are trivially detectable.
     All three conditions (including baseline A with NO monitor) achieve 100% EDR on these
     types. The error injections for E1/E2/E4 leak detectable signals directly into the
     raw monitoring stream (low confidence, conflictDetected, unexpectedResult). The Monitor
     adds no value over raw signal inspection for these error types.

  2. E3 (confidence miscalibration) is the only genuinely hard error type. It has no
     explicit failure flag — only an inflated confidence on a read-only action with zero
     novelty. Baseline A detects 0%. v1 Monitor detects 3.4%. v2 MonitorV2 detects 37.9%.
     This is the ONLY error type where the Monitor actually earns its keep.

  3. v2 MonitorV2 trades false positives for E3 detection. Its prediction-error tracking
     and adaptive thresholds catch miscalibration patterns but also raise FPR across all
     types: E1 14.6%, E2 26.3%, E3 21.8%, E4 18.1%. v1 Monitor has 0% FPR everywhere.
     G2 fails for v2 because of this.

  4. d' analysis confirms: v1 is a perfect detector for easy errors (d'=4.65) but blind
     to E3 (d'=0.17). v2 gains marginal E3 sensitivity (d'=0.34) at the cost of reduced
     discrimination on easy errors (d' drops to ~3.0-3.4 due to false positives).

  5. The experiment design has a ceiling effect. E1/E2/E4 error injections are too
     "loud" — they embed explicit failure flags (unexpectedResult=true, success=false,
     conflictDetected=true) that any threshold-based detector catches trivially. Future
     iterations should test subtler error injections where the Monitor must cross-reference
     multiple signals to detect the error, not just read a single flag.

  6. Practical implication: v1 Monitor is strictly better than v2 for the current error
     injection design. It catches everything v2 catches on 3/4 types with zero FPR. Only
     for E3-type errors (subtle miscalibration) does v2 provide marginal improvement, and
     even then at 37.9% EDR with 21.8% FPR — not clinically useful. The path forward is
     harder error injections, not more sensitive monitors.
