analysis:
  headline: |
    Hypothesis NOT supported. Interventionist (C) costs 1.42x baseline but has LOWER success
    rate (67% vs 93%). Always-on (B) costs only 1.07x and matches baseline success. The EVC
    policy is intervening too aggressively on easy tasks (simple-rename) and creating
    interference that degrades performance.

  cost_findings:
    - "Always-on (B) overhead is remarkably low at 1.07x, far below the expected >2x. This
      suggests the monitor is essentially free because MonitorV2 is rule-based (no LLM call).
      The token cost is dominated by the REASON phase (object-level LLM calls)."
    - "Interventionist (C) at 1.42x satisfies the <1.5x target but only because of config-
      migration (1.22x) and circular-dep (1.07x). Simple-rename at 1.97x exceeds the target."
    - "The 69620-token outlier in interventionist/simple-rename/run4 suggests the EVC policy
      can trigger spiraling behavior: intervention -> replan -> more intervention -> longer
      context -> more tokens per cycle."

  success_findings:
    - "No-monitor (A) 93% success rate is the highest, suggesting the baseline model (Sonnet)
      is competent enough that monitoring provides minimal error-detection benefit on these tasks."
    - "Always-on (B) matches at 93% — monitoring neither helps nor hurts much."
    - "Interventionist (C) at 67% is significantly worse. The EVC-triggered interventions on
      simple-rename (40% pass rate vs 100% baseline) actively degrade performance."
    - "Config-migration is 100% across all conditions — the ideal case for interventionist,
      where it saves tokens on an easy task."
    - "Circular-dep: always-on 100% > no-monitor 80% > interventionist 60%. Monitoring helps
      on hard tasks (B vs A) but the EVC policy's selectivity loses that benefit (C vs B)."

  intervention_findings:
    - "Interventionist triggers on ~8.9/cycle avg, vs always-on 11.4. Only 22% fewer
      interventions, not the expected 80-90% reduction. The EVC minPredictionError=0.1
      threshold is too sensitive."
    - "Config-migration shows the best selectivity: 3.8 interventions (interventionist) vs
      5.4 (always-on) = 30% reduction."
    - "Simple-rename: 11.0 interventions vs 13.8 = only 20% reduction. The EVC policy
      is triggering on nearly every cycle for a task that needs zero monitoring."

  root_cause: |
    The EVC policy with default parameters (minPredictionError=0.1) is too sensitive. It
    fires on almost every cycle because:
    1. ReasonerActorV2 emits prediction error signals on tool-use results (file reads/writes),
       and even successful operations can have PE > 0.1.
    2. The monitor's re-planning directives (forceReplan, restrictedActions) interfere with
       the agent's natural task completion flow.
    3. On simple tasks, this interference causes the agent to lose its plan and spiral.

    The "default-interventionist" architecture requires either:
    (a) Higher PE threshold (e.g., minPredictionError=0.3) to reduce false-positive triggers
    (b) Task-adaptive thresholds (calibrate based on task difficulty signal)
    (c) Monitor that doesn't issue forceReplan on low-severity anomalies

  comparison_to_pilot: |
    Pilot (N=1 on circular-dep) found interventionist at 100% success. N=5 shows it's 60%
    on the same task. Confirms N=1 pilot was insufficient for reliable success rate estimates.

verdict: FAIL
verdict_reason: |
  Interventionist (C) overhead 1.42x satisfies the <1.5x cost target BUT success rate (67%)
  is significantly worse than both baseline (93%) and always-on (93%). The cost savings are
  illusory when the agent fails more often. By the experiment's own decision criteria
  (detection rate >= 0.8x of always-on), interventionist fails: 67% / 93% = 0.72 < 0.80.

recommendations:
  - "Increase minPredictionError from 0.1 to 0.25-0.3 to reduce false-positive interventions"
  - "Separate anomaly severity levels: forceReplan only on high-severity anomalies, not all"
  - "Add a 'warm-up' period (skip monitoring for first 3 cycles) to let the agent establish its plan"
  - "Re-run with calibrated thresholds (proposed R-06b follow-up)"
  - "Investigate the 69620-token spiral: add a per-cycle token cap that triggers early exit"

