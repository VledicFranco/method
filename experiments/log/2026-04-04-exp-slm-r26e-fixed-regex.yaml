    title: "The cognitive architecture has reached its ceiling for Sonnet 4"
    detail: >
      The architecture now correctly: plans (Planner), retrieves relevant context (unified
      store), maintains understanding (working memory), assesses progress (phase-aware eval),
      gates termination (solvability), and tracks subgoal progress. But the ReasonerActor
      (Sonnet 4) sometimes writes incorrect code. This is an LLM capability limit, not an
      architecture limit. The next lever is: (1) better ReasonerActor model, or (2) verification
      loop that catches wrong writes and retries.

