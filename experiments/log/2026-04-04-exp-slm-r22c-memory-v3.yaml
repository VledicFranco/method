findings:
  - id: F1
    title: "Memory retrieval enables complex task completion — T06 0/3→2/3"
    detail: >
      T06 (multi-module extraction) went from 0/3 in every prior partitioned condition
      to 2/3. The memory module recalled evicted file contents (5 entries/cycle by
      cycle 6+) that the agent needed for the extraction. This is the exact mechanism
      predicted by RFC 006: hippocampal-style episodic recall compensates for
      workspace eviction.

  - id: F2
    title: "T03 recovered to flat baseline parity (1/3 = 33%)"
    detail: >
      T03 (config migration) matched the flat baseline rate (1/3). Memory recall
      provided the config structure context that partitions had evicted.

  - id: F3
    title: "T04 still 0/3 — memory doesn't fix reasoning-path divergence"
    detail: >
      T04 (api versioning) remains at 0%. The partition regression on T04 isn't about
      evicted content — it's about how the partitioned context shapes the agent's
      reasoning. The agent under partitioned context doesn't form the right plan for
      creating the v2 handler. This is the working memory gap: the agent has no
      persistent plan/understanding across cycles. Memory v3 provides episodic recall
      (hippocampal) but not working memory (prefrontal). RFC 006 §Module Working Memory
      identifies this as the next intervention.

  - id: F4
    title: "T01 regressed 2/3→0/3 — memory may add noise for simple tasks"
    detail: >
      T01 (circular dep) regressed from R-22b. The memory module retrieves 5 entries/cycle
      even when they're not helpful, expanding context by ~40%. For simple tasks where the
      agent needs focused attention, the extra context may be distracting. Task-dependent
      memory gating (from partitioned-smart) was not ported — worth adding.

  - id: F5
    title: "Validation of the two-layer memory architecture (RFC 006)"
    detail: >
      R-22c confirms the CLS analogy: episodic recall (Memory v3) helps with information
      retrieval but doesn't substitute for working memory. The agent can remember what it
      read but can't maintain a persistent plan. This validates RFC 006's distinction:
      module working memory = fast/local/persistent plan, episodic store = slow/global/
      recalled-on-demand facts. Both layers are needed.

next_steps:
  - "Implement per-module WorkingMemory in the algebra (RFC 006 §Module Working Memory)"
  - "R-23: ReasonerActor with persistent scratchpad — target T04 recovery"
