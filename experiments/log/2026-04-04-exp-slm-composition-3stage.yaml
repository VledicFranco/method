run_id: phase-3-three-stage-clm
date: 2026-04-04
experiment: exp-slm-composition
phase: phase-3-composition-runtime
condition: 3-stage-clm-two-real-slms

hypothesis: >
  A 3-stage CLM pipeline with two real SLMs and deterministic validation
  gates maintains >= 85% end-to-end accuracy, validating RFC 005's error
  compounding theory that gates reduce compounding from multiplicative
  (a^N) to linear (1 - N*f).

pipeline:
  id: 3-stage-clm
  stages:
    - "Stage 1: B-1 SLM (Schema→Grammar) — TS interface → PEG grammar"
    - "Gate 1: PeggyCompileGate — grammar compiles?"
    - "Stage 2: Context generator (deterministic) — generates SESSION-CONTEXT"
    - "Stage 3: Downstream SLM (WorktreeInfo) — context → DSL output"
    - "Gate 2: PeggyParseGate — DSL parses through B-1's grammar?"
  slm_count: 2
  gate_count: 2
  total_stages: 3

results:
  three_stage_e2e:
    success: 50
    total: 50
    rate: 1.00
    mean_latency_ms: 1.63
    gate_pass_rate: 1.00
    verdict: PASS

  error_compounding:
    ungated_direct_parse: { pass: 50, total: 50, rate: 1.00 }
    gated_pipeline: { pass: 50, total: 50, rate: 1.00 }
    theory_prediction_ungated: "0.95^3 = 85.7% (at 95% per-stage)"
    actual_with_gates: "100.0%"
    observation: >
      Both gated and ungated achieve 100% because both SLMs are at ~100%
      on this task. The error compounding theory is validated in principle
      (gates don't degrade), but the stronger test needs SLMs with real
      error rates (< 100%).

findings:
  - "F1: 3-stage CLM with 2 real SLMs achieves 100% (50/50) — no depth ceiling at N=3"
  - "F2: The full bootstrap chain works: B-1 generates grammar → grammar validates downstream SLM output"
  - "F3: Cross-SLM composition is viable — B-1 and downstream SLM were trained independently, yet compose correctly"
  - "F4: Validation gates add zero overhead to correct outputs — gate pass rate 100%, mean pipeline latency 1.63ms"
  - "F5: The composition runtime handles 3-stage pipelines correctly — metrics, state propagation, gate ordering all work"

architectural_observations:
  - "PipelineContext.state carries compiled parser from Gate 1 to Gate 2 across 3 stages — the port pattern scales"
  - "Stage 2 (deterministic context generator) shows mixed SLM+deterministic stages compose naturally"
  - "The pipeline engine's stage/gate iteration is N-agnostic — no changes needed for deeper pipelines"

not_yet_validated:
  - "Error compounding with real errors (both SLMs at ~100% makes the ablation trivial)"
  - "N > 3 stages (no additional SLMs to add currently)"
  - "Parallel composition (A ⊗ B) across stages"

session_cost_estimate:
  inference: "$0 (pre-generated predictions)"
  total: "$0"
