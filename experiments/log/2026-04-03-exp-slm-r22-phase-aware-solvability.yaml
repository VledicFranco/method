findings:
  - id: F1
    title: "Phase awareness produces meaningful, differentiated signals — hypothesis partially validated"
    detail: >
      The phase-aware evaluator correctly identifies explore→execute→verify transitions,
      gives task-specific KPIs, and reports solvability as a separate dimension. T01 improved
      from 0/3 (R-21) to 2/3 — the two passing runs used all 15 cycles because solvability
      stayed high enough to prevent premature termination. This is the RFC 006 mechanism
      working as designed.

  - id: F2
    title: "Solvability signal is too volatile — single-cycle drops cause false unreachable"
    detail: >
      Solvability swings wildly: 0.85→0.20 in a single cycle when the agent makes an error
      or gets a connection timeout. The termination check fires on the raw single-cycle value,
      not a smoothed trend. Several runs where the agent was making genuine progress (discrepancy
      decreasing, previous solvability 0.75+) got killed because one bad cycle tanked solvability.
      Fix: rolling average or require sustained low solvability (2+ cycles below threshold).

  - id: F3
    title: "False-positive goal-satisfied is a new failure mode"
    detail: >
      Two runs (T02 run 3, T04 run 3) received goal-satisfied termination with discrepancy=0.0
      and confidence=0.95, but actual validation failed. The LLM evaluator thought the agent
      had completed the task when it hadn't — the writes were syntactically present but
      semantically wrong. Fix: require satisfied=true for 2+ consecutive cycles.

  - id: F4
    title: "Connection errors cause evaluator fallback to rule-based"
    detail: >
      T06 run 3 had connection errors on every evaluator call, falling back to rule-based
      (disc=0.600, conf=0.70). The old rate-based termination then fired at cycle 10.
      This is expected degradation but worth noting.

next_steps:
  - "R-22b: Smooth solvability (rolling 3-cycle avg), require sustained low solvability, require sustained satisfied"
  - "If R-22b reaches flat baseline parity (73%), proceed to R-23 module implementation"
