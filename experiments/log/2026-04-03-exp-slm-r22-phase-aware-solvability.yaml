experiment: exp-slm
run_id: r22-phase-aware-solvability
date: 2026-04-03
agent: "Claude Opus 4.6"
config:
  task: "RFC 006 diagnostic — phase-aware evaluator with solvability-gated termination"
  conditions: ["partitioned-cognitive-goal"]
  baseline_comparison: "R-21 (LLM eval, 17%), R-20 (rule-based, 22%), R-15 (flat, 73%)"
  n_per_task: 3
  max_cycles: 15
  modules:
    observer: "rule-based, cycle 0 only"
    monitor: "rule-based"
    evaluator: "LLM phase-aware (buildPhaseAwareDiscrepancy) + solvability gating"
    reasoner_actor: "Claude Sonnet 4 (frontier)"
  rfc005_features:
    task_assessment: "assessTaskWithLLM() at cycle 0 — difficulty, phases, KPIs"
    phase_aware_prompt: "evaluator receives TaskAssessment with phase context"
    solvability_gating: "terminate unreachable when solvability < 0.3 past 50% of estimatedCycles"
    signals_returned: "discrepancy + solvability + currentPhase (separate)"

status: closed-partial

