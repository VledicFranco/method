experiment: exp-cognitive-baseline
run_id: r12-threshold-ablation
date: 2026-03-30
agent: "Claude Sonnet 4.6"
config:
  task: "01 (circular-dep)"
  condition: cognitive
  N: 5
  configs_tested: [baseline, v2-minimal, v2-thane]

protocol_notes: >
  R-12 intended to ablate stagnationThreshold=2,3,4. During pre-run analysis,
  a wiring defect was discovered: run.ts line 403 hardcodes createMonitor with
  stagnationThreshold:2 regardless of config.monitor.stagnationThreshold.
  The enforcement schedule in monitor.ts is also hardcoded (constrain@2, force@3).
  A true threshold ablation (passing 2→3→4 into createMonitor) is not possible
  via the existing --config flag alone.

  Instead, R-12 tested the three available MONITOR STRATEGY variants that differ
  in intervention behavior — effectively a monitor strategy ablation at a fixed
  threshold=2. The three configs chosen were:
    - baseline: constrain-force (action blocking + force replan, unlimited budget)
    - v2-minimal: reframe (no action blocking, force replan only, unlimited budget)
    - v2-thane: nudge-reframe-reset (3-tier escalation, budget=3, then silent)

  This is the data that can be collected under the current implementation.
  The wiring fix needed for true threshold ablation is logged as a finding.

