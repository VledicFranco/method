verdict: >
  Config alpha (baseline, constrain-force, threshold=2) remains the best-performing
  monitor strategy: 4/5 (80%) on Task 01 in this N=5 run, consistent with R-02
  (6/10, 60%). The reframe monitor (beta) produced a catastrophic regression: 0/5
  with avg tokens 43435 (73% higher than alpha). The budgeted nudge-reframe-reset
  monitor (gamma) also failed 0/5, but at 29974 avg tokens — suggesting the budget
  enforcement at least prevents runaway token use even while failing.

  The original R-12 question (what threshold stops over-firing without losing real
  stagnation detection) cannot be answered from these results because the threshold
  is hardcoded. What CAN be concluded: the constrain-force strategy is strictly
  necessary. Softening interventions to reframe-only causes complete failure on
  Task 01 — more interventions (8.2 vs 6.0 avg) at higher cost with 0% success.
  The reframe strategy allows the agent to continue accumulating reads indefinitely
  rather than blocking the stuck action, which explains the token explosion.

  True threshold ablation requires a code fix in run.ts to pass
  config.monitor.stagnationThreshold into createMonitor().

findings:
  - id: F1
    title: "Constrain-force is necessary — reframe-only causes complete failure"
    detail: >
      Switching from action-blocking (constrain-force) to reframe-only on Task 01
      dropped success from 80% to 0% while increasing avg tokens by 73% (25084 →
      43435). The reframe strategy fires more interventions (8.2 vs 6.0) but without
      action blocking, the agent continues identical read actions — the reframe prompt
      has no traction against the exploration-stagnation pattern.

  - id: F2
    title: "Budgeted monitor avoids token explosion but cannot recover from exploration loops"
    detail: >
      v2-thane (budget=3, nudge-reframe-reset) had the lowest token consumption
      (29974 avg) but 0/5 success. After the 3-intervention budget exhausts in cycles
      2-4, the monitor goes silent and the agent enters pure Glob loops (10-13 Glob
      calls in a row). The budget prevents escalating token cost but offers no path
      to recovery. Budget enforcement is a cost control tool, not a quality tool.

  - id: F3
    title: "Stagnation threshold is hardcoded — wiring defect prevents true ablation"
    detail: >
      run.ts line 403 hardcodes createMonitor({ stagnationThreshold: 2 }) regardless
      of config.monitor.stagnationThreshold. The enforcement schedule in monitor.ts
      (constrain@2, force@3) is also hardcoded at the module level and is not
      parameterized by the config value. A true threshold ablation (testing 2,3,4)
      requires: (1) pass config.monitor.stagnationThreshold into createMonitor() in
      run.ts, and (2) parameterize the enforcement schedule (lines 197-212 of
      monitor.ts) to use the configured threshold rather than hardcoded 2/3.

  - id: F4
    title: "Alpha (constrain-force) at N=5 shows 80% success — improved from R-02 baseline"
    detail: >
      R-02 showed 6/10 (60%) with identical config. This N=5 run shows 4/5 (80%).
      The difference likely reflects run-to-run variance at small N. The two results
      are not statistically distinguishable at N=5 vs N=10, but the direction is
      consistent with constrain-force being the best available monitor strategy.

recommendations:
  - >
    Fix the wiring defect (run.ts line 403): replace the hardcoded stagnationThreshold:2
    with config.monitor.stagnationThreshold to enable true threshold ablation. Also
    parameterize monitor.ts enforcement schedule lines 197-212. This is the prerequisite
    for the actual R-12 ablation (testing threshold=2,3,4).
  - >
    Keep constrain-force as the monitor strategy for all subsequent experiments.
    The reframe and nudge-reframe-reset strategies are strictly worse on Task 01.
    Do not change monitor strategy without the wiring fix.
  - >
    Once the wiring is fixed, run the true threshold ablation: threshold=2 (current),
    3 (one extra read), 4 (two extra reads). Hypothesis: threshold=3 or 4 will reduce
    early-cycle over-firing (which currently starts at cycle 2) while preserving
    stagnation detection for genuine loops.
  - >
    Add a `--stagnation-threshold=N` CLI flag to run.ts to enable single-run
    ablation without modifying config objects.

wiring_defect:
  file: experiments/exp-cognitive-baseline/run.ts
  line: 403
  current: "const monitor = createMonitor({ confidenceThreshold: 0.3, stagnationThreshold: 2 });"
  fix: "const monitor = createMonitor({ confidenceThreshold: 0.3, stagnationThreshold: config.monitor.stagnationThreshold });"
  also_needed:
    - "Parameterize monitor.ts enforcement schedule (lines 197-212) to use configured threshold"
    - "Add --stagnation-threshold=N CLI flag to run.ts main()"
