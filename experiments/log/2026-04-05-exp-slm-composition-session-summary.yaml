run_id: 2026-04-session-summary
date_range: "2026-04-04 to 2026-04-05"
experiment: exp-slm-composition
phase: phase-1 through phase-3 + phase-2 bootstrap

summary: >
  Two-day work session that built the CLM composition runtime, retrained B-1 with
  improved corpus and multi-language support, validated cross-SLM composition at
  N=3, trained B-2 Causal Validator, and bootstrapped the first fully-automated
  SLM (KPI Checker) using the flywheel. The bootstrap loop is now operational.

session_deliverables:
  composition_runtime:
    - "7 source files, 28 tests, all passing"
    - "Port interfaces: StagePort, GatePort, InferencePort"
    - "Gate types: PeggyCompile, PeggyParse, Schema, ClassifierGate (pending)"
    - "Stage types: SLMStage, DeterministicStage, ExampleGeneratorStage"
    - "Competitive composition operator (A ⊕ B) with selector gate"
    - "Ollama inference adapter + frontier escalation (qwen3-coder:30b)"

  slms_trained:
    - model: B-1 v2 (Schema→Grammar)
      corpus: "3K pairs (TypeScript + JSON Schema)"
      training_time: "79 min"
      result: "96.7% novel TS (29/30), 100% JSON Schema (5/5)"
    - model: B-2 Causal Validator
      corpus: "8.5K pairs across 3 domains (monitor, worktree, schema-grammar)"
      training_time: "189 min"
      result: "95.5% precision, 89.6% accuracy (Gate B-G1 PASS)"
    - model: KPI Checker (first flywheel-bootstrapped)
      corpus: "3K pairs (Check DSL, 100% grammar-validated)"
      training_time: "40 min"
      result: "100% parse accuracy, 100% semantic match (600/600)"

  gates_passed:
    - { gate: C-G1, name: "2-stage CLM e2e accuracy", target: ">=85%", result: "100% (50/50)" }
    - { gate: C-G2, name: "Gate effectiveness ablation", target: ">=50%", result: "100%" }
    - { gate: B-G1, name: "B-2 precision on INVALID", target: ">=90%", result: "95.5%" }
    - { gate: B-G2_partial, name: "SLM creation time", target: "<2 days", result: "~1h 45min (8x speedup)" }
    - { gate: "3-stage CLM", name: "Depth stress test", target: "No degradation at N=3", result: "100% (50/50, 2 real SLMs)" }
    - { gate: "KPI Gate 1", name: "Parse accuracy", target: ">=98%", result: "100%" }
    - { gate: "KPI Gate 2", name: "Semantic match", target: ">=90%", result: "100%" }

  documentation:
    - "composition-runtime/FINDINGS.md — Phase 3 comprehensive findings"
    - "phase-2-bootstrap/FINDINGS.md — bootstrap flywheel results"
    - "docs/guides/37-slm-training-pipeline.md — how-to guide with rationale"
    - "6 experiment YAML logs"
    - "Updated CLAUDE.md research table + experiment README"

bootstrap_flywheel_status: FULLY_OPERATIONAL

flywheel_components:
  B-1_v2:
    role: "Grammar generation from type definitions"
    status: "Production — 96.7% novel TS, 100% JSON Schema"
    enables: "Automated grammar creation for new DSLs"
  composition_runtime:
    role: "Pipeline orchestration with validation gates"
    status: "Production — 31 tests, 3-stage validated"
    enables: "Automated corpus validation (100% via Peggy gates)"
  B-2:
    role: "Causal consistency validator"
    status: "Production — 95.5% precision"
    enables: "Automated corpus quality checks (replaces manual review)"

flywheel_performance:
  manual_slm_creation: "~14 hours (Monitor, Observer, Evaluator baseline)"
  bootstrapped_slm_creation: "~1h 45min (KPI Checker)"
  speedup: 8
  human_effort_reduction: "~14x (12h → 50min)"

key_findings:
  - "F1: Deterministic gates provide free, perfect structural validation (f=0)"
  - "F2: Error bound collapses to 1.0 for translator pipelines regardless of depth N"
  - "F3: Cross-SLM composition works via grammar contracts (B-1 + downstream at 100%)"
  - "F4: B-1 is a genuine type→grammar translator — cross-language generalization works with 16% multi-lang corpus"
  - "F5: B-2 achieves high precision (95.5%) on unseen pairs via cross-domain training"
  - "F6: Bootstrap flywheel works end-to-end — 8x speedup validated with KPI Checker"
  - "F7: Targeted corpus improvements produce large accuracy gains (+20pp on novel inputs with compound field names)"

what_remains:
  phase_1: "B-1 v3 with Protobuf + Python dataclass (corpus ready, training queued)"
  phase_2: "B-3 Trace Distiller, second bootstrapped SLM, bootstrap pipeline wiring"
  phase_4: "Autonomous compilation loop (Memory trigger, Reflector extension, DSL Inducer, MetaComposer)"
  phase_5: "Application domain experiments (coding, scientific, coordination)"
  research_opportunities:
    - "Error compounding stress test with weakened SLM (deliberately degraded model at N=4+)"
    - "Per-domain precision analysis for B-2"
    - "ARC-AGI integration (external AGI benchmark)"
    - "Integrate KPI Checker into Planner (PRD 049 R-28 experiment)"

total_session_cost: "$0 (all training on local GPU, pre-generated predictions otherwise)"
