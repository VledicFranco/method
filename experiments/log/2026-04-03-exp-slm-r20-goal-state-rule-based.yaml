findings:
  - id: F1
    title: "Rule-based discrepancy function cannot measure progress"
    detail: >
      computeDiscrepancy() produces constant output (0.300 discrepancy, 0.50 confidence)
      regardless of actual task progress. The function uses keyword overlap between goal
      description and workspace content — but the workspace contains tool calls and file
      contents, not goal-matching keywords. The signal is meaningless.

  - id: F2
    title: "Universal premature termination — 100% of runs killed at cycle 10"
    detail: >
      Every single run terminates at cycle 10 with goal-unreachable. The mechanism:
      (1) discrepancy flatlines at 0.300 with rate=0.000 from cycle 1-9,
      (2) at cycle 10 (67% of 15 = past 60% threshold), the unreachable heuristic fires
      because rate <= 0 and diminishingReturns is true. The heuristic is correct given
      its inputs — the inputs are wrong.

  - id: F3
    title: "satisfied=true triggered but blocked by confidence gate"
    detail: >
      From cycle 4 onward in many runs, satisfied=true (discrepancy 0.300 < 1-0.80=0.20
      is FALSE, but aspiration drops below 0.80 via Selten adaptation, eventually making
      the threshold 0.40 which 0.300 IS below). However, the confidence (0.50) never
      exceeds the 0.70 gate, so goal-satisfied termination never fires. The rule-based
      confidence estimator can't reach high confidence without subgoals.

  - id: F4
    title: "Goal-state monitoring architecture is sound — discrepancy function is the bottleneck"
    detail: >
      The cycle integration (Wave 2), TerminateSignal propagation, and experiment runner
      integration (Wave 3) all work correctly. The architecture faithfully implements the
      Carver-Scheier cybernetic loop. The problem is purely in the comparator (discrepancy
      function) — it can't actually compare workspace state to goal state. This motivates
      upgrading to an LLM-based evaluator (frontier model first, then SLM compilation).

next_steps:
  - "R-21: Replace rule-based discrepancy with frontier LLM evaluator"
  - "If R-21 shows LLM can measure progress accurately, investigate termination tuning"
