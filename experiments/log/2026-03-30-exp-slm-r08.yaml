experiment: exp-slm
run_id: r08-observer-evaluator-design
date: 2026-03-30
agent: "Claude Sonnet 4.6 (sub-agent)"
config:
  task: "Design and train Observer and Evaluator SLMs (multi-module scaling)"
  models: ["observer-qwen25-coder-05b-lora", "evaluator-qwen25-coder-05b-lora"]
  base_model: "Qwen2.5-Coder-0.5B-Instruct"
  lora_r: 16
  max_steps: 3000
  dsls:
    observer: "OBS-SIGNALS → PRIORITY/FOCUS/NOVELTY/NOTE"
    evaluator: "EVAL-SIGNALS → PROGRESS/CONFIDENCE/ACTION/NOTE"

status: partial-complete

outcomes:
  observer:
    corpus_generated: true
    corpus_path: "phase-2-dsl/corpus/observer-v1/"
    corpus_entries: "~10K (generated by generate-observer-corpus.py)"
    training_status: "incomplete — stopped at checkpoint-2000 (2/3 through)"
    training_loss: "unknown (log only captured evaluation progress bars)"
    checkpoint_usable: true
    checkpoint_path: "phase-3-training/models/observer-qwen25-coder-05b-lora/checkpoint-2000/"
    onnx_export: pending

  evaluator:
    corpus_generated: true
    corpus_path: "phase-2-dsl/corpus/evaluator-v1/"
    corpus_entries: "~10K (generated by generate-evaluator-corpus.py)"
    training_status: "FAILED — NaN loss throughout entire training run"
    training_loss: "loss=0.0, grad_norm=nan, mean_token_accuracy=0.0 from step 0"
    checkpoint_usable: false
    root_cause: "unknown — possible learning rate too high, corpus format mismatch, or gradient explosion at initialization"

training_failures:
  - id: F1
    title: "Evaluator training diverged immediately (NaN loss from step 0)"
    detail: >
      The evaluator training showed loss=0.0 and grad_norm=NaN from the first logged step,
      with mean_token_accuracy=0.0 throughout. This is a catastrophic divergence, not a
      gradual one. Possible causes: (1) learning rate 2e-4 too high for evaluator DSL
      sequences, (2) evaluator corpus format mismatch with training script tokenization,
      (3) LoRA initialization with this specific model+data combination causing gradient
      explosion immediately. The observer trained on the same script without this issue,
      suggesting corpus or learning rate is the culprit.

  - id: F2
    title: "Observer training stopped at checkpoint-2000 (step 2000/3000)"
    detail: >
      The observer training log shows no loss metrics (only evaluation progress bars were
      captured). The model directory has checkpoint-1000 and checkpoint-2000 but no
      checkpoint-3000. Training likely ran concurrently with other GPU-intensive tasks
      (stagnation ONNX export on GPU 0) and may have been interrupted or OOM-killed.
      checkpoint-2000 is usable for evaluation but represents only 67% of planned training.

recommendations:
  - Retrain evaluator with lower learning rate (1e-4 or 5e-5)
  - Validate evaluator corpus format against tokenizer before training
  - Train observer and evaluator sequentially (not concurrently) to avoid VRAM pressure
  - Complete observer training from checkpoint-2000 with remaining 1000 steps
  - After successful training, export both to ONNX and run DSL parse rate evaluation

configs:
  observer_config: "phase-3-training/configs/observer-qwen25-coder-05b-lora.yaml"
  evaluator_config: "phase-3-training/configs/evaluator-qwen25-coder-05b-lora.yaml"
  corpus_generators:
    - "phase-2-dsl/scripts/generate-observer-corpus.py"
    - "phase-2-dsl/scripts/generate-evaluator-corpus.py"
