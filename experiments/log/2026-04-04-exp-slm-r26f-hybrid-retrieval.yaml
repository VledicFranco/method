  overall: { pass: 7, fail: 11, rate: 0.39 }

findings:
  - id: F1
    title: "Hybrid retrieval doesn't improve outcomes — retrieval was already good enough"
    detail: >
      Semantic search is working (embeddings active, RRF fusion running) but the bottleneck
      isn't retrieval quality. The agent sees the right context in both lexical and hybrid
      modes. The failures are in LLM code generation: handleOrderV2 referenced but not defined,
      router not updated correctly. Adding semantic search to an already-adequate lexical
      system provides no marginal value for these tasks.
  - id: F2
    title: "The architecture has reached its ceiling for the current task suite + Sonnet 4"
    detail: >
      Across R-26 through R-26f (6 runs, N=3 each = 108 task attempts): the architecture
      consistently produces T01 67-100%, T02 67-100%, T05 100%. T03/T04/T06 are bounded by
      LLM capability (wrong code, incomplete implementations) not architecture gaps. The
      next lever is either: (1) better base model, (2) verification/retry loop, or (3)
      larger N for statistical confidence on the demonstrated rates.

architecture_ceiling_analysis:
  retrieval_quality: "Sufficient — both lexical and hybrid produce adequate context"
  planning_quality: "Good — Planner subgoals are correct and actionable"
  monitoring_quality: "Good — phase-aware, solvability-gated, KPI-checked"
  working_memory: "Good — plan persistence prevents read-loops"
  code_generation: "BOTTLENECK — Sonnet 4 writes incorrect implementations ~40% of time on multi-file tasks"
  next_levers:
    - "Verification loop: after writes, validate against KPIs and retry on failure"
    - "Better model: try Opus for ReasonerActor on T04/T06"
    - "N=5+ replication: stabilize the demonstrated best rates"
