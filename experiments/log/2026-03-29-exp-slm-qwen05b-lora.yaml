notes: >
  Qwen2.5-0.5B-Instruct with LoRA (r=16, alpha=32, 0.44% trainable params)
  on 10K augmented corpus. All three evaluation gates pass with the best
  results across all models tested. QLoRA (4-bit NF4) was attempted first but
