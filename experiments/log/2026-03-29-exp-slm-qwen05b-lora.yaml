    adversarial 92.45% vs 77.36% (+15.1pp). Significant adversarial gain.

  Qwen2.5-0.5B achieved the highest semantic and adversarial accuracy of any
  model tested, with only 2.16M trainable parameters (0.44% of 494M). Peak VRAM
  4466 MB fits comfortably in 11GB RTX 2080 Ti. Training completed in 20.0
  minutes (3000 steps, batch_size=2). Inference latency median 0.54s — faster
  than the 360M LoRA (0.76s) despite being a larger base model, likely due to
  Qwen2.5's more efficient architecture. Confidence extremely high (mean 0.9995).
