model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  dtype: "float32"

lora:
  r: 16
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  max_steps: 1500
  per_device_train_batch_size: 4
  learning_rate: 2.0e-4
  warmup_steps: 50
  weight_decay: 0.01
  fp16: true
  bf16: false
  max_length: 256
  logging_steps: 100
  save_strategy: "steps"
  save_steps: 500
  eval_strategy: "steps"
  eval_steps: 500
  seed: 42

data:
  train_path: "../../exp-slm-composition/phase-1-schema-grammar/corpus/ag2-worktree/train.jsonl"
  holdout_path: "../../exp-slm-composition/phase-1-schema-grammar/corpus/ag2-worktree/holdout.jsonl"

output:
  dir: "../../exp-slm-composition/phase-1-schema-grammar/models/ag2-worktree-qwen25-05b-lora"
